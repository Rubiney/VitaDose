<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Asma / DPOC — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .ad-hdr{background:linear-gradient(135deg,#065f46,#0369a1);color:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
    .ad-title{font-size:1rem;font-weight:800;margin-bottom:4px}
    .ad-sub{font-size:.73rem;opacity:.8}
    label{font-size:.75rem;font-weight:700;color:#1e3a5f;display:block;margin-bottom:4px}
    select,input[type=number]{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;outline:none;margin-bottom:10px}
    select:focus,input:focus{border-color:#065f46}
    .checkbox-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .checkbox-item{display:flex;align-items:center;gap:8px;font-size:.8rem;cursor:pointer}
    .checkbox-item input[type=checkbox]{width:18px;height:18px;accent-color:#065f46;cursor:pointer}
    .btn-calc{width:100%;background:#065f46;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.87rem;font-weight:700;cursor:pointer;margin:8px 0}
    .tab-bar{display:flex;gap:6px;margin-bottom:14px}
    .tab-btn{flex:1;padding:10px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;color:#64748b}
    .tab-btn.active{border-color:#065f46;background:#f0fdf4;color:#065f46}
    .ctrl-card{border-radius:14px;border:4px solid;padding:14px;margin-bottom:10px;text-align:center}
    .ctrl-num{font-size:1.6rem;font-weight:900;line-height:1}
    .ctrl-lbl{font-size:.85rem;font-weight:800;margin-top:4px}
    .step-card{border-radius:12px;border:2px solid;padding:14px;margin-bottom:10px}
    .step-hdr{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .step-nome{font-size:.88rem;font-weight:800;margin-bottom:6px}
    .step-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;color:#fff;margin:2px}
    .step-drugs{font-size:.78rem;margin-top:6px;line-height:1.7}
    .step-note{font-size:.71rem;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #f1f5f9}
    .dev-card{border-radius:10px;border:2px solid #e2e8f0;padding:12px;margin-bottom:8px}
    .dev-nome{font-size:.82rem;font-weight:800;color:#1e3a5f;margin-bottom:4px}
    .dev-row{padding:4px 0;border-bottom:1px dashed #e2e8f0;font-size:.75rem;line-height:1.5}
    .dev-row:last-child{border-bottom:none}
    .dev-lbl{font-size:.62rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
    .gold-badge{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;font-size:1.3rem;font-weight:900;color:#fff;flex-shrink:0}
  </style>
</head>
<body>
<header class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="top-title">Asma / DPOC — Algoritmo</span>
  <div class="top-right"></div>
</header>
<main class="container" style="padding-bottom:90px">

  <div class="ad-hdr">
    <div class="ad-title">🌬️ Asma e DPOC — Algoritmo Farmacoterapêutico</div>
    <div class="ad-sub">GINA 2024 (Asma) · GOLD 2024 (DPOC) · Guia de Dispositivos Inalatórios</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tb0" onclick="showTab(0)">Asma</button>
    <button class="tab-btn" id="tb1" onclick="showTab(1)">DPOC</button>
    <button class="tab-btn" id="tb2" onclick="showTab(2)">Dispositivos</button>
  </div>

  <!-- TAB 0 – ASMA -->
  <div id="tab0">
    <div class="card" style="padding:12px 14px">
      <label>Modo</label>
      <select id="a_modo">
        <option value="ctrl">Controle crônico — avaliar degrau terapêutico</option>
        <option value="exac">Exacerbação aguda</option>
      </select>
      <label>Controle nas últimas 4 semanas</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="a_sint"> Sintomas diurnos &gt;2×/semana</label>
        <label class="checkbox-item"><input type="checkbox" id="a_limit"> Limitação de atividade por asma</label>
        <label class="checkbox-item"><input type="checkbox" id="a_noct"> Despertar noturno por asma</label>
        <label class="checkbox-item"><input type="checkbox" id="a_saba"> Uso de SABA/reliever &gt;2×/semana</label>
      </div>
      <label>Degrau terapêutico atual (GINA)</label>
      <select id="a_step">
        <option value="0">Sem tratamento regular (diagnosticado agora)</option>
        <option value="1">Degrau 1 (reliever PRN somente)</option>
        <option value="2">Degrau 2 (CI baixa dose diária)</option>
        <option value="3">Degrau 3 (CI+LABA baixa dose)</option>
        <option value="4">Degrau 4 (CI+LABA dose média)</option>
        <option value="5">Degrau 5 (CI+LABA dose alta + add-on)</option>
      </select>
      <label>Perfil especial</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="a_gest"> Gestação</label>
        <label class="checkbox-item"><input type="checkbox" id="a_crian"> Criança &lt;5 anos</label>
        <label class="checkbox-item"><input type="checkbox" id="a_fumante"> Tabagista ativo (pensar DPOC/ACOS)</label>
        <label class="checkbox-item"><input type="checkbox" id="a_rinite"> Rinite alérgica concomitante</label>
      </div>
    </div>
    <button class="btn-calc" onclick="calcAsma()">🌬️ Gerar recomendação GINA 2024</button>
    <div id="asmaResult" style="display:none"></div>
  </div>

  <!-- TAB 1 – DPOC -->
  <div id="tab1" style="display:none">
    <div class="card" style="padding:12px 14px">
      <label>Dispneia — Escala mMRC</label>
      <select id="d_mmrc">
        <option value="0">Grau 0 — Dispneia apenas em exercício intenso</option>
        <option value="1">Grau 1 — Dispneia ao caminhar rápido ou subir ladeira leve</option>
        <option value="2" selected>Grau 2 — Caminha mais lento que a maioria; para para respirar no próprio ritmo</option>
        <option value="3">Grau 3 — Para para respirar após ~100 m ou poucos minutos em plano</option>
        <option value="4">Grau 4 — Muito dispneico para sair de casa / dispneico ao se vestir</option>
      </select>
      <label>Exacerbações nos últimos 12 meses</label>
      <select id="d_exac">
        <option value="0">0 exacerbações</option>
        <option value="1">1 exacerbação moderada (não hospitalizou)</option>
        <option value="2">≥2 exacerbações moderadas</option>
        <option value="3">≥1 hospitalização por DPOC</option>
      </select>
      <label>Eosinófilos no sangue (células/μL)</label>
      <select id="d_eosi">
        <option value="nd">Não disponível</option>
        <option value="lt100">&lt;100 células/μL</option>
        <option value="100_299">100–299 células/μL</option>
        <option value="gte300">≥300 células/μL</option>
      </select>
      <label>Tratamento atual</label>
      <select id="d_trat">
        <option value="naive">Sem broncodilatador regular</option>
        <option value="laba_lama_mono">LABA ou LAMA (monoterapia)</option>
        <option value="laba_lama_dupla">LABA + LAMA (dupla)</option>
        <option value="ics_laba">ICS + LABA (sem LAMA)</option>
        <option value="tripla">LABA + LAMA + ICS (tripla)</option>
      </select>
      <label>Comorbidades</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="d_pneumo"> Pneumonias de repetição</label>
        <label class="checkbox-item"><input type="checkbox" id="d_oxig"> Em uso de O₂ suplementar domiciliar</label>
        <label class="checkbox-item"><input type="checkbox" id="d_tab"> Tabagismo ativo (orientar cessação)</label>
      </div>
    </div>
    <button class="btn-calc" style="background:#0369a1" onclick="calcDPOC()">💨 Gerar recomendação GOLD 2024</button>
    <div id="dpocResult" style="display:none"></div>
  </div>

  <!-- TAB 2 – DISPOSITIVOS -->
  <div id="tab2" style="display:none">
    <div id="devList"></div>
  </div>

</main>

<script src="js/db.js"></script>
<script>
function showTab(n){
  [0,1,2].forEach(i=>{document.getElementById('tab'+i).style.display=i===n?'block':'none';document.getElementById('tb'+i).classList.toggle('active',i===n);});
  if(n===2) renderDevices();
}

/* ── ASMA ───────────────────────────────────────────────────────────── */
function calcAsma(){
  const modo  = document.getElementById('a_modo').value;
  const sint  = document.getElementById('a_sint').checked;
  const limit = document.getElementById('a_limit').checked;
  const noct  = document.getElementById('a_noct').checked;
  const saba  = document.getElementById('a_saba').checked;
  const step  = parseInt(document.getElementById('a_step').value)||0;
  const gest  = document.getElementById('a_gest').checked;
  const crian = document.getElementById('a_crian').checked;
  const fumante=document.getElementById('a_fumante').checked;
  const rinite= document.getElementById('a_rinite').checked;

  const nFRC = [sint,limit,noct,saba].filter(Boolean).length;
  let ctrl, ctrlCol, ctrlNum;
  if(nFRC===0){ctrl='Bem Controlada';ctrlCol='#16a34a';ctrlNum='✅';}
  else if(nFRC<=2){ctrl='Parcialmente Controlada';ctrlCol='#d97706';ctrlNum='⚠️';}
  else{ctrl='Não Controlada';ctrlCol='#dc2626';ctrlNum='❌';}

  let recs=[];

  if(modo==='exac'){
    recs.push({
      hdr:'Exacerbação Aguda de Asma',col:'#dc2626',
      nome:'Avaliar gravidade e tratar imediatamente',
      badges:[{t:'Leve-moderada: ambulatório',c:'#d97706'},{t:'Grave/risco de vida: emergência',c:'#dc2626'}],
      drugs:`<strong>Leve a moderada (PFE ≥40%, sem cianose, fala em frases):</strong><br>
SABA inalatório a cada 20 min × 3 doses (salbutamol 4–8 jatos pMDI + câmara ou 2,5 mg nebulizado)<br>
Corticoide oral: prednisolona 40–50 mg/dia × 5–7 dias (máx 10 dias se não resolver)<br>
Aumentar CI para dose dupla ou alta até resolução (2–4 semanas)<br>
<br><strong>Grave (PFE &lt;40%, fala palavras isoladas, taquipneia &gt;25/min):</strong><br>
SABA contínuo + Ipratrópio 0,5 mg + O₂ (meta SpO₂ 93–95%) + Corticoide IV/VO<br>
Avaliar sulfato de magnésio 2 g IV em 20 min se refratário<br>
<br><strong>Risco de vida (cianose, alteração da consciência, tórax silencioso):</strong><br>
Suporte ventilatório · Heliox · UTI · Intubação se necessário`,
      note:'Após resolução: manter CI aumentado 2–4 semanas. Revisar técnica inalatória e adesão. Considerar subir degrau GINA se exacerbação por controle inadequado.',
    });
  } else {
    recs.push({hdr:`Nível de controle`, col:ctrlCol, nome:`Asma ${ctrl}`, badges:[{t:nFRC+' de 4 itens presentes',c:ctrlCol}],
      drugs:nFRC===0?'Manter degrau atual. Considerar desescalonamento se bem controlada ≥3 meses.':
            `Itens não controlados: ${[sint&&'sintomas diurnos',limit&&'limitação',noct&&'despertar noturno',saba&&'uso de SABA'].filter(Boolean).join(', ')}.`,
      note:'GINA: avaliar controle a cada 1–3 meses. Subir degrau se parcialmente/não controlada. Descer degrau após ≥3 meses de bom controle.',
    });

    const nextStep = nFRC===0 ? Math.max(1,step-1) : Math.min(5,step+1);
    const STEPS = {
      1:{nome:'Degrau 1 — Reliever PRN (asma leve, sintomas ocasionais)',drugs:'<strong>Preferido (GINA 2022+):</strong> Budesonida/Formoterol 200/6 mcg — 1 inalação PRN ao sintoma (previne exacerbação vs SABA isolado)<br><strong>Alternativa:</strong> Salbutamol 100 mcg PRN (somente se sintomas muito infrequentes &lt;2×/mês e sem fatores de risco para exacerbação)',note:'GINA não recomenda mais SABA isolado como Degrau 1 padrão — CI/formoterol PRN é preferível por reduzir risco de exacerbação.'},
      2:{nome:'Degrau 2 — CI baixa dose diária (controle regular)',drugs:'<strong>Preferido:</strong> Budesonida/Formoterol 200/6 mcg — 1 inal. manhã + PRN ao sintoma (abordagem MART)<br><strong>Alternativo:</strong> CI baixa dose 1–2×/dia (budesonida 200–400 mcg, beclometasona 200–250 mcg, fluticasona 100–250 mcg) + salbutamol PRN<br><strong>Adicional:</strong> Montelucaste 10 mg/dia (complemento em rinite alérgica concomitante)',note:'Montelucaste: opção se recusa ou incapacidade de usar inalador, mas eficácia inferior à CI.'},
      3:{nome:'Degrau 3 — CI baixa dose + LABA',drugs:'<strong>Preferido:</strong> Budesonida/Formoterol 200/6 mcg 1–2×/dia + PRN ao sintoma (MART)<br><strong>Alternativo:</strong> Fluticasona/Salmeterol 100/50 mcg 2×/dia ou Fluticasona/Formoterol + Salbutamol PRN<br><strong>Crianças 6–11 anos:</strong> CI dose intermediária; LABA não aprovado &lt;5 anos',note:'Verificar adesão e técnica antes de subir degrau. Combinar com montelucaste se rinite não controlada.'},
      4:{nome:'Degrau 4 — CI dose média-alta + LABA',drugs:'<strong>Preferido:</strong> Budesonida/Formoterol 200/6 mcg 2–4 inalações/dia + PRN (MART)<br>Fluticasona 250–500 mcg/Salmeterol 50 mcg 2×/dia<br>Fluticasona furoato/Vilanterol (Relvar) 92/22 mcg 1×/dia<br><strong>Add-on opcional:</strong> Tiotrópio 5 mcg 1×/dia (Degrau 4 add-on em ≥6 anos)',note:'Se não controlada no Degrau 4: encaminhar para pneumologista/alergologista para avaliação de biológico (Degrau 5).'},
      5:{nome:'Degrau 5 — CI alta dose + LABA + add-on especializado',drugs:'CI alta dose + LABA (qualquer combinação do Degrau 4 em dose máxima)<br><strong>Tiotrópio</strong> 5 mcg 1×/dia (add-on aprovado ≥6 anos)<br><strong>Biológicos (conforme fenótipo — prescrição especializada):</strong><br>• Dupilumabe 200–300 mg SC q2sem (eosinofílico ou IL-4/IL-13 elevado) — aprovado ≥6 anos<br>• Mepolizumabe 100 mg SC/mês (eosinófilos ≥150 + ≥2 exacerb/ano) — ≥6 anos<br>• Benralizumabe 30 mg SC q4sem×3 depois q8sem (eosinófilos ≥300) — ≥12 anos<br>• Omalizumabe 75–375 mg SC q2–4sem (alérgica, IgE 30–1500 UI/mL)',note:'Corticoide oral contínuo: somente se tudo acima falhar (baixa dose = prednisolona ≤7,5 mg/dia). Efeitos adversos sistêmicos graves com uso prolongado.'},
    };
    const sd = STEPS[nextStep]||STEPS[1];
    recs.push({hdr:nFRC===0?`Degrau recomendado: Desescalonar para Degrau ${nextStep}`:`Degrau recomendado: Subir para Degrau ${nextStep}`,col:'#065f46',
      nome:sd.nome,badges:[{t:`GINA Degrau ${nextStep}`,c:'#065f46'}],drugs:sd.drugs,note:sd.note});

    if(gest) recs.push({hdr:'Gestação',col:'#9d174d',nome:'Asma na gestação — manter tratamento',badges:[{t:'Gestação',c:'#9d174d'}],
      drugs:'<strong>Manter CI — seguro na gestação.</strong> Budesonida: dado mais extenso de segurança (categoria B).<br>SABA (salbutamol) seguro PRN. Formoterol e salmeterol: dados mais limitados, mas usados quando necessário.<br>Montelucaste: categoria B — pode manter se era o tratamento prévio.<br>Corticoide oral curtos ciclos: usar se necessário (asma grave não controlada é pior que o CE).',
      note:'Asma não controlada na gestação = maior risco de complicações (prematuridade, RCIU, pré-eclâmpsia) do que o tratamento inalatório. Nunca interromper CI na gestação.'});

    if(fumante) recs.push({hdr:'Tabagismo — Considerar DPOC ou ACOS',col:'#64748b',nome:'Síndrome de Sobreposição Asma-DPOC (ACOS)',badges:[{t:'Tabagista',c:'#64748b'}],
      drugs:'Investigar espirometria com broncodilatador. Se obstrução irreversível (VEF1/CVF <70% pós-BD): considerar DPOC. Se sobreposição: usar aba DPOC.',
      note:'ACOS: usar CI+LABA (não LABA isolado). Evitar ICS em altas doses se DPOC puro. Cessação tabagismo é prioridade absoluta.'});

    if(rinite) recs.push({hdr:'Rinite Alérgica Concomitante',col:'#7c3aed',nome:'Tratar rinite melhora controle da asma',badges:[{t:'Via aérea única',c:'#7c3aed'}],
      drugs:'Corticoide intranasal: mometasona, fluticasona ou budesonida nasal 1–2 jatos/narina 1–2×/dia<br>Montelucaste 10 mg/dia (benefício duplo: asma + rinite)<br>Anti-histamínico de 2ª geração se sintomático: loratadina, cetirizina, fexofenadina',
      note:'ARIA: tratar rinite melhora controle da asma. Imunoterapia alérgeno-específica: considerar em rinite alérgica moderada-grave com asma controlada.'});
  }

  document.getElementById('asmaResult').style.display='block';
  document.getElementById('asmaResult').innerHTML=(modo==='ctrl'?`<div class="ctrl-card" style="border-color:${ctrlCol};background:${ctrlCol}15"><div class="ctrl-num" style="color:${ctrlCol}">${ctrlNum}</div><div class="ctrl-lbl" style="color:${ctrlCol}">Asma ${ctrl}</div><div style="font-size:.72rem;margin-top:8px;opacity:.8">${nFRC} de 4 itens não atingidos nas últimas 4 semanas</div></div>`:'')
    +recs.map(r=>`<div class="step-card" style="border-color:${r.col}"><div class="step-hdr" style="color:${r.col}">${r.hdr}</div><div class="step-nome">${r.nome}</div><div>${r.badges.map(b=>`<span class="step-badge" style="background:${b.c}">${b.t}</span>`).join('')}</div><div class="step-drugs">${r.drugs}</div><div class="step-note">${r.note}</div></div>`).join('');
  document.getElementById('asmaResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ── DPOC ───────────────────────────────────────────────────────────── */
function calcDPOC(){
  const mmrc  = parseInt(document.getElementById('d_mmrc').value)||0;
  const exac  = parseInt(document.getElementById('d_exac').value)||0;
  const eosi  = document.getElementById('d_eosi').value;
  const trat  = document.getElementById('d_trat').value;
  const pneumo= document.getElementById('d_pneumo').checked;
  const oxig  = document.getElementById('d_oxig').checked;
  const tab   = document.getElementById('d_tab').checked;

  // GOLD 2024: ABE classification
  const altaSint = mmrc>=2;
  const altaExac = exac>=2 || exac===3;
  let grupo, grupoCol, grupoDesc;
  if(altaExac){ grupo='E'; grupoCol='#dc2626'; grupoDesc='Alto risco de exacerbação (≥2 moderadas ou ≥1 hospitalização/ano)'; }
  else if(altaSint){ grupo='B'; grupoCol='#d97706'; grupoDesc='Sintomas significativos (mMRC ≥2) sem alto risco de exacerbação'; }
  else{ grupo='A'; grupoCol='#16a34a'; grupoDesc='Poucos sintomas e baixo risco de exacerbação'; }

  const addICS = eosi==='gte300' || (eosi==='100_299' && altaExac);
  const avoidICS = pneumo || eosi==='lt100';

  const recs=[];

  // Cessação
  if(tab) recs.push({hdr:'🚬 Cessação tabagismo — PRIORIDADE MÁXIMA',col:'#64748b',nome:'Intervenção mais eficaz em DPOC',badges:[{t:'NNT=8 vs farmacoterapia NNT>30',c:'#64748b'}],
    drugs:'Vareniclina (Champix) 0,5 mg/dia × 3 dias → 0,5 mg 2×/dia × 4 dias → 1 mg 2×/dia × 12 semanas (mais eficaz)<br>Bupropiona 150 mg/dia × 3 dias → 150 mg 2×/dia × 7–12 semanas<br>TRN: adesivo + goma/pastilha combinados (mais eficaz que monoterapia TRN)',
    note:'Nenhuma intervenção farmacológica substitui cessação tabagismo em termos de redução de declínio do VEF1. Associar suporte comportamental (consulta, linha 0800-722-4996).'});

  // Grupo e recomendação de tratamento
  const grupoRecs={
    A:{drugs:'<strong>Broncodilatador de ação longa — monoterapia:</strong><br>LAMA: Tiotrópio 18 mcg HandiHaler 1×/dia <strong>(preferido)</strong> ou Umeclidínio 62,5 mcg Ellipta 1×/dia<br>OU LABA: Indacaterol 150 mcg Breezhaler 1×/dia · Formoterol 12 mcg 2×/dia · Salmeterol 50 mcg 2×/dia<br><strong>SABA PRN:</strong> Salbutamol 100 mcg 1–2 jatos conforme necessário',
      note:'Grupo A: monoterapia é suficiente. Se persiste sintomático com mono: subir para dupla LABA+LAMA.'},
    B:{drugs:'<strong>Dupla broncodilatação — LABA + LAMA (preferido para Grupo B):</strong><br>Indacaterol/Glicopirrônio (Ultibro Breezhaler) 110/50 mcg 1×/dia<br>Vilanterol/Umeclidínio (Anoro Ellipta) 22/55 mcg 1×/dia<br>Olodaterol/Tiotrópio (Stiolto Respimat) 2,5/2,5 mcg 2 inalações 1×/dia<br>Formoterol/Aclidínio 12/400 mcg 2×/dia<br><strong>SABA PRN</strong> + Reabilitação pulmonar',
      note:'GOLD 2024: LABA+LAMA superior a monoterapia em sintomas no Grupo B. ICS não indicado como add-on em Grupo B sem exacerbações.'},
    E:{drugs:`<strong>LABA + LAMA (base do Grupo E):</strong><br>Qualquer combinação do Grupo B acima<br><br><strong>Adicionar ICS se:</strong>${!avoidICS?(addICS?' ✅ Indicado (eosinófilos ≥300 ou 100–299 com exacerbações)':' Considerar se eosinófilos 100–299'):''}${avoidICS?' ⚠️ Evitar ICS (pneumonias de repetição e/ou eosinófilos <100)':', eosinófilos ≥300 ou frequentes exacerbações'}<br><br>${addICS&&!avoidICS?'<strong>Tripla (LABA+LAMA+ICS):</strong><br>FF/UMEC/VI (Trelegy Ellipta) 92/55/22 mcg 1×/dia<br>Budesonida/Formoterol/Glicopirrônio (Breztri) 160/4,8/7,2 mcg 2 inalações 2×/dia':''}`,
      note:'Azitromicina 250 mg/dia (profilaxia anti-inflamatória) pode ser considerada como add-on em Grupo E com ≥3 exacerbações/ano, ex-tabagistas, sem bronquiectasia significativa. Avaliar: QTc, audição, micobactérias atípicas antes de iniciar.'},
  };
  recs.push({hdr:`Grupo GOLD ${grupo} — ${grupoDesc}`,col:grupoCol,nome:`Recomendação GOLD 2024 para Grupo ${grupo}`,
    badges:[{t:`GOLD ${grupo}`,c:grupoCol},{t:exac>=2||exac===3?'Alto risco exacerbações':'Baixo risco',c:grupoCol}],
    drugs:grupoRecs[grupo].drugs,note:grupoRecs[grupo].note});

  // Oxigenoterapia domiciliar
  if(oxig) recs.push({hdr:'Oxigenoterapia Domiciliar',col:'#0369a1',nome:'Indicação e parâmetros',badges:[{t:'LTOT',c:'#0369a1'}],
    drugs:'Indicação: SpO₂ ≤88% em repouso (ou PaO₂ ≤55 mmHg) em 2 gasometrias com 3 semanas de intervalo no paciente estável<br>Duração mínima: ≥15h/dia (idealmente 24h/dia)<br>Alvo: SpO₂ 88–92% (não hiperoxigenar em retentores de CO₂)<br>Fluxo: iniciar 1–2 L/min e titular por oximetria ou gasometria',
    note:'LTOT prolonga sobrevida em DPOC com hipoxemia grave. Não usar somente em exercício se SpO₂ em repouso >88%. Revisão clínica e gasometria a cada 3 meses.'});

  document.getElementById('dpocResult').style.display='block';
  document.getElementById('dpocResult').innerHTML=`<div class="ctrl-card" style="border-color:${grupoCol};background:${grupoCol}15">
    <div style="display:flex;align-items:center;justify-content:center;gap:12px">
      <div class="gold-badge" style="background:${grupoCol}">${grupo}</div>
      <div style="text-align:left"><div style="font-size:1.1rem;font-weight:900;color:${grupoCol}">GOLD ${grupo}</div><div style="font-size:.72rem;color:${grupoCol};opacity:.9">${grupoDesc}</div></div>
    </div></div>`
    +recs.map(r=>`<div class="step-card" style="border-color:${r.col}"><div class="step-hdr" style="color:${r.col}">${r.hdr}</div><div class="step-nome">${r.nome}</div><div>${r.badges.map(b=>`<span class="step-badge" style="background:${b.c}">${b.t}</span>`).join('')}</div><div class="step-drugs">${r.drugs}</div><div class="step-note">${r.note}</div></div>`).join('');
  document.getElementById('dpocResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}
