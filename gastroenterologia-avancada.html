const PROTO_GAS={
  hp_1:{col:'#c2410c',hdr:'H. pylori — Terapia Tríplice 1ª linha',nome:'Duração 14 dias · Taxa de erradicação ~80% (claritromicina sensível)',
   body:`<strong>Indicações de erradicação (CONSENSO IV BRASILEIRO):</strong><br>
Úlcera péptica (ativa ou cicatricial) · Linfoma MALT · Pós-ressecção de câncer gástrico · Dispepsia funcional · Gastrite atrófica · Parentes 1° grau de câncer gástrico · Uso crónico de AINEs/AAS · Indicação individual (anemia ferropriva refratária, PTI, DRGE em paciente jovem)<br><br>
<strong>Protocolo Tríplice Padrão (14 dias — SE resistência local à claritromicina &lt;15%):</strong><br>
<table>
  <tr><th>Fármaco</th><th>Dose</th><th>Frequência</th></tr>
  <tr><td>IBP (omeprazol <em>ou</em> esomeprazol)</td><td>20 mg (omeprazol) OU 40 mg (esomeprazol)</td><td>2×/dia (30 min antes das refeições)</td></tr>
  <tr><td>Amoxicilina</td><td>1 g</td><td>2×/dia</td></tr>
  <tr><td>Claritromicina</td><td>500 mg</td><td>2×/dia</td></tr>
</table>
<br>
<div class="atencao">⚠️ CYP2C19 e IBP: metabolizadores ultrarrápidos (UUR — ~20% dos pacientes) metabolizam IBPs rapidamente → menos supressão ácida → menor erradicação. Preferir rabeprazol 20 mg 2×/dia OU vonoprazan 20 mg 2×/dia (não depende de CYP2C19) quando suspeitar de falha por genótipo.</div>
<br>
<strong>Vonoprazan-based therapy (superior ao IBP em regiões de alta resistência):</strong><br>
• Vonoprazan 20 mg + Amoxicilina 1 g 2×/dia × 14 dias (dual therapy) → erradicação 84–87% (PHALCON-HP trial 2022)<br>
• Vonoprazan + Amoxicilina + Claritromicina × 14 dias → 90%+ (não dependente de genótipo CYP)<br>
• Disponível no Brasil (Takeda/Genérico) desde 2024 sob o nome Vonoprazan<br><br>
<strong>Confirmação de erradicação:</strong> Obrigatória · Teste respiratório com C13-ureia (padrão-ouro) OU antígeno fecal (se indisponível) · 4 semanas após término de ATB e 2 semanas após suspensão de IBP`,
   note:'Alergias a penicilina: substituir amoxicilina por metronidazol 500 mg 3×/dia (mas resistência maior) OU levofloxacino 500 mg/dia. Confirmação por teste respiratório SEMPRE antes de afirmar falha (18% falso-positivo do antígeno fecal em uso de IBP). Teste rápido de urease (CLO test endoscópico): sensibilidade reduz se uso recente de IBP, ATB ou bismuto (suspender 14 dias antes). Cultura + antibiograma: indicada após 2ª falha de erradicação ou em regiões de alta resistência conhecida.'},
  hp_2:{col:'#7c3aed',hdr:'H. pylori — Bismuto Quádruplo (2ª linha OU 1ª linha em alta resistência)',nome:'Taxa de erradicação 85–90% independente de resistência à claritromicina',
   body:`<strong>Indicações de bismuto quádruplo:</strong><br>
• Falha da terapia tríplice prévia · Resistência à claritromicina &gt;15% na região · Intolerância a claritromicina · Como 1ª linha universal (menos dependente de padrão de resistência local)<br><br>
<strong>Protocolo PBMT (Proton pump inhibitor + Bismuth + Metronidazole + Tetracycline) — 10–14 dias:</strong><br>
<table>
  <tr><th>Fármaco</th><th>Dose</th><th>Frequência</th></tr>
  <tr><td>IBP (omeprazol)</td><td>20 mg</td><td>2×/dia</td></tr>
  <tr><td>Subcitrato de bismuto coloidal</td><td>120 mg</td><td>4×/dia (antes das 3 refeições + deitar)</td></tr>
  <tr><td>Metronidazol</td><td>500 mg</td><td>3×/dia com refeições</td></tr>
  <tr><td>Tetraciclina</td><td>500 mg</td><td>4×/dia com refeições</td></tr>
</table>
<br>
<strong>Formulação combinada (Pylera® — disponível em alguns países):</strong> bismuto + metronidazol + tetraciclina em uma cápsula única + IBP separado × 10 dias · Melhora adesão mas custo elevado<br><br>
<strong>RAM e cuidados:</strong><br>
• Bismuto: fezes escuras (melear), náusea leve (benigno, tranquilizar) · Contraindicado: gestação, clearance creatinina &lt;30 · Não usar por &gt;12 semanas (encefalopatia por bismuto)<br>
• Metronidazol: efeito antabuse (proibir álcool) · Sabor metálico<br>
• Tetraciclina: não usar em gravidez e crianças &lt;8 anos · Fotossensibilidade · Intervalo de 2h com antiácidos/leite<br><br>
<strong>Alternativa quando bismuto indisponível — Terapia Concomitante:</strong><br>
IBP + Amoxicilina 1g + Claritromicina 500 mg + Metronidazol 500 mg · todos 2×/dia × 14 dias → erradicação 87–90% (sem bismuto, mas inclui 4 agentes)`,
   note:'Bismuto no Brasil: subcitrato de bismuto coloidal (De-Nol®) ou subsalicilato de bismuto. De-Nol está disponível via importação em alguns centros. Subsalicilato (Pepto-Bismol®) tem menor concentração e é usado em 2 comprimidos 4×/dia. Resistência ao metronidazol: alta no Brasil (>60%) mas bismuto atenua parcialmente esta resistência — a combinação mantém eficácia. Resistência à tetraciclina: muito rara no Brasil (<2%) — torna o bismuto quádruplo ainda mais atraente.'},
  hp_3:{col:'#dc2626',hdr:'H. pylori — Terapias de Salvagem (≥2 falhas prévias)',nome:'Levofloxacino OU rifabutina após 2 falhas · Cultura obrigatória se disponível',
   body:`<div class="atencao">⚠️ Após 2 falhas de erradicação: cultura + antibiograma ANTES de nova tentativa (se disponível endoscopicamente). Se não disponível: escolher antibiótico nunca utilizado.</div>
<br>
<strong>Terapia com Levofloxacino (3ª linha quando sem fluoroquinolona prévia):</strong><br>
• IBP 2×/dia + Levofloxacino 500 mg 1×/dia + Amoxicilina 1 g 2×/dia × 14 dias<br>
• Erradicação: 70–80% (se resistência à levo &lt;10% — verificar uso prévio de fluoroquinolonas)<br>
• Resistência à levofloxacino crescente globalmente (Brasil ~10–15% — monitorar)<br><br>
<strong>Terapia com Rifabutina (salvagem em resistência múltipla):</strong><br>
• IBP 2×/dia + Rifabutina 150 mg 2×/dia + Amoxicilina 1 g 3×/dia × 10 dias<br>
• Erradicação: 75–90% mesmo com resistência a claritromicina e metronidazol<br>
• RAM: mielossupressão (monitorar hemograma) · Coloração alaranjada de urina/secreções (tranquilizar) · Uveíte (rara)<br>
• CI: tuberculose ativa não tratada (induz resistência de Mycobacterium bovis a rifampicina) · HIV + rifabutina: interações com ARV<br><br>
<strong>High-dose dual therapy (HDDT):</strong><br>
IBP alta dose (esomeprazol 40 mg 3×/dia) + Amoxicilina 1 g 3×/dia × 14 dias → erradicação 90%+ em sensíveis · Opção para pacientes com múltiplas resistências e sem rifabutina<br><br>
<strong>Resistência primária no Brasil (dados SBH 2022):</strong><br>
• Claritromicina: 15–30% (centro-sul mais alta) · Metronidazol: 60%+ · Levofloxacino: 10–15% · Amoxicilina: &lt;1% · Tetraciclina: &lt;2%<br>
→ Amoxicilina e tetraciclina são os antibióticos mais confiáveis no Brasil`,
   note:'PCR para genotipagem de resistência do H. pylori: disponível em alguns centros brasileiros (amplifica genes de resistência do material de biópsia gástrica sem necessidade de cultura). Mais rápido que cultura. Detecta: mutações em 23S rRNA (claritromicina), gyrA (levofloxacino). Sensibilidade 95%+ para estas mutações. Futuramente pode guiar terapia de 1ª linha. H. pylori e AINE: AINE + H. pylori = risco de úlcera 60× maior vs cada um isolado. Erradicar SEMPRE antes de iniciar AINE crônico (se tempo permitir) ou junto com IBP profilático.'},
  drge_e:{col:'#0369a1',hdr:'DRGE Erosiva — Esofagite Los Angeles graus A–D',nome:'IBP 4–8 semanas; esofagite grave: 12 semanas + manutenção',
   body:`<strong>Classificação Los Angeles (endoscópica):</strong><br>
• LA-A: erosão ≤5 mm isolada · LA-B: erosão &gt;5 mm, sem confluência entre pregas · LA-C: confluência &lt;75% da circunferência · LA-D: confluência ≥75% da circunferência (esofagite grave)<br><br>
<strong>Tratamento por grau:</strong><br>
<table>
  <tr><th>Grau</th><th>Tratamento</th><th>Duração</th><th>Manutenção</th></tr>
  <tr><td>LA-A/B</td><td>IBP dose padrão (omeprazol 20 mg ou pantoprazol 40 mg) 30 min antes do café</td><td>4–8 semanas</td><td>Sob demanda (se sintomas recorrem)</td></tr>
  <tr><td>LA-C/D</td><td>IBP dose dobrada (omeprazol 40 mg 2×/dia OU esomeprazol 40 mg/dia)</td><td>8–12 semanas → EDA controle</td><td>IBP dose padrão contínua (recaída em 80% sem manutenção)</td></tr>
</table>
<br>
<strong>Vonoprazan na DRGE erosiva grave:</strong><br>
• Vonoprazan 20 mg/dia: cicatrização de LA-C/D em 94% × 8 semanas (vs omeprazol 80–84%) — PHALCON-EE trial<br>
• Ação imediata (não precisa de ativação ácida), não dependente de CYP2C19 · Custo maior<br><br>
<strong>Complicações de DRGE: Esôfago de Barrett:</strong><br>
• Metaplasia colunar especializada substituindo epitélio escamoso (intestinal metaplasia)<br>
• Vigilância endoscópica: sem displasia: 3–5 anos · Displasia baixo grau: 6–12 meses + ablação (RFA)<br>
• Displasia alto grau/adenocarcinoma superficial: ressecção endoscópica mucosa (REM) + RFA (ablação por radiofrequência)<br>
• IBP NÃO reverte Barrett (metaplasia persiste) mas reduz risco de progressão`,
   note:'RAM crônica de IBP: hipomagnesemia (&gt;1 ano, dosar Mg a cada 6 meses), infecção por C. difficile (OR 1,7), pneumonia comunitária (OR 1,3), fratura ósteoporótica (longa duração), deficiência de B12 (reduz absorção, dosar B12 a cada 2 anos em uso prolongado), hipoNa (SIADH — raro). IBP e clopidogrel: omeprazol e esomeprazol inibem CYP2C19 → reduzem ativação de clopidogrel → usar pantoprazol ou rabeprazol (menor interação). Desmame de IBP: rebound acid hypersecretion ao suspender abruptamente → reduzir gradualmente em 4 semanas.'},
  drge_ne:{col:'#059669',hdr:'DRGE Não-Erosiva (DRGE-NE) e Pirose Funcional',nome:'IBP eficaz em 60%; pirose funcional: antidepressivos em baixa dose',
   body:`<strong>Fenótipos da DRGE sem esofagite:</strong><br>
• <strong>DRGE-NE verdadeira:</strong> pH-metria positiva (DeMeester &gt;14,7 ou % tempo pH&lt;4 &gt;4,2%) + sintomas correlacionados (SI &gt;50% OU SAP &gt;95%) → IBP funciona em 60%<br>
• <strong>Hipersensibilidade esofágica:</strong> pH normal, mas impedânciometria/pH-metria mostra correlação sintoma-refluxo → IBP + neuromodulador<br>
• <strong>Pirose funcional:</strong> pH-metria normal, sem correlação sintoma-refluxo → IBP não tem eficácia além do placebo<br><br>
<strong>Tratamento por fenótipo:</strong><br>
<table>
  <tr><th>Fenótipo</th><th>Tratamento</th></tr>
  <tr><td>DRGE-NE verdadeira</td><td>IBP dose padrão × 4–8 semanas · Se parcial: dobrar dose ou trocar para esomeprazol/rabeprazol · Cirurgia (fundoplicatura Nissen) se refratário ou aversão a IBP vitalício</td></tr>
  <tr><td>Hipersensibilidade esofágica</td><td>IBP + <strong>Amitriptilina 10–25 mg/noite</strong> ou <strong>Citalopram 20 mg/dia</strong> (neuromoduladores viscerais) · TCC para hipersensibilidade visceral</td></tr>
  <tr><td>Pirose funcional (Roma IV)</td><td>IBP NÃO indicado como terapia de manutenção · <strong>Amitriptilina 10 mg/noite</strong> OU <strong>Imipramina</strong> OU <strong>Buspirona 10 mg 3×/dia</strong> (relaxamento do fundo gástrico)</td></tr>
</table>
<br>
<strong>Medidas comportamentais (complementam qualquer fenótipo):</strong><br>
Cabeceira elevada 15 cm (se refluxo noturno) · Refeições pequenas e frequentes · Evitar deitar 3h após refeição · Perda de peso (reduz refluxo em 10–15%) · Evitar trigggers: chocolate, álcool, café, hortelã, gordura, alho`,
   note:'Fundoplicatura de Nissen: padrão-ouro cirúrgico (laparoscópico). Eficaz em DRGE com hipotonia de EEI (esfíncter esofágico inferior &lt;10 mmHg) confirmada por manometria. Recaída de sintomas em 10–15% em 10 anos (deslizamento da fundoplicatura). Dispositivo LINX (anel magnético): alternativa cirúrgica minimamente invasiva para DRGE-NE refratária. Pirose sem EDA: trial empírico de IBP × 4 semanas em &lt;45 anos sem sinais de alarme (disfagia, perda de peso, hematemese) — EDA somente se não resposta ou sinais de alarme.'},
  ee:{col:'#be185d',hdr:'Esofagite Eosinofílica (EE)',nome:'≥15 eosinófilos/HPF · IBP + budesonida deglutida + eliminação alimentar',
   body:`<strong>Diagnóstico (Consenso AGREE 2022):</strong><br>
• Sintomas esofágicos (disfagia, impactação alimentar, dor torácica) + biópsia: ≥15 eosinófilos/campo de grande aumento (HPF) após IBP 8 semanas (IBP responsivos são subtipos de EE, não excluem mais o diagnóstico)<br>
• Endoscopia: anéis (traquealização), sulcos, exsudatos brancos, edema, estenose<br><br>
<strong>Tratamento:</strong><br>
<table>
  <tr><th>Opção</th><th>Protocolo</th><th>Remissão histológica</th></tr>
  <tr><td>IBP (1ª linha em todos)</td><td>Omeprazol 40 mg 2×/dia × 8–12 semanas</td><td>40–60% (IBP-responsivos)</td></tr>
  <tr><td>Budesonida deglutida (viscosa)</td><td>Budesonida suspensão 0,5 mg/mL em veículo viscoso (mel de agave OU sucralose) · 2 mg 2×/dia × 8–12 semanas</td><td>65–80%</td></tr>
  <tr><td>Dupixent (Dupilumabe)</td><td>600 mg SC D1 → 300 mg SC q2sem · Aprovado FDA 2022 para EE ≥12 anos</td><td>60% histológica + melhora disfagia · Opção em refratários · Custo alto</td></tr>
  <tr><td>Dieta de eliminação</td><td>6-food elimination (leite, glúten, ovo, soja, nozes, frutos do mar) → reintrodução sequencial com biópsia</td><td>70% (leite isolado responde em 50%)</td></tr>
  <tr><td>Dilatação endoscópica</td><td>Stricturoplastia com balão ou bougie em estenoses (calibre &lt;12 mm) · NÃO trata inflamação</td><td>Sintomática (não histológica)</td></tr>
</table>
<br>
<strong>Leite é o principal gatilho (50–60%):</strong> eliminar leite isoladamente como 1ª tentativa alimentar antes de dieta de 6 alimentos`,
   note:'Budesonida viscosa no Brasil: não há formulação comercial disponível. Preparo magistral: budesonida 0,5 mg/mL ampola nebulização + misturar com 2–4 g de sucralose ou maltodextrina para criar veículo viscoso → deglutir sem água após → não comer/beber 30 min. Alternativa: fluticasona inalatória deglutida 440–880 mcg/dia (4–8 jatos de 110 mcg deglutidos). Dupilumabe EE: aprovado FDA 2022 e ANVISA (acesso especial) para EE ativa ≥12 anos refratária a IBP e corticoide tópico. Monitorar candidíase esofágica (complic. de budesonida — antifúngico se sintomas).'},
};

function calcGas(){
  const c=document.getElementById('gas_cond').value;
  const p=PROTO_GAS[c];
  document.getElementById('gasResult').style.display='block';
  document.getElementById('gasResult').innerHTML=`<div class="rec-card" style="border-color:${p.col}"><div class="rec-hdr" style="color:${p.col}">GASTROENTEROLOGIA — ${p.hdr}</div><div class="rec-nome">${p.nome}</div><div class="rec-body">${p.body}</div>${p.note?`<div class="rec-note">${p.note}</div>`:''}</div>`;
  document.getElementById('gasResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderSII(){
  if(document.getElementById('siiList').innerHTML) return;
  document.getElementById('siiList').innerHTML=`
  <div class="gas-card" style="border-color:#c2410c">
    <div class="gas-nome" style="color:#c2410c">SII — Síndrome do Intestino Irritável (Roma IV 2016)</div>
    <div class="gas-body">
      <strong>Critérios Roma IV:</strong><br>
      Dor abdominal recorrente ≥1 dia/semana nos últimos 3 meses (início há ≥6 meses) + ≥2 dos:<br>
      1. Relação com evacuação · 2. Mudança na frequência das fezes · 3. Mudança na consistência das fezes (Bristol)<br><br>
      <strong>Subtipos:</strong><br>
      • SII-C: constipação predominante (Bristol 1–2 em &gt;25% das evacuações) · SII-D: diarreia (Bristol 6–7 em &gt;25%) · SII-M: misto · SII-U: inclassificável<br><br>
      <strong>Exames:</strong> Calprotectina fecal normal (&lt;50 µg/g) exclui DII (sensibilidade 95%). Tireóide (hipotireoidismo em SII-C). Anticorpos anti-endomísio (celíaca). Sem colonoscopia rotineira &lt;45 anos sem sinais de alarme.<br><br>
      <strong>Tratamento farmacológico por subtipo:</strong><br>
      <table>
        <tr><th>SII-D (diarreia)</th><th>SII-C (constipação)</th><th>Dor/Cólicas (ambos)</th></tr>
        <tr><td><strong>Rifaximina</strong> 550 mg 3×/dia × 14 dias (TARGETING trial: melhora flatulência/fezes soltas/dor) · Repetição até 2× ao ano</td><td><strong>Linaclotida</strong> 290 mcg/dia (agonista GC-C; IBSYMPHONY trial) · <strong>Plecanatida</strong> 3 mg/dia · <strong>Tegaserode</strong> (5-HT4 agonista)</td><td><strong>Antiespasmódicos:</strong> mebeverina 135 mg 3×/dia, diciclomina 10–20 mg 3×/dia, escopolamina 10 mg 3×/dia</td></tr>
        <tr><td><strong>Eluxadolina</strong> 100 mg 2×/dia (agonista µ-opioide + antagonista δ): EUA · Alta eficácia · CI: sem vesícula biliar, alcoolismo</td><td><strong>Lubiprostone</strong> 8 mcg 2×/dia (ativador ClC-2) · <strong>Macrogol 3350</strong> 17 g/dia (osmótico)</td><td><strong>Antidepressivos em baixa dose:</strong> amitriptilina 10–25 mg/noite (SII-D; ACT-SSRI trial) · citalopram 20 mg/dia (SII-C; acelera trânsito)</td></tr>
        <tr><td><strong>Loperamida</strong> 2 mg PRN (diarreia urgente — controle sintomático)</td><td><strong>Fibras solúveis</strong> (psyllium/ispaghula 10–20 g/dia) — melhor que fibras insolúveis no SII</td><td><strong>TCC e hipnose intestinal:</strong> eficácia 50–70% em trials controlados — igual ou superior a fármacos em longo prazo</td></tr>
      </table>
      <br>
      <strong>Dieta FODMAP (Fermentable Oligosaccharides, Disaccharides, Monosaccharides And Polyols):</strong><br>
      Redução de FODMAPs × 4–8 semanas → melhora de 50–75% dos pacientes (mais eficaz que dieta sem glúten isolada)<br>
      Alimentos a evitar: trigo, cevada, lactose, frutose (maçã, manga), frutooligossacarídeos (alho, cebola), polióis (sorbitol, manitol em adoçantes)<br>
      Reintrodução sistemática para identificar gatilhos individuais após fase de eliminação
    </div>
  </div>
  <div class="gas-card" style="border-color:#7c3aed;margin-top:8px">
    <div class="gas-nome" style="color:#7c3aed">Dispepsia Funcional (DF) — Roma IV</div>
    <div class="gas-body">
      <strong>Critérios Roma IV:</strong><br>
      Síndrome do desconforto pós-prandial (SDC): empachamento pós-prandial + saciedade precoce OU<br>
      Síndrome de dor epigástrica (SDE): dor/queimação epigástrica · ≥3 dias/semana · Início &gt;6 meses · Sem explicação estrutural<br><br>
      <strong>H. pylori na DF:</strong> erradicar se positivo (NNT ≈ 14 para benefício sintomático)<br><br>
      <strong>Tratamento farmacológico por síndrome:</strong><br>
      <table>
        <tr><th>SDE (dor epigástrica)</th><th>SDC (desconforto pós-prandial)</th></tr>
        <tr><td>IBP 4–8 semanas (NNT ≈ 7)</td><td>Procinéticos: domperidona 10 mg 3×/dia (CI: QTc prolongado) · Metoclopramida 10 mg 3×/dia (risco tardidiscinesia crônica — evitar &gt;12 semanas) · Acotiamida 100 mg 3×/dia (aprovado Japão, em estudo no Brasil)</td></tr>
        <tr><td>Antidepressivos em baixa dose (SDE refratária): amitriptilina 10–25 mg/noite (FUNADICS trial: melhora vs placebo) · mirtazapina 15 mg/noite (gastroparesia associada)</td><td>Buspirona 10 mg 3×/dia (relaxamento do fundo gástrico) · Itopride 50 mg 3×/dia · Tandospirona (5-HT1A agonista) em estudos</td></tr>
      </table>
    </div>
  </div>`;
}
