<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F3460">
  <title>VitaDose — Cadastro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/vitadose.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="vita">Vita</span><span class="dose">Dose</span>
      <span class="sub">Cadastro</span>
    </div>
    <a class="nav-btn" href="index.html" style="color:rgba(255,255,255,.7);font-size:.75rem;text-decoration:none;display:flex;align-items:center;gap:4px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Início
    </a>
  </header>

  <!-- Paciente -->
  <div class="card">
    <div class="card-title">
      Perfil do Paciente
    </div>

    <div class="form-group">
      <label class="form-lbl" for="f-nome">Nome completo *</label>
      <input id="f-nome" class="form-input" type="text" placeholder="Ex: Maria da Silva" autocomplete="name">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-lbl" for="f-perfil">Perfil clínico</label>
        <select id="f-perfil" class="form-select">
          <option value="adulto">Adulto</option>
          <option value="idoso">Idoso (60+)</option>
          <option value="pediatrico">Pediátrico</option>
          <option value="renal">Insuf. Renal</option>
          <option value="hepatico">Insuf. Hepática</option>
          <option value="gestante">Gestante</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-lbl" for="f-cuidador">Cuidador (opcional)</label>
        <input id="f-cuidador" class="form-input" type="text" placeholder="Nome do cuidador">
      </div>
    </div>

    <button class="btn btn-primary btn-full" onclick="salvarPaciente()">Salvar Paciente</button>
  </div>

  <!-- Medicamentos -->
  <div id="sec-meds" class="hidden">

    <!-- Medicamentos cadastrados -->
    <div class="card">
      <div class="card-title">
        Medicamentos Cadastrados
        <span class="text-xs text-2" style="font-weight:400">do paciente</span>
      </div>
      <div id="med-list-cadastro">
        <p class="text-sm text-2">Nenhum medicamento ainda.</p>
      </div>
    </div>

    <!-- Adicionar medicamento -->
    <div class="card">
      <div class="card-title">Adicionar Medicamento</div>

      <div class="form-group">
        <label class="form-lbl" for="f-med-nome">Nome do medicamento *</label>
        <input id="f-med-nome" class="form-input" type="text" placeholder="Ex: Losartana">
      </div>

      <div class="form-group">
        <label class="form-lbl" for="f-indicacao">Indicação terapêutica</label>
        <input id="f-indicacao" class="form-input" type="text" placeholder="Ex: Pressão arterial">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl" for="f-forma">Forma farmacêutica</label>
          <select id="f-forma" class="form-select">
            <option value="comprimido">Comprimido</option>
            <option value="capsula">Cápsula</option>
            <option value="solucao">Solução oral</option>
            <option value="suspensao">Suspensão</option>
            <option value="gotas">Gotas</option>
            <option value="injetavel">Injetável</option>
            <option value="adesivo">Adesivo</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-lbl" for="f-intervalo">Intervalo</label>
          <select id="f-intervalo" class="form-select">
            <option value="6">6/6h (4x/dia)</option>
            <option value="8">8/8h (3x/dia)</option>
            <option value="12">12/12h (2x/dia)</option>
            <option value="24" selected>24h (1x/dia)</option>
            <option value="48">48h (dias alternados)</option>
            <option value="72">72h (2x semana)</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl" for="f-dose">Dose por tomada *</label>
          <input id="f-dose" class="form-input mono" type="text" placeholder="Ex: 50">
        </div>
        <div class="form-group">
          <label class="form-lbl" for="f-unidade">Unidade</label>
          <select id="f-unidade" class="form-select">
            <option value="mg">mg</option>
            <option value="mcg">mcg</option>
            <option value="g">g</option>
            <option value="mL">mL</option>
            <option value="UI">UI</option>
            <option value="comp">comp.</option>
            <option value="cap">cáp.</option>
            <option value="gts">gts</option>
          </select>
        </div>
      </div>

      <!-- Horários -->
      <div class="form-group">
        <label class="form-lbl">Horários das doses *</label>
        <div id="horario-tags" class="h-builder" style="margin-bottom:8px"></div>
        <div class="h-input-row">
          <input id="input-horario" type="time" class="form-input" style="width:130px" placeholder="08:00">
          <button id="btn-add-horario" class="btn btn-outline btn-sm" type="button">+ Adicionar</button>
        </div>
        <p class="form-hint">Adicione um horário por vez (ex: 08:00, 20:00)</p>
      </div>

      <!-- Estoque -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl" for="f-qtd-caixa">Unidades na caixa</label>
          <input id="f-qtd-caixa" class="form-input mono" type="number" min="0" placeholder="Ex: 30">
        </div>
        <div class="form-group">
          <label class="form-lbl" for="f-qtd-atual">Estoque atual</label>
          <input id="f-qtd-atual" class="form-input mono" type="number" min="0" placeholder="Ex: 22">
        </div>
      </div>

      <div class="form-group">
        <label class="form-lbl" for="f-limiar">Alerta de estoque baixo (unidades)</label>
        <input id="f-limiar" class="form-input mono" type="number" min="0" placeholder="Auto">
        <p class="form-hint" id="limiar-hint"></p>
      </div>

      <button class="btn btn-gold btn-full" onclick="salvarMedicamento()">Adicionar Medicamento</button>
    </div>

    <!-- Ir para home -->
    <div style="margin:0 16px 24px">
      <button class="btn btn-primary btn-full" onclick="irParaHome()">Ir para o Painel do Dia →</button>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Início
    </a>
    <a class="nav-btn active" href="cadastro.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Medicamentos
      <div class="nav-dot"></div>
    </a>
    <a class="nav-btn" href="historico.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Histórico
    </a>
    <a class="nav-btn" href="perfil.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>
  </nav>

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
