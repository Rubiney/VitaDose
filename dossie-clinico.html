<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dossiê Clínico — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    body { background:#f0f4f8;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif }

    .topbar { display:flex;align-items:center;gap:10px;padding:12px 16px;background:#1e3a5f;position:sticky;top:0;z-index:100 }
    .back-btn { background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;font-size:1rem;cursor:pointer }
    .topbar-title { font-size:.95rem;font-weight:800;color:#fff;flex:1 }
    .btn-print { background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:.75rem;font-weight:700;cursor:pointer;margin-right:4px }
    .btn-share { background:#16a34a;border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:.75rem;font-weight:700;cursor:pointer }

    main { padding:14px 16px 90px;max-width:600px;margin:0 auto }

    /* Document */
    #docWrap { background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1) }

    .doc-header { background:#1e3a5f;color:#fff;padding:20px 20px 16px }
    .doc-logo { font-size:.75rem;font-weight:700;opacity:.7;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em }
    .doc-title { font-size:1.15rem;font-weight:900 }
    .doc-date { font-size:.7rem;opacity:.7;margin-top:3px }

    .doc-pac { background:#e8eef6;padding:14px 20px;border-bottom:2px solid #d1dbe8 }
    .doc-pac-nome { font-size:1rem;font-weight:900;color:#1e3a5f }
    .doc-pac-meta { font-size:.72rem;color:#475569;margin-top:3px;line-height:1.6 }
    .alergia-bar { background:#dc2626;color:#fff;padding:6px 14px;font-size:.72rem;font-weight:800 }
    .cond-bar { background:#ede9fe;color:#4c1d95;padding:6px 14px;font-size:.72rem;font-weight:700 }

    .sec { padding:16px 20px;border-bottom:1px solid #f1f5f9 }
    .sec:last-child { border-bottom:none }
    .sec-hdr { font-size:.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px }

    /* Meds table */
    table { width:100%;border-collapse:collapse;font-size:.75rem }
    th { background:#f8fafc;color:#64748b;font-weight:700;text-align:left;padding:6px 8px;border-bottom:1.5px solid #e2e8f0;font-size:.65rem;text-transform:uppercase }
    td { padding:7px 8px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:top }
    tr:last-child td { border-bottom:none }

    /* PRMs */
    .prm-row { display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9 }
    .prm-row:last-child { border-bottom:none }
    .prm-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px }
    .prm-tipo { font-size:.68rem;font-weight:700;color:#64748b }
    .prm-desc { font-size:.78rem;color:#374151;margin-top:2px;line-height:1.5 }
    .prm-st { display:inline-block;padding:1px 6px;border-radius:4px;font-size:.58rem;font-weight:800;margin-top:3px }

    /* Intervenções */
    .int-row { padding:8px 0;border-bottom:1px solid #f1f5f9 }
    .int-row:last-child { border-bottom:none }
    .int-data { font-size:.65rem;color:#94a3b8 }
    .int-acao { font-size:.78rem;color:#374151;margin-top:2px;line-height:1.5 }
    .int-res  { font-size:.7rem;color:#0369a1;margin-top:2px }
    .aceite-bdg { display:inline-block;padding:1px 6px;border-radius:4px;font-size:.6rem;font-weight:800;margin-left:6px }

    /* SOAP */
    .soap-box { background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:8px }
    .soap-data { font-size:.65rem;font-weight:700;color:#94a3b8;margin-bottom:6px }
    .soap-lbl { font-size:.62rem;font-weight:800;color:#475569;text-transform:uppercase }
    .soap-txt { font-size:.75rem;color:#374151;margin-top:1px;margin-bottom:6px;line-height:1.5 }

    /* Labs */
    .lab-chip { display:inline-flex;align-items:center;gap:5px;background:#f8fafc;border-radius:8px;padding:5px 9px;margin:3px;font-size:.72rem }
    .lab-nome { font-weight:700;color:#374151 }
    .lab-val { color:#0369a1;font-weight:700 }
    .lab-dt { color:#94a3b8;font-size:.62rem }

    /* Assinatura */
    .assin { padding:16px 20px;display:flex;gap:30px }
    .assin-col { flex:1 }
    .assin-line { border-top:1.5px solid #374151;margin-top:40px;padding-top:4px;font-size:.65rem;color:#64748b }

    .empty-msg { text-align:center;color:#94a3b8;font-size:.8rem;padding:20px 0 }

    @media print {
      header, .topbar, nav { display:none !important }
      body { background:#fff }
      main { padding:0;max-width:none }
      #docWrap { box-shadow:none;border-radius:0 }
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">📋 Dossiê Clínico</span>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>
  <button class="btn-share" onclick="compartilhar()">📤</button>
</div>

<main>
  <div id="docWrap">
    <p class="empty-msg" style="padding:40px">Gerando dossiê clínico...</p>
  </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="historico.html" class="nav-item">📋<span>Histórico</span></a>
  <a href="diario.html" class="nav-item">📓<span>Diário</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>

const CONDS_LABEL = {
  has:'Hipertensão Arterial',dm:'Diabetes Mellitus',asma:'Asma / DPOC',
  ic:'Insuficiência Cardíaca',hepatica:'Hepatopatia',epilepsia:'Epilepsia',
  glaucoma:'Glaucoma',hpb:'Hiperplasia Prostática',gota:'Gota',
  gastrite:'Gastrite / DRGE',gestacao:'Gestação',osteoporose:'Osteoporose',
  miastenia:'Miastenia Gravis',parkinson:'Doença de Parkinson',
};

const _COR = {
  'RAM / Evento adverso':'#dc2626','Interação medicamentosa':'#ea580c',
  'Superdosagem / evento tóxico':'#b45309','Subdosagem / efeito insuficiente':'#d97706',
  'Indicação sem medicamento':'#7c3aed','Medicamento sem indicação':'#6366f1',
  'Não adesão ao tratamento':'#0369a1','Monitoramento terapêutico':'#0891b2',
  'Duplicidade terapêutica':'#0f766e','Medicamento inapropriado':'#9f1239','Outro':'#475569',
};

const _ST = {
  ativo:{bg:'#fee2e2',c:'#991b1b',t:'Ativo'},
  parcial:{bg:'#fef9c3',c:'#713f12',t:'Parcial'},
  resolvido:{bg:'#d1fae5',c:'#065f46',t:'Resolvido'},
  nao_resolvido:{bg:'#f1f5f9',c:'#475569',t:'Não resolvido'},
};

let _pacNomeGlobal = '';

async function init() {
  const pid = getActivePacienteId();
  if (!pid) { document.getElementById('docWrap').innerHTML = '<p class="empty-msg" style="padding:40px">Nenhum paciente ativo.</p>'; return; }

  const hj = hoje();
  const dataEmissao = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });

  const [pac, allMeds, allLab, plano, ints, soaps, rams, farmCfg, agenda] = await Promise.all([
    dbGet('pacientes', pid),
    dbGetAll('medicamentos'),
    dbGetAll('laboratorio'),
    dbGetConfig('plano_cuidados_' + pid),
    dbGetConfig('sft_int_' + pid),
    dbGetConfig('soap_' + pid),
    dbGetConfig('ram_' + pid),
    dbGetConfig('farmaceutico_cfg'),
    dbGetConfig('agenda'),
  ]);

  if (!pac) { document.getElementById('docWrap').innerHTML = '<p class="empty-msg" style="padding:40px">Paciente não encontrado.</p>'; return; }

  _pacNomeGlobal = pac.nome || 'Paciente';
  const meds = (allMeds||[]).filter(m => m.pacienteId===pid && m.ativo!==false && (!m.dataFim||m.dataFim>=hj));
  const medsEncerrados = (allMeds||[]).filter(m => m.pacienteId===pid && m.ativo===false);
  const conds = (pac.condicoes||[]).map(c=>CONDS_LABEL[c]||c).filter(Boolean);
  if (pac.condicoesClinicas) conds.push(pac.condicoesClinicas);

  const horMap = {};
  (agenda||[]).forEach(a => {
    if (!horMap[a.medId]) horMap[a.medId] = [];
    if (!horMap[a.medId].includes(a.horario)) horMap[a.medId].push(a.horario);
  });
  meds.forEach(m => { if (!horMap[m.id] && m.horarios?.length) horMap[m.id] = m.horarios; });

  /* Labs: último de cada tipo */
  const labsSorted = (allLab||[]).filter(l=>l.pacienteId===pid).sort((a,b)=>b.data.localeCompare(a.data));
  const labMap = {};
  labsSorted.forEach(l => { if (!labMap[l.tipo]) labMap[l.tipo] = l; });
  const labsRecentes = Object.values(labMap).slice(0,16);

  /* SOAPs: últimas 3 */
  const ultimosSoaps = ([...(soaps||[])]).sort((a,b)=>(b.data||'').localeCompare(a.data||'')).slice(0,3);

  /* PRMs */
  const problemas = (plano?.problemas)||[];
  const metas = (plano?.metas)||[];

  /* Aderência 30d */
  const d30 = (() => { const d=new Date(); d.setDate(d.getDate()-30); return d.toISOString().slice(0,10); })();
  let tomadas=0, perdidas=0;
  try {
    const medIds = new Set(meds.map(m=>m.id));
    const doses30 = (await dbGetAll('doses')).filter(d=>d.data>=d30 && medIds.has(d.medicamentoId));
    tomadas = doses30.filter(d=>d.status==='tomado').length;
    perdidas = doses30.filter(d=>d.status==='perdido').length;
  } catch(e){}
  const total = tomadas+perdidas;
  const adesao = total>0 ? Math.round(tomadas/total*100) : null;

  /* Render */
  document.getElementById('docWrap').innerHTML = `

    <div class="doc-header">
      <div class="doc-logo">VitaDose · Farmácia Clínica</div>
      <div class="doc-title">📋 Dossiê Clínico do Paciente</div>
      <div class="doc-date">Emitido em ${dataEmissao}${farmCfg?.nome?' · '+farmCfg.nome+(farmCfg.crf?' ('+farmCfg.crf+')':''):''}</div>
    </div>

    <div class="doc-pac">
      <div class="doc-pac-nome">${esc(pac.nome)}</div>
      <div class="doc-pac-meta">
        ${[pac.idadePac?pac.idadePac+' anos':'', {M:'Masculino',F:'Feminino'}[pac.sexoPac]||'', pac.pesoPac?pac.pesoPac+' kg':'', pac.alturaPac?pac.alturaPac+' cm':'', pac.tipoSanguineo||''].filter(Boolean).join(' · ')}
        ${pac.cpf?`<br>CPF: ${esc(pac.cpf)}`:''}
        ${pac.telefone?`<br>Tel: ${esc(pac.telefone)}`:''}
      </div>
    </div>
    ${pac.alergias ? `<div class="alergia-bar">🚨 ALERGIAS: ${esc(pac.alergias)}</div>` : ''}
    ${conds.length ? `<div class="cond-bar">🏥 CONDIÇÕES: ${conds.map(c=>esc(c)).join(' · ')}</div>` : ''}

    <!-- Medicamentos Ativos -->
    <div class="sec">
      <div class="sec-hdr">💊 Medicamentos Ativos (${meds.length})</div>
      ${meds.length ? `<table>
        <thead><tr><th>Medicamento</th><th>Dose</th><th>Frequência</th><th>Horários</th></tr></thead>
        <tbody>
          ${meds.map(m=>{
            const hors = (horMap[m.id]||m.horarios||[]).join(', ')||'—';
            return `<tr>
              <td><strong>${esc(m.nome)}</strong>${m.indicacao?`<br><span style="font-size:.62rem;color:#94a3b8">${esc(m.indicacao)}</span>`:''}${m.via?`<br><span style="font-size:.62rem;color:#94a3b8">Via: ${esc(m.via)}</span>`:''}</td>
              <td>${esc(m.dose||'—')}${m.unidade?' '+esc(m.unidade):''}</td>
              <td>${esc(m.frequencia||m.posologia||'—')}</td>
              <td>${esc(hors)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>` : '<p class="empty-msg">Nenhum medicamento ativo.</p>'}
      ${adesao!==null?`<p style="font-size:.7rem;color:#64748b;margin-top:10px">📊 Aderência (últimos 30 dias): <strong style="color:${adesao>=75?'#16a34a':adesao>=50?'#d97706':'#dc2626'}">${adesao}%</strong> (${tomadas}/${total} doses)</p>`:''}
    </div>

    <!-- Histórico de Medicamentos -->
    ${medsEncerrados.length ? `<div class="sec">
      <div class="sec-hdr">📁 Medicamentos Encerrados (${medsEncerrados.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${medsEncerrados.map(m=>`<span style="background:#f1f5f9;border-radius:6px;padding:3px 8px;font-size:.68rem;color:#64748b">${esc(m.nome)}</span>`).join('')}
      </div>
    </div>` : ''}

    <!-- PRMs -->
    ${problemas.length ? `<div class="sec">
      <div class="sec-hdr">⚠️ Problemas Relacionados a Medicamentos (${problemas.length})</div>
      ${problemas.map(p=>{
        const cor = _COR[p.tipo]||'#475569';
        const st = _ST[p.status]||_ST.ativo;
        const dt = p.data?new Date(p.data+'T12:00').toLocaleDateString('pt-BR'):'—';
        return `<div class="prm-row">
          <div class="prm-dot" style="background:${cor}"></div>
          <div>
            <div class="prm-tipo">${esc(p.tipo||'Outro')}${p.medicamento?' · '+esc(p.medicamento):''}</div>
            <div class="prm-desc">${esc(p.descricao||'')}</div>
            <div style="margin-top:4px;display:flex;align-items:center;gap:8px">
              <span class="prm-st" style="background:${st.bg};color:${st.c}">${st.t}</span>
              <span style="font-size:.62rem;color:#94a3b8">${dt}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Metas terapêuticas -->
    ${metas.length ? `<div class="sec">
      <div class="sec-hdr">🎯 Metas Terapêuticas (${metas.length})</div>
      <table>
        <thead><tr><th>Parâmetro</th><th>Alvo</th><th>Prazo</th><th>Status</th></tr></thead>
        <tbody>
          ${metas.map(m=>{
            const pr = m.prazo?new Date(m.prazo+'T12:00').toLocaleDateString('pt-BR'):'—';
            const stl = {andamento:{b:'#dbeafe',c:'#1e40af',t:'Andamento'},atingida:{b:'#d1fae5',c:'#065f46',t:'Atingida'},nao_atingida:{b:'#fee2e2',c:'#991b1b',t:'Não atingida'}}[m.status]||{b:'#f1f5f9',c:'#475569',t:m.status||'—'};
            return `<tr><td>${esc(m.parametro||'—')}</td><td>${esc(m.alvo||'—')}</td><td>${pr}</td><td><span style="background:${stl.b};color:${stl.c};padding:1px 6px;border-radius:4px;font-size:.62rem;font-weight:800">${stl.t}</span></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <!-- Intervenções SFT -->
    ${(ints||[]).length ? `<div class="sec">
      <div class="sec-hdr">💬 Intervenções Farmacêuticas (${ints.length})</div>
      ${[...(ints||[])].sort((a,b)=>(b.data||'').localeCompare(a.data||'')).slice(0,10).map(i=>{
        const dt = i.data?new Date(i.data+'T12:00').toLocaleDateString('pt-BR'):'—';
        const aceiteMap = {sim:{b:'#d1fae5',c:'#065f46',t:'✅ Aceita'},parcial:{b:'#fef9c3',c:'#713f12',t:'🟡 Parcial'},nao:{b:'#fee2e2',c:'#991b1b',t:'❌ Não aceita'},pendente:{b:'#dbeafe',c:'#1e40af',t:'⏳ Pendente'}};
        const aceite = i.aceita && aceiteMap[i.aceita];
        return `<div class="int-row">
          <div class="int-data">${dt}${aceite?`<span class="aceite-bdg" style="background:${aceite.b};color:${aceite.c}">${aceite.t}</span>`:''}</div>
          <div class="int-acao">${esc(i.acao||'')}</div>
          ${i.resultado?`<div class="int-res">Resultado: ${esc(i.resultado)}</div>`:''}
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- RAMs -->
    ${(rams||[]).length ? `<div class="sec">
      <div class="sec-hdr">⚠️ Reações Adversas Registradas (${rams.length})</div>
      <table>
        <thead><tr><th>Medicamento</th><th>Reação</th><th>Grau</th><th>Data</th></tr></thead>
        <tbody>
          ${(rams||[]).map(r=>{
            const dt = r.data?new Date(r.data.slice(0,10)+'T12:00').toLocaleDateString('pt-BR'):'—';
            return `<tr><td>${esc(r.med||r.medicamento||'—')}</td><td>${esc(r.reacao||'—')}</td><td>${esc(r.grau||'—')}</td><td>${dt}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <!-- Exames recentes -->
    ${labsRecentes.length ? `<div class="sec">
      <div class="sec-hdr">🔬 Últimos Exames Laboratoriais</div>
      <div style="display:flex;flex-wrap:wrap">
        ${labsRecentes.map(l=>{
          const dt = l.data?new Date(l.data+'T12:00').toLocaleDateString('pt-BR'):'';
          const stCor = l.status==='alterado'?'#dc2626':l.status==='critico'?'#7c3aed':'#16a34a';
          return `<div class="lab-chip">
            <span class="lab-nome">${esc(l.tipo)}</span>
            <span class="lab-val" style="color:${stCor}">${esc(String(l.valor))} ${esc(l.unidade||'')}</span>
            <span class="lab-dt">${dt}</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <!-- Últimas anotações SOAP -->
    ${ultimosSoaps.length ? `<div class="sec">
      <div class="sec-hdr">📝 Últimas Anotações SOAP</div>
      ${ultimosSoaps.map(s=>{
        const dt = s.data?new Date(s.data.slice(0,10)+'T12:00').toLocaleDateString('pt-BR'):'—';
        return `<div class="soap-box">
          <div class="soap-data">${dt}</div>
          ${s.s?`<div class="soap-lbl">S — Subjetivo</div><div class="soap-txt">${esc(s.s)}</div>`:''}
          ${s.o?`<div class="soap-lbl">O — Objetivo</div><div class="soap-txt">${esc(s.o)}</div>`:''}
          ${s.a?`<div class="soap-lbl">A — Avaliação</div><div class="soap-txt">${esc(s.a)}</div>`:''}
          ${s.p?`<div class="soap-lbl">P — Plano</div><div class="soap-txt">${esc(s.p)}</div>`:''}
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Assinatura -->
    <div class="assin">
      <div class="assin-col">
        <div class="assin-line">
          ${farmCfg?.nome?esc(farmCfg.nome):'Farmacêutico Responsável'}
          ${farmCfg?.crf?'<br>'+esc(farmCfg.crf):''}
        </div>
      </div>
      <div class="assin-col">
        <div class="assin-line">Paciente ou Responsável</div>
      </div>
    </div>
  `;
}

async function compartilhar() {
  const pid = getActivePacienteId();
  const pac = pid ? await dbGet('pacientes', pid) : null;
  const nome = pac?.nome || 'Paciente';
  const dt = new Date().toLocaleDateString('pt-BR');
  const txt = `📋 *DOSSIÊ CLÍNICO — ${nome}*\nEmitido em ${dt}\n\n_Gerado pelo VitaDose — Farmácia Clínica_`;
  if (navigator.share) {
    try { await navigator.share({ title:'Dossiê Clínico', text:txt }); return; } catch(e){}
  }
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
