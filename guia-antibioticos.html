const CATS = [...new Set(AB.map(a=>a.cat))];
let activecat = null;

function buildCatChips() {
  const wrap = document.getElementById('catChips');
  const CHIP_COLORS = {
    'Respiratórias':'#0369a1','Urinárias':'#7c3aed',
    'Pele e Partes Moles':'#b45309','Intra-Abdominal':'#0f766e',
    'SNC':'#4f46e5','Cardiovascular':'#dc2626',
    'Oncológica / Imunossuprimido':'#6d28d9','Sistêmica':'#991b1b',
  };
  wrap.innerHTML = CATS.map(c=>{
    const col = CHIP_COLORS[c]||'#64748b';
    const act = activecat===c;
    return `<span class="cat-chip${act?' active':''}" style="border-color:${col};${act?'background:'+col:''}" onclick="toggleCat('${c}')">${c}</span>`;
  }).join('');
}

function toggleCat(cat) {
  activecat = activecat===cat ? null : cat;
  buildCatChips();
  renderAB();
}

function renderAB() {
  const q   = document.getElementById('abSearch').value.toLowerCase();
  const list= document.getElementById('abList');

  let items = AB;
  if (activecat) items = items.filter(a=>a.cat===activecat);
  if (q) items = items.filter(a=>`${a.nome} ${a.patogenos} ${a.cat} ${a.linha1} ${a.alternativa} ${a.notas}`.toLowerCase().includes(q));

  if (!items.length) {
    list.innerHTML=`<div class="empty-state"><span class="emoji">🔎</span>Nenhum resultado encontrado.</div>`;
    return;
  }

  list.innerHTML = items.map(a=>`
    <div class="ab-card">
      <div class="ab-card-hdr">
        <span class="ab-icone">${a.icone}</span>
        <div>
          <span class="ab-cat">${a.cat}</span>
          <div class="ab-nome">${a.nome}</div>
        </div>
      </div>

      <div class="ab-row">
        <div class="ab-lbl">Patógenos prováveis</div>
        <div class="ab-val" style="color:#64748b">${a.patogenos}</div>
      </div>

      <div class="ab-row">
        <div class="ab-lbl">1ª Linha</div>
        <div class="ab-val"><strong>${a.linha1}</strong></div>
        ${a.linha1b?`<div class="ab-val" style="margin-top:3px;color:#64748b">${a.linha1b}</div>`:''}
      </div>

      <div class="ab-row">
        <div class="ab-lbl">Alternativa</div>
        <div class="ab-val">${a.alternativa}</div>
      </div>

      <div class="ab-row">
        <div class="ab-lbl">Se alergia a beta-lactâmico</div>
        <div class="ab-val" style="color:#7c3aed">${a.alergia}</div>
      </div>

      <div class="ab-row">
        <div class="ab-lbl">Duração</div>
        <div class="ab-val"><span class="dur-chip">${a.duracao}</span>${a.ajuste_renal?'<span class="adj-chip" style="margin-left:4px">Ajuste renal</span>':''}</div>
      </div>

      <div class="ab-row">
        <div class="ab-lbl">Notas clínicas</div>
        <div class="ab-val" style="color:#92400e">${a.notas}</div>
      </div>
    </div>`).join('');
}

buildCatChips();
renderAB();
</script>
</body>
