<script>
function showTab(n){[0,1,2].forEach(i=>{document.getElementById('tab'+i).style.display=i===n?'block':'none';document.getElementById('tb'+i).classList.toggle('active',i===n);});if(n===1)renderChoque();if(n===2)renderATB();}

/* ─── SOFA & BUNDLE ─────────────────────────────────────────────── */
function calcSOFA(){
  const pts=['s_resp','s_plaq','s_bil','s_cv','s_neuro','s_renal'].map(id=>parseInt(document.getElementById(id).value));
  const total=pts.reduce((a,b)=>a+b,0);
  let risco,cor;
  if(total<2){risco='Baixo risco — monitorar';cor='#059669';}
  else if(total<6){risco='SEPSE confirmada — iniciar bundle imediatamente';cor='#b45309';}
  else if(total<10){risco='Sepse grave — alto risco de mortalidade';cor='#dc2626';}
  else{risco='Disfunção múltipla de órgãos — UTI';cor='#7f1d1d';}
  const html=`<div class="score-box">
    <div class="score-item"><span>Respiração</span><span>${pts[0]} pts</span></div>
    <div class="score-item"><span>Coagulação</span><span>${pts[1]} pts</span></div>
    <div class="score-item"><span>Fígado</span><span>${pts[2]} pts</span></div>
    <div class="score-item"><span>Cardiovascular</span><span>${pts[3]} pts</span></div>
    <div class="score-item"><span>SNC (GCS)</span><span>${pts[4]} pts</span></div>
    <div class="score-item"><span>Renal</span><span>${pts[5]} pts</span></div>
    <div class="score-total">SOFA TOTAL: ${total} pontos</div>
    <div style="margin-top:6px;font-size:.8rem;font-weight:700;color:${cor}">${risco}</div>
    <div style="font-size:.71rem;color:#64748b;margin-top:4px">Sepsis-3: suspeita de infecção + SOFA ≥2 = SEPSE · qSOFA (pré-hospitalar): FR≥22, ECG≤14, PAS≤100 — 2/3 = alto risco</div>
  </div>`;
  document.getElementById('sofaResult').style.display='block';
  document.getElementById('sofaResult').innerHTML=html;
  renderBundle();
}

function renderBundle(){
  document.getElementById('bundleCard').innerHTML=`
  <div class="sep-card" style="border-color:#991b1b">
    <div class="sep-nome" style="color:#991b1b">🕐 HORA-1 BUNDLE — Surviving Sepsis Campaign 2018</div>
    <div class="sep-body">
      <div class="alerta">⚠️ Sepse = emergência médica. Cada hora de atraso aumenta mortalidade em ~7%</div>
      <strong>Em 1 hora de identificação da sepse:</strong><br><br>
      <strong>1. Lactato sérico</strong> · Repetir em 2–4h se &gt;2 mmol/L · Lactato &gt;4 = choque séptico mesmo sem hipotensão<br><br>
      <strong>2. Hemoculturas (2 pares)</strong> ANTES do ATB<br>
      · Colher veia periférica (1 par) + cateter/outro sítio (1 par) · Volume mínimo 10 mL/frasco · Não atrasar ATB &gt;45 min para coletar<br><br>
      <strong>3. Antibióticos de amplo espectro — IMEDIATAMENTE</strong><br>
      · Não atrasar aguardando cultura · Desescalonar assim que disponível<br><br>
      <strong>4. SF 0,9% ou Ringer Lactato 30 mL/kg IV</strong> em 3h (se hipotensão ou lactato ≥4)<br>
      · Titular a resposta: PAM ≥65 mmHg, diurese ≥0,5 mL/kg/h, FC, lactato de repetição<br>
      · Reavaliação dinâmica: evitar sobrecarga hídrica (monitorar variação de pressão de pulso, PLR, ecocardiograma)<br><br>
      <strong>5. Vasopressor se PAM &lt;65 após ressuscitação volêmica inicial:</strong><br>
      · <strong>Noradrenalina 0,01–3 mcg/kg/min IV</strong> (1ª linha): alvo PAM ≥65 mmHg<br>
      · Acesso central preferencial mas iniciar periférico se necessário<br><br>
      <strong>Metas de ressuscitação (Bundle primeiras 6h):</strong><br>
      · PAM ≥65 mmHg · Diurese ≥0,5 mL/kg/h · ScvO2 ≥70% (ou SvO2 ≥65%) · Normalização do lactato<br>
      · <strong>Cristaloide balanceado (RL) &gt; SF 0,9%</strong>: SMART trial — menor MACE com RL · SF em grandes volumes: acidose hiperclorêmica<br><br>
      <strong>Corticoide em choque séptico refratário:</strong><br>
      · <strong>Hidrocortisona 200 mg/dia IV (50 mg 6/6h ou infusão contínua)</strong>: ADRENAL trial — se choque refratário (noradrenalina &gt;0,25 mcg/kg/min por &gt;4h)<br>
      · Não usar como profilaxia · Não reduz mortalidade mas reduz tempo em vasopressor<br>
      · Fludrocortisona: APROCCHSS trial adiciona 50 mcg/dia VO ± benefício adicional
    </div>
  </div>
  <div class="sep-card" style="border-color:#b45309">
    <div class="sep-nome" style="color:#b45309">💊 Vasopressores em Sepse — Escalonamento</div>
    <div class="sep-body">
      <table>
        <tr><th>Vasopressor</th><th>Dose</th><th>Indicação / Posição</th></tr>
        <tr><td><strong>Noradrenalina (NE)</strong></td><td>0,01–3 mcg/kg/min</td><td>1ª linha universal · Alvo PAM ≥65 · Começar periférico se central indisponível</td></tr>
        <tr><td><strong>Vasopressina</strong></td><td>0,03–0,04 UI/min (fixo)</td><td>Adicionar à NE se NE &gt;0,25 mcg/kg/min · Poupa NE · VASST trial</td></tr>
        <tr><td><strong>Adrenalina</strong></td><td>0,01–3 mcg/kg/min</td><td>3ª linha ou anafilaxia · Aumenta lactato (glicólise) — não usar como guia de lactato</td></tr>
        <tr><td><strong>Dopamina</strong></td><td>5–20 mcg/kg/min</td><td>Evitar: mais arritmias que NE (SOAP-II) · Casos selecionados: bradicardia</td></tr>
        <tr><td><strong>Dobutamina</strong></td><td>2–20 mcg/kg/min</td><td>Disfunção miocárdica séptica (IC + PAM OK) · SvO2 baixa · NÃO para ↑PA</td></tr>
        <tr><td><strong>Terlipressina</strong></td><td>0,5–2 mg a cada 6h IV</td><td>Síndrome hepatorrenal + sepse · Alternativa vasopressina</td></tr>
        <tr><td><strong>Metilazul (Azul de Metileno)</strong></td><td>1–2 mg/kg IV</td><td>Choque refratário (inibição de NO sintase) · Off-label · Anafilaxia refratária</td></tr>
      </table>
      <div style="margin-top:6px;font-size:.72rem;color:#64748b"><strong>Angiotensina II (Giapreza):</strong> aprovada FDA 2017 para choque séptico refratário · 20 ng/kg/min IV → titular · Aumenta RVS pelo SRAA · Associada a maior trombose</div>
    </div>
  </div>`;
}

/* ─── CHOQUE POR TIPO ─────────────────────────────────────────────── */
function renderChoque(){
  if(document.getElementById('choqueList').innerHTML) return;
  const CARDS=[
    {col:'#991b1b',nome:'Choque Distributivo — Séptico, Anafilático, Neurogênico',
     body:`<strong>Hemodinâmica:</strong> ↑débito cardíaco (hiperdinâmico), ↓RVS, pele quente, pulso amplo<br>
Choque séptico: ver Tab 0 · Choque anafilático: adrenalina IM → IV + volume<br><br>
<strong>Choque Neurogênico (lesão medular alta — C1–T4):</strong><br>
Bradicardia + hipotensão (perda do tônus simpático vasomotor e cardioestimulador)<br>
• SF 0,9% 1–2 L · NÃO volume agressivo (sem taquicardia compensatória como guia)<br>
• <strong>Noradrenalina</strong>: vasopressão + cronotrópico (alfa+beta) · Alvo PAM ≥85 mmHg em TRM (melhor perfusão medular)<br>
• Atropina 0,5 mg IV: bradicardia sintomática · Marcapasso temporário: bradicardia refratária<br>
• Dexametasona 10 mg IV → 6 mg IV 6/6h × 48h: TRM agudo (controverso — NASCIS III)<br><br>
<strong>Crise Adrenal / Choque Addissoniano:</strong><br>
Hipotensão + hiponatremia + hiperpotassemia + hipoglicemia em paciente com hipopituitarismo ou uso prévio de corticoide<br>
• <strong>Hidrocortisona 100 mg IV bolus → 200 mg/dia IV contínuo</strong><br>
• SF 0,9% 1 L em 30–60 min + dextrose 10% (hipoglicemia)<br>
• NÃO esperar resultados de cortisol — tratar empiricamente se suspeita`,
     note:'Choque distributivo tem DC normal/alto — não confundir com "bomba parada". O problema é vasoplegia (vasopressores) e não contratilidade (inotrópicos). Exceto choque séptico tardio com miocardiopatia séptica (DC cai) — ecocardiograma beira-leito diferencia.'},
    {col:'#1e3a8a',nome:'Choque Cardiogênico — IAM, IC Descompensada, Miocardite',
     body:`<strong>Hemodinâmica:</strong> ↓DC, ↑PCP (&gt;18 mmHg), ↑RVS, pele fria, pulso fino, estertores<br>
Critério: IC &lt;2,2 L/min/m² + PAS &lt;90 OU PAM &lt;65 + congestão<br><br>
<strong>Tratamento:</strong><br>
• <strong>Dobutamina 5–20 mcg/kg/min IV</strong>: inotrópico positivo · Aumenta DC e reduz PCP<br>
  RAM: taquicardia, arritmia, isquemia (aumenta demanda O2)<br>
• <strong>Noradrenalina + Dobutamina (combinação)</strong>: choque cardiogênico com hipotensão<br>
  NE mantém PAM; dobutamina melhora contratilidade<br>
• Levosimendan 0,1–0,2 mcg/kg/min × 24h: sensibilizador de Ca · Não aumenta demanda O2 · REVIVE/SURVIVE trials · Útil em IC terminal<br>
• Milrinona 0,375–0,75 mcg/kg/min: inibidor de PDE-III · Vasodilatador + inotrópico · Evitar se hipotensão<br><br>
<strong>Suporte Circulatório Mecânico:</strong><br>
• <strong>BIA (Balão Intra-Aórtico)</strong>: 1ª linha histórica · IABP-SHOCK II: não reduz mortalidade vs tratamento clínico · Útil em regurgitação mitral aguda e defeito do septo<br>
• <strong>Impella (CP/5.5):</strong> bomba percutânea axial intracardíaca · Maior suporte que BIA · IMPRESS trial: sem diferença de mortalidade vs IABP<br>
• <strong>ECMO VA (venoarterial):</strong> choque refratário ou parada cardíaca — ECMO-RCP (E-CPR) · Maior suporte hemodinâmico disponível · Complicações: isquemia de MMII, trombose, sangramento<br><br>
<strong>Tratamento da causa:</strong><br>
IAM: ICP primária IMEDIATA (independente do choque) · IC aguda: diurético + nitrato se PAM permite`,
     note:'Ecocardiograma à beira-leito: indispensável no choque para diferencial (RUSH protocol: Rapid Ultrasound for Shock). Pericardite com tamponamento: pericardiocentese urgente (agulha subxifoide). Miocardite fulminante em jovem: ECMO VA como ponte para recuperação ou transplante.'},
    {col:'#b45309',nome:'Choque Obstrutivo — Tamponamento, TEP, Pneumotórax',
     body:`<strong>Hemodinâmica:</strong> ↓DC por obstrução mecânica ao fluxo · ↑RVS · Turgência jugular<br><br>
<strong>Tamponamento Cardíaco:</strong><br>
Tríade de Beck: hipotensão + turgência jugular + bulhas abafadas · ECG: alternância elétrica + baixa voltagem · Echo: colapso de VD na diástole<br>
• <strong>Pericardiocentese imediata:</strong> 60° sentado · Abordagem subxifoide · Eco-guiada<br>
• SF 0,9% 500 mL: preencher VD · NÃO dar furosemida (reduz pré-carga → piora)<br>
• Causa: neoplasia (mais comum), TB, uremia, pós-IAM (Dressler), dissecção tipo A<br><br>
<strong>TEP com choque (TEP maciço):</strong><br>
Critério: choque/hipotensão + RV dilatado (S1Q3T3, RBBB, sobrecarga VD no eco)<br>
• <strong>Alteplase 100 mg IV em 2h</strong> (ou 0,6 mg/kg em 15 min se PCR iminente)<br>
• UFH concomitante: suspender durante infusão de alteplase · Reiniciar após (sem bolus, PTTa 60–80s)<br>
• Trombectomia percutânea ou cirúrgica: CI absoluta a trombolítico ou falha<br>
• ECMO VA: TEP maciço + colapso · Ponte para trombectomia cirúrgica<br><br>
<strong>Pneumotórax Hipertensivo:</strong><br>
Desvio de traqueia + abolição do MV unilateral + turgência jugular + hipotensão<br>
• <strong>Descompressão imediata com agulha:</strong> 2º EIC na linha hemiclavicular (adulto: 4,5 cm de comprimento mínimo)<br>
• Drenagem torácica imediatamente após: 4–5º EIC linha axilar média`,
     note:'RUSH protocol: 3 janelas ultrassonográficas (coração → eco: tamponamento/disfunção; VCI → hipovolemia; pulmões → pneumotórax/derrame). Diferencial por turgência jugular: tamponamento e choque obstrutivo = TJ aumentada; hipovolêmico = TJ diminuída; séptico = TJ variável.'},
    {col:'#374151',nome:'Choque Hipovolêmico — Hemorrágico e Não-Hemorrágico',
     body:`<strong>Hemodinâmica:</strong> ↓DC, ↓PVC, ↑FC, ↑RVS, pele fria, turgência jugular diminuída<br><br>
<strong>Classificação do choque hemorrágico (ATLS):</strong><br>
<table>
  <tr><th>Classe</th><th>Perda</th><th>FC</th><th>PA</th><th>Conduta</th></tr>
  <tr><td>I</td><td>&lt;15% (&lt;750 mL)</td><td>Normal</td><td>Normal</td><td>Observação</td></tr>
  <tr><td>II</td><td>15–30%</td><td>100–120</td><td>Normal</td><td>Cristaloide 1–2 L</td></tr>
  <tr><td>III</td><td>30–40%</td><td>120–140</td><td>↓</td><td>Cristaloide + hemocomponentes</td></tr>
  <tr><td>IV</td><td>&gt;40% (&gt;2L)</td><td>&gt;140</td><td>↓↓</td><td>Controle de dano + MTP</td></tr>
</table>
<br>
<strong>Ressuscitação hemostática (trauma grave, Classe III/IV):</strong><br>
• <strong>Protocolo de Transfusão Maciça (MTP):</strong> razão 1:1:1 (CH:PFC:plaquetas)<br>
• <strong>Ácido tranexâmico (TXA) 1 g IV em 10 min → 1 g em 8h:</strong> mortalidade −15% se administrado em &lt;3h (CRASH-2 trial) · Não usar após 3h (pior)<br>
• <strong>Fibrinogênio:</strong> crioprecipitado ou concentrado de fibrinogênio se &lt;1,5 g/L<br>
• Hipotensão permissiva: PAS 80–90 mmHg (trauma sem TCE) até controle cirúrgico<br>
• Hipotermia + acidose + coagulopatia = "tríade da morte": prevenir aquecimento ativo<br><br>
<strong>Choque hipovolêmico não-hemorrágico (hemorragia digestiva, vômitos, perdas de terceiro espaço):</strong><br>
• Ringer Lactato 30 mL/kg + avaliar resposta (PLR: elevação passiva das pernas)<br>
• Albumina 5%: hipoalbuminemia + sepse (SAFE trial)<br>
• HES (amido): CONTRAINDICADO em sepse (maior IRA e mortalidade — CHEST/6S trials)`,
     note:'Choque hemorrágico em anticoagulado: CCP 4 fatores (warfarina) / idarucizumabe (dabigatrana) / andexanet (apixabana/rivaroxabana) + TXA. HAS e betabloqueadores mascaram taquicardia — não usar FC como único guia. Cálcio ionizado: monitorar em transfusão maciça (citrato do hemocomponente quela Ca — repor CaCl2 1 g IV a cada 4 unidades transfundidas).'},
  ];
  document.getElementById('choqueList').innerHTML=CARDS.map(c=>`<div class="sep-card" style="border-color:${c.col}"><div class="sep-nome" style="color:${c.col}">${c.nome}</div><div class="sep-body">${c.body}</div>${c.note?`<div style="font-size:.7rem;color:#64748b;margin-top:6px">💡 ${c.note}</div>`:''}</div>`).join('');
}

/* ─── ATB POR FOCO & MODS ─────────────────────────────────────────── */
function renderATB(){
  if(document.getElementById('atbList').innerHTML) return;
  const CARDS=[
    {col:'#991b1b',nome:'ATB Empírico em Sepse por Foco',
     body:`<strong>Regra geral: amplo espectro, precoce, de-escalada assim que disponível</strong><br><br>
<table>
  <tr><th>Foco Suspeito</th><th>ATB 1ª Linha</th><th>Cobertura extra</th></tr>
  <tr><td>Pulmonar (PAC grave)</td><td>Amox-clav 2,2 g IV 8h + Azitromicina 500 mg IV/dia</td><td>Atípicos cobertos · Se DPOC: adicionar ciprofloxacino</td></tr>
  <tr><td>Pulmonar (PAH, VM &gt;5 dias)</td><td>Pip-taz 4,5 g 6h + Vancomicina IV AUC-guiada</td><td>Se risco MDR: cefepime ou meropeném</td></tr>
  <tr><td>Urinário (PNA complicada/UTI)</td><td>Ceftriaxona 2 g IV 24h OU Ciprofloxacino 400 mg IV 8h</td><td>ESBL suspeito: meropeném 1 g 8h</td></tr>
  <tr><td>Abdominal / Peritonite</td><td>Pip-taz 4,5 g IV 6h</td><td>+ Metronidazol 500 mg 8h (anaeróbios) · ESBL: meropeném</td></tr>
  <tr><td>Meningite bacteriana</td><td>Ceftriaxona 4 g IV 12h + Dexametasona 0,15 mg/kg 6h × 4 dias</td><td>+ Ampicilina 2 g 4h (Listeria se &gt;50 anos ou imuno) · Aciclovir se viral suspeito</td></tr>
  <tr><td>Endocardite (comunitária)</td><td>Ampicilina-sulbactam 3 g 6h + Gentamicina 3 mg/kg/dia</td><td>MRSA: Vancomicina AUC-guiada</td></tr>
  <tr><td>Pele/partes moles (fasceíte)</td><td>Pip-taz 4,5 g 6h + Vancomicina + Clindamicina 900 mg 8h (antitoxina)</td><td>Cirurgia de desbridamento urgente</td></tr>
  <tr><td>Febre neutropênica (&lt;500)</td><td>Cefepime 2 g 8h OU Pip-taz 4,5 g 6h</td><td>+ Vancomicina se HDA ou mucosites; antifúngico se &gt;4 dias de febre</td></tr>
  <tr><td>Bacteremia por cateter</td><td>Vancomicina IV AUC-guiada + coleta de hemoculturas periféricas</td><td>Retirar cateter IMEDIATAMENTE · Se S. aureus: ecocardiograma</td></tr>
  <tr><td>Foco desconhecido / choque</td><td>Meropeném 1 g 8h + Vancomicina AUC-guiada</td><td>± Anidulafungina (Candida suspeita: CVC + neutropenia + QT prolongada)</td></tr>
</table>
<div style="margin-top:6px;font-size:.72rem;color:#64748b"><strong>De-escalada:</strong> Revisar ATB em 48–72h com resultados de cultura · Trocar para agente mais estreito · Suspender ATB desnecessários · Duração: sepse 7–10 dias (guiar por PCT quando possível: suspender se PCT &lt;0,5 ou redução &gt;80% do pico)</div>`,
     note:'PCT (procalcitonina) como guia de duração: PRORATA trial — guia de PCT reduz duração de ATB sem piorar desfechos. Não usar para iniciar (sensibilidade baixa nas primeiras horas). BioFire FilmArray: painel multiplex rápido (1–2h) para identificação bacteriana em hemocultura — acelera de-escalada.'},
    {col:'#450a0a',nome:'MODS — Disfunção Múltipla de Órgãos: Manejo por Sistema',
     body:`<strong>MODS (Multiple Organ Dysfunction Syndrome):</strong> falência de ≥2 órgãos em paciente crítico · Mortalidade 40–80% se ≥3 órgãos<br><br>
<strong>Pulmão (SARA / ARDS):</strong><br>
• Ventilação protetora: Vt 6 mL/kg PI · Platô ≤30 cmH2O · PEEP guiada por tabela ARDSNet<br>
• Prona ≥12h/dia: PaO2/FiO2 &lt;150 (PROSEVA: mortalidade −17%)<br>
• Dexametasona 6 mg/dia × 10 dias (RECOVERY) OU metilprednisolona (MEDURI protocol) para ARDS persistente<br>
• ECMO VV: ARDS refratário (PaO2/FiO2 &lt;80 após 6h de VM otimizada)<br><br>
<strong>Rim (IRA em sepse):</strong><br>
• Evitar nefrotóxicos: aminoglicosídeo, AINE, contraste iodado (adiar se não urgente)<br>
• Dose de NE para PAM ≥65 (melhor fluxo renal que dopamina em dose renal — obsoleta)<br>
• TRSCC (hemodiálise contínua): indicação quando K &gt;6,5, acidose pH &lt;7,15, uremia, sobrecarga volêmica<br>
• Timing precoce de diálise: AKIKI/ELAIN — sem benefício de diálise muito precoce para oligúria<br><br>
<strong>Fígado:</strong><br>
• Evitar hepatotóxicos · Reduzir dose de fármacos com metabolismo hepático<br>
• Colestase séptica: icterícia sem obstrução biliar · Melhora com tratamento da sepse<br>
• Insuf. hepática aguda grave em MODS: ver hepatologia<br><br>
<strong>Coagulação (CIVD em sepse):</strong><br>
• CIVD de consumo: ↓plaquetas + ↑TAP/INR + ↑D-dímero + ↓fibrinogênio<br>
• Tratamento da causa (sepse) = tratamento principal<br>
• Transfusão: plaquetas &lt;10.000 (ou &lt;50.000 + sangramento ativo) · PFC se INR &gt;2 + sangramento · Crioprecipitado: fibrinogênio &lt;1,5 g/L`,
     note:'Prevenção de complicações em UTI: cabeça 30–45° (PAV) · Profilaxia de TVP (HBPM + meia elástica) · Profilaxia de úlcera de stress (IBP ou sucralfato) · Higiene oral com clorexidina 0,12% · Controle glicêmico 140–180 mg/dL · Protocolo de mobilização precoce (fisioterapia) · Gestão de sedação (RASS 0 a −2, SAT/SBT diário). Pacotes ABCDEF de UTI.'},
  ];
  document.getElementById('atbList').innerHTML=CARDS.map(c=>`<div class="sep-card" style="border-color:${c.col}"><div class="sep-nome" style="color:${c.col}">${c.nome}</div><div class="sep-body">${c.body}</div>${c.note?`<div style="font-size:.7rem;color:#64748b;margin-top:6px">💡 ${c.note}</div>`:''}</div>`).join('');
}
</script>
