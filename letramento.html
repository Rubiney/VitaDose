<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Letramento em Saúde — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar { display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0f766e;position:sticky;top:0;z-index:100 }
    .back-btn { background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:1rem }
    .topbar-title { font-size:.93rem;font-weight:800;color:#fff;flex:1 }
    .topbar-sub { font-size:.62rem;color:rgba(255,255,255,.7);margin-top:1px }
    .btn-top { background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:4px }

    main { max-width:600px;margin:0 auto;padding:12px 14px 90px }
    .pac-sel { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:.88rem;margin-bottom:10px;background:#fff }

    /* Score Hero */
    .score-hero { background:linear-gradient(135deg,#0f766e,#0d9488);border-radius:16px;padding:20px;text-align:center;margin-bottom:12px;color:#fff }
    .score-pct { font-size:4rem;font-weight:900;line-height:1 }
    .score-lbl { font-size:1rem;font-weight:800;margin-top:4px }
    .score-sub { font-size:.75rem;opacity:.7;margin-top:4px }
    .barra-prog { height:12px;background:rgba(255,255,255,.2);border-radius:8px;overflow:hidden;margin-top:14px }
    .barra-fill { height:100%;border-radius:8px;background:#fff;transition:width .5s }

    /* Medicamento card */
    .med-card { background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07) }
    .med-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:10px }
    .med-nome { font-size:.92rem;font-weight:800;color:#1e293b }
    .med-dose { font-size:.72rem;color:#94a3b8 }
    .med-score-badge { font-size:.75rem;font-weight:800;border-radius:10px;padding:3px 10px }
    .score-ok  { background:#dcfce7;color:#166534 }
    .score-par { background:#fef9c3;color:#854d0e }
    .score-low { background:#fee2e2;color:#991b1b }

    /* Perguntas */
    .q-row { display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc }
    .q-row:last-child { border:none }
    .q-txt { flex:1;font-size:.78rem;color:#374151;line-height:1.4 }
    .q-resp { display:flex;gap:8px }
    .resp-btn { border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:.72rem;cursor:pointer;background:#f8fafc;font-weight:700;transition:.15s }
    .resp-btn.sim   { background:#dcfce7;border-color:#4ade80;color:#166534 }
    .resp-btn.nao   { background:#fee2e2;border-color:#f87171;color:#991b1b }
    .resp-btn.ativo { opacity:1 }

    /* Plano de Educação */
    .plano-card { background:#fff;border-radius:14px;padding:16px;margin-top:10px;box-shadow:0 1px 4px rgba(0,0,0,.07) }
    .plano-title { font-size:.7rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:12px }
    .plano-item { padding:10px 0;border-bottom:1px solid #f8fafc }
    .plano-item:last-child { border:none }
    .plano-med  { font-size:.82rem;font-weight:800;color:#1e293b;margin-bottom:4px }
    .plano-gap  { font-size:.73rem;color:#dc2626;margin-bottom:3px;font-weight:600 }
    .plano-ac   { font-size:.73rem;color:#0f766e;line-height:1.5 }

    .empty { text-align:center;padding:40px 20px;color:#94a3b8 }
    .empty-icon { font-size:2.5rem }

    /* Abas */
    .tabs { display:flex;gap:6px;margin-bottom:12px }
    .tab { flex:1;border:none;border-radius:10px;padding:8px 4px;font-size:.78rem;font-weight:700;cursor:pointer;background:#e2e8f0;color:#64748b }
    .tab.ativo { background:#0f766e;color:#fff }

    .resumo-strip { display:flex;gap:6px;margin-bottom:10px }
    .res-item { flex:1;background:#fff;border-radius:10px;padding:10px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07) }
    .res-n { font-size:1.4rem;font-weight:900 }
    .res-l { font-size:.6rem;color:#64748b;font-weight:700;text-transform:uppercase;margin-top:2px }

    @media print {
      .topbar,.pac-sel,.btn-top,.tabs,nav,.resp-btn { display:none!important }
      body { background:#fff }
      main { padding:0;max-width:none }
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div style="flex:1">
    <div class="topbar-title">📚 Letramento em Saúde</div>
    <div class="topbar-sub">Avaliação Teach-Back por medicamento</div>
  </div>
  <button class="btn-top" onclick="salvar()">💾</button>
  <button class="btn-top" onclick="window.print()">🖨️</button>
</div>

<main>
  <select class="pac-sel" id="sel-pac" onchange="init()"><option value="">Selecione o paciente...</option></select>
  <div class="tabs" id="tabs-views" style="display:none">
    <button class="tab ativo" onclick="setView('avaliar',this)">📝 Avaliar</button>
    <button class="tab" onclick="setView('plano',this)">📋 Plano Educacional</button>
    <button class="tab" onclick="setView('historico',this)">📈 Histórico</button>
  </div>
  <div id="conteudo"></div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="historico.html" class="nav-item">📋<span>Histórico</span></a>
  <a href="diario.html" class="nav-item">📓<span>Diário</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>
const PERGUNTAS = [
  { id:'nome',    q:'Sabe o nome do medicamento?' },
  { id:'indica',  q:'Sabe para que serve (indicação)?' },
  { id:'dose',    q:'Sabe a dose correta?' },
  { id:'horario', q:'Sabe o horário/frequência de uso?' },
  { id:'efeito',  q:'Conhece os principais efeitos adversos?' },
];

const ACAO = {
  nome:    'Reforçar identificação visual do medicamento (rótulo, cor, formato) e o nome genérico.',
  indica:  'Explicar a doença/condição e como o medicamento age. Usar linguagem simples e exemplos do cotidiano.',
  dose:    'Demonstrar como medir/contar a dose. Usar medidores ou colunas de referência. Entregar instruções escritas.',
  horario: 'Criar um esquema de horários personalizado (despertador, refeições, rituais). Utilizar "Meu Esquema de Horários" do app.',
  efeito:  'Listar os 3 efeitos adversos mais relevantes. Orientar quando deve buscar atendimento vs. quando é esperado.',
};

let _meds = [], _respostas = {}, _view = 'avaliar', _pid = null;

async function init() {
  _pid = parseInt(document.getElementById('sel-pac').value);
  if (!_pid) { document.getElementById('conteudo').innerHTML=''; document.getElementById('tabs-views').style.display='none'; return; }
  const hj = hoje();
  const allMeds = await dbGetByIndex('medicamentos','pacienteId',_pid);
  _meds = allMeds.filter(m=>m.ativo!==false&&(!m.dataFim||m.dataFim>=hj));
  _respostas = (await dbGetConfig('letramento_'+_pid)) || {};
  document.getElementById('tabs-views').style.display='flex';
  render();
}

function setView(v, btn) {
  _view = v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo'));
  btn.classList.add('ativo');
  render();
}

function render() {
  if (_view==='avaliar') renderAvaliar();
  else if (_view==='plano') renderPlano();
  else renderHistorico();
}

function calcScore() {
  let total=0, correct=0;
  _meds.forEach(m=>{
    PERGUNTAS.forEach(p=>{
      total++;
      if (_respostas[m.id]?.[p.id]==='sim') correct++;
    });
  });
  return { total, correct, pct: total?Math.round(correct/total*100):0 };
}

function renderAvaliar() {
  const { total, correct, pct } = calcScore();
  const nivel = pct>=80?'Adequado':pct>=50?'Parcial':'Insuficiente';
  const corN  = pct>=80?'#14b8a6':pct>=50?'#f59e0b':'#ef4444';
  const nGaps = _meds.reduce((acc,m)=>acc+PERGUNTAS.filter(p=>_respostas[m.id]?.[p.id]==='nao').length,0);

  let html = `
    <div class="score-hero">
      <div class="score-pct" style="color:${corN}">${pct}%</div>
      <div class="score-lbl">Letramento ${nivel}</div>
      <div class="score-sub">${correct}/${total} perguntas corretas</div>
      <div class="barra-prog"><div class="barra-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="resumo-strip">
      <div class="res-item"><div class="res-n" style="color:#14b8a6">${correct}</div><div class="res-l">Conhece</div></div>
      <div class="res-item"><div class="res-n" style="color:#ef4444">${total-correct}</div><div class="res-l">Lacunas</div></div>
      <div class="res-item"><div class="res-n" style="color:#f59e0b">${nGaps}</div><div class="res-l">Para educar</div></div>
      <div class="res-item"><div class="res-n" style="color:#1e3a5f">${_meds.length}</div><div class="res-l">Meds</div></div>
    </div>`;

  _meds.forEach(m=>{
    const resp = _respostas[m.id] || {};
    const ok   = PERGUNTAS.filter(p=>resp[p.id]==='sim').length;
    const pctM = Math.round(ok/PERGUNTAS.length*100);
    const badgeCls = pctM>=80?'score-ok':pctM>=40?'score-par':'score-low';

    html += `
      <div class="med-card">
        <div class="med-header">
          <div>
            <div class="med-nome">${esc(m.nome||'?')}</div>
            <div class="med-dose">${m.dosagem||''} ${m.frequencia?'· '+m.frequencia:''}</div>
          </div>
          <span class="med-score-badge ${badgeCls}">${ok}/${PERGUNTAS.length}</span>
        </div>
        ${PERGUNTAS.map(p=>{
          const val = resp[p.id]||'';
          return `<div class="q-row">
            <div class="q-txt">${esc(p.q)}</div>
            <div class="q-resp">
              <button class="resp-btn ${val==='sim'?'sim':''}" onclick="setResp(${m.id},'${p.id}','sim',this)">✓ Sim</button>
              <button class="resp-btn ${val==='nao'?'nao':''}" onclick="setResp(${m.id},'${p.id}','nao',this)">✗ Não</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  });

  document.getElementById('conteudo').innerHTML = html;
}

function setResp(mid, qid, val, btn) {
  if (!_respostas[mid]) _respostas[mid]={};
  _respostas[mid][qid] = val;
  // Atualiza botões visuais
  const card = btn.closest('.med-card');
  const qRow = btn.closest('.q-resp');
  qRow.querySelectorAll('.resp-btn').forEach(b=>{
    b.className = 'resp-btn';
    if (b.textContent.includes('Sim')) { if (val==='sim') b.className='resp-btn sim'; }
    else { if (val==='nao') b.className='resp-btn nao'; }
  });
  // Atualiza score do card
  const ok = PERGUNTAS.filter(p=>_respostas[mid]?.[p.id]==='sim').length;
  const pctM = Math.round(ok/PERGUNTAS.length*100);
  const badge = card.querySelector('.med-score-badge');
  if (badge) {
    badge.textContent = ok+'/'+PERGUNTAS.length;
    badge.className='med-score-badge '+(pctM>=80?'score-ok':pctM>=40?'score-par':'score-low');
  }
  // Atualiza score global no hero
  const { pct, correct, total } = calcScore();
  const el = document.querySelector('.score-pct');
  if (el) el.textContent = pct+'%';
  const lbl = document.querySelector('.score-lbl');
  if (lbl) lbl.textContent = 'Letramento '+(pct>=80?'Adequado':pct>=50?'Parcial':'Insuficiente');
  const sub = document.querySelector('.score-sub');
  if (sub) sub.textContent = correct+'/'+total+' perguntas corretas';
  const fill = document.querySelector('.barra-fill');
  if (fill) fill.style.width=pct+'%';
}

function renderPlano() {
  const gaps = [];
  _meds.forEach(m=>{
    const resp = _respostas[m.id]||{};
    const lacunas = PERGUNTAS.filter(p=>resp[p.id]==='nao');
    if (lacunas.length) gaps.push({ med:m, lacunas });
  });

  if (!gaps.length) {
    document.getElementById('conteudo').innerHTML = `
      <div class="plano-card" style="text-align:center;padding:40px">
        <div style="font-size:2.5rem">🎉</div>
        <div style="font-weight:800;color:#14b8a6;margin-top:8px">Ótimo letramento!</div>
        <div style="font-size:.78rem;color:#64748b;margin-top:4px">Nenhuma lacuna identificada até o momento.</div>
      </div>`;
    return;
  }

  const { pct } = calcScore();
  const data = hoje().split('-').reverse().join('/');

  let html = `
    <div class="plano-card">
      <div class="plano-title">📋 Plano de Educação em Saúde — ${data}</div>
      <p style="font-size:.75rem;color:#64748b;margin-bottom:14px;line-height:1.5">
        Letramento atual: <strong>${pct}%</strong>. As intervenções educativas abaixo devem ser realizadas nas próximas consultas.
      </p>
      ${gaps.map((g,i)=>`
        <div class="plano-item">
          <div class="plano-med">${i+1}. ${esc(g.med.nome||'?')} — ${g.med.dosagem||''}</div>
          ${g.lacunas.map(p=>`<div class="plano-gap">⚠️ Lacuna: ${esc(p.q.replace('?',''))}</div>
            <div class="plano-ac">→ ${esc(ACAO[p.id]||'Orientar o paciente.')}</div>`).join('')}
        </div>`).join('')}
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid #f1f5f9;font-size:.7rem;color:#94a3b8">
        Avaliação realizada por: _________________________________ CRF: ___________<br>
        Assinatura do paciente: _________________________________ Data: ___________
      </div>
    </div>`;

  document.getElementById('conteudo').innerHTML = html;
}

async function renderHistorico() {
  const hist = (await dbGetConfig('letramento_hist_'+_pid)) || [];
  if (!hist.length) {
    document.getElementById('conteudo').innerHTML = `<div class="empty"><div class="empty-icon">📈</div><div style="margin-top:8px;font-size:.85rem;font-weight:700">Nenhuma avaliação salva</div><div style="font-size:.75rem;margin-top:4px">Salve a avaliação atual para ver o histórico de evolução.</div></div>`;
    return;
  }

  // Gráfico SVG de tendência
  const datas = hist.map(h=>h.data.split('-').slice(1).join('/'));
  const pcts  = hist.map(h=>h.pct);
  const W=320, H=120, px=30, py=20;
  const ew=(W-2*px)/(Math.max(hist.length-1,1));
  const pts = pcts.map((p,i)=>({ x:px+i*ew, y:py+(H-2*py)*(1-p/100) }));
  const poly = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const fill = `${pts[0].x},${H-py} ${poly} ${pts[pts.length-1].x},${H-py}`;

  let svg = `<div class="med-card" style="margin-bottom:10px">
    <div class="plano-title" style="margin-bottom:10px">Evolução do Letramento</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
      <polygon points="${fill}" fill="#ccfbf1" opacity=".7"/>
      <polyline points="${poly}" fill="none" stroke="#0f766e" stroke-width="2.5"/>
      ${pts.map((p,i)=>`
        <circle cx="${p.x}" cy="${p.y}" r="5" fill="#0f766e"/>
        <text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="9" fill="#0f766e" font-weight="700">${pcts[i]}%</text>
        <text x="${p.x}" y="${H-6}" text-anchor="middle" font-size="8" fill="#94a3b8">${datas[i]}</text>`).join('')}
      <line x1="${px}" y1="${py}" x2="${px}" y2="${H-py}" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="${px}" y1="${H-py}" x2="${W-px}" y2="${H-py}" stroke="#e2e8f0" stroke-width="1"/>
    </svg>
  </div>`;

  svg += `<div class="med-card">
    <div class="plano-title">Histórico de avaliações</div>
    ${hist.slice().reverse().map(h=>`
      <div class="q-row">
        <div class="q-txt">${h.data.split('-').reverse().join('/')}</div>
        <div style="font-size:.82rem;font-weight:800;color:${h.pct>=80?'#14b8a6':h.pct>=50?'#f59e0b':'#ef4444'}">${h.pct}% — ${h.nivel}</div>
      </div>`).join('')}
  </div>`;

  document.getElementById('conteudo').innerHTML = svg;
}

async function salvar() {
  if (!_pid) { showToast('Selecione um paciente'); return; }
  await dbSetConfig('letramento_'+_pid, _respostas);
  const { pct } = calcScore();
  const nivel = pct>=80?'Adequado':pct>=50?'Parcial':'Insuficiente';
  const hist = (await dbGetConfig('letramento_hist_'+_pid)) || [];
  hist.push({ data:hoje(), pct, nivel, nMeds:_meds.length });
  await dbSetConfig('letramento_hist_'+_pid, hist);
  showToast('✅ Avaliação salva — Letramento: '+pct+'% ('+nivel+')');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

document.addEventListener('DOMContentLoaded', async ()=>{
  const pacs = await dbGetAll('pacientes');
  const sel  = document.getElementById('sel-pac');
  sel.innerHTML='<option value="">Selecione o paciente...</option>'+pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
  const pid = getActivePacienteId();
  if (pid) { sel.value=pid; await init(); }
});
</script>
</body>
</html>
