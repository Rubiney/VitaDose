• T-DXd em HER2+ (DESTINY-Gastric02): ORR 41%<br>
• MSI-H/dMMR: pembrolizumabe 2ª linha (KEYNOTE-059 ORR 57,1%)`,
   note:'Ca gástrico difuso (células em anel de sinete): pior prognóstico · Menos responsivo a quimio · Claudin-18.2: alvo emergente (zolbetuximab + XELOX — SPOTLIGHT/GLOW: OS benefício em CLDN18.2+). Bevacizumabe em gástrico: NÃO aprovado (AVAGAST trial negativo). Câncer gástrico e aspirina: H. pylori é 1° passo; erradicação reduz risco de Ca gástrico em 30% (metanálise Cochrane).'},
};

function calcOnc(){
  const t=document.getElementById('onc_tumor').value;
  const p=PROTO_ONC[t];
  document.getElementById('oncResult').style.display='block';
  document.getElementById('oncResult').innerHTML=`<div class="rec-card" style="border-color:${p.col}"><div class="rec-hdr" style="color:${p.col}">ONCOLOGIA — ${p.hdr}</div><div class="rec-nome">${p.nome}</div><div class="rec-body">${p.body}</div>${p.note?`<div class="rec-note">${p.note}</div>`:''}</div>`;
  document.getElementById('oncResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ─── IMUNOTERAPIA irAE & SLT ─────────────────────────────────────── */
function renderImun(){
  if(document.getElementById('imunList').innerHTML) return;
  const CARDS=[
    {col:'#6d28d9',nome:'Toxicidade de Imunoterapia (irAE) — Diagnóstico e Manejo',
     body:`<strong>Mecanismo:</strong> ICI (inibidores de checkpoint) bloqueiam PD-1/PD-L1 ou CTLA-4 → desbloqueio de imunidade antitumoral → auto-imunidade tecidual<br><br>
<strong>irAE por sistema e manejo (graus CTCAE):</strong><br>
<table>
  <tr><th>Sistema</th><th>Apresentação</th><th>Grau 1–2</th><th>Grau 3–4</th></tr>
  <tr><td><strong>Colite</strong></td><td>Diarreia, dor abdominal, sangue nas fezes</td><td>Pausar ICI + loperamida + hidratação</td><td>Suspender permanentemente + prednisolona 1–2 mg/kg → infliximabe 5 mg/kg IV se refratário a 72h de corticoide</td></tr>
  <tr><td><strong>Pneumonite</strong></td><td>Tosse, dispneia, infiltrado TC</td><td>Pausar ICI + prednisona 0,5 mg/kg + broncoscopia</td><td>Suspender + prednisolona 1–2 mg/kg + micofenolato ou infliximabe se refratário · Monitorar 4–8 sem</td></tr>
  <tr><td><strong>Hepatite</strong></td><td>↑TGO/TGP (AST/ALT &gt;3× LSN)</td><td>Pausar + prednisolona 0,5–1 mg/kg</td><td>Suspender + prednisolona 1–2 mg/kg; se refratário: micofenolato mofetil 1 g 2×/dia (NÃO infliximabe — hepatotóxico)</td></tr>
  <tr><td><strong>Endocrinopatias</strong></td><td>Hipofisita (cefaleia, fadiga, pan-hipo), tireoidite, DM1 tipo 3c</td><td>Manter ICI + reposição hormonal</td><td>Hipofisita: hidrocortisona 100 mg IV urgente se adrenal</td></tr>
  <tr><td><strong>Nefrite</strong></td><td>↑creatinina (≥1,5× basal)</td><td>Pausar + prednisona 0,5 mg/kg</td><td>Suspender + prednisona 1–2 mg/kg + biópsia renal</td></tr>
  <tr><td><strong>Artrite</strong></td><td>Artralgia, artrite, tenossinovite</td><td>AINE + manter ICI</td><td>Prednisona 0,5–1 mg/kg · Metotrexato/hidroxicloroquina se persistente</td></tr>
  <tr><td><strong>Miocardite</strong></td><td>Dor torácica, ↑troponina, bloqueio AV</td><td colspan="2">SUSPENDER IMEDIATAMENTE + prednisolona 1–2 mg/kg IV + cardiologia · Alta mortalidade</td></tr>
</table>
<br>
<strong>Princípio geral:</strong><br>
Grau 1: manter ICI, tratar sintomas · Grau 2: pausar ICI + iniciar corticoide · Grau 3–4: suspender permanentemente + corticoide imunossupressor<br>
Desmame do corticoide: lento (≥4 semanas) para evitar recaída do irAE · Anti-CTLA4 (ipilimumabe): irAE mais frequentes e graves que anti-PD-1`,
     note:'Infliximabe e colite por ICI: 5 mg/kg IV dose única → repetir em 2 sem se necessário. NÃO usar em pneumonite ou hepatite irAE (piora inflamação). Vedolizumabe 300 mg IV: alternativa a infliximabe em colite grave (seletivo para GI, menos imunossupressão sistêmica). Reiniciar ICI após irAE grave: apenas em tumores altamente responsivos, após resolução completa e corticoide desmamado, com monitoramento apertado.'},
    {col:'#dc2626',nome:'Síndrome de Lise Tumoral (SLT) — Prevenção e Manejo',
     body:`<strong>Critérios de Cairo-Bishop (SLT Laboratorial):</strong><br>
≥2 dos seguintes em 3 dias antes ou 7 dias após início do tratamento:<br>
• Ácido úrico ≥8 mg/dL (ou ↑25% do basal) · Potássio ≥6 mEq/L (ou ↑25%) · Fósforo ≥4,5 mg/dL (adulto) · Cálcio ≤7 mg/dL (hipocalcemia)<br><br>
<strong>Risco de SLT por tumor:</strong><br>
<span style="color:#dc2626;font-weight:800">ALTO RISCO:</span> LNH Burkitt · LLA · LMA M5 · LLC (após ibrutinibe/venetoclax) · LNH DLBCL bulky · Leucemia com &gt;25.000/mm³<br>
<span style="color:#b45309;font-weight:800">RISCO INTERMEDIÁRIO:</span> DLBCL não-bulky · LH avançado · MM · Ca sólido altamente proliferativo (tumor grande + sensível)<br>
<span style="color:#16a34a;font-weight:800">BAIXO RISCO:</span> Ca sólido padrão · Tumores indolentes<br><br>
<strong>Prevenção (antes de iniciar quimio):</strong><br>
<strong>Alto risco:</strong><br>
• <strong>Rasburicase 0,2 mg/kg IV/dia × 5–7 dias</strong>: uricorredutase recombinante · Converte ácido úrico em alantoína (excretada facilmente) · Início 4–24h antes da quimio · CI: deficiência de G6PD (hemólise)<br>
• Hidratação IV agressiva: SF ou SG 200–300 mL/h (débito urinário ≥80–100 mL/h) · SEM bicarbonato de rotina (precipita fosfato)<br>
• Monitoramento: eletrólitos + ácido úrico + creatinina a cada 4–6h<br><br>
<strong>Risco intermediário:</strong><br>
• Alopurinol 300 mg/dia (inicia 24–48h antes): inibidor de xantina oxidase · NÃO converte AU já formado (só previne produção) · Interação com 6-MP/azatioprina (dose ÷4)<br>
• Hidratação 2–3 L/dia VO + monitoramento eletrólitos diário<br><br>
<strong>Manejo da SLT estabelecida:</strong><br>
Hiperuricemia: rasburicase · Hiperkalemia: resinas, kayexalate, insulina+glicose (ver urgências) · Hiperfosforemia: sevelamer 800 mg 3×/dia com refeições, quelantes de fósforo · Hipocalcemia sintomática: gluconato de Ca IV (cuidado — precipita fosfato se hiperfosfatemia) · Insuficiência renal grave: hemodiálise`,
     note:'Rasburicase e G6PD: hemólise grave (hemoglobinúria maciça) em deficientes de G6PD — triagem ou interrogação de histórico antes de usar. Alopurinol e 6-mercaptopurina / azatioprina: ambas metabolizadas por xantina oxidase → rasburicase aumenta nível de 6-MP e azatioprina em 4× → dose ÷4 ou trocar por 6-TG. Venetoclax e SLT: monitoramento rigoroso — iniciar com 20 mg/dia e titulação semanal muito lenta + hospitalização no ramp-up de alto risco.'},
  ];
  document.getElementById('imunList').innerHTML=CARDS.map(c=>`<div class="onc-card" style="border-color:${c.col}"><div class="onc-nome" style="color:${c.col}">${c.nome}</div><div class="onc-body">${c.body}</div>${c.note?`<div style="font-size:.7rem;color:#64748b;margin-top:6px">💡 ${c.note}</div>`:''}</div>`).join('');
}
