<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>PHQ-9 + GAD-7 — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#581c87;position:sticky;top:0;z-index:100}
    .back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:1rem}
    .topbar-title{font-size:.93rem;font-weight:800;color:#fff;flex:1}
    .topbar-sub{font-size:.62rem;color:rgba(255,255,255,.7);margin-top:1px}
    .btn-top{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:4px}
    main{max-width:600px;margin:0 auto;padding:12px 14px 90px}
    .pac-sel{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:.88rem;margin-bottom:10px;background:#fff}

    /* Score duplo */
    .score-duo{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .score-bloco{border-radius:14px;padding:16px;text-align:center;color:#fff}
    .phq-bloco{background:linear-gradient(135deg,#581c87,#7c3aed)}
    .gad-bloco{background:linear-gradient(135deg,#1e3a8a,#1d4ed8)}
    .sb-n{font-size:2.8rem;font-weight:900;line-height:1}
    .sb-lbl{font-size:.78rem;font-weight:800;opacity:.9;margin-top:3px}
    .sb-nivel{font-size:.68rem;opacity:.75;margin-top:3px}
    .sb-prog{height:6px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin-top:8px}
    .sb-fill{height:100%;border-radius:4px;background:#fff;transition:width .4s}

    /* Alertas PHQ-9 Q9 */
    .alerta-suicidio{background:#fee2e2;border:2px solid #f87171;border-radius:12px;padding:12px 14px;margin:8px 0;display:none}
    .alerta-suicidio-txt{font-size:.8rem;font-weight:700;color:#991b1b;line-height:1.5}

    /* Seção */
    .sec-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .sec-title{font-size:.82rem;font-weight:800;margin-bottom:4px}
    .sec-instr{font-size:.73rem;color:#64748b;margin-bottom:12px;line-height:1.5;border-bottom:1px solid #f1f5f9;padding-bottom:10px}
    .q-item{padding:10px 0;border-bottom:1px solid #f8fafc}
    .q-item:last-child{border:none}
    .q-num{font-size:.62rem;font-weight:800;color:#94a3b8;margin-bottom:4px}
    .q-txt{font-size:.82rem;color:#1e293b;font-weight:500;line-height:1.4;margin-bottom:8px}
    .opts{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
    @media(min-width:400px){.opts{grid-template-columns:repeat(4,1fr)}}
    .opt{border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 4px;font-size:.68rem;cursor:pointer;background:#f8fafc;font-weight:600;text-align:center;color:#475569;transition:.12s;line-height:1.3}
    .opt.sel0{background:#dcfce7;border-color:#4ade80;color:#166534}
    .opt.sel1{background:#fef9c3;border-color:#fbbf24;color:#713f12}
    .opt.sel2{background:#fed7aa;border-color:#fb923c;color:#9a3412}
    .opt.sel3{background:#fecaca;border-color:#f87171;color:#991b1b}

    /* Impacto funcional */
    .imp-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .imp-btn{flex:1;min-width:80px;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 6px;font-size:.65rem;cursor:pointer;background:#f8fafc;text-align:center;color:#475569;font-weight:600}
    .imp-btn.sel{background:#ede9fe;border-color:#7c3aed;color:#581c87}

    /* Histórico */
    .hist-card{background:#fff;border-radius:14px;padding:14px;margin-top:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .hist-title{font-size:.65rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:10px}
    .hist-row{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:.76rem}
    .hist-row:last-child{border:none}

    /* Correlação MMAS */
    .corr-box{background:#faf5ff;border:1.5px solid #d8b4fe;border-radius:10px;padding:10px 12px;font-size:.74rem;color:#581c87;line-height:1.7;margin-top:10px}
    .ref-box{background:#f5f3ff;border:1.5px solid #c4b5fd;border-radius:10px;padding:10px 12px;font-size:.72rem;color:#4c1d95;line-height:1.8;margin-top:8px}
    @media print{.topbar,.pac-sel,.btn-top,nav,.opt{display:none!important}body{background:#fff}main{padding:0}}
  </style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div style="flex:1">
    <div class="topbar-title">🧠 PHQ-9 + GAD-7</div>
    <div class="topbar-sub">Rastreio de Depressão e Ansiedade</div>
  </div>
  <button class="btn-top" onclick="salvar()">💾</button>
  <button class="btn-top" onclick="window.print()">🖨️</button>
</div>
<main>
  <select class="pac-sel" id="sel-pac" onchange="init()"><option value="">Selecione o paciente...</option></select>
  <div id="conteudo"></div>
</main>
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="historico.html" class="nav-item">📋<span>Histórico</span></a>
  <a href="diario.html" class="nav-item">📓<span>Diário</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>
const PHQ = [
  'Pouco interesse ou prazer em fazer as coisas',
  'Sentir-se para baixo, deprimido(a) ou sem perspectiva',
  'Dificuldade para adormecer, permanecer dormindo ou dormir mais do que de costume',
  'Sentir-se cansado(a) ou com pouca energia',
  'Falta de apetite ou comer em excesso',
  'Sentir-se mal consigo mesmo(a), achar que você é um fracasso ou que decepcionou a si mesmo(a) ou sua família',
  'Dificuldade de se concentrar nas coisas (ler jornal, ver televisão)',
  'Mover-se ou falar tão devagar que outras pessoas percebem; ou ao contrário, estar tão agitado(a) que fica andando mais do que de costume',
  'Pensar em se machucar de alguma forma ou achar que seria melhor estar morto(a)',
];
const GAD = [
  'Sentir-se nervoso(a), ansioso(a) ou no limite',
  'Não ser capaz de parar ou controlar suas preocupações',
  'Preocupar-se muito com diversas coisas',
  'Dificuldade para relaxar',
  'Ficar tão agitado(a) que se torna difícil ficar parado(a)',
  'Ficar facilmente aborrecido(a) ou irritável',
  'Sentir medo como se algo terrível fosse acontecer',
];
const OPTS = ['Nunca','Vários dias','Mais da metade dos dias','Quase todos os dias'];
const OPTS_CLS = ['sel0','sel1','sel2','sel3'];
const IMP_OPTS = ['Não foi difícil','Um pouco difícil','Muito difícil','Extremamente difícil'];

let _resp={phq:{},gad:{},phqImp:null,gadImp:null}, _pid=null;

const phqNivel=s=>s<=4?['mínima','#16a34a']:s<=9?['leve','#d97706']:s<=14?['moderada','#f97316']:s<=19?['mod. grave','#dc2626']:['grave','#991b1b'];
const gadNivel=s=>s<=4?['mínima','#16a34a']:s<=9?['leve','#d97706']:s<=14?['moderada','#f97316']:['grave','#dc2626'];

async function init(){
  _pid=parseInt(document.getElementById('sel-pac').value)||null;
  if(!_pid){document.getElementById('conteudo').innerHTML='';return;}
  const saved=await dbGetConfig('phq9gad7_'+_pid)||{};
  _resp=saved.resp||{phq:{},gad:{},phqImp:null,gadImp:null};
  render();
}

function calcPHQ(){return Object.values(_resp.phq).reduce((a,b)=>a+b,0);}
function calcGAD(){return Object.values(_resp.gad).reduce((a,b)=>a+b,0);}
function nPHQ(){return Object.keys(_resp.phq).length;}
function nGAD(){return Object.keys(_resp.gad).length;}

function render(){
  const phqTotal=calcPHQ(), gadTotal=calcGAD();
  const [pNivel,pCor]=phqNivel(phqTotal);
  const [gNivel,gCor]=gadNivel(gadTotal);

  let html=`
  <div class="score-duo">
    <div class="score-bloco phq-bloco">
      <div class="sb-n">${phqTotal}</div>
      <div class="sb-lbl">PHQ-9 Depressão</div>
      <div class="sb-nivel">${pNivel} · ${nPHQ()}/9</div>
      <div class="sb-prog"><div class="sb-fill" style="width:${phqTotal/27*100}%"></div></div>
    </div>
    <div class="score-bloco gad-bloco">
      <div class="sb-n">${gadTotal}</div>
      <div class="sb-lbl">GAD-7 Ansiedade</div>
      <div class="sb-nivel">${gNivel} · ${nGAD()}/7</div>
      <div class="sb-prog"><div class="sb-fill" style="width:${gadTotal/21*100}%"></div></div>
    </div>
  </div>

  <div class="alerta-suicidio" id="alerta-q9" style="display:${_resp.phq[8]>=1?'block':'none'}">
    <div class="alerta-suicidio-txt">
      ⚠️ <strong>Atenção — Questão 9:</strong> O paciente relatou pensamentos de se machucar ou de que seria melhor estar morto(a).<br>
      Avalie risco de suicídio imediatamente. Encaminhe para saúde mental se score ≥1 na Q9.
    </div>
  </div>`;

  // PHQ-9
  html+=`<div class="sec-card">
    <div class="sec-title" style="color:#581c87">🟣 PHQ-9 — Escala de Depressão</div>
    <div class="sec-instr">Nas últimas <strong>2 semanas</strong>, com que frequência você foi incomodado(a) pelos problemas abaixo?</div>
    ${PHQ.map((q,i)=>{
      const val=_resp.phq[i];
      return `<div class="q-item">
        <div class="q-num">Q${i+1}${i===8?' ⚠️':''}</div>
        <div class="q-txt">${esc(q)}</div>
        <div class="opts">
          ${OPTS.map((o,v)=>`<div class="opt ${val===v?OPTS_CLS[v]:''}" onclick="setR('phq',${i},${v},this)">${esc(o)}<br><span style="font-size:.6rem;opacity:.7">${v} pt${v!==1?'s':''}</span></div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:12px;font-size:.73rem;color:#64748b;font-weight:700">
      Impacto funcional: Se assinalou algum problema, o quanto isso dificulta seu trabalho, cuidados domésticos ou relacionamentos?
    </div>
    <div class="imp-row">
      ${IMP_OPTS.map((o,v)=>`<div class="imp-btn ${_resp.phqImp===v?'sel':''}" onclick="setImp('phqImp',${v},this)">${esc(o)}</div>`).join('')}
    </div>
  </div>`;

  // GAD-7
  html+=`<div class="sec-card">
    <div class="sec-title" style="color:#1e3a8a">🔵 GAD-7 — Escala de Ansiedade</div>
    <div class="sec-instr">Nas últimas <strong>2 semanas</strong>, com que frequência você foi incomodado(a) pelos problemas abaixo?</div>
    ${GAD.map((q,i)=>{
      const val=_resp.gad[i];
      return `<div class="q-item">
        <div class="q-num">Q${i+1}</div>
        <div class="q-txt">${esc(q)}</div>
        <div class="opts">
          ${OPTS.map((o,v)=>`<div class="opt ${val===v?OPTS_CLS[v]:''}" onclick="setR('gad',${i},${v},this)">${esc(o)}<br><span style="font-size:.6rem;opacity:.7">${v} pt${v!==1?'s':''}</span></div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:12px;font-size:.73rem;color:#64748b;font-weight:700">Impacto funcional:</div>
    <div class="imp-row">
      ${IMP_OPTS.map((o,v)=>`<div class="imp-btn ${_resp.gadImp===v?'sel':''}" onclick="setImp('gadImp',${v},this)">${esc(o)}</div>`).join('')}
    </div>
  </div>`;

  // Correlação MMAS-8
  html+=`<div id="corr-mmas"></div>
  <div class="ref-box">
    <strong>Interpretação PHQ-9:</strong> 0–4 Mínima · 5–9 Leve · 10–14 Moderada · 15–19 Mod. Grave · ≥20 Grave<br>
    <strong>Interpretação GAD-7:</strong> 0–4 Mínima · 5–9 Leve · 10–14 Moderada · ≥15 Grave<br><br>
    Kroenke K, Spitzer RL. <em>Psychiatr Ann</em>. 2002;32:509-521 ·
    Santos IS, et al. <em>Cad Saúde Pública</em>. 2013;29(8):1533-43 (validação brasileira)<br>
    Spitzer RL, et al. <em>Arch Intern Med</em>. 2006;166:1092-1097 (GAD-7)
  </div>`;

  html+=`<div id="hist-div"></div>`;
  document.getElementById('conteudo').innerHTML=html;
  carregarCorrelMmas();
  carregarHistorico();
}

function setR(esc2,idx,val,btn){
  _resp[esc2][idx]=val;
  const row=btn.closest('.opts');
  row.querySelectorAll('.opt').forEach(b=>b.className='opt');
  btn.className='opt '+OPTS_CLS[val];
  // Atualiza scores
  const phqT=calcPHQ(),gadT=calcGAD();
  const [pN]=phqNivel(phqT); const [gN]=gadNivel(gadT);
  document.querySelector('.phq-bloco .sb-n').textContent=phqT;
  document.querySelector('.phq-bloco .sb-nivel').textContent=pN+' · '+nPHQ()+'/9';
  document.querySelector('.phq-bloco .sb-fill').style.width=phqT/27*100+'%';
  document.querySelector('.gad-bloco .sb-n').textContent=gadT;
  document.querySelector('.gad-bloco .sb-nivel').textContent=gN+' · '+nGAD()+'/7';
  document.querySelector('.gad-bloco .sb-fill').style.width=gadT/21*100+'%';
  // Alerta Q9
  if(esc2==='phq'&&idx===8){
    const al=document.getElementById('alerta-q9');
    if(al) al.style.display=val>=1?'block':'none';
  }
}

function setImp(key,val,btn){
  _resp[key]=val;
  btn.closest('.imp-row').querySelectorAll('.imp-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function carregarCorrelMmas(){
  if(!_pid)return;
  const mmas=await dbGetConfig('mmas8_hist_'+_pid);
  if(!mmas||!mmas.length) return;
  const ult=mmas.at(-1);
  const phqT=calcPHQ();
  const correlMsg=phqT>=10&&ult.score<6?'⚠️ Depressão moderada + baixa aderência: risco de desfecho adverso elevado. Avaliar tratamento antidepressivo e reforço de adesão.':
    phqT>=5&&ult.score<8?'ℹ️ Sintomas depressivos podem estar contribuindo para a aderência parcial ao tratamento.':
    '✅ Sem correlação de risco significativa entre rastreio psíquico e aderência.';
  document.getElementById('corr-mmas').innerHTML=`
    <div class="corr-box">
      <strong>Correlação PHQ-9 × MMAS-8:</strong><br>
      PHQ-9: ${phqT} pts (${phqNivel(phqT)[0]}) &nbsp;·&nbsp; MMAS-8 último: ${ult.score.toFixed(1)} (${ult.nivel} aderência)<br>
      ${correlMsg}
    </div>`;
}

async function carregarHistorico(){
  if(!_pid)return;
  const hist=await dbGetConfig('phq9gad7_hist_'+_pid)||[];
  if(!hist.length){document.getElementById('hist-div').innerHTML='';return;}
  document.getElementById('hist-div').innerHTML=`
    <div class="hist-card">
      <div class="hist-title">Histórico</div>
      ${hist.slice().reverse().map(h=>`
        <div class="hist-row">
          <div style="flex:1;color:#64748b">${h.data.split('-').reverse().join('/')}</div>
          <div>PHQ: <strong style="color:#581c87">${h.phq}</strong> (${h.pNivel})</div>
          <div style="margin-left:8px">GAD: <strong style="color:#1e3a8a">${h.gad}</strong> (${h.gNivel})</div>
        </div>`).join('')}
    </div>`;
}

async function salvar(){
  if(!_pid){showToast('Selecione um paciente');return;}
  if(nPHQ()<9||nGAD()<7){showToast('Responda todas as questões antes de salvar');return;}
  const phqT=calcPHQ(),gadT=calcGAD();
  const [pNivel]=phqNivel(phqT); const [gNivel]=gadNivel(gadT);
  await dbSetConfig('phq9gad7_'+_pid,{resp:{..._resp},phqTotal:phqT,gadTotal:gadT,pNivel,gNivel,data:hoje()});
  const hist=await dbGetConfig('phq9gad7_hist_'+_pid)||[];
  hist.push({data:hoje(),phq:phqT,gad:gadT,pNivel,gNivel});
  await dbSetConfig('phq9gad7_hist_'+_pid,hist);
  showToast('✅ PHQ-9: '+phqT+' ('+pNivel+') · GAD-7: '+gadT+' ('+gNivel+')');
  await carregarHistorico();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.addEventListener('DOMContentLoaded',async()=>{
  const pacs=await dbGetAll('pacientes');
  const sel=document.getElementById('sel-pac');
  sel.innerHTML='<option value="">Selecione o paciente...</option>'+pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
  const pid=getActivePacienteId();
  if(pid){sel.value=pid;await init();}
});
</script>
</body>
</html>
