<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linha do Tempo Clínica — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <style>
    body { background:#f8fafc;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif }
    .topbar { display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100 }
    .back-btn { background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;color:#475569;border-radius:8px }
    .topbar-title { font-size:1rem;font-weight:700;color:#1e293b;flex:1 }
    .card { background:#fff;border-radius:14px;padding:14px 16px;margin:0 16px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06) }

    /* Filtros de período */
    .period-chips { display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 16px;margin-bottom:4px }
    .period-chips::-webkit-scrollbar { display:none }
    .pchip { background:#f1f5f9;border:none;border-radius:20px;padding:7px 14px;font-size:.8rem;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap }
    .pchip.ativo { background:#6366f1;color:#fff }

    /* Filtros de tipo */
    .type-chips { display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 16px 12px }
    .type-chips::-webkit-scrollbar { display:none }
    .tchip { background:#f1f5f9;border:2px solid transparent;border-radius:20px;padding:5px 12px;font-size:.75rem;font-weight:700;color:#475569;cursor:pointer;white-space:nowrap;transition:all .15s }
    .tchip.ativo { border-color:currentColor }
    .tchip.t-med   { color:#7c3aed } .tchip.t-med.ativo   { background:#f5f3ff;border-color:#7c3aed }
    .tchip.t-lab   { color:#0369a1 } .tchip.t-lab.ativo   { background:#e0f2fe;border-color:#0369a1 }
    .tchip.t-diary { color:#047857 } .tchip.t-diary.ativo { background:#dcfce7;border-color:#047857 }

    /* Linha do tempo */
    .timeline { padding:0 16px 80px }
    .tl-month { font-size:.7rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin:20px 0 10px;padding-left:24px }
    .tl-item { display:flex;gap:12px;margin-bottom:6px }
    .tl-dot-col { display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0 }
    .tl-dot { width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:6px }
    .tl-line { width:2px;background:#e2e8f0;flex:1;min-height:6px;margin-top:2px }
    .tl-content { flex:1;background:#fff;border-radius:10px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:6px }
    .tl-date { font-size:.68rem;color:#94a3b8;margin-bottom:2px }
    .tl-title { font-size:.85rem;font-weight:700;color:#1e293b;margin-bottom:2px }
    .tl-sub { font-size:.75rem;color:#64748b;line-height:1.45 }
    .tl-badge { display:inline-block;font-size:.65rem;font-weight:700;border-radius:5px;padding:1px 7px;margin-top:4px }

    /* Cores por tipo */
    .dot-med   { background:#7c3aed }
    .dot-medend{ background:#9ca3af }
    .dot-lab   { background:#0369a1 }
    .dot-lab-h { background:#dc2626 }
    .dot-lab-l { background:#2563eb }
    .dot-diary { background:#047857 }
    .dot-diary-alt{ background:#d97706 }
    .dot-sft  { background:#0891b2 }
    .dot-soap { background:#7c3aed }
    .dot-ram  { background:#dc2626 }

    .badge-med    { background:#f5f3ff;color:#7c3aed }
    .badge-medend { background:#f1f5f9;color:#64748b }
    .badge-lab    { background:#e0f2fe;color:#0369a1 }
    .badge-diary  { background:#dcfce7;color:#047857 }
    .badge-alt    { background:#fef3c7;color:#d97706 }
    .badge-sft    { background:#e0f7fa;color:#0891b2 }
    .badge-soap   { background:#f3e8ff;color:#7c3aed }
    .badge-ram    { background:#fee2e2;color:#dc2626 }

    .empty-tl { text-align:center;color:#94a3b8;padding:40px 20px;font-size:.85rem;line-height:1.7 }
    .legend { background:#fff;border-radius:12px;padding:10px 14px;margin:0 16px 12px;display:flex;flex-wrap:wrap;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05) }
    .leg-item { display:flex;align-items:center;gap:5px;font-size:.72rem;color:#475569 }
    .leg-dot { width:9px;height:9px;border-radius:50%;flex-shrink:0 }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">📅 Linha do Tempo Clínica</span>
  <button style="background:none;border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:.75rem;font-weight:700;color:#475569;cursor:pointer" onclick="window.print()">🖨️</button>
</div>

<div style="height:12px"></div>

<!-- Legenda -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#7c3aed"></div>Medicamento iniciado</div>
  <div class="leg-item"><div class="leg-dot" style="background:#9ca3af"></div>Medicamento encerrado</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0369a1"></div>Exame laboratorial</div>
  <div class="leg-item"><div class="leg-dot" style="background:#dc2626"></div>Exame alterado ▲</div>
  <div class="leg-item"><div class="leg-dot" style="background:#047857"></div>Registro de saúde</div>
  <div class="leg-item"><div class="leg-dot" style="background:#d97706"></div>PA/Glicemia alterada</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0891b2"></div>Intervenção SFT</div>
  <div class="leg-item"><div class="leg-dot" style="background:#7c3aed"></div>Anotação SOAP</div>
  <div class="leg-item"><div class="leg-dot" style="background:#dc2626"></div>Reação adversa</div>
</div>

<!-- Período -->
<div class="period-chips" id="period-chips">
  <button class="pchip" onclick="setPeriodo(30)"  data-p="30">30 dias</button>
  <button class="pchip ativo" onclick="setPeriodo(90)" data-p="90">3 meses</button>
  <button class="pchip" onclick="setPeriodo(180)" data-p="180">6 meses</button>
  <button class="pchip" onclick="setPeriodo(365)" data-p="365">1 ano</button>
  <button class="pchip" onclick="setPeriodo(0)"   data-p="0">Tudo</button>
</div>

<!-- Tipo de evento -->
<div class="type-chips">
  <button class="tchip t-med ativo"   id="ft-med"   onclick="toggleTipo('med')">💊 Medicamentos</button>
  <button class="tchip t-lab ativo"   id="ft-lab"   onclick="toggleTipo('lab')">🔬 Exames</button>
  <button class="tchip t-diary ativo" id="ft-diary" onclick="toggleTipo('diary')">📋 Saúde</button>
  <button class="tchip ativo" id="ft-int" style="color:#0891b2" onclick="toggleTipo('int')">💬 Intervenções</button>
</div>

<!-- Linha do tempo -->
<div class="timeline" id="timeline">
  <p class="empty-tl">Carregando...</p>
</div>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/laboratorio.js"></script>
<script>

let _periodo = 90;
let _tipos   = new Set(['med','lab','diary','int']);
let _pid     = null;
let _allEvts = [];

const MESES_EXT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ─── Init ─────────────────────────────────────────────── */
async function init() {
  _pid = typeof getActivePacienteId === 'function' ? getActivePacienteId() : null;
  if (!_pid) { window.location.href = 'index.html'; return; }

  await carregarEventos();
  renderTimeline();
}

/* ─── Carregamento de dados ───────────────────────────── */
async function carregarEventos() {
  _allEvts = [];
  const hoje = new Date().toISOString().slice(0,10);

  /* ── Medicamentos: início e fim ── */
  try {
    const todos = await dbGetByIndex('medicamentos','pacienteId',_pid);
    for (const m of todos) {
      const nome = m.nome || m.generico || '—';
      const dose = m.dose ? ` ${m.dose}${m.unidade||''}` : '';
      const data = m.criadoEm
        ? new Date(m.criadoEm).toISOString().slice(0,10)
        : (m.dataInicio || hoje);

      _allEvts.push({
        data, tipo:'med',
        titulo: `💊 ${nome}${dose}`,
        sub: m.indicacao ? `Indicação: ${m.indicacao}` : 'Medicamento iniciado',
        dot:'dot-med', badge:'badge-med', badgeTxt:'Iniciado',
      });

      if (m.dataFim && m.dataFim < hoje) {
        _allEvts.push({
          data: m.dataFim, tipo:'med',
          titulo: `⏹ ${nome}${dose}`,
          sub: 'Tratamento encerrado',
          dot:'dot-medend', badge:'badge-medend', badgeTxt:'Encerrado',
        });
      }
    }
  } catch(e) {}

  /* ── Histórico Laboratorial ── */
  try {
    const labs = await dbGetByIndex('laboratorio','pacienteId',_pid);
    for (const r of labs) {
      const exame = (typeof EXAMES !== 'undefined') ? EXAMES.find(e => e.id === r.tipo) : null;
      const label = exame ? exame.label : r.tipo;
      const unit  = exame ? exame.unidade : '';
      const st    = (typeof statusLab === 'function') ? statusLab(r.tipo, r.valor) : null;
      const isAlt = st === 'alto' || st === 'baixo';
      const stTxt = st === 'alto' ? '▲ ACIMA' : st === 'baixo' ? '▼ ABAIXO' : '✓ Normal';
      const dot   = st === 'alto' ? 'dot-lab-h' : st === 'baixo' ? 'dot-lab-l' : 'dot-lab';

      _allEvts.push({
        data: r.data, tipo:'lab',
        titulo: `🔬 ${label}: ${r.valor} ${unit}`,
        sub: `${stTxt}${r.obs ? ' · ' + r.obs : ''}`,
        dot, badge: isAlt ? 'badge-alt' : 'badge-lab',
        badgeTxt: isAlt ? stTxt : 'Normal',
        destaque: isAlt,
      });
    }
  } catch(e) {}

  /* ── Diário de Saúde ── */
  try {
    const fn = typeof dbGetAll === 'function' ? dbGetAll : null;
    if (fn) {
      const diarios = await fn('diario');
      const meusDiarios = diarios.filter(d => !d.pacienteId || d.pacienteId === _pid);
      for (const d of meusDiarios) {
        if (!d.data) continue;
        const itens = [];
        if (d.paSis && d.paDia) {
          const paAlt = d.paSis >= 140 || d.paDia >= 90;
          const paBai = d.paSis < 90;
          itens.push({ txt:`PA: ${d.paSis}/${d.paDia} mmHg`, alt: paAlt || paBai });
        }
        if (d.glicemia) {
          const gliAlt = d.glicemia > 126;
          itens.push({ txt:`Glicemia: ${d.glicemia} mg/dL ${d.glicemiaCtx ? '('+d.glicemiaCtx+')' : ''}`, alt: gliAlt });
        }
        if (d.peso) itens.push({ txt:`Peso: ${d.peso} kg${d.imc ? ' · IMC ' + d.imc : ''}`, alt: false });
        if (!itens.length) continue;

        const temAlteracao = itens.some(i => i.alt);
        _allEvts.push({
          data: d.data, tipo:'diary',
          titulo: '📋 Registro de Saúde',
          sub: itens.map(i => (i.alt ? '⚠️ ' : '') + i.txt).join(' · '),
          dot: temAlteracao ? 'dot-diary-alt' : 'dot-diary',
          badge: temAlteracao ? 'badge-alt' : 'badge-diary',
          badgeTxt: temAlteracao ? 'Atenção' : 'Registrado',
          destaque: temAlteracao,
        });
      }
    }
  } catch(e) {}

  /* ── Intervenções SFT ── */
  try {
    const ints = (await dbGetConfig('sft_int_' + _pid)) || [];
    for (const it of ints) {
      if (!it.data) continue;
      const acIcon = { sim:'✅', parcial:'🟡', nao:'❌', pendente:'⏳' };
      const aceite = it.aceita ? ` · Aceita: ${acIcon[it.aceita]||'—'}` : '';
      _allEvts.push({
        data: it.data, tipo:'int',
        titulo: '💬 Intervenção Farmacêutica',
        sub: (it.acao||'').slice(0,120) + aceite,
        dot:'dot-sft', badge:'badge-sft', badgeTxt:'SFT',
      });
    }
  } catch(e) {}

  /* ── Anotações SOAP ── */
  try {
    const soaps = (await dbGetConfig('soap_' + _pid)) || [];
    for (const s of soaps) {
      if (!s.data) continue;
      const resumo = [s.s, s.a, s.p].filter(Boolean).join(' · ').slice(0,120);
      _allEvts.push({
        data: s.data.slice(0,10), tipo:'int',
        titulo: '📝 Anotação SOAP',
        sub: resumo || 'Consulta farmacêutica registrada',
        dot:'dot-soap', badge:'badge-soap', badgeTxt:'SOAP',
      });
    }
  } catch(e) {}

  /* ── Reações Adversas ── */
  try {
    const rams = (await dbGetConfig('ram_' + _pid)) || [];
    for (const r of rams) {
      if (!r.data) continue;
      _allEvts.push({
        data: r.data.slice(0,10), tipo:'int',
        titulo: `⚠️ RAM: ${r.med || r.medicamento || '—'}`,
        sub: `${r.reacao||''} ${r.grau ? '· Grau: '+r.grau : ''} ${r.conduta ? '· '+r.conduta : ''}`.trim().slice(0,120),
        dot:'dot-ram', badge:'badge-ram', badgeTxt:'RAM',
        destaque: true,
      });
    }
  } catch(e) {}

  // Ordena do mais recente ao mais antigo
  _allEvts.sort((a,b) => b.data.localeCompare(a.data));
}

/* ─── Filtros ─────────────────────────────────────────── */
function setPeriodo(dias) {
  _periodo = dias;
  document.querySelectorAll('.pchip').forEach(c => {
    c.classList.toggle('ativo', c.dataset.p == String(dias));
  });
  renderTimeline();
}

function toggleTipo(tipo) {
  if (_tipos.has(tipo)) _tipos.delete(tipo);
  else                   _tipos.add(tipo);
  const el = document.getElementById('ft-'+tipo);
  if (el) el.classList.toggle('ativo', _tipos.has(tipo));
  renderTimeline();
}

/* ─── Renderização ───────────────────────────────────── */
function renderTimeline() {
  const wrap = document.getElementById('timeline');

  const corte = _periodo > 0
    ? new Date(Date.now() - _periodo * 86400000).toISOString().slice(0,10)
    : '0000-00-00';

  const evts = _allEvts.filter(e =>
    _tipos.has(e.tipo) && e.data >= corte
  );

  if (!evts.length) {
    wrap.innerHTML = `<p class="empty-tl">Nenhum evento encontrado para o período e filtros selecionados.<br>
      Adicione medicamentos, exames ou registros de saúde para ver a linha do tempo.</p>`;
    return;
  }

  // Agrupa por mês (YYYY-MM)
  const porMes = {};
  for (const e of evts) {
    const mes = e.data.slice(0,7);
    if (!porMes[mes]) porMes[mes] = [];
    porMes[mes].push(e);
  }

  let html = '';
  for (const [mes, lista] of Object.entries(porMes).sort((a,b) => b[0].localeCompare(a[0]))) {
    const [y, m] = mes.split('-');
    html += `<p class="tl-month">${MESES_EXT[+m-1]} ${y}</p>`;

    lista.forEach((e, idx) => {
      const [, mm, dd] = e.data.split('-');
      const temProx = idx < lista.length - 1;
      html += `
        <div class="tl-item">
          <div class="tl-dot-col">
            <div class="tl-dot ${e.dot}"></div>
            ${temProx ? '<div class="tl-line"></div>' : ''}
          </div>
          <div class="tl-content${e.destaque ? ' ' : ''}">
            <p class="tl-date">${dd}/${mm}/${y}</p>
            <p class="tl-title">${e.titulo}</p>
            <p class="tl-sub">${e.sub}</p>
            <span class="tl-badge ${e.badge}">${e.badgeTxt}</span>
          </div>
        </div>`;
    });
  }

  wrap.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
