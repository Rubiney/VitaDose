<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Naranjo / NOTIVISA — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar { display:flex;align-items:center;gap:10px;padding:12px 16px;background:#7c2d12;position:sticky;top:0;z-index:100 }
    .back-btn { background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:1rem }
    .topbar-title { font-size:.93rem;font-weight:800;color:#fff;flex:1 }
    .topbar-sub { font-size:.62rem;color:rgba(255,255,255,.7);margin-top:1px }
    .btn-top { background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:4px }

    main { max-width:580px;margin:0 auto;padding:12px 14px 90px }

    .pac-sel { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:.88rem;margin-bottom:10px;background:#fff }

    /* Lista de RAMs */
    .ram-card { background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;border-left:4px solid #e2e8f0;display:flex;align-items:flex-start;gap:10px }
    .ram-card.ativa { border-left-color:#7c2d12;background:#fff7ed }
    .ram-card:hover { background:#fafafa }
    .ram-icon { font-size:1.3rem }
    .ram-body { flex:1 }
    .ram-nome { font-size:.9rem;font-weight:700;color:#1e293b }
    .ram-det  { font-size:.74rem;color:#64748b;margin-top:2px }
    .ram-score { text-align:right;flex-shrink:0 }
    .score-badge { display:inline-block;padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:800 }
    .sc-def   { background:#fee2e2;color:#991b1b }
    .sc-prov  { background:#fef3c7;color:#92400e }
    .sc-poss  { background:#e0f2fe;color:#0369a1 }
    .sc-duv   { background:#f1f5f9;color:#64748b }
    .sc-nd    { background:#f8fafc;color:#94a3b8 }

    /* Formulário Naranjo */
    .card { background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07) }
    .card-title { font-size:.65rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px }

    .nr-quest { margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f1f5f9 }
    .nr-quest:last-child { border:none;margin-bottom:0;padding-bottom:0 }
    .nr-num { font-size:.6rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:4px }
    .nr-texto { font-size:.82rem;color:#1e293b;line-height:1.5;margin-bottom:8px;font-weight:600 }
    .nr-opts { display:flex;gap:6px }
    .nr-btn { flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.74rem;font-weight:700;color:#475569;cursor:pointer;text-align:center }
    .nr-btn.ativo-sim { background:#dcfce7;border-color:#16a34a;color:#166534 }
    .nr-btn.ativo-nao { background:#fee2e2;border-color:#dc2626;color:#991b1b }
    .nr-btn.ativo-dk  { background:#fef3c7;border-color:#d97706;color:#92400e }
    .nr-pontos { font-size:.62rem;color:#94a3b8;margin-top:4px;text-align:right }

    /* Score resultado */
    .score-display { border-radius:14px;padding:20px;text-align:center;margin-bottom:10px }
    .score-n  { font-size:3rem;font-weight:900;line-height:1 }
    .score-cl { font-size:1.1rem;font-weight:800;margin-top:6px }
    .score-ds { font-size:.78rem;opacity:.8;margin-top:4px }

    /* Formulário NOTIVISA */
    label { font-size:.72rem;font-weight:700;color:#475569;display:block;margin-bottom:3px;margin-top:10px }
    label:first-child { margin-top:0 }
    input, select, textarea { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 11px;font-size:.82rem;color:#1e293b;background:#fff;font-family:inherit }
    textarea { resize:vertical }
    input:focus, select:focus, textarea:focus { outline:none;border-color:#7c2d12 }
    .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:10px }

    .btn-gerar { width:100%;background:#7c2d12;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px }
    .btn-gerar:hover { background:#6b2010 }

    /* Notivisa doc */
    .notivisa-doc { background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden }
    .nv-topo { background:#7c2d12;color:#fff;padding:16px 20px }
    .nv-title { font-size:.95rem;font-weight:900 }
    .nv-sub   { font-size:.7rem;opacity:.8;margin-top:2px }
    .nv-corpo { padding:16px 20px }
    .nv-sec   { font-size:.62rem;font-weight:800;color:#7c2d12;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px }
    .nv-campo { font-size:.8rem;color:#374151;margin-bottom:5px;line-height:1.5 }
    .nv-linha { border-top:1px solid #f1f5f9;margin:10px 0 }

    @media print {
      .topbar,.pac-sel,.btn-top,nav,.no-print { display:none!important }
      body { background:#fff }
      main { padding:0;max-width:none }
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div style="flex:1">
    <div class="topbar-title">🔬 Naranjo + NOTIVISA</div>
    <div class="topbar-sub">Causalidade de RAM e notificação de farmacovigilância</div>
  </div>
  <button class="btn-top no-print" id="btn-impr" style="display:none" onclick="window.print()">🖨️</button>
  <button class="btn-top no-print" id="btn-wpp"  style="display:none" onclick="compartilharWpp()">📲</button>
</div>

<main>
  <select class="pac-sel no-print" id="sel-pac" onchange="carregarRAMs()"><option value="">Selecione o paciente...</option></select>

  <div id="lista-rams"></div>
  <div id="form-naranjo" style="display:none"></div>
  <div id="notivisa-form" style="display:none"></div>
  <div id="notivisa-doc" style="display:none"></div>
</main>

<nav class="bottom-nav no-print">
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="historico.html" class="nav-item">📋<span>Histórico</span></a>
  <a href="diario.html" class="nav-item">📓<span>Diário</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>

const PERGUNTAS = [
  { txt:'Existem relatos conclusivos anteriores sobre esta reação adversa?',                          sim:1,  nao:0,  dk:0  },
  { txt:'A reação adversa apareceu após o medicamento suspeito ser administrado?',                   sim:2,  nao:-1, dk:0  },
  { txt:'A reação adversa melhorou quando o medicamento foi descontinuado ou antagonista específico foi administrado?', sim:1, nao:0, dk:0 },
  { txt:'A reação adversa reapareceu quando o medicamento foi readministrado (rechallenge)?',        sim:2,  nao:-1, dk:0  },
  { txt:'Existem causas alternativas que possam por si só ter causado a reação?',                    sim:-1, nao:2,  dk:0  },
  { txt:'A reação reapareceu quando um placebo foi administrado?',                                   sim:-1, nao:1,  dk:0  },
  { txt:'O medicamento foi detectado no sangue (ou outros fluidos) em concentrações tóxicas?',       sim:1,  nao:0,  dk:0  },
  { txt:'A reação foi mais severa quando a dose foi aumentada, ou menos severa quando a dose foi diminuída?', sim:1, nao:0, dk:0 },
  { txt:'O paciente teve reação similar ao mesmo ou a medicamento similar em exposição prévia?',     sim:1,  nao:0,  dk:0  },
  { txt:'A reação adversa foi confirmada por evidência objetiva?',                                   sim:1,  nao:0,  dk:0  },
];

const RESP_LABELS = { sim:'Sim', nao:'Não', dk:'Não sei' };

let _pacs = [], _ramAtiva = null, _respostas = {}, _farmCfg = {};
let _notiForm = {};

async function initPacs() {
  _pacs = await dbGetAll('pacientes');
  _farmCfg = (await dbGetConfig('farmaceutico_cfg')) || {};
  const sel = document.getElementById('sel-pac');
  sel.innerHTML = '<option value="">Selecione o paciente...</option>' +
    _pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
  const pid = getActivePacienteId();
  if (pid) { sel.value = pid; await carregarRAMs(); }
}

async function carregarRAMs() {
  const pid = parseInt(document.getElementById('sel-pac').value);
  if (!pid) { document.getElementById('lista-rams').innerHTML=''; return; }

  const rams = (await dbGetConfig('ram_' + pid)) || [];
  document.getElementById('form-naranjo').style.display='none';
  document.getElementById('notivisa-form').style.display='none';
  document.getElementById('notivisa-doc').style.display='none';
  document.getElementById('btn-impr').style.display='none';
  document.getElementById('btn-wpp').style.display='none';

  if (!rams.length) {
    document.getElementById('lista-rams').innerHTML = `
      <div style="text-align:center;padding:30px;color:#94a3b8;font-size:.82rem">
        Nenhuma RAM registrada para este paciente.<br>
        <a href="reacoes-adv.html" style="color:#7c2d12;font-weight:700">Registrar RAM →</a>
      </div>`;
    return;
  }

  function classScore(score) {
    if (score === null || score === undefined) return { cls:'sc-nd', txt:'Não avaliado' };
    if (score >= 9) return { cls:'sc-def',  txt:'Definida (≥9)' };
    if (score >= 5) return { cls:'sc-prov', txt:'Provável (5–8)' };
    if (score >= 1) return { cls:'sc-poss', txt:'Possível (1–4)' };
    return { cls:'sc-duv', txt:'Duvidosa (≤0)' };
  }

  document.getElementById('lista-rams').innerHTML = `
    <div class="card">
      <div class="card-title">⚠️ RAMs registradas — ${rams.length} reação${rams.length!==1?'ões':''}</div>
      ${rams.map((r,i)=>{
        const sc = r.naranjoScore !== undefined ? classScore(r.naranjoScore) : classScore(null);
        return `<div class="ram-card ${_ramAtiva?.idx===i?'ativa':''}" onclick="selecionarRAM(${i})">
          <div class="ram-icon">💊</div>
          <div class="ram-body">
            <div class="ram-nome">${esc(r.med||r.medicamento||'Medicamento ?')}</div>
            <div class="ram-det">${esc(r.reacao||r.reacao_adv||r.descricao||'Reação não descrita')}${r.data?' · '+r.data:''}</div>
            <div class="ram-det" style="margin-top:3px">Gravidade: ${esc(r.gravidade||'não informada')}${r.conduta?' · Conduta: '+esc(r.conduta.slice(0,30)):''}...</div>
          </div>
          <div class="ram-score">
            <span class="score-badge ${sc.cls}">${r.naranjoScore!==undefined?'Score '+r.naranjoScore+'\n':' '}${sc.txt}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

async function selecionarRAM(idx) {
  const pid = parseInt(document.getElementById('sel-pac').value);
  const rams = (await dbGetConfig('ram_' + pid)) || [];
  _ramAtiva = { idx, ram: rams[idx], pid };
  _respostas = rams[idx].naranjoRespostas || {};

  renderNaranjo(rams[idx]);
  await carregarRAMs(); // atualiza seleção visual
}

function renderNaranjo(ram) {
  const total = calcNaranjo();
  const cls   = classifNaranjo(total);

  document.getElementById('form-naranjo').style.display='block';
  document.getElementById('form-naranjo').innerHTML = `
    <div class="card">
      <div class="card-title">🔬 Escala de Naranjo — ${esc(ram.med||ram.medicamento||'?')}</div>
      ${PERGUNTAS.map((q,i)=>{
        const r = _respostas[i];
        return `<div class="nr-quest">
          <div class="nr-num">Questão ${i+1}</div>
          <div class="nr-texto">${q.txt}</div>
          <div class="nr-opts">
            <button class="nr-btn ${r==='sim'?'ativo-sim':''}" onclick="setResp(${i},'sim')">Sim (${q.sim>=0?'+':''}${q.sim})</button>
            <button class="nr-btn ${r==='nao'?'ativo-nao':''}" onclick="setResp(${i},'nao')">Não (${q.nao>=0?'+':''}${q.nao})</button>
            <button class="nr-btn ${r==='dk'?'ativo-dk':''}"  onclick="setResp(${i},'dk')">Não sei (${q.dk>=0?'+':''}${q.dk})</button>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="score-display" style="background:${cls.bg};color:${cls.cor}">
      <div class="score-n" id="score-display-n">${total !== null ? total : '—'}</div>
      <div class="score-cl" id="score-display-cl">${cls.label}</div>
      <div class="score-ds" id="score-display-ds">${cls.desc}</div>
    </div>

    <button class="btn-gerar" onclick="abrirNotivisa()">Preencher formulário NOTIVISA →</button>
  `;

  renderScoreDisplay();
}

function setResp(idx, valor) {
  _respostas[idx] = valor;
  const total = calcNaranjo();
  const cls   = classifNaranjo(total);

  // Atualiza visual dos botões
  const quests = document.querySelectorAll('.nr-quest');
  quests.forEach((q, i) => {
    const btns = q.querySelectorAll('.nr-btn');
    btns.forEach((b,bi) => {
      const tipos = ['sim','nao','dk'];
      b.className = 'nr-btn' + (_respostas[i]===tipos[bi] ? (' ativo-'+tipos[bi]) : '');
    });
  });

  renderScoreDisplay();
  salvarNaranjo();
}

function calcNaranjo() {
  if (!Object.keys(_respostas).length) return null;
  let t = 0;
  PERGUNTAS.forEach((q,i)=>{
    const r = _respostas[i];
    if (r==='sim') t += q.sim;
    else if (r==='nao') t += q.nao;
    else if (r==='dk') t += q.dk;
  });
  return t;
}

function classifNaranjo(score) {
  if (score === null) return { label:'Não avaliado', desc:'Responda as perguntas acima', bg:'#f8fafc', cor:'#94a3b8' };
  if (score >= 9) return { label:'Definida', desc:'Score ≥9: causalidade altamente provável', bg:'#fee2e2', cor:'#991b1b' };
  if (score >= 5) return { label:'Provável', desc:'Score 5–8: associação provável com o medicamento', bg:'#fef3c7', cor:'#92400e' };
  if (score >= 1) return { label:'Possível', desc:'Score 1–4: possível associação com o medicamento', bg:'#e0f2fe', cor:'#0369a1' };
  return { label:'Duvidosa', desc:'Score ≤0: associação improvável com o medicamento', bg:'#f1f5f9', cor:'#64748b' };
}

function renderScoreDisplay() {
  const total = calcNaranjo();
  const cls   = classifNaranjo(total);
  const el = document.querySelector('.score-display');
  if (!el) return;
  el.style.background = cls.bg;
  el.style.color      = cls.cor;
  document.getElementById('score-display-n').textContent  = total !== null ? total : '—';
  document.getElementById('score-display-cl').textContent = cls.label;
  document.getElementById('score-display-ds').textContent = cls.desc;
}

async function salvarNaranjo() {
  if (!_ramAtiva) return;
  const { pid, idx } = _ramAtiva;
  const rams = (await dbGetConfig('ram_' + pid)) || [];
  rams[idx].naranjoRespostas = _respostas;
  rams[idx].naranjoScore = calcNaranjo();
  await dbSetConfig('ram_' + pid, rams);
}

async function abrirNotivisa() {
  const pid = parseInt(document.getElementById('sel-pac').value);
  const pac = _pacs.find(p=>p.id===pid);
  const ram = _ramAtiva?.ram;
  if (!ram) return;
  const score = calcNaranjo();
  const cls   = classifNaranjo(score);
  const farm  = _farmCfg;

  document.getElementById('notivisa-form').style.display = 'block';
  document.getElementById('notivisa-form').innerHTML = `
    <div class="card">
      <div class="card-title">📋 Formulário de Notificação — NOTIVISA / VigiMed</div>

      <div class="grid-2">
        <div>
          <label>Nome do notificador</label>
          <input type="text" id="nv-farm" value="${esc(farm.nome||'')}">
        </div>
        <div>
          <label>CRF / Conselho</label>
          <input type="text" id="nv-crf" value="${esc(farm.crf||'')}">
        </div>
      </div>

      <label>Instituição / Local de notificação</label>
      <input type="text" id="nv-inst" value="${esc(farm.instituicao||'')}">

      <label>Data da notificação</label>
      <input type="date" id="nv-data" value="${hoje()}">

      <div style="border-top:1.5px solid #f1f5f9;margin:14px 0"></div>

      <label>Medicamento suspeito</label>
      <input type="text" id="nv-med" value="${esc(ram.med||ram.medicamento||'')}">

      <div class="grid-2">
        <div>
          <label>Dose utilizada</label>
          <input type="text" id="nv-dose" value="${esc(ram.dose||'')}">
        </div>
        <div>
          <label>Via de administração</label>
          <input type="text" id="nv-via" value="${esc(ram.via||'oral')}">
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label>Data de início do medicamento</label>
          <input type="date" id="nv-med-inicio" value="">
        </div>
        <div>
          <label>Data de término (se aplicável)</label>
          <input type="date" id="nv-med-fim" value="">
        </div>
      </div>

      <label>Indicação do medicamento suspeito</label>
      <input type="text" id="nv-indicacao" value="${esc(ram.indicacao||'')}">

      <div style="border-top:1.5px solid #f1f5f9;margin:14px 0"></div>

      <label>Descrição da reação adversa</label>
      <textarea id="nv-reacao" rows="3">${esc(ram.reacao||ram.reacao_adv||ram.descricao||'')}</textarea>

      <div class="grid-2">
        <div>
          <label>Data de início da reação</label>
          <input type="date" id="nv-ram-inicio" value="${ram.data||''}">
        </div>
        <div>
          <label>Data de término (se resolvida)</label>
          <input type="date" id="nv-ram-fim" value="">
        </div>
      </div>

      <label>Gravidade</label>
      <select id="nv-grav">
        <option value="leve" ${ram.gravidade==='leve'?'selected':''}>Leve — não necessita intervenção</option>
        <option value="moderada" ${ram.gravidade==='moderada'?'selected':''}>Moderada — requer monitoramento</option>
        <option value="grave" ${ram.gravidade==='grave'||ram.gravidade==='severa'?'selected':''}>Grave — hospitalização/incapacidade</option>
        <option value="fatal">Fatal — contribuiu para óbito</option>
      </select>

      <label>Desfecho da reação</label>
      <select id="nv-desfecho">
        <option value="Recuperado sem sequelas">Recuperado sem sequelas</option>
        <option value="Recuperado com sequelas">Recuperado com sequelas</option>
        <option value="Recuperando (ainda em curso)">Recuperando (ainda em curso)</option>
        <option value="Não recuperado">Não recuperado</option>
        <option value="Fatal">Fatal</option>
        <option value="Desconhecido">Desconhecido</option>
      </select>

      <label>Conduta adotada</label>
      <textarea id="nv-conduta" rows="2">${esc(ram.conduta||ram.tratamento||'')}</textarea>

      <div style="border-top:1.5px solid #f1f5f9;margin:14px 0"></div>

      <label>Outros medicamentos em uso</label>
      <textarea id="nv-outros" rows="2" placeholder="Liste outros medicamentos que o paciente utilizava concomitantemente..."></textarea>

      <label>Comorbidades relevantes</label>
      <input type="text" id="nv-comorbid" value="${esc((pac?.condicoes||[]).join(', '))}">

      <label>Causalidade (Escala de Naranjo) — calculada automaticamente</label>
      <input type="text" id="nv-naranjo" value="${score!==null?'Score '+score+' — '+cls.label:'Não avaliada'}" readonly style="background:#f8fafc;color:#64748b">

      <label>Informações adicionais</label>
      <textarea id="nv-obs" rows="2" placeholder="Outros dados relevantes para a notificação..."></textarea>

      <button class="btn-gerar" onclick="gerarNotivisa()">Gerar Notificação →</button>
    </div>`;

  document.getElementById('notivisa-form').scrollIntoView({ behavior:'smooth' });
}

function gerarNotivisa() {
  const pid  = parseInt(document.getElementById('sel-pac').value);
  const pac  = _pacs.find(p=>p.id===pid);
  const farm = _farmCfg;
  const score= calcNaranjo();
  const cls  = classifNaranjo(score);
  const dtHoje = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

  const g = id => (document.getElementById(id)?.value||'—').trim();

  const doc = document.getElementById('notivisa-doc');
  doc.style.display = 'block';
  doc.innerHTML = `
  <div class="notivisa-doc">
    <div class="nv-topo">
      <div class="nv-title">NOTIFICAÇÃO DE REAÇÃO ADVERSA A MEDICAMENTO</div>
      <div class="nv-sub">Sistema Nacional de Farmacovigilância — NOTIVISA / VigiMed · ANVISA</div>
    </div>
    <div class="nv-corpo">

      <div class="nv-sec">I — Identificação do notificador</div>
      <div class="nv-campo"><strong>Notificador:</strong> ${esc(g('nv-farm'))}</div>
      <div class="nv-campo"><strong>Conselho / Registro:</strong> ${esc(g('nv-crf'))}</div>
      <div class="nv-campo"><strong>Instituição:</strong> ${esc(g('nv-inst'))}</div>
      <div class="nv-campo"><strong>Data da notificação:</strong> ${new Date(g('nv-data')+'T12:00').toLocaleDateString('pt-BR')}</div>

      <div class="nv-linha"></div>
      <div class="nv-sec">II — Identificação do paciente</div>
      <div class="nv-campo"><strong>Nome:</strong> ${esc(pac?.nome||'—')}</div>
      <div class="nv-campo"><strong>Sexo:</strong> ${pac?.sexoPac==='F'?'Feminino':pac?.sexoPac==='M'?'Masculino':'Não informado'}</div>
      <div class="nv-campo"><strong>Idade:</strong> ${pac?.idadePac||'—'} anos</div>
      <div class="nv-campo"><strong>Peso:</strong> ${pac?.pesoPac||'—'} kg</div>
      <div class="nv-campo"><strong>Comorbidades:</strong> ${esc(g('nv-comorbid'))}</div>

      <div class="nv-linha"></div>
      <div class="nv-sec">III — Medicamento suspeito</div>
      <div class="nv-campo"><strong>Medicamento:</strong> ${esc(g('nv-med'))}</div>
      <div class="nv-campo"><strong>Dose / Via:</strong> ${esc(g('nv-dose'))} · ${esc(g('nv-via'))}</div>
      <div class="nv-campo"><strong>Indicação:</strong> ${esc(g('nv-indicacao'))}</div>
      ${g('nv-med-inicio')!=='—'?`<div class="nv-campo"><strong>Período de uso:</strong> ${new Date(g('nv-med-inicio')+'T12:00').toLocaleDateString('pt-BR')}${g('nv-med-fim')!=='—'?' a '+new Date(g('nv-med-fim')+'T12:00').toLocaleDateString('pt-BR'):' (em uso)'}</div>`:''}
      <div class="nv-campo"><strong>Outros medicamentos em uso:</strong> ${esc(g('nv-outros'))}</div>

      <div class="nv-linha"></div>
      <div class="nv-sec">IV — Descrição da reação adversa</div>
      <div class="nv-campo"><strong>Descrição:</strong> ${esc(g('nv-reacao'))}</div>
      ${g('nv-ram-inicio')!=='—'?`<div class="nv-campo"><strong>Início da reação:</strong> ${new Date(g('nv-ram-inicio')+'T12:00').toLocaleDateString('pt-BR')}</div>`:''}
      ${g('nv-ram-fim')!=='—'?`<div class="nv-campo"><strong>Término da reação:</strong> ${new Date(g('nv-ram-fim')+'T12:00').toLocaleDateString('pt-BR')}</div>`:''}
      <div class="nv-campo"><strong>Gravidade:</strong> ${esc(g('nv-grav'))}</div>
      <div class="nv-campo"><strong>Desfecho:</strong> ${esc(g('nv-desfecho'))}</div>
      <div class="nv-campo"><strong>Conduta adotada:</strong> ${esc(g('nv-conduta'))}</div>

      <div class="nv-linha"></div>
      <div class="nv-sec">V — Avaliação de causalidade (Escala de Naranjo)</div>
      <div style="display:flex;align-items:center;gap:16px;padding:10px;background:${cls.bg};border-radius:10px">
        <div style="font-size:2rem;font-weight:900;color:${cls.cor}">${score!==null?score:'—'}</div>
        <div>
          <div style="font-weight:800;color:${cls.cor};font-size:.9rem">${cls.label}</div>
          <div style="font-size:.75rem;color:#374151">${cls.desc}</div>
        </div>
      </div>
      ${score!==null?`
      <div style="margin-top:10px;font-size:.75rem;color:#64748b;line-height:1.8">
        ${PERGUNTAS.map((q,i)=>{
          const r = _respostas[i];
          const pts = r==='sim'?q.sim:r==='nao'?q.nao:q.dk;
          return `<div>${i+1}. ${q.txt.slice(0,60)}... <strong>${RESP_LABELS[r]||'—'} (${pts>=0?'+':''}${pts})</strong></div>`;
        }).join('')}
      </div>` : ''}

      ${g('nv-obs')!=='—'?`<div class="nv-linha"></div>
      <div class="nv-sec">VI — Informações adicionais</div>
      <div class="nv-campo">${esc(g('nv-obs'))}</div>`:''}

      <div class="nv-linha"></div>
      <div style="display:flex;gap:20px;margin-top:14px">
        <div style="flex:1;text-align:center">
          <div style="border-top:1.5px solid #1e293b;margin-bottom:6px"></div>
          <div style="font-size:.78rem;font-weight:700;color:#374151">${esc(g('nv-farm'))}</div>
          <div style="font-size:.65rem;color:#94a3b8">${esc(g('nv-crf'))} — ${esc(g('nv-inst'))}</div>
        </div>
      </div>

      <div style="margin-top:16px;font-size:.65rem;color:#94a3b8;line-height:1.7;border-top:1px solid #f1f5f9;padding-top:10px">
        Notificação gerada em ${dtHoje} via VitaDose — Sistema de Farmácia Clínica.<br>
        Para enviar ao NOTIVISA acesse: <strong>notivisa.anvisa.gov.br</strong><br>
        Para VigiMed (pacientes e cuidadores): <strong>vigimed.anvisa.gov.br</strong>
      </div>
    </div>
  </div>`;

  document.getElementById('btn-impr').style.display='';
  document.getElementById('btn-wpp').style.display='';
  doc.scrollIntoView({ behavior:'smooth' });
}

function compartilharWpp() {
  const ram  = _ramAtiva?.ram;
  if (!ram) return;
  const score= calcNaranjo();
  const cls  = classifNaranjo(score);
  const pid  = parseInt(document.getElementById('sel-pac').value);
  const pac  = _pacs.find(p=>p.id===pid);
  const farm = _farmCfg;
  const g    = id => (document.getElementById(id)?.value||'—').trim();

  const t = `*NOTIFICAÇÃO DE RAM — VitaDose*\n\n` +
    `*Notificador:* ${farm.nome||'—'} | ${farm.crf||''}\n` +
    `*Paciente:* ${pac?.nome||'—'}, ${pac?.idadePac||'—'} anos\n\n` +
    `*Medicamento suspeito:* ${ram.med||ram.medicamento||'—'}\n` +
    `*Dose/Via:* ${g('nv-dose')} / ${g('nv-via')}\n\n` +
    `*Reação adversa:* ${ram.reacao||ram.reacao_adv||ram.descricao||'—'}\n` +
    `*Gravidade:* ${g('nv-grav')}\n` +
    `*Desfecho:* ${g('nv-desfecho')}\n\n` +
    `*Causalidade (Naranjo):* Score ${score!==null?score:'—'} — ${cls.label}\n\n` +
    `*Conduta:* ${g('nv-conduta')}\n\n` +
    `Para notificar ao NOTIVISA: notivisa.anvisa.gov.br`;

  if (navigator.share) navigator.share({ title:'Notificação RAM', text:t });
  else window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');
}

function classifNaranjo(score) {
  if (score === null || score === undefined) return { label:'Não avaliado', desc:'Responda as perguntas acima', bg:'#f8fafc', cor:'#94a3b8' };
  if (score >= 9) return { label:'Definida',  desc:'Score ≥9: causalidade altamente provável', bg:'#fee2e2', cor:'#991b1b' };
  if (score >= 5) return { label:'Provável',  desc:'Score 5–8: associação provável',           bg:'#fef3c7', cor:'#92400e' };
  if (score >= 1) return { label:'Possível',  desc:'Score 1–4: possível associação',           bg:'#e0f2fe', cor:'#0369a1' };
  return             { label:'Duvidosa',   desc:'Score ≤0: associação improvável',           bg:'#f1f5f9', cor:'#64748b' };
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

document.addEventListener('DOMContentLoaded', initPacs);
</script>
</body>
</html>
