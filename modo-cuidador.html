<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Modo Cuidador — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    *{box-sizing:border-box}
    body{background:#f0f4f8;font-family:system-ui,sans-serif}
    /* Header */
    .hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:18px 16px 14px;position:sticky;top:0;z-index:100}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .hdr-modo{font-size:.62rem;font-weight:800;color:#7dd3fc;text-transform:uppercase;letter-spacing:.05em}
    .hdr-pac{font-size:1.2rem;font-weight:900;color:#fff;line-height:1.2}
    .hdr-data{font-size:.73rem;color:rgba(255,255,255,.65);margin-top:2px}
    .hdr-config{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 10px;font-size:.82rem;cursor:pointer}

    /* Progresso do dia */
    .prog-bar-outer{background:rgba(255,255,255,.15);border-radius:6px;height:8px;overflow:hidden}
    .prog-bar-inner{height:100%;border-radius:6px;background:#34d399;transition:width .4s}
    .prog-txt{font-size:.65rem;color:rgba(255,255,255,.7);margin-top:4px;text-align:right}

    main{max-width:540px;margin:0 auto;padding:14px 12px 100px}

    /* Seletor de paciente */
    .pac-sel-wrap{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .pac-sel{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:.85rem;background:#fff}

    /* Período */
    .periodo-hdr{font-size:.68rem;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
    .periodo-hdr::after{content:'';flex:1;height:1px;background:#e2e8f0}

    /* Card de medicamento */
    .med-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid transparent;transition:.2s;display:flex;gap:14px;align-items:center}
    .med-card.confirmado{border-color:#22c55e;background:#f0fdf4}
    .med-card.atrasado{border-color:#f97316;background:#fff7ed}
    .med-icone{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
    .med-info{flex:1;min-width:0}
    .med-nome{font-size:1rem;font-weight:900;color:#0f172a;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .med-dose{font-size:.82rem;color:#475569;font-weight:600;margin-bottom:4px}
    .med-horario{font-size:.73rem;color:#94a3b8;display:flex;align-items:center;gap:5px}
    .med-stock{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
    .stock-ok{background:#dcfce7;color:#166534}
    .stock-warn{background:#fef3c7;color:#92400e}
    .stock-crit{background:#fee2e2;color:#991b1b}

    /* Botão de confirmação GRANDE */
    .conf-btn{border:none;border-radius:12px;padding:12px 14px;font-size:.82rem;font-weight:800;cursor:pointer;transition:.15s;flex-shrink:0;min-width:80px;text-align:center;line-height:1.3}
    .conf-btn.pendente{background:#0ea5e9;color:#fff;box-shadow:0 4px 12px rgba(14,165,233,.3)}
    .conf-btn.pendente:active{transform:scale(.96)}
    .conf-btn.feito{background:#f0fdf4;color:#16a34a;border:2px solid #86efac}

    /* Sem medicamentos */
    .periodo-vazio{text-align:center;padding:16px;color:#cbd5e1;font-size:.8rem}

    /* Botão de ocorrência flutuante */
    .fab{position:fixed;bottom:80px;right:16px;background:#f97316;color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(249,115,22,.4);z-index:200;display:flex;align-items:center;justify-content:center}

    /* Modal de ocorrência */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end}
    .modal-box{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:540px;margin:0 auto;animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-title{font-size:1rem;font-weight:800;color:#0f172a;margin-bottom:14px}
    .modal-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .cat-btn{padding:6px 12px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:.72rem;font-weight:700;cursor:pointer;background:#f8fafc;color:#475569;transition:.12s}
    .cat-btn.ativo{background:#fff7ed;border-color:#fb923c;color:#c2410c}
    .modal-ta{width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px;font-size:.85rem;resize:none;height:90px;font-family:inherit}
    .modal-actions{display:flex;gap:8px;margin-top:12px}
    .modal-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:.85rem;font-weight:800;cursor:pointer}
    .btn-cancel{background:#f1f5f9;color:#475569}
    .btn-salvar{background:#f97316;color:#fff}

    /* Contato emergência */
    .emerg-bar{background:#fff;border-radius:14px;padding:13px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px}
    .emerg-info{flex:1}
    .emerg-lbl{font-size:.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase}
    .emerg-nome{font-size:.85rem;font-weight:700;color:#0f172a}
    .emerg-btn{background:#dc2626;border:none;color:#fff;border-radius:10px;padding:10px 14px;font-size:.78rem;font-weight:800;cursor:pointer}

    /* Ocorrências recentes */
    .ocorr-card{background:#fff;border-radius:14px;padding:13px 14px;margin-top:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .ocorr-title{font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:8px}
    .ocorr-item{padding:8px 0;border-bottom:1px solid #f8fafc;font-size:.78rem}
    .ocorr-item:last-child{border:none}
    .ocorr-cat{font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:3px}

    nav.bottom-nav .nav-item{font-size:.62rem}
    @media print{.hdr,.fab,nav,.pac-sel-wrap,.modal-overlay,.emerg-bar{display:none!important}}
  </style>
</head>
<body>
<div class="hdr" id="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-modo">🧡 Modo Cuidador</div>
      <div class="hdr-pac" id="hdr-pac">Selecione o paciente</div>
      <div class="hdr-data" id="hdr-data"></div>
    </div>
    <button class="hdr-config" onclick="location.href='perfil.html'">⚙️</button>
  </div>
  <div class="prog-bar-outer"><div class="prog-bar-inner" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-txt" id="prog-txt">0 de 0 doses confirmadas hoje</div>
</div>

<main>
  <div class="pac-sel-wrap">
    <select class="pac-sel" id="sel-pac" onchange="init()"><option value="">Selecione o paciente...</option></select>
  </div>
  <div id="emerg-div"></div>
  <div id="lista-meds"></div>
  <div id="ocorr-div"></div>
</main>

<button class="fab" onclick="abrirOcorrencia()" title="Registrar ocorrência">📝</button>

<!-- Modal ocorrência -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)fecharModal()">
  <div class="modal-box">
    <div class="modal-title">📝 Registrar Ocorrência</div>
    <div class="modal-cats">
      <div class="cat-btn" onclick="selCat(this,'Recusou dose')">💊 Recusou dose</div>
      <div class="cat-btn" onclick="selCat(this,'Vômito após dose')">🤢 Vômito</div>
      <div class="cat-btn" onclick="selCat(this,'Queda')">🚨 Queda</div>
      <div class="cat-btn" onclick="selCat(this,'Febre')">🌡️ Febre</div>
      <div class="cat-btn" onclick="selCat(this,'Dor')">😣 Dor</div>
      <div class="cat-btn" onclick="selCat(this,'Agitação')">😤 Agitação</div>
      <div class="cat-btn" onclick="selCat(this,'Confusão mental')">🧠 Confusão</div>
      <div class="cat-btn" onclick="selCat(this,'Outra')">✏️ Outra</div>
    </div>
    <textarea class="modal-ta" id="ocorr-txt" placeholder="Descreva o que aconteceu..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn btn-salvar" onclick="salvarOcorrencia()">Salvar</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<span>Painel</span></a>
  <a href="diario-compartilhado.html" class="nav-item">💬<span>Diário</span></a>
  <a href="estoque-inteligente.html" class="nav-item">📦<span>Estoque</span></a>
  <a href="perfil.html" class="nav-item">⚙️<span>Config</span></a>
</nav>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>
let _pid=null, _pac=null, _meds=[], _doses=[], _catSel='Outra';

const PERIODOS=[
  {id:'manha',   lbl:'🌅 Manhã',     horas:[5,6,7,8,9,10,11]},
  {id:'tarde',   lbl:'☀️ Tarde',     horas:[12,13,14,15,16,17]},
  {id:'noite',   lbl:'🌆 Noite',     horas:[18,19,20,21]},
  {id:'dormir',  lbl:'🌙 Ao dormir', horas:[22,23,0,1,2,3,4]},
];

const ICONES_PERIODO={manha:'🌅',tarde:'☀️',noite:'🌆',dormir:'🌙'};
const COR_PERIODO={manha:'#fef3c7',tarde:'#e0f2fe',noite:'#ede9fe',dormir:'#1e1b4b'};
const COR_TEXT={manha:'#92400e',tarde:'#0369a1',noite:'#5b21b6',dormir:'#e2e8f0'};

function hoje2(){return new Date().toISOString().slice(0,10);}

function dosesConfirmadas(medId,horario){
  return _doses.some(d=>d.medicamentoId===medId&&d.horario===horario&&d.data===hoje2()&&d.confirmado!==false);
}

function stockDias(med){
  const est=parseFloat(med.estoqueAtual||med.estoque||0);
  const freq=parseFq(med.frequencia||med.intervalo||'');
  if(!freq||!est) return null;
  return Math.floor(est/freq);
}

function parseFq(f){
  const s=f.toLowerCase();
  if(/1\s*x|1\s*vez|1\s*comp/.test(s)||/uma vez/.test(s)) return 1;
  if(/2\s*x|2\s*vez/.test(s)||/duas vezes/.test(s)) return 2;
  if(/3\s*x|3\s*vez/.test(s)||/três vezes|tres vezes/.test(s)) return 3;
  if(/4\s*x|4\s*vez/.test(s)||/quatro vezes/.test(s)) return 4;
  if(/6\s*h/.test(s)) return 4;
  if(/8\s*h/.test(s)) return 3;
  if(/12\s*h/.test(s)) return 2;
  if(/24\s*h/.test(s)) return 1;
  if(/semana|semanal|week/.test(s)) return 1/7;
  return 1;
}

function medHorarios(med){
  if(med.horarios&&med.horarios.length) return med.horarios;
  // Derivar da frequência
  const freq=parseFq(med.frequencia||'');
  const base=[7,12,18,23];
  return base.slice(0,Math.round(freq));
}

function horarioStr(h){
  if(typeof h==='string'&&h.includes(':')) return h;
  return String(h).padStart(2,'0')+':00';
}

function periodoDoHorario(h){
  const hora=parseInt(String(h).split(':')[0]);
  return PERIODOS.find(p=>p.horas.includes(hora))||PERIODOS[0];
}

function stockBadge(med){
  const d=stockDias(med);
  if(d===null) return '';
  const cls=d<=3?'stock-crit':d<=14?'stock-warn':'stock-ok';
  const txt=d<=3?`⚠️ Acaba em ${d} dia${d!==1?'s':''}!`:d<=14?`📦 ${d} dias restantes`:`✅ ${d} dias`;
  return `<span class="med-stock ${cls}">${txt}</span>`;
}

async function init(){
  _pid=parseInt(document.getElementById('sel-pac').value)||null;
  if(!_pid){render();return;}
  [_pac,_meds,_doses]=await Promise.all([
    dbGet('pacientes',_pid),
    dbGetByIndex('medicamentos','pacienteId',_pid),
    dbGetAll('doses'),
  ]);
  _meds=(_meds||[]).filter(m=>m.ativo!==false&&m.ativo!==0);
  _doses=(_doses||[]).filter(d=>d.pacienteId===_pid&&d.data===hoje2());
  render();
}

function render(){
  // Header
  const pac=_pac;
  document.getElementById('hdr-pac').textContent=pac?.nome||'Paciente';
  document.getElementById('hdr-data').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  // Progresso
  const pares=_meds.flatMap(m=>medHorarios(m).map(h=>({m,h})));
  const conf=pares.filter(p=>dosesConfirmadas(p.m.id,horarioStr(p.h))).length;
  const pct=pares.length?Math.round(conf/pares.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=conf+' de '+pares.length+' doses confirmadas hoje';

  // Emergência
  const emerg=pac?.contatoEmergencia||pac?.cuidador||'';
  const telefEmerg=pac?.telefoneEmergencia||pac?.telefoneCuidador||'';
  const emergDiv=document.getElementById('emerg-div');
  if(emerg){
    emergDiv.innerHTML=`<div class="emerg-bar">
      <div>🚨</div>
      <div class="emerg-info">
        <div class="emerg-lbl">Contato de emergência</div>
        <div class="emerg-nome">${esc(emerg)} ${telefEmerg?'— '+esc(telefEmerg):''}</div>
      </div>
      ${telefEmerg?`<button class="emerg-btn" onclick="location.href='tel:${esc(telefEmerg)}'">Ligar</button>`:''}
    </div>`;
  } else {
    emergDiv.innerHTML='';
  }

  if(!_meds.length){
    document.getElementById('lista-meds').innerHTML=`<div style="text-align:center;padding:40px;color:#94a3b8">
      <div style="font-size:3rem;margin-bottom:8px">💊</div>
      Nenhum medicamento cadastrado.<br>
      <a href="cadastro.html" style="color:#0ea5e9;font-weight:700">Cadastrar medicamentos</a>
    </div>`;
    return;
  }

  // Agrupa por período
  let html='';
  PERIODOS.forEach(per=>{
    const items=[];
    _meds.forEach(med=>{
      medHorarios(med).forEach(h=>{
        const hStr=horarioStr(h);
        const hora=parseInt(String(h).split(':')[0]);
        if(per.horas.includes(hora)){
          items.push({med,hStr});
        }
      });
    });
    if(!items.length) return;

    html+=`<div class="periodo-hdr">${per.lbl}</div>`;
    items.sort((a,b)=>a.hStr.localeCompare(b.hStr));
    items.forEach(({med,hStr})=>{
      const conf=dosesConfirmadas(med.id,hStr);
      const agora=new Date(); const horaAgora=agora.getHours()*60+agora.getMinutes();
      const [hh,mm]=hStr.split(':').map(Number); const horMin=hh*60+mm;
      const atrasado=!conf&&horaAgora>horMin+30;
      const sb=stockBadge(med);
      html+=`<div class="med-card ${conf?'confirmado':atrasado?'atrasado':''}" id="card-${med.id}-${hStr.replace(':','')}">
        <div class="med-icone" style="background:${conf?'#dcfce7':atrasado?'#fff7ed':'#f0f9ff'}">
          ${conf?'✅':atrasado?'⏰':'💊'}
        </div>
        <div class="med-info">
          <div class="med-nome">${esc(med.nome||med.medicamento||'Medicamento')}</div>
          <div class="med-dose">${esc(med.dose||'')} ${esc(med.forma||med.formaFarma||'')}</div>
          <div class="med-horario">🕐 ${hStr}</div>
          ${sb}
        </div>
        <button class="conf-btn ${conf?'feito':'pendente'}" onclick="confirmar('${med.id}','${hStr}',this)">
          ${conf?'✅<br>Tomado':'Confirmei<br>a dose'}
        </button>
      </div>`;
    });
  });
  document.getElementById('lista-meds').innerHTML=html;

  // Ocorrências recentes
  renderOcorrencias();
}

async function confirmar(medId,hStr,btn){
  if(!_pid) return;
  const id_med=parseInt(medId);
  const jaConf=dosesConfirmadas(id_med,hStr);
  if(jaConf){
    // Desfazer confirmação
    const idx=_doses.findIndex(d=>d.medicamentoId===id_med&&d.horario===hStr&&d.data===hoje2());
    if(idx>=0){const d=_doses[idx];if(d.id) await dbDelete('doses',d.id);_doses.splice(idx,1);}
  } else {
    const nova={pacienteId:_pid,medicamentoId:id_med,horario:hStr,data:hoje2(),confirmado:true,ts:Date.now()};
    const newId=await dbAdd('doses',nova);
    nova.id=newId;
    _doses.push(nova);
  }
  // Atualizar UI sem re-render completo
  const card=document.getElementById('card-'+medId+'-'+hStr.replace(':',''));
  if(card){
    const novaConf=dosesConfirmadas(id_med,hStr);
    card.className='med-card '+(novaConf?'confirmado':'');
    card.querySelector('.med-icone').textContent=novaConf?'✅':'💊';
    btn.className='conf-btn '+(novaConf?'feito':'pendente');
    btn.innerHTML=novaConf?'✅<br>Tomado':'Confirmei<br>a dose';
  }
  // Atualiza progresso
  const pares=_meds.flatMap(m=>medHorarios(m).map(h=>({m,h})));
  const conf=pares.filter(p=>dosesConfirmadas(p.m.id,horarioStr(p.h))).length;
  const pct=pares.length?Math.round(conf/pares.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=conf+' de '+pares.length+' doses confirmadas hoje';
  tocarBip();
}

function tocarBip(){
  try{const a=new AudioContext();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.2);o.start();o.stop(a.currentTime+.2);}catch(e){}
}

let _catSel2='Outra';
function abrirOcorrencia(){document.getElementById('modal').style.display='flex';}
function fecharModal(){document.getElementById('modal').style.display='none';document.getElementById('ocorr-txt').value='';}
function selCat(btn,cat){
  _catSel2=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
}

const CAT_COR={
  'Recusou dose':'#fee2e2','Vômito após dose':'#fef3c7','Queda':'#fee2e2',
  'Febre':'#fff7ed','Dor':'#fff7ed','Agitação':'#fef3c7',
  'Confusão mental':'#ede9fe','Outra':'#f1f5f9'
};
const CAT_TEXT={
  'Recusou dose':'#991b1b','Vômito após dose':'#92400e','Queda':'#991b1b',
  'Febre':'#c2410c','Dor':'#c2410c','Agitação':'#92400e',
  'Confusão mental':'#5b21b6','Outra':'#475569'
};

async function salvarOcorrencia(){
  if(!_pid){showToast('Selecione um paciente');return;}
  const txt=document.getElementById('ocorr-txt').value.trim();
  const ocorr={pid:_pid,categoria:_catSel2,texto:txt,data:hoje2(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),ts:Date.now()};
  const lista=await dbGetConfig('ocorrencias_'+_pid)||[];
  lista.push(ocorr);
  await dbSetConfig('ocorrencias_'+_pid,lista);
  // Salva também no diário compartilhado
  const diario=await dbGetConfig('diario_comp_'+_pid)||[];
  diario.push({...ocorr,autor:'cuidador',tipo:'ocorrencia'});
  await dbSetConfig('diario_comp_'+_pid,diario);
  fecharModal();
  await renderOcorrencias();
  showToast('✅ Ocorrência registrada');
}

async function renderOcorrencias(){
  if(!_pid){document.getElementById('ocorr-div').innerHTML='';return;}
  const lista=await dbGetConfig('ocorrencias_'+_pid)||[];
  const hoje=lista.filter(o=>o.data===hoje2()).slice(-5).reverse();
  if(!hoje.length){document.getElementById('ocorr-div').innerHTML='';return;}
  document.getElementById('ocorr-div').innerHTML=`<div class="ocorr-card">
    <div class="ocorr-title">Ocorrências de hoje</div>
    ${hoje.map(o=>`<div class="ocorr-item">
      <span class="ocorr-cat" style="background:${CAT_COR[o.categoria]||'#f1f5f9'};color:${CAT_TEXT[o.categoria]||'#475569'}">${esc(o.categoria)}</span>
      <span style="font-size:.62rem;color:#94a3b8;margin-left:6px">${o.hora||''}</span>
      ${o.texto?`<div style="color:#334155;margin-top:2px">${esc(o.texto)}</div>`:''}
    </div>`).join('')}
  </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.addEventListener('DOMContentLoaded',async()=>{
  const pacs=await dbGetAll('pacientes');
  const sel=document.getElementById('sel-pac');
  sel.innerHTML='<option value="">Selecione o paciente...</option>'+pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
  const pid=getActivePacienteId();
  if(pid){sel.value=pid;await init();}
  else render();
});
</script>
</body>
</html>
