<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F3460">
  <title>VitaDose — Diário Clínico</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/vitadose.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="vita">Vita</span><span class="dose">Dose</span>
      <span class="sub">Diário Clínico</span>
    </div>
  </header>

  <!-- Navegação de data -->
  <div class="diario-nav">
    <button class="diario-nav-btn" onclick="mudarDia(-1)">‹</button>
    <span id="diario-data" class="diario-nav-data">Hoje</span>
    <button class="diario-nav-btn" id="btn-prox" onclick="mudarDia(1)">›</button>
  </div>

  <!-- Registro do dia -->
  <div class="card">
    <div class="card-title">Registro do Dia</div>

    <!-- Pressão Arterial -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="form-lbl" style="margin-bottom:0">Pressão Arterial</span>
      <span class="badge" id="pa-badge" style="display:none"></span>
    </div>
    <div class="form-row" style="margin-bottom:16px">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-lbl" for="f-pa-sis" style="font-weight:400;color:var(--text-2);font-size:.75rem">Sistólica (mmHg)</label>
        <input id="f-pa-sis" class="form-input mono" type="number" min="60" max="250" placeholder="Ex: 120" inputmode="numeric">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-lbl" for="f-pa-dia" style="font-weight:400;color:var(--text-2);font-size:.75rem">Diastólica (mmHg)</label>
        <input id="f-pa-dia" class="form-input mono" type="number" min="40" max="150" placeholder="Ex: 80" inputmode="numeric">
      </div>
    </div>

    <!-- Glicemia -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="form-lbl" style="margin-bottom:0">Glicemia</span>
      <span class="badge" id="gli-badge" style="display:none"></span>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:16px">
      <div>
        <label class="form-lbl" for="f-gli" style="font-weight:400;color:var(--text-2);font-size:.75rem">Valor (mg/dL)</label>
        <input id="f-gli" class="form-input mono" type="number" min="20" max="600" placeholder="Ex: 95" inputmode="numeric">
      </div>
      <div>
        <label class="form-lbl" for="f-gli-ctx" style="font-weight:400;color:var(--text-2);font-size:.75rem">Momento</label>
        <select id="f-gli-ctx" class="form-select">
          <option value="jejum">Jejum</option>
          <option value="pos">Pós-ref.</option>
          <option value="deitar">Deitar</option>
          <option value="outro">Outro</option>
        </select>
      </div>
    </div>

    <!-- Peso + Altura -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-lbl" for="f-peso">Peso (kg)</label>
        <input id="f-peso" class="form-input mono" type="number" min="20" max="300" step="0.1"
          placeholder="Ex: 72.5" inputmode="decimal" oninput="calcularIMC()">
      </div>
      <div class="form-group">
        <label class="form-lbl" for="f-altura">
          Altura (cm)
          <span style="font-size:.65rem;font-weight:400;color:var(--text-2)">— 1× só</span>
        </label>
        <input id="f-altura" class="form-input mono" type="number" min="100" max="220"
          placeholder="Ex: 170" inputmode="numeric" oninput="calcularIMC()" onblur="salvarAltura()">
      </div>
    </div>

    <!-- IMC calculado automaticamente -->
    <div id="imc-wrap" style="display:none;align-items:center;justify-content:space-between;gap:12px;background:var(--blue-bg);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:16px">
      <div>
        <p style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-2);margin-bottom:3px">IMC</p>
        <p id="imc-valor" style="font-size:1.4rem;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1">—</p>
      </div>
      <span id="imc-badge" class="badge"></span>
    </div>

    <button class="btn btn-gold btn-full" onclick="salvarRegistro()">Salvar Registro</button>
  </div>

  <!-- Gráficos de tendência (visível com ≥ 3 pontos) -->
  <div id="charts-wrap" class="card" style="display:none">
    <div class="card-title">Tendências</div>
    <div class="chart-grid">
      <div class="chart-cell">
        <p class="chart-lbl">PA Sistólica</p>
        <p class="chart-val" id="v-pa">—</p>
        <canvas id="chart-pa" class="chart-canvas" height="52"></canvas>
      </div>
      <div class="chart-cell">
        <p class="chart-lbl">Glicemia</p>
        <p class="chart-val" id="v-gli">—</p>
        <canvas id="chart-gli" class="chart-canvas" height="52"></canvas>
      </div>
      <div class="chart-cell">
        <p class="chart-lbl">IMC</p>
        <p class="chart-val" id="v-imc">—</p>
        <canvas id="chart-imc" class="chart-canvas" height="52"></canvas>
      </div>
    </div>
  </div>

  <!-- Histórico -->
  <div class="card">
    <div class="card-title">
      Histórico
      <div class="periodo-tabs">
        <button class="periodo-btn" onclick="setPeriodo(7, this)">7d</button>
        <button class="periodo-btn active" onclick="setPeriodo(30, this)">30d</button>
        <button class="periodo-btn" onclick="setPeriodo(90, this)">90d</button>
      </div>
    </div>
    <div id="hist-vazio" class="empty" style="padding:20px 0;display:none">
      <div class="icon">📋</div>
      <p>Nenhum registro ainda.<br>Comece com os valores de hoje.</p>
    </div>
    <div id="hist-lista"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Início
    </a>
    <a class="nav-btn" href="cadastro.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Medicamentos
    </a>
    <a class="nav-btn" href="historico.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Histórico
    </a>
    <a class="nav-btn active" href="diario.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Diário
      <div class="nav-dot"></div>
    </a>
    <a class="nav-btn" href="perfil.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>
  </nav>

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/diario.js"></script>
</body>
</html>
