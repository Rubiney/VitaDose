<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MRPA — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <style>
    body { background:#f8fafc;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif }
    .topbar { display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100 }
    .back-btn { background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;color:#475569;border-radius:8px }
    .topbar-title { font-size:1rem;font-weight:700;color:#1e293b;flex:1 }
    .sec-title { font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;padding:0 16px;margin:14px 0 6px }

    /* Resultado */
    .result-card { background:#fff;border-radius:16px;margin:0 16px 10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:18px;text-align:center }
    .result-pa   { font-size:2.4rem;font-weight:900;letter-spacing:.02em }
    .result-sub  { font-size:.72rem;color:#94a3b8;margin-top:2px }
    .result-badge{ display:inline-block;border-radius:10px;padding:6px 20px;font-size:.85rem;font-weight:800;margin-top:10px }

    /* Status grid */
    .status-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 10px }
    .status-cell { background:#fff;border-radius:12px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05) }
    .st-val { font-size:1rem;font-weight:900 }
    .st-lbl { font-size:.6rem;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-top:2px }

    /* Alerta contextual */
    .alerta { margin:0 16px 10px;border-radius:12px;padding:10px 14px;font-size:.78rem;font-weight:700;line-height:1.5 }

    /* Formulário */
    .form-card { background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:14px }
    .form-lbl  { font-size:.67rem;font-weight:700;color:#64748b;margin-bottom:4px }
    .form-inp  { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 12px;font-size:.82rem;color:#1e293b }
    .form-inp:focus { outline:none;border-color:#dc2626 }
    .form-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px }
    .form-grid3{ display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px }
    .period-row{ display:flex;gap:8px;margin-bottom:10px }
    .period-btn{ flex:1;background:#f1f5f9;border:1.5px solid transparent;border-radius:10px;padding:10px;font-size:.78rem;font-weight:700;color:#475569;cursor:pointer;text-align:center }
    .period-btn.sel { background:#fee2e2;border-color:#fca5a5;color:#dc2626 }
    .btn-add { width:100%;background:#dc2626;color:#fff;border:none;border-radius:10px;padding:11px;font-size:.85rem;font-weight:800;cursor:pointer;margin-top:2px }

    /* PA consulta */
    .consulta-row { display:flex;gap:8px;align-items:flex-end;margin-top:4px }
    .consulta-inp { flex:1;border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 12px;font-size:.82rem;color:#1e293b }
    .consulta-inp:focus { outline:none;border-color:#6366f1 }
    .btn-salv-cons { background:#6366f1;color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:.75rem;font-weight:700;cursor:pointer }

    /* Tabela de dias */
    .day-group { background:#fff;border-radius:12px;margin:0 16px 8px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden }
    .day-hdr   { display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0 }
    .day-lbl   { font-size:.75rem;font-weight:800;color:#1e293b;flex:1 }
    .day-excl  { font-size:.65rem;font-weight:700;background:#fef3c7;color:#d97706;border-radius:5px;padding:2px 7px }
    .day-del   { background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:.85rem }
    .reading-row { display:grid;grid-template-columns:90px 1fr 1fr 1fr;gap:0;padding:8px 14px;border-bottom:1px solid #f8fafc;font-size:.75rem }
    .reading-row:last-child { border-bottom:none }
    .per-tag   { font-size:.65rem;font-weight:700;border-radius:5px;padding:2px 7px;align-self:center }

    .vazio { text-align:center;color:#94a3b8;padding:24px;font-size:.82rem }

    @media print {
      .topbar,.back-btn,.btn-add,.btn-salv-cons,.day-del,.form-card { display:none }
    }
  </style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">🩺 MRPA — Monitorização Residencial</span>
</div>
<div id="app" style="padding-bottom:60px">
  <p style="text-align:center;color:#94a3b8;padding:40px;font-size:.85rem">Carregando...</p>
</div>
<div class="toast" id="toast"></div>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>

/* ─── Classificação MRPA — SBC 2020 ─── */
function classifMRPA(sys, dia) {
  if (!sys || !dia) return null;
  if (sys < 130 && dia < 80)  return { lbl:'PA Controlada',        cor:'#16a34a', bg:'#dcfce7' };
  if (sys < 135 && dia < 85)  return { lbl:'Limítrofe',            cor:'#d97706', bg:'#fef3c7' };
  return                              { lbl:'Não Controlada',       cor:'#dc2626', bg:'#fee2e2' };
}
function jaleco(ofSys, ofDia, mrSys, mrDia) {
  if (!ofSys || !mrSys) return null;
  const ofAlta = ofSys >= 140 || ofDia >= 90;
  const mrAlta = mrSys >= 135 || mrDia >= 85;
  if (ofAlta && !mrAlta) return { lbl:'⚠️ Possível Hipertensão do Jaleco Branco', cor:'#d97706', bg:'#fef3c7' };
  if (!ofAlta && mrAlta) return { lbl:'🚨 Possível Hipertensão Mascarada',         cor:'#dc2626', bg:'#fee2e2' };
  return null;
}

function fmtData(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function diaDaSemana(iso) {
  const ds = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return ds[new Date(iso+'T12:00:00').getDay()];
}

let _pid  = null;
let _pac  = null;
let _sess = [];    // sessões registradas
let _cons = {};    // PA de consultório { sys, dia, data }
let _per  = 'manha'; // período selecionado no form

async function init() {
  _pid  = getActivePacienteId();
  if (!_pid) { window.location.href='index.html'; return; }
  _pac  = await dbGet('pacientes', _pid);
  _sess = (await dbGetConfig('mrpa_sess_'+_pid)) || [];
  _cons = (await dbGetConfig('mrpa_cons_'+_pid)) || {};

  /* Tenta pegar PA do último diário */
  if (!_cons.sys) {
    try {
      const hoje = new Date().toISOString().slice(0,10);
      const dt30 = new Date(); dt30.setDate(dt30.getDate()-30);
      const diarios = await dbGetDiarioRange(dt30.toISOString().slice(0,10), hoje);
      const comPA   = diarios.filter(r=>r.paSis).sort((a,b)=>b.data.localeCompare(a.data));
      if (comPA[0]) { _cons = { sys: comPA[0].paSis, dia: comPA[0].paDia, data: comPA[0].data }; }
    } catch(e){}
  }
  render();
}

/* ─── Cálculos ──────────────────────────────────────── */
function calcMRPA() {
  if (!_sess.length) return null;
  /* Ordenar por data */
  const sorted = [..._sess].sort((a,b)=>a.data.localeCompare(b.data)||a.criadoEm.localeCompare(b.criadoEm));
  /* Dias únicos */
  const dias = [...new Set(sorted.map(s=>s.data))].sort();
  const util = sorted.filter(s => s.data !== dias[0]); // exclui dia 1

  if (!util.length) return null;
  const reads = util.flatMap(s => [
    { sys:s.pas1, dia:s.pad1 },
    { sys:s.pas2, dia:s.pad2 },
  ]).filter(r=>r.sys&&r.dia);

  if (!reads.length) return null;
  const mSys = +(reads.reduce((a,r)=>a+r.sys,0)/reads.length).toFixed(1);
  const mDia = +(reads.reduce((a,r)=>a+r.dia,0)/reads.length).toFixed(1);
  const nDias = dias.length;
  return { mSys, mDia, nDias, nLeit: reads.length, dias, util };
}

/* ─── Render ─────────────────────────────────────────── */
function render() {
  const calc = calcMRPA();
  const hoje = new Date().toISOString().slice(0,10);

  /* Resultado */
  let resultHTML = '';
  if (calc) {
    const cl = classifMRPA(calc.mSys, calc.mDia);
    const jl = jaleco(_cons.sys, _cons.dia, calc.mSys, calc.mDia);
    resultHTML = `
      <p class="sec-title" style="margin-top:10px">Resultado MRPA — ${_pac?.nome||'Paciente'}</p>
      <div class="result-card">
        <div class="result-pa" style="color:${cl?.cor||'#1e293b'}">${Math.round(calc.mSys)} / ${Math.round(calc.mDia)}</div>
        <p class="result-sub">mmHg — média de ${calc.nLeit} leituras válidas (${calc.nDias} dias, dia 1 excluído)</p>
        <span class="result-badge" style="background:${cl?.bg};color:${cl?.cor}">${cl?.lbl}</span>
      </div>
      <div class="status-grid">
        <div class="status-cell">
          <div class="st-val" style="color:#dc2626">${Math.round(calc.mSys)}</div>
          <div class="st-lbl">PAS média</div>
        </div>
        <div class="status-cell">
          <div class="st-val" style="color:#ea580c">${Math.round(calc.mDia)}</div>
          <div class="st-lbl">PAD média</div>
        </div>
        <div class="status-cell">
          <div class="st-val" style="color:#6366f1">${calc.nDias}</div>
          <div class="st-lbl">dias</div>
        </div>
      </div>
      ${jl ? `<div class="alerta" style="background:${jl.bg};color:${jl.cor}">${jl.lbl}<br><span style="font-size:.7rem;font-weight:400">PA consultório: ${_cons.sys}/${_cons.dia} mmHg · MRPA: ${Math.round(calc.mSys)}/${Math.round(calc.mDia)} mmHg</span></div>` : ''}
      ${calc.nDias < 5 ? `<div class="alerta" style="background:#fef3c7;color:#d97706">📋 Protocolo incompleto: ${calc.nDias} de 5 dias mínimos registrados (excluindo dia 1).</div>` : ''}
    `;
  } else {
    resultHTML = `
      <p class="sec-title" style="margin-top:10px">Resultado MRPA — ${_pac?.nome||'Paciente'}</p>
      <div class="result-card">
        <p style="color:#94a3b8;font-size:.85rem;padding:8px 0">Sem dados suficientes.<br>Registre ao menos 2 dias de medidas (o dia 1 é excluído do cálculo).</p>
      </div>
    `;
  }

  /* Protocolo SBC */
  const protocolHTML = `
    <div style="background:#ede9fe;border-radius:12px;margin:0 16px 10px;padding:12px 14px;font-size:.72rem;color:#5b21b6;line-height:1.6">
      <b>Protocolo SBC 2020:</b> ≥5 dias · 2 leituras manhã (após acordar, antes de medicamentos) + 2 leituras tarde/noite · Intervalo de 1-2 min entre leituras · Sentado, 5 min repouso · <b>Dia 1 excluído</b> do cálculo · Meta MRPA: &lt;130/80 mmHg
    </div>
  `;

  /* PA de consultório */
  const consHTML = `
    <p class="sec-title">PA de Consultório (para comparação)</p>
    <div class="form-card">
      <div class="consulta-row">
        <input class="consulta-inp" id="c-sys" type="number" placeholder="PAS" value="${_cons.sys||''}" style="width:70px">
        <span style="align-self:center;color:#94a3b8;font-weight:700">/</span>
        <input class="consulta-inp" id="c-dia" type="number" placeholder="PAD" value="${_cons.dia||''}" style="width:70px">
        <span style="align-self:center;font-size:.75rem;color:#64748b">mmHg</span>
        <button class="btn-salv-cons" onclick="salvarCons()">Salvar</button>
      </div>
      <p style="font-size:.65rem;color:#94a3b8;margin-top:6px">Auto-preenchido do último registro do diário. Usado para detectar efeito do jaleco branco.</p>
    </div>
  `;

  /* Formulário de registro */
  const formHTML = `
    <p class="sec-title">Registrar Medida</p>
    <div class="form-card">
      <div class="period-row">
        <button class="period-btn${_per==='manha'?' sel':''}" onclick="setPer('manha')">🌅 Manhã<br><span style="font-size:.62rem;font-weight:400">Antes dos meds</span></button>
        <button class="period-btn${_per==='tarde'?' sel':''}" onclick="setPer('tarde')">🌆 Tarde/Noite<br><span style="font-size:.62rem;font-weight:400">Antes de dormir</span></button>
      </div>
      <div class="form-grid" style="margin-bottom:8px">
        <div><p class="form-lbl">Data</p><input class="form-inp" id="f-data" type="date" value="${hoje}"></div>
        <div><p class="form-lbl">FC (bpm) — opcional</p><input class="form-inp" id="f-fc" type="number" placeholder="72"></div>
      </div>
      <p class="form-lbl">1ª leitura</p>
      <div class="form-grid3" style="margin-bottom:8px">
        <div><input class="form-inp" id="f-s1" type="number" placeholder="PAS" min="60" max="250"></div>
        <div><input class="form-inp" id="f-d1" type="number" placeholder="PAD" min="40" max="160"></div>
        <div><input class="form-inp" id="f-fc1" type="number" placeholder="FC (bpm)"></div>
      </div>
      <p class="form-lbl">2ª leitura (1-2 min depois)</p>
      <div class="form-grid3" style="margin-bottom:8px">
        <div><input class="form-inp" id="f-s2" type="number" placeholder="PAS" min="60" max="250"></div>
        <div><input class="form-inp" id="f-d2" type="number" placeholder="PAD" min="40" max="160"></div>
        <div><input class="form-inp" id="f-fc2" type="number" placeholder="FC (bpm)"></div>
      </div>
      <button class="btn-add" onclick="salvar()">✓ Registrar Medida</button>
    </div>
  `;

  /* Tabela por dia */
  const sorted  = [..._sess].sort((a,b)=>a.data.localeCompare(b.data)||a.criadoEm.localeCompare(b.criadoEm));
  const dias    = [...new Set(sorted.map(s=>s.data))].sort().reverse();
  const dia1    = [...new Set(sorted.map(s=>s.data))].sort()[0];

  const tabelaHTML = dias.length
    ? dias.map((dia, idx) => {
        const sessoesDia = sorted.filter(s=>s.data===dia);
        const isExcluido = dia === dia1;
        const reads = sessoesDia.flatMap(s=>[{sys:s.pas1,dia:s.pad1},{sys:s.pas2,dia:s.pad2}]).filter(r=>r.sys&&r.dia);
        const mS = reads.length ? Math.round(reads.reduce((a,r)=>a+r.sys,0)/reads.length) : null;
        const mD = reads.length ? Math.round(reads.reduce((a,r)=>a+r.dia,0)/reads.length) : null;
        const cl = mS ? classifMRPA(mS, mD) : null;

        const rows = sessoesDia.map(s => {
          const perCor = s.periodo==='manha' ? '#fef3c7:#d97706' : '#ede9fe:#7c3aed';
          const [bg,cor] = perCor.split(':');
          const mSes = Math.round((s.pas1+s.pas2)/2);
          const mDes = Math.round((s.pad1+s.pad2)/2);
          return `<div class="reading-row">
            <span class="per-tag" style="background:${bg};color:${cor}">${s.periodo==='manha'?'☀️ Manhã':'🌙 Tarde'}</span>
            <span style="text-align:center;color:#475569">${s.pas1}/${s.pad1}</span>
            <span style="text-align:center;color:#475569">${s.pas2}/${s.pad2}</span>
            <span style="text-align:center;font-weight:700;color:${cl?.cor||'#1e293b'}">${mSes}/${mDes}</span>
          </div>`;
        }).join('');

        return `<div class="day-group">
          <div class="day-hdr">
            <span class="day-lbl">${diaDaSemana(dia)} ${fmtData(dia)}</span>
            ${isExcluido ? '<span class="day-excl">Dia 1 — excluído</span>' : ''}
            ${mS&&!isExcluido ? `<span style="font-size:.7rem;font-weight:800;color:${cl?.cor}">${mS}/${mD}</span>` : ''}
            <button class="day-del" onclick="excluirDia('${dia}')">×</button>
          </div>
          <div style="display:grid;grid-template-columns:90px 1fr 1fr 1fr;padding:6px 14px 2px;font-size:.62rem;font-weight:700;color:#94a3b8">
            <span>Período</span><span style="text-align:center">Leit. 1</span><span style="text-align:center">Leit. 2</span><span style="text-align:center">Média</span>
          </div>
          ${rows}
        </div>`;
      }).join('')
    : `<p class="vazio">Nenhuma medida registrada. Inicie o protocolo de 5 dias.</p>`;

  document.getElementById('app').innerHTML = `
    ${resultHTML}
    ${protocolHTML}
    ${consHTML}
    ${formHTML}
    <p class="sec-title">Medidas por Dia (${dias.length} dias)</p>
    ${tabelaHTML}
    <div style="height:20px"></div>
  `;
}

function setPer(p) { _per = p; render(); }

async function salvar() {
  const data = document.getElementById('f-data')?.value;
  const s1   = parseFloat(document.getElementById('f-s1')?.value);
  const d1   = parseFloat(document.getElementById('f-d1')?.value);
  const s2   = parseFloat(document.getElementById('f-s2')?.value);
  const d2   = parseFloat(document.getElementById('f-d2')?.value);

  if (!data || !s1 || !d1 || !s2 || !d2) { showToast('Preencha as 2 leituras (PAS e PAD)'); return; }
  if (s1<60||s1>250||d1<40||d1>160) { showToast('Valores de PA inválidos'); return; }

  const sess = {
    id: Date.now().toString(36),
    data, periodo: _per,
    pas1:s1, pad1:d1,
    pas2:s2, pad2:d2,
    fc1: parseFloat(document.getElementById('f-fc1')?.value)||null,
    fc2: parseFloat(document.getElementById('f-fc2')?.value)||null,
    criadoEm: new Date().toISOString(),
  };
  _sess.push(sess);
  await dbSetConfig('mrpa_sess_'+_pid, _sess);
  showToast(`✓ ${_per==='manha'?'Manhã':'Tarde'} registrada — ${s1}/${d1} · ${s2}/${d2}`);
  render();
}

async function salvarCons() {
  const sys = parseFloat(document.getElementById('c-sys')?.value);
  const dia = parseFloat(document.getElementById('c-dia')?.value);
  if (!sys||!dia) return;
  _cons = { sys, dia, data: new Date().toISOString().slice(0,10) };
  await dbSetConfig('mrpa_cons_'+_pid, _cons);
  showToast('✓ PA de consultório salva');
  render();
}

async function excluirDia(dia) {
  _sess = _sess.filter(s=>s.data!==dia);
  await dbSetConfig('mrpa_sess_'+_pid, _sess);
  showToast('Dia removido');
  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
