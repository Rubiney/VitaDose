<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fitoterápicos — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <style>
    body { background:#f8fafc;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif }
    .topbar { display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100 }
    .back-btn { background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;color:#475569;border-radius:8px }
    .topbar-title { font-size:1rem;font-weight:700;color:#1e293b;flex:1 }
    .sec-title { font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;padding:0 16px;margin:14px 0 6px }

    .form-card { background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:14px }
    .form-row   { margin-bottom:10px }
    .form-lbl   { font-size:.67rem;font-weight:700;color:#64748b;margin-bottom:4px }
    .form-sel, .form-inp { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 12px;font-size:.82rem;color:#1e293b }
    .form-sel:focus,.form-inp:focus { outline:none;border-color:#16a34a }
    .form-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px }
    .btn-add { width:100%;background:#16a34a;color:#fff;border:none;border-radius:10px;padding:11px;font-size:.85rem;font-weight:800;cursor:pointer;margin-top:4px }

    /* Lista em uso */
    .uso-card { background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden }
    .uso-row  { display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #f1f5f9 }
    .uso-row:last-child { border-bottom:none }
    .uso-icon { font-size:1.2rem;flex-shrink:0 }
    .uso-nome { font-size:.82rem;font-weight:700;color:#1e293b;flex:1 }
    .uso-dose { font-size:.68rem;color:#94a3b8 }
    .uso-del  { background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:.95rem }
    .uso-del:hover { color:#ef4444 }

    /* Interações */
    .int-card { background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden }
    .int-row  { padding:12px 14px;border-bottom:1px solid #f1f5f9 }
    .int-row:last-child { border-bottom:none }
    .int-top  { display:flex;align-items:center;gap:8px;margin-bottom:5px }
    .int-sev  { width:8px;height:8px;border-radius:50%;flex-shrink:0 }
    .int-pair { font-size:.8rem;font-weight:800;color:#1e293b }
    .int-badge{ font-size:.62rem;font-weight:800;border-radius:5px;padding:2px 7px;margin-left:auto }
    .int-ef   { font-size:.75rem;color:#475569;line-height:1.4;margin-bottom:3px }
    .int-cond { font-size:.7rem;font-weight:700;color:#6366f1 }

    .vazio { text-align:center;color:#94a3b8;padding:20px;font-size:.82rem }
    .ok-box { background:#dcfce7;border-radius:12px;padding:14px;margin:0 16px 10px;text-align:center;font-size:.82rem;font-weight:700;color:#16a34a }

    .mecanismo-tag { display:inline-block;background:#f1f5f9;border-radius:5px;padding:2px 8px;font-size:.62rem;font-weight:700;color:#64748b;margin-top:4px }

    @media print { .topbar,.btn-add,.uso-del,.back-btn { display:none } }
  </style>
</head>

    { d:/insulina|glibenclamida|metformin/i, n:1, ef:'Leve efeito hipoglicemiante (relatos)', c:'Monitorar glicemia com doses altas.' },
    { d:/nifedipin|felodipino/i, n:1, ef:'Possível potencialização do efeito hipotensor', c:'Monitorar pressão arterial.' },
  ],
  espinheiro: [
    { d:/digoxin/i, n:2, ef:'Espinheiro-alvo potencializa efeito cronotrópico e inotrópico da digoxina — toxicidade', c:'Monitorar digitalemia e FC.' },
    { d:/enalapril|captopril|losartan|metoprolol|atenolol|amlodipino|nifedipin/i, n:2, ef:'Efeito hipotensor e bradicardizante aditivo', c:'Monitorar PA e FC. Risco de hipotensão excessiva.' },
    { d:/sildenafil|tadalafil|vardenafil/i, n:2, ef:'Hipotensão aditiva', c:'Evitar associação.' },
  ],
  camomila: [
    { d:/warfar|acenocoumar/i, n:1, ef:'Cumarina natural da camomila pode potencializar efeito anticoagulante', c:'Monitorar INR com uso intenso de chá de camomila.' },
    { d:/alprazolam|clonazepam|diazepam/i, n:1, ef:'Leve potencialização da sedação', c:'Observar sedação excessiva.' },
    { d:/ciclosporin/i, n:1, ef:'Possível inibição de CYP3A4 pela apigenina (componente da camomila)', c:'Monitorar nível sérico de ciclosporina.' },
  ],
  gugurana: [
    { d:/aspirina|aas/i, n:1, ef:'Cafeína do guaraná pode aumentar agregação plaquetária', c:'Usar com moderação em antiagregados.' },
    { d:/atenolol|metoprolol|propranolol/i, n:2, ef:'Cafeína antagoniza efeito bradicardizante e hipotensor dos beta-bloqueadores', c:'Evitar guaraná em doses altas em hipertensos.' },
    { d:/quinolon|fluoroquinolon/i, n:1, ef:'Fluoroquinolonas inibem metabolismo da cafeína (CYP1A2) — toxicidade cafeínica', c:'Reduzir ingestão de cafeína durante antibioticoterapia com quinolonas.' },
    { d:/litio/i, n:2, ef:'Cafeína aumenta clearance renal de lítio — possível queda dos níveis abaixo do terapêutico', c:'Monitorar litemias.' },
  ],
  primula: [
    { d:/fenitoina|carbamazep|fenobarbital|valproat/i, n:2, ef:'Ácido gama-linolênico da prímula pode reduzir limiar convulsivo e antagonizar anticonvulsivantes', c:'Evitar em epilépticos.' },
    { d:/warfar|aspirina|clopidogrel/i, n:1, ef:'Leve efeito antiagregante aditivo', c:'Monitorar sangramento.' },
  ],
  sawpalm: [
    { d:/warfar|acenocoumar/i, n:1, ef:'Possível efeito antiagregante fraco', c:'Monitorar INR.' },
    { d:/finasterida|dutasterida/i, n:1, ef:'Mecanismo de ação similar — pode potencializar efeito antiandrogênico', c:'Monitorar eficácia clínica.' },
    { d:/contraceptiv|antiandrogeno/i, n:1, ef:'Efeito antiandrogênico fraco pode interagir com terapia hormonal', c:'Monitorar.' },
  ],
};

function norm(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

let _pid   = null;
let _pac   = null;
let _meds  = [];
let _fitoList = [];

async function init() {
  _pid = getActivePacienteId();
  if (!_pid) { window.location.href='index.html'; return; }
  _pac = await dbGet('pacientes', _pid);
  const hoje = new Date().toISOString().slice(0,10);
  const todos = await dbGetAll('medicamentos');
  _meds = todos.filter(m => m.pacienteId===_pid && m.ativo!==false && (!m.dataFim||m.dataFim>=hoje));
  _fitoList = (await dbGetConfig('fitoterapicos_'+_pid)) || [];
  render();
}

function checkarInteracoes() {
  const achados = [];
  for (const fito of _fitoList) {
    const ints = _INTS[fito.catId] || [];
    for (const int of ints) {
      for (const med of _meds) {
        if (int.d.test(med.nome)) {
          achados.push({
            herb: fito.nome,
            med:  med.nome,
            nivel: int.n,
            ef:   int.ef,
            c:    int.c,
          });
        }
      }
    }
  }
  return achados.sort((a,b) => b.nivel - a.nivel);
}

function nivelCor(n) {
  return n===3 ? { cor:'#dc2626', bg:'#fee2e2', lbl:'Grave' }
       : n===2 ? { cor:'#ea580c', bg:'#ffedd5', lbl:'Moderada' }
               : { cor:'#d97706', bg:'#fef3c7', lbl:'Leve' };
}

function render() {
  const ints = checkarInteracoes();
  const catOpts = _CAT.map(c => `<option value="${c.id}">${c.icon} ${c.nome}</option>`).join('');

  const emUsoHTML = _fitoList.length
    ? _fitoList.map(f => {
        const cat = _CAT.find(c=>c.id===f.catId)||{icon:'🌿',ind:'',mec:''};
        return `<div class="uso-row">
          <span class="uso-icon">${cat.icon}</span>
          <div style="flex:1;min-width:0">
            <p class="uso-nome">${f.nome}</p>
            <p class="uso-dose">${[f.dose,f.freq].filter(Boolean).join(' · ')}${cat.ind?` · ${cat.ind}`:''}</p>
            ${cat.mec ? `<span class="mecanismo-tag">${cat.mec}</span>` : ''}
          </div>
          <button class="uso-del" onclick="remover('${f.id}')">×</button>
        </div>`;
      }).join('')
    : `<p class="vazio">Nenhum fitoterápico ou suplemento registrado.</p>`;

  const intsHTML = ints.length
    ? ints.map(i => {
        const nv = nivelCor(i.nivel);
        return `<div class="int-row">
          <div class="int-top">
            <span class="int-sev" style="background:${nv.cor}"></span>
            <span class="int-pair">${i.herb} + ${i.med}</span>
            <span class="int-badge" style="background:${nv.bg};color:${nv.cor}">${nv.lbl}</span>
          </div>
          <p class="int-ef">${i.ef}</p>
          <p class="int-cond">→ ${i.c}</p>
        </div>`;
      }).join('')
    : _fitoList.length
      ? `<div class="ok-box">✓ Nenhuma interação detectada entre os fitoterápicos/suplementos registrados e os medicamentos ativos.</div>`
      : `<p class="vazio">Adicione fitoterápicos acima para verificar interações.</p>`;

  document.getElementById('app').innerHTML = `
    <p class="sec-title" style="margin-top:10px">Adicionar — ${_pac?.nome||'Paciente'}</p>
    <div class="form-card">
      <div class="form-row">
        <p class="form-lbl">Fitoterápico / Suplemento</p>
        <select class="form-sel" id="f-cat" onchange="onCatChange()">
          ${catOpts}
        </select>
      </div>
      <div id="outro-wrap" style="display:none" class="form-row">
        <p class="form-lbl">Nome (outro)</p>
        <input class="form-inp" id="f-outro" placeholder="Ex: Própolis, Astragalus...">
      </div>
      <div class="form-grid">
        <div class="form-row" style="margin:0">
          <p class="form-lbl">Dose</p>
          <input class="form-inp" id="f-dose" placeholder="Ex: 500mg">
        </div>
        <div class="form-row" style="margin:0">
          <p class="form-lbl">Frequência</p>
          <input class="form-inp" id="f-freq" placeholder="Ex: 2×/dia">
        </div>
      </div>
      <button class="btn-add" onclick="adicionar()">+ Adicionar</button>
    </div>

    <p class="sec-title">Em uso (${_fitoList.length})</p>
    <div class="uso-card">${emUsoHTML}</div>

    <p class="sec-title">Interações com Medicamentos (${ints.length})</p>
    <div class="int-card">${intsHTML}</div>

    <p style="font-size:.67rem;color:#94a3b8;padding:4px 16px 20px;line-height:1.5">
      Base de dados inclui ${Object.keys(_INTS).length} fitoterápicos e suplementos. Interações verificadas contra os medicamentos ativos do paciente. Dados de apoio à decisão clínica — não substitui avaliação profissional.
    </p>
  `;
}

function onCatChange() {
  const v = document.getElementById('f-cat')?.value;
  document.getElementById('outro-wrap').style.display = v==='outro' ? '' : 'none';
}

async function adicionar() {
  const catId = document.getElementById('f-cat')?.value;
  const cat   = _CAT.find(c=>c.id===catId);
  const outro = document.getElementById('f-outro')?.value.trim();
  const nome  = catId==='outro' ? (outro||'Outro') : (cat?.nome||catId);
  const dose  = document.getElementById('f-dose')?.value.trim();
  const freq  = document.getElementById('f-freq')?.value.trim();

  if (_fitoList.find(f => norm(f.nome)===norm(nome))) {
    showToast('Já está na lista.'); return;
  }

  _fitoList.push({ id:Date.now().toString(36), catId, nome, dose, freq, criadoEm:new Date().toISOString() });
  await dbSetConfig('fitoterapicos_'+_pid, _fitoList);
  showToast('✓ Adicionado');
  render();
}

async function remover(id) {
  _fitoList = _fitoList.filter(f=>f.id!==id);
  await dbSetConfig('fitoterapicos_'+_pid, _fitoList);
  showToast('Removido');
  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
