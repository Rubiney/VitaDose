<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Farmacêutico — VitaDose</title>
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: #1a1a2e;
      background: #f5f5f5;
    }

    /* ── Barra de ação (no-print) ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #0f3460;
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .toolbar-title { color: #fff; font-size: .9rem; font-weight: 700; }
    .toolbar-btns  { display: flex; gap: 10px; }
    .btn-print {
      background: #c9a84c; color: #0f3460; border: none;
      padding: 8px 18px; border-radius: 8px; font-weight: 700;
      font-size: .85rem; cursor: pointer;
    }
    .btn-fechar {
      background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.4);
      padding: 7px 14px; border-radius: 8px; font-size: .82rem; cursor: pointer;
    }

    /* ── Documento ── */
    .documento {
      max-width: 780px;
      margin: 60px auto 40px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      padding: 40px 44px 50px;
    }

    /* ── Cabeçalho ── */
    .doc-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 3px solid #0f3460;
      margin-bottom: 24px;
    }
    .doc-logo { font-size: 1.5rem; font-weight: 900; color: #0f3460; letter-spacing: -.02em; }
    .doc-logo span { color: #c9a84c; }
    .doc-meta { text-align: right; font-size: .78rem; color: #666; }
    .doc-meta strong { display: block; font-size: .95rem; color: #0f3460; margin-bottom: 2px; }

    /* ── Seções ── */
    .sec {
      margin-bottom: 24px;
      break-inside: avoid;
    }
    .sec-title {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; color: #0f3460;
      border-bottom: 1.5px solid #e2e8f0;
      padding-bottom: 5px; margin-bottom: 12px;
    }

    /* ── Grid dados paciente ── */
    .pac-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px 16px;
    }
    .pac-field label { font-size: .7rem; font-weight: 700; color: #888; text-transform: uppercase; display: block; }
    .pac-field span  { font-size: .88rem; color: #1a1a2e; font-weight: 600; }

    /* ── Box alergia ── */
    .alergia-box {
      background: #fff5f5; border: 2px solid #fc8181; border-radius: 8px;
      padding: 10px 14px; margin-top: 12px;
    }
    .alergia-box-title { font-size: .72rem; font-weight: 800; color: #c53030; text-transform: uppercase; margin-bottom: 4px; }
    .alergia-box p     { font-size: .88rem; color: #742a2a; }

    /* ── Tabela de medicamentos ── */
    .med-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .med-table th {
      background: #0f3460; color: #fff;
      padding: 7px 10px; text-align: left; font-weight: 700; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .med-table td { padding: 7px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
    .med-table tr:last-child td { border-bottom: none; }
    .med-table tr:nth-child(even) td { background: #f8fafc; }
    .badge-perfil {
      display: inline-block; font-size: .65rem; font-weight: 700;
      padding: 1px 7px; border-radius: 10px; margin-left: 4px;
      vertical-align: middle;
    }

    /* ── Alertas ── */
    .alerta-item {
      border-radius: 8px; padding: 10px 13px; margin-bottom: 8px;
      border-left: 4px solid;
    }
    .alerta-vermelho  { background: #fff5f5; border-color: #fc8181; }
    .alerta-laranja   { background: #fffaf0; border-color: #f6ad55; }
    .alerta-amarelo   { background: #fffff0; border-color: #ecc94b; }
    .alerta-azul      { background: #ebf8ff; border-color: #63b3ed; }
    .alerta-verde     { background: #f0fff4; border-color: #68d391; }
    .alerta-titulo    { font-size: .78rem; font-weight: 700; margin-bottom: 3px; }
    .alerta-desc      { font-size: .8rem; color: #444; line-height: 1.45; }
    .alerta-alt       { font-size: .76rem; color: #276749; margin-top: 4px; }

    /* ── TFG box ── */
    .tfg-box {
      display: inline-flex; align-items: center; gap: 12px;
      border-radius: 8px; padding: 10px 16px; margin-top: 10px;
      border: 1.5px solid;
    }
    .tfg-valor { font-size: 1.4rem; font-weight: 900; }
    .tfg-desc  { font-size: .78rem; }

    /* ── Rodapé ── */
    .doc-footer {
      margin-top: 32px; padding-top: 14px;
      border-top: 1.5px solid #e2e8f0;
      font-size: .7rem; color: #999; text-align: center; line-height: 1.6;
    }

    /* ── Print ── */
    @media print {
      body { background: #fff; font-size: 12px; }
      .toolbar { display: none !important; }
      .documento { margin: 0; box-shadow: none; padding: 24px 28px 32px; max-width: 100%; }
      .sec { break-inside: avoid; page-break-inside: avoid; }
      .med-table th { background: #0f3460 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .alerta-item, .alergia-box, .tfg-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

  <!-- Toolbar (não imprime) -->
  <div class="toolbar no-print">
    <span class="toolbar-title">📄 Relatório Farmacêutico — VitaDose</span>
    <div class="toolbar-btns">
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn-fechar" onclick="window.close()">✕ Fechar</button>
    </div>
  </div>

  <!-- Documento -->
  <div class="documento" id="relatorio">
    <p style="text-align:center;color:#888;padding:40px 0">⏳ Gerando relatório...</p>
  </div>

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ajusterenal.js"></script>
  <script src="js/beers.js"></script>
  <script src="js/interacoes.js"></script>
  <script src="js/duplicidade.js"></script>
  <script src="js/anticolin.js"></script>
  <script src="js/laboratorio.js"></script>
  <script src="js/adesao.js"></script>
  <script src="js/contraindicacoes.js"></script>
  <script src="js/lab_farma.js"></script>
  <script src="js/risco.js"></script>
  <script src="js/reacoes.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', gerarRelatorio);

  async function gerarRelatorio() {
    const pid = getActivePacienteId();
    if (!pid) {
      document.getElementById('relatorio').innerHTML =
        '<p style="text-align:center;color:#c53030;padding:40px">⚠️ Nenhum paciente ativo. Acesse o VitaDose e selecione um paciente.</p>';
      return;
    }

    const pac  = await dbGet('pacientes', pid);
    if (!pac) {
      document.getElementById('relatorio').innerHTML =
        '<p style="text-align:center;color:#c53030;padding:40px">⚠️ Paciente não encontrado.</p>';
      return;
    }

    const todos = await dbGetByIndex('medicamentos', 'pacienteId', pid);
    const hj    = hoje();
    const meds  = todos.filter(m => m.ativo !== false && (!m.dataFim || m.dataFim >= hj));

    const agora    = new Date();
    const dataEmissao = agora.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
    const horaEmissao = agora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

    /* ── Dados do paciente ── */
    const perfilLabel = { adulto:'Adulto', idoso:'Idoso (60+)', pediatrico:'Pediátrico', renal:'Insuf. Renal', hepatico:'Insuf. Hepática', gestante:'Gestante' };
    const tfg    = pac.tfg ? pac.tfg : null;
    const estTFG = tfg ? estagioRenal(tfg) : null;
    const isIdoso = pacienteIdoso(pac);

    /* ── Interações / alertas alimentares ── */
    const alertas = (typeof gerarAlertas === 'function' && meds.length)
      ? gerarAlertas(meds) : [];
    const interacoes = alertas.filter(a => a.tipo === 'interacao');
    const alimentares = alertas.filter(a => a.tipo === 'alimentacao');

    /* ── Duplicidade terapêutica ── */
    const dups = (typeof verificarDuplicidade === 'function' && meds.length >= 2)
      ? verificarDuplicidade(meds) : [];

    /* ── Carga Anticolinérgica ── */
    const acb = (typeof calcularCargaAnticolin === 'function' && meds.length)
      ? calcularCargaAnticolin(meds) : null;

    /* ── Polimedicação ── */
    const polifTotal = meds.length;
    const polifNivel = polifTotal >= 10 ? 'grave' : polifTotal >= 5 ? 'moderado' : null;

    /* ── Adesão Terapêutica ── */
    let adesaoData = [];
    if (typeof calcularAdesao === 'function') {
      let todasDoses = [];
      try { todasDoses = await dbGetAll('doses'); } catch(e) {}
      adesaoData = meds
        .filter(m => m.horarios && m.horarios.length)
        .map(m => ({ nome: m.nome, ad: calcularAdesao(m, todasDoses) }))
        .filter(x => x.ad);
    }

    /* ── Contraindicações por Patologia ── */
    const cisRelatorio = (typeof verificarContraindicacoes === 'function' && pac.condicoes && pac.condicoes.length)
      ? verificarContraindicacoes(meds, pac.condicoes) : [];

    /* ── Histórico Laboratorial ── */
    let labRecords = [];
    try { labRecords = await dbGetByIndex('laboratorio', 'pacienteId', pid); } catch(e) {}
    const labPorTipo = {};
    for (const r of labRecords) {
      if (!labPorTipo[r.tipo]) labPorTipo[r.tipo] = [];
      labPorTipo[r.tipo].push(r);
    }
    // Ordena cada tipo por data e mantém o mais recente
    for (const tipo of Object.keys(labPorTipo)) {
      labPorTipo[tipo].sort((a,b) => b.data.localeCompare(a.data));
    }

    /* ── Últimos exames por tipo (reutilizado em lab-farma e risco) ── */
    const ultimosLabRel = Object.fromEntries(
      Object.entries(labPorTipo).map(([tipo, lista]) =>
        [tipo, { valor: lista[0].valor, data: lista[0].data }]
      )
    );

    /* ── Interações Fármaco-Laboratório ── */
    const labFarmaAlerts = (typeof verificarLabFarma === 'function' && Object.keys(ultimosLabRel).length)
      ? verificarLabFarma(ultimosLabRel, meds) : [];

    /* ── Score de Risco Farmacoterapêutico ── */
    const riscoRel = (typeof calcularRiscoFarmacoterapeutico === 'function' && meds.length)
      ? calcularRiscoFarmacoterapeutico({ medicamentos: meds, paciente: pac, ultimosLab: ultimosLabRel, tfg: pac.tfg || null })
      : null;

    /* ── Beers ── */
    const beersAlertas = [];
    if (isIdoso && typeof buscarBeers === 'function') {
      for (const m of meds) {
        const b = buscarBeers(m.nome);
        if (b) beersAlertas.push({ med: m.nome, ...b });
      }
    }

    /* ── Ajuste renal ── */
    const renalAlertas = [];
    if (tfg && typeof buscarAjusteRenal === 'function') {
      for (const m of meds) {
        const r = buscarAjusteRenal(m.nome, tfg);
        if (r) renalAlertas.push({ med: m.nome, ...r });
      }
    }

    /* ── Reações adversas com observações pessoais ── */
    const reacoesNotaveis = meds.filter(m => m.reacoesObs && m.reacoesObs.trim());

    /* ── HTML ── */
    const riscoBeersCorMap = {
      alto:     { bg:'#fff5f5', borda:'#fc8181', cor:'#c53030' },
      moderado: { bg:'#fffaf0', borda:'#f6ad55', cor:'#c05621' },
      cautela:  { bg:'#fffff0', borda:'#ecc94b', cor:'#975a16' },
    };
    const riscoRenalCorMap = {
      contraindicado: { bg:'#fff5f5', borda:'#fc8181', cor:'#c53030', icone:'🔴' },
      reduzir:        { bg:'#fffaf0', borda:'#f6ad55', cor:'#c05621', icone:'🟠' },
      cautela:        { bg:'#fffff0', borda:'#ecc94b', cor:'#975a16', icone:'🟡' },
    };

    const html = `
      <!-- Cabeçalho -->
      <div class="doc-header">
        <div>
          <div class="doc-logo">Vita<span>Dose</span></div>
          <div style="font-size:.78rem;color:#666;margin-top:3px">Relatório Farmacoterapêutico</div>
        </div>
        <div class="doc-meta">
          <strong>Documento de apoio clínico</strong>
          Emitido em ${dataEmissao} às ${horaEmissao}<br>
          Uso exclusivo do profissional de saúde
        </div>
      </div>

      <!-- Dados do Paciente -->
      <div class="sec">
        <p class="sec-title">👤 Dados do Paciente</p>
        <div class="pac-grid">
          <div class="pac-field"><label>Nome</label><span>${pac.nome || '—'}</span></div>
          <div class="pac-field"><label>Perfil</label><span>${perfilLabel[pac.perfil] || pac.perfil || '—'}</span></div>
          <div class="pac-field"><label>Cuidador</label><span>${pac.cuidador || '—'}</span></div>
          ${pac.idadePac ? `<div class="pac-field"><label>Idade</label><span>${pac.idadePac} anos</span></div>` : ''}
          ${pac.pesoPac  ? `<div class="pac-field"><label>Peso</label><span>${pac.pesoPac} kg</span></div>` : ''}
          ${pac.sexoPac  ? `<div class="pac-field"><label>Sexo</label><span>${pac.sexoPac === 'F' ? 'Feminino' : 'Masculino'}</span></div>` : ''}
          ${pac.creatinina ? `<div class="pac-field"><label>Creatinina</label><span>${pac.creatinina} mg/dL</span></div>` : ''}
        </div>

        ${tfg && estTFG ? `
          <div class="tfg-box" style="background:${estTFG.cor}12;border-color:${estTFG.cor}">
            <span class="tfg-valor" style="color:${estTFG.cor}">${tfg} mL/min</span>
            <span class="tfg-desc" style="color:${estTFG.cor}">
              <strong>TFG — Estágio ${estTFG.estadio}</strong><br>${estTFG.descricao}<br>
              <span style="font-size:.68rem;opacity:.8">Cockcroft-Gault</span>
            </span>
          </div>` : ''}

        ${pac.condicoesClinicas ? `
          <div style="margin-top:14px">
            <div style="font-size:.7rem;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:4px">Doenças e condições diagnosticadas</div>
            <p style="font-size:.88rem;color:#1a1a2e;line-height:1.55">${pac.condicoesClinicas}</p>
          </div>` : ''}

        ${pac.alergias ? `
          <div class="alergia-box">
            <p class="alergia-box-title">🚨 Alergias a Medicamentos e Alimentos</p>
            <p>${pac.alergias}</p>
          </div>` : ''}
      </div>

      <!-- Score de Risco Farmacoterapêutico -->
      ${riscoRel ? `
        <div class="sec" style="background:${riscoRel.bg};border:2px solid ${riscoRel.borda};border-radius:10px;padding:16px 20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${riscoRel.breakdown.length ? '12px' : '0'}">
            <div>
              <p class="sec-title" style="color:${riscoRel.cor};margin:0 0 4px">${riscoRel.icone} Risco Farmacoterapêutico: ${riscoRel.label}</p>
              <p style="font-size:.78rem;color:#555;margin:0">
                Pontuação integrada — ${riscoRel.pontos} pts
                ${riscoRel.nivel === 'baixo' ? '· Farmacoterapia sem alertas clínicos significativos.'
                  : riscoRel.nivel === 'moderado' ? '· Revisar itens com o médico prescritor.'
                  : riscoRel.nivel === 'alto' ? '· Intervenção farmacêutica recomendada.'
                  : '· Reavaliação urgente da farmacoterapia.'}
              </p>
            </div>
            <div style="background:${riscoRel.cor};color:#fff;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;flex-shrink:0">
              ${riscoRel.pontos}
            </div>
          </div>
          ${riscoRel.breakdown.length > 0 ? `
            <div style="border-top:1px solid ${riscoRel.borda};padding-top:10px">
              <p style="font-size:.72rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Contribuições por categoria</p>
              <table style="width:100%;border-collapse:collapse;font-size:.8rem">
                ${riscoRel.breakdown.map(b => `
                  <tr>
                    <td style="padding:3px 0;color:#333">${b.icone} ${b.categoria}</td>
                    <td style="color:#555;font-size:.75rem;padding:3px 8px">${b.detalhe}</td>
                    <td style="text-align:right;font-weight:700;color:${riscoRel.cor};white-space:nowrap">+${b.pontos} pts</td>
                  </tr>`).join('')}
                <tr style="border-top:1px solid ${riscoRel.borda}">
                  <td colspan="2" style="padding-top:5px;font-weight:700;font-size:.8rem">Total</td>
                  <td style="padding-top:5px;text-align:right;font-weight:800;color:${riscoRel.cor}">= ${riscoRel.pontos} pts</td>
                </tr>
              </table>
            </div>` : ''}
        </div>` : ''}

      <!-- Medicamentos -->
      <div class="sec">
        <p class="sec-title">💊 Medicamentos em Uso (${meds.length})</p>
        ${meds.length === 0
          ? '<p style="color:#888;font-size:.85rem">Nenhum medicamento cadastrado.</p>'
          : `<table class="med-table">
              <thead>
                <tr>
                  <th style="width:32%">Medicamento</th>
                  <th style="width:14%">Dose</th>
                  <th style="width:16%">Forma</th>
                  <th style="width:22%">Horários</th>
                  <th style="width:16%">Estoque</th>
                </tr>
              </thead>
              <tbody>
                ${meds.map(m => {
                  const horarios = (m.horarios || []).join(' · ') || '—';
                  const estoque  = m.estoque != null ? `${m.estoque} ${m.unidadeEstoque || 'un.'}` : '—';
                  const beersOk  = isIdoso && typeof buscarBeers === 'function' && buscarBeers(m.nome);
                  const renalOk  = tfg && typeof buscarAjusteRenal === 'function' && buscarAjusteRenal(m.nome, tfg);
                  return `<tr>
                    <td>
                      <strong>${m.nome}</strong>
                      ${beersOk ? `<span class="badge-perfil" style="background:#fee2e2;color:#991b1b">Beers</span>` : ''}
                      ${renalOk ? `<span class="badge-perfil" style="background:#ffedd5;color:#9a3412">Renal</span>` : ''}
                    </td>
                    <td>${m.dose || '—'}</td>
                    <td>${m.forma || '—'}</td>
                    <td>${horarios}</td>
                    <td>${estoque}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>`
        }
      </div>

      <!-- Duplicidade Terapêutica -->
      ${dups.length ? `
        <div class="sec">
          <p class="sec-title">🔵 Duplicidade Terapêutica</p>
          <p style="font-size:.75rem;color:#666;margin-bottom:10px">Dois ou mais medicamentos da mesma classe farmacológica identificados na prescrição.</p>
          ${dups.map(d => {
            const nivelCores = {
              grave:    { bg:'#fff5f5', borda:'#f87171', cor:'#c53030' },
              moderado: { bg:'#fffaf0', borda:'#f6ad55', cor:'#c05621' },
            };
            const c = nivelCores[d.nivel] || nivelCores.moderado;
            return `<div class="alerta-item" style="background:${c.bg};border-left-color:${c.borda}">
              <p class="alerta-titulo" style="color:${c.cor}">🔵 ${d.classe}</p>
              <p class="alerta-desc"><strong>Medicamentos:</strong> ${d.meds.join(' · ')}</p>
              <p class="alerta-desc" style="margin-top:4px">${d.aviso}</p>
            </div>`;
          }).join('')}
        </div>` : ''}

      <!-- Alertas Critérios de Beers -->
      ${beersAlertas.length ? `
        <div class="sec">
          <p class="sec-title">🔴 Critérios de Beers — Medicamentos Potencialmente Inapropriados</p>
          <p style="font-size:.75rem;color:#666;margin-bottom:10px">Fonte: American Geriatrics Society Beers Criteria® 2023. Paciente idoso — risco aumentado de efeitos adversos.</p>
          ${beersAlertas.map(b => {
            const c = riscoBeersCorMap[b.risco] || riscoBeersCorMap.cautela;
            const label = {alto:'Alto Risco',moderado:'Risco Moderado',cautela:'Cautela'}[b.risco];
            return `<div class="alerta-item" style="background:${c.bg};border-left-color:${c.borda}">
              <p class="alerta-titulo" style="color:${c.cor}">${b.med} — ${label} · ${b.categoria}</p>
              <p class="alerta-desc">${b.motivo}</p>
              ${b.alternativa ? `<p class="alerta-alt">✅ Alternativa: ${b.alternativa}</p>` : ''}
            </div>`;
          }).join('')}
        </div>` : ''}

      <!-- Alertas Ajuste Renal -->
      ${renalAlertas.length ? `
        <div class="sec">
          <p class="sec-title">🫘 Ajuste Renal — Recomendações por TFG (${tfg} mL/min)</p>
          ${renalAlertas.map(r => {
            const c = riscoRenalCorMap[r.nivel] || riscoRenalCorMap.cautela;
            return `<div class="alerta-item" style="background:${c.bg};border-left-color:${c.borda}">
              <p class="alerta-titulo" style="color:${c.cor}">${c.icone} ${r.med}</p>
              <p class="alerta-desc">${r.texto}</p>
            </div>`;
          }).join('')}
        </div>` : ''}

      <!-- Interações Medicamentosas -->
      ${interacoes.length ? `
        <div class="sec">
          <p class="sec-title">⚠️ Interações Medicamentosas e Alertas Clínicos</p>
          ${interacoes.map(a => `
            <div class="alerta-item alerta-laranja">
              <p class="alerta-titulo" style="color:#9a3412">${a.titulo}</p>
              <p class="alerta-desc">${a.desc}</p>
            </div>`).join('')}
        </div>` : ''}

      <!-- Alertas Alimentares -->
      ${alimentares.length ? `
        <div class="sec">
          <p class="sec-title">🥗 Orientações Alimentares e de Horário</p>
          ${alimentares.map(a => `
            <div class="alerta-item alerta-azul">
              <p class="alerta-titulo" style="color:#1a365d">${a.titulo}</p>
              <p class="alerta-desc">${a.desc}</p>
            </div>`).join('')}
        </div>` : ''}

      <!-- Observações Pessoais de Reações Adversas -->
      ${reacoesNotaveis.length ? `
        <div class="sec">
          <p class="sec-title">📝 Observações Clínicas Pessoais</p>
          ${reacoesNotaveis.map(m => `
            <div class="alerta-item alerta-amarelo">
              <p class="alerta-titulo" style="color:#744210">${m.nome}</p>
              <p class="alerta-desc">${m.reacoesObs}</p>
            </div>`).join('')}
        </div>` : ''}

      <!-- Doenças Sazonais -->
      ${pac.doencasSazonais && Object.keys(pac.doencasSazonais).length ? `
        <div class="sec">
          <p class="sec-title">🍂 Doenças Sazonais e Medicamentos Habituais</p>
          ${Object.entries(pac.doencasSazonais).map(([d, med]) => `
            <div style="display:flex;gap:12px;border-bottom:1px solid #e2e8f0;padding:7px 0">
              <span style="font-weight:700;font-size:.85rem;min-width:160px">${d}</span>
              <span style="font-size:.83rem;color:#444">${med || '—'}</span>
            </div>`).join('')}
        </div>` : ''}

      <!-- Suplementação -->
      ${pac.suplementacao && Object.keys(pac.suplementacao).length ? `
        <div class="sec">
          <p class="sec-title">💊 Suplementação</p>
          <table class="med-table">
            <thead><tr><th>Suplemento</th><th>Dose / Marca</th><th>Horário / Observação</th></tr></thead>
            <tbody>
              ${Object.entries(pac.suplementacao).map(([nome, dados]) => `
                <tr>
                  <td><strong>${nome}</strong></td>
                  <td>${dados.dose || '—'}</td>
                  <td>${dados.obs || '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>` : ''}

      <!-- Orientações Nutricionais -->
      ${pac.orientacoesNutricionais ? `
        <div class="sec">
          <p class="sec-title">🥗 Orientações Nutricionais</p>
          <p style="font-size:.88rem;line-height:1.6;white-space:pre-wrap">${pac.orientacoesNutricionais}</p>
        </div>` : ''}

      <!-- Curativos e Pomadas -->
      ${pac.curativosPomadas ? `
        <div class="sec">
          <p class="sec-title">🩹 Curativos, Pomadas e Uso Tópico</p>
          <p style="font-size:.88rem;line-height:1.6;white-space:pre-wrap">${pac.curativosPomadas}</p>
        </div>` : ''}

      <!-- Carga Anticolinérgica -->
      ${acb && acb.total > 0 ? `
        <div class="sec">
          <p class="sec-title">🧠 Carga Anticolinérgica (ACB Scale)</p>
          <p style="font-size:.75rem;color:#666;margin-bottom:10px">
            Escore Total: <strong style="font-size:1.1rem;color:${acb.nivel==='alto'?'#dc2626':acb.nivel==='moderado'?'#c2410c':'#92400e'}">${acb.total}</strong> ponto${acb.total>1?'s':''} —
            Risco ${acb.nivel.toUpperCase()}
            ${acb.nivel==='alto'?'(≥ 6 pts)':acb.nivel==='moderado'?'(3–5 pts)':'(1–2 pts)'}
          </p>
          <table class="med-table">
            <thead><tr><th>Medicamento</th><th>Score ACB</th><th>Classe Farmacológica</th></tr></thead>
            <tbody>
              ${acb.itens.map(i => `<tr>
                <td>${i.nome}</td>
                <td style="font-weight:800;color:${i.score===3?'#dc2626':i.score===2?'#c2410c':'#92400e'}">${i.score}/3</td>
                <td>${i.classe}</td>
              </tr>`).join('')}
            </tbody>
          </table>
          <p style="font-size:.72rem;color:#888;margin-top:8px">
            ACB ≥ 3: risco aumentado de declínio cognitivo, delirium e quedas em idosos (Boustani et al., 2012).
            Ref: Anticholinergic Cognitive Burden Scale · AGS Beers Criteria® 2023.
          </p>
        </div>` : ''}

      <!-- Polimedicação -->
      ${polifNivel ? `
        <div class="sec">
          <p class="sec-title">${polifNivel==='grave'?'🔴':'🟠'} ${polifNivel==='grave'?'Polifarmácia Grave':'Polimedicação'} — ${polifTotal} Medicamentos</p>
          <div class="alerta-item" style="background:${polifNivel==='grave'?'#fff5f5':'#fffaf0'};border-left-color:${polifNivel==='grave'?'#f87171':'#f6ad55'}">
            <p class="alerta-desc">
              ${polifNivel==='grave'
                ? `Paciente em uso de <strong>${polifTotal} medicamentos</strong> simultaneamente. Polifarmácia grave (≥ 10) está associada a aumento de interações, reações adversas, baixa adesão, quedas e hospitalização. <strong>Recomenda-se revisão farmacoterapêutica completa pelo farmacêutico clínico.</strong>`
                : `Paciente em uso de <strong>${polifTotal} medicamentos</strong> simultaneamente (polimedicação ≥ 5). Avaliar necessidade de cada item, possíveis duplicidades e interações. Considerar deprescricão de itens desnecessários.`}
            </p>
          </div>
          <p style="font-size:.72rem;color:#888;margin-top:8px">
            Ref: Masnoon N et al. What is polypharmacy? A systematic review of definitions. BMC Geriatr. 2017.
          </p>
        </div>` : ''}

      <!-- Contraindicações por Patologia -->
      ${cisRelatorio.length > 0 ? `
        <div class="sec">
          <p class="sec-title">⛔ Contraindicações por Patologia</p>
          <p style="font-size:.75rem;color:#666;margin-bottom:10px">
            Condições do paciente: <strong>${(pac.condicoes || []).map(c => (CONDICOES_LABELS||{})[c] || c).join(' · ')}</strong>
          </p>
          ${cisRelatorio.map(ci => {
            const isGrave = ci.risco === 'grave';
            return `<div class="alerta-item" style="background:${isGrave?'#fff5f5':'#fff7ed'};border-left-color:${isGrave?'#f87171':'#fb923c'}">
              <p style="font-weight:700;color:${isGrave?'#991b1b':'#9a3412'};margin-bottom:4px">
                ${isGrave?'🔴 CONTRAINDICAÇÃO GRAVE':'🟠 CAUTELA MODERADA'} — ${ci.med} + ${(CONDICOES_LABELS||{})[ci.condicoes[0]]||ci.condicoes[0]}
              </p>
              <p style="font-size:.82rem;color:${isGrave?'#991b1b':'#9a3412'};line-height:1.5;margin-bottom:6px">${ci.motivo}</p>
              <p style="font-size:.8rem;color:#047857;font-weight:600">Alternativa: ${ci.alternativa}</p>
            </div>`;
          }).join('')}
        </div>` : ''}

      <!-- Adesão Terapêutica -->
      ${adesaoData.length > 0 ? `
        <div class="sec">
          <p class="sec-title">📊 Adesão Terapêutica (últimos 30 dias)</p>
          <table class="med-table">
            <thead><tr><th>Medicamento</th><th>Doses Tomadas</th><th>Adesão</th><th>Nível</th></tr></thead>
            <tbody>
              ${adesaoData.map(({ nome, ad }) => {
                const cor = ad.nivel === 'alta' ? '#16a34a' : ad.nivel === 'media' ? '#d97706' : '#dc2626';
                const bg  = ad.nivel === 'alta' ? '#dcfce7' : ad.nivel === 'media' ? '#fef9c3' : '#fee2e2';
                const txt = ad.nivel === 'alta' ? 'Alta ≥ 80%' : ad.nivel === 'media' ? 'Média 50–79%' : 'Baixa < 50%';
                return `<tr>
                  <td>${nome}</td>
                  <td style="text-align:center">${ad.tomadas} / ${ad.total}</td>
                  <td style="text-align:center;font-weight:700;color:${cor}">${ad.pct}%</td>
                  <td style="text-align:center">
                    <span style="background:${bg};color:${cor};border-radius:5px;padding:2px 8px;font-size:.75rem;font-weight:700">${txt}</span>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
          <p style="font-size:.72rem;color:#888;margin-top:8px">
            Baseado em confirmações de dose registradas no app. Adesão ≥ 80% é considerada adequada (WHO).
          </p>
        </div>` : ''}

      <!-- Interações Fármaco-Laboratório -->
      ${labFarmaAlerts.length > 0 ? `
        <div class="sec">
          <p class="sec-title">🔬 Interações Fármaco-Laboratório</p>
          <p style="font-size:.72rem;color:#666;margin-bottom:10px">
            Cruzamento dos exames mais recentes com os medicamentos em uso. Verificar com o médico prescritor.
          </p>
          ${labFarmaAlerts.map(a => {
            const isGrave = a.risco === 'grave';
            const bg    = isGrave ? '#fff5f5' : '#fff7ed';
            const borda = isGrave ? '#fc8181' : '#f6ad55';
            const cor   = isGrave ? '#c53030' : '#c05621';
            return `<div class="alerta-item" style="background:${bg};border-left-color:${borda};margin-bottom:10px">
              <p style="font-weight:700;color:${cor};font-size:.82rem;margin-bottom:4px">${isGrave?'🔴':'🟠'} ${a.titulo}</p>
              <p style="font-size:.77rem;color:#4a5568;margin-bottom:3px">
                <strong>Exame:</strong> ${a.labValor} (${a.labData}) ·
                <strong>Medicamento:</strong> ${a.medsTrigger.join(', ')}
              </p>
              <p style="font-size:.77rem;color:#4a5568;line-height:1.5;margin-bottom:6px">${a.desc}</p>
              <p style="font-size:.77rem;color:#276749;font-weight:600">✅ Conduta: ${a.conduta}</p>
            </div>`;
          }).join('')}
        </div>` : ''}

      <!-- Histórico Laboratorial -->
      ${Object.keys(labPorTipo).length > 0 ? `
        <div class="sec">
          <p class="sec-title">🔬 Histórico Laboratorial</p>
          <table class="med-table">
            <thead><tr><th>Exame</th><th>Último Valor</th><th>Data</th><th>Histórico (últimos 3)</th></tr></thead>
            <tbody>
              ${Object.entries(labPorTipo).map(([tipo, lista]) => {
                const REFS_LAB = {
                  creatinina:{ label:'Creatinina', unidade:'mg/dL', min:0.6, max:1.2 },
                  hba1c:     { label:'HbA1c',      unidade:'%',     min:4.0, max:5.6 },
                  glicemia:  { label:'Glicemia Jejum', unidade:'mg/dL', min:70, max:99 },
                  inr:       { label:'INR',         unidade:'',      min:0.8, max:1.2 },
                  potassio:  { label:'Potássio',    unidade:'mEq/L', min:3.5, max:5.0 },
                  sodio:     { label:'Sódio',       unidade:'mEq/L', min:136, max:145 },
                  colesterol:{ label:'Colest. Total', unidade:'mg/dL', min:0, max:200 },
                  ldl:       { label:'LDL',         unidade:'mg/dL', min:0, max:130 },
                  hdl:       { label:'HDL',         unidade:'mg/dL', min:40, max:9999 },
                  triglicerios:{ label:'Triglicerídeos', unidade:'mg/dL', min:0, max:150 },
                  alt:       { label:'ALT (TGP)',   unidade:'U/L',   min:0, max:40 },
                  ast:       { label:'AST (TGO)',   unidade:'U/L',   min:0, max:40 },
                  tsh:       { label:'TSH',         unidade:'mUI/L', min:0.4, max:4.0 },
                  hemoglobina:{ label:'Hemoglobina', unidade:'g/dL', min:12, max:17.5 },
                  ck:        { label:'CK',          unidade:'U/L',   min:0, max:200 },
                  pcr:       { label:'PCR',         unidade:'mg/dL', min:0, max:0.5 },
                };
                const ref    = REFS_LAB[tipo] || { label:tipo, unidade:'', min:0, max:9999 };
                const ultimo = lista[0];
                const alto   = ultimo.valor > ref.max && ref.max < 9999;
                const baixo  = ultimo.valor < ref.min && ref.min > 0;
                const cor    = alto ? '#dc2626' : baixo ? '#2563eb' : '#166534';
                const status = alto ? '▲ Alto' : baixo ? '▼ Baixo' : '✓ Normal';
                const hist   = lista.slice(1,4).map(r => `${r.valor} (${r.data.slice(5)})`).join(' · ') || '—';
                const fmtData = d => { const [a,m,di]=d.split('-'); return `${di}/${m}/${a}`; };
                return `<tr>
                  <td>${ref.label}</td>
                  <td style="font-weight:700;color:${cor}">${ultimo.valor} ${ref.unidade} <span style="font-size:.7rem">${status}</span></td>
                  <td>${fmtData(ultimo.data)}</td>
                  <td style="font-size:.75rem;color:#666">${hist}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : ''}

      <!-- Rodapé -->
      <div class="doc-footer">
        <strong>VitaDose</strong> — Gerenciador de Medicamentos e Apoio Farmacoterapêutico<br>
        Relatório gerado em ${dataEmissao} às ${horaEmissao} · ID do paciente: ${pid}<br>
        Este documento é de uso exclusivo do profissional de saúde. Não substitui prescrição médica ou avaliação clínica.<br>
        Referências: AGS Beers Criteria® 2023 · KDIGO 2022 · UpToDate · SBN
      </div>`;

    document.getElementById('relatorio').innerHTML = html;
  }
  </script>
</body>
</html>
