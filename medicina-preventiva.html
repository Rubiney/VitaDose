function showTab(n){[0,1,2].forEach(i=>{document.getElementById('tab'+i).style.display=i===n?'block':'none';document.getElementById('tb'+i).classList.toggle('active',i===n);});if(n===0&&!document.getElementById('rastrList').innerHTML)renderRastr();if(n===1)renderTabObes();if(n===2)renderVac();}

/* ─── ASCVD (estimativa simplificada — Pooled Cohort Equations) ─── */
function calcASCVD(){
  const idade=parseInt(document.getElementById('asc_idade').value)||55;
  const ct=parseFloat(document.getElementById('asc_ct').value)||200;
  const ldl=parseFloat(document.getElementById('asc_ldl').value)||130;
  const hdl=parseFloat(document.getElementById('asc_hdl').value)||50;
  const pas=parseFloat(document.getElementById('asc_pas').value)||130;
  const sexo=document.getElementById('asc_sexo').value;
  const raca=document.getElementById('asc_raca').value;
  const tab=document.getElementById('asc_tab').value==='S';
  const hasRx=document.getElementById('asc_has').value==='S';
  const dm=document.getElementById('asc_dm').value==='S';

  // Equações do Pooled Cohort (ACC/AHA 2013) — logarítmicas por grupo demográfico
  const lnA=Math.log(idade), lnCT=Math.log(ct), lnHDL=Math.log(hdl), lnPAS=Math.log(pas);
  let indiv=0, media=0, baseRisk=0;

  if(sexo==='M'&&raca==='W'){
    indiv=12.344*lnA+11.853*lnCT-2.664*Math.log(hdl)+1.769*(hasRx?lnPAS:0)+(hasRx?0:1.764)*lnPAS+7.837*0+(tab?7.837:0)+(dm?0.661:0);
    media=61.18; baseRisk=0.9144;
    indiv=1-Math.pow(baseRisk,Math.exp(indiv-media));
  } else if(sexo==='M'&&raca==='B'){
    indiv=2.469*lnA+0.302*lnCT-0.307*Math.log(hdl)+1.916*(hasRx?lnPAS:0)+(hasRx?0:1.809)*lnPAS+(tab?0.549:0)+(dm?0.645:0);
    media=19.54; baseRisk=0.8954;
    indiv=1-Math.pow(baseRisk,Math.exp(indiv-media));
  } else if(sexo==='F'&&raca==='W'){
    indiv=-29.799*lnA+4.884*lnA*lnA+13.54*lnCT-3.114*lnA*lnCT-13.578*Math.log(hdl)+3.149*lnA*Math.log(hdl)+2.019*(hasRx?lnPAS:0)+(hasRx?0:1.957)*lnPAS+(tab?7.574:0)+(dm?0.661:0);
    media=-29.18; baseRisk=0.9665;
    indiv=1-Math.pow(baseRisk,Math.exp(indiv-media));
  } else {
    indiv=17.1141*lnA+0.9396*lnCT-18.9196*Math.log(hdl)+4.4748*lnA*Math.log(hdl)+29.2907*(hasRx?lnPAS:0)-6.4321*(hasRx?lnA*lnPAS:0)+(hasRx?0:27.8197)*lnPAS+(hasRx?0:-6.0873*lnA*lnPAS)+(tab?0.8738:0)+(dm?0.8738:0);
    media=86.61; baseRisk=0.9533;
    indiv=1-Math.pow(baseRisk,Math.exp(indiv-media));
  }
  const risco=Math.max(0,Math.min(0.99,indiv))*100;
  let cat='',cor='',rec='',estatina='';
  if(risco<5){cat='Baixo risco';cor='#16a34a';rec='Mudanças de estilo de vida';estatina='Estatina NÃO indicada para prevenção primária com risco &lt;5%';}
  else if(risco<7.5){cat='Borderline';cor='#b45309';rec='Considerar fatores modificadores (PCR-us, score de cálcio — CAC)';estatina='Estatina de intensidade moderada se fatores de risco aumentadores';}
  else if(risco<20){cat='Risco Intermediário';cor='#ea580c';rec='Estatina de intensidade moderada-alta';estatina='<strong>Atorvastatina 10–20 mg</strong> OU Rosuvastatina 5–10 mg/dia · Meta LDL &lt;100 mg/dL';}
  else{cat='Alto Risco';cor='#dc2626';rec='Estatina de alta intensidade + mudança de estilo de vida intensa';estatina='<strong>Atorvastatina 40–80 mg</strong> OU Rosuvastatina 20–40 mg · Meta LDL &lt;70 mg/dL (ou &lt;50 se muito alto risco)';}
  let ext='';
  if(risco>=5&&risco<20){ext=`<div style="margin-top:8px;font-size:.77rem"><strong>Fatores que aumentam risco (modificadores — mover para estatina):</strong><br>
• PCR-us ≥2 mg/L · Score CAC ≥100 UA (tomografia de cálcio coronário) · Tornozelo-braquial &lt;0,9 (DAP)<br>
• História familiar prematura de DCV · LDL ≥160 mg/dL · Triglicerídeos ≥175 mg/dL persistentes<br>
• TFG 15–59 · Pré-eclâmpsia · Artrite reumatoide · DII · Psoríase · HIV<br><br>
<strong>AAS na prevenção primária (USPSTF 2022 — mudança importante):</strong><br>
• 40–59 anos + risco ≥10%: AAS 81 mg/dia — <strong>decisão compartilhada</strong> (risco hemorrágico vs benefício modesto)<br>
• ≥60 anos: AAS DESACONSELHADO em prevenção primária (benefício não supera risco GI)</div>`;
  }
  document.getElementById('ascResult').style.display='block';
  document.getElementById('ascResult').innerHTML=`<div class="result-box"><div class="result-line"><span>Risco ASCVD 10 anos (estimado)</span><span class="result-val">${risco.toFixed(1)}%</span></div><div style="margin-top:6px;font-weight:800;color:${cor}">${cat}</div><div style="margin-top:4px;font-size:.78rem">${rec}</div><div style="margin-top:8px;font-size:.78rem">${estatina}</div>${ext}</div>`;
  if(!document.getElementById('rastrList').innerHTML) renderRastr();
}

    {col:'#0369a1',nome:'Câncer Colorretal — Rastreamento (INCA/USPSTF 2021)',

<table>

  <tr><td>Sigmoidoscopia flexível</td><td>A cada 5 anos</td><td>Combinar com PSOF anual</td></tr>
  <tr><td>Colonoscopia virtual (CTC)</td><td>A cada 5 anos</td><td>Sem sedação · Achados requerem colonoscopia</td></tr>

</table>
<strong>Alto risco:</strong> CCR familiar de 1° grau &lt;60 anos → colonoscopia a partir de 40 anos OU 10 anos antes do caso familiar (o que for mais cedo)<br>
Doença de Lynch (MMR): colonoscopia anual desde 25 anos<br>
PAF: sigmoidoscopia anual desde adolescência`},
    {col:'#be185d',nome:'Câncer de Mama — Rastreamento (USPSTF 2024 / FEBRASGO)',
     body:`<strong>USPSTF 2024 (revisão):</strong> mamografia bienal a partir dos <strong>40 anos</strong> (antecipou de 50 para 40) · Até 74 anos<br>
<strong>FEBRASGO:</strong> mamografia anual a partir de 40 anos · Ultrassonografia em mamas densas<br><br>
<strong>Alto risco (iniciar mais cedo + RM):</strong><br>
• Mutação BRCA1/BRCA2 · PALB2, CHEK2, ATM · Mama densa categoria C–D (BIRADS)<br>
• Histórico familiar (1° grau) &lt;50 anos ou bilateral ou câncer de mama em homem<br>
• Histórico pessoal de Ca mama/ovário · Radioterapia torácica antes dos 30 anos (linfoma Hodgkin)<br>
• Nestas: RM + mamografia anualmente a partir de 30 anos (ou 10 anos antes do caso familiar)<br><br>
<strong>Teste genético BRCA (USPSTF):</strong><br>
Histórico familiar positivo para Ca mama/ovário/pâncreas/próstata agressivo → encaminhar conselheiro genético<br>
Se BRCA1/2 +: quimioprofilaxia com tamoxifeno 20 mg/dia × 5 anos (pré-menopáusica) OU raloxifeno/anastrozol (pós-menopáusica) OU mastectomia redutora de risco`},
    {col:'#7c3aed',nome:'Ca de Colo do Útero · Ca de Próstata · Ca de Pulmão',
     body:`<strong>Colo do Útero — Citologia (Papanicolaou):</strong><br>
• Início: 25 anos · Citopatologia a cada 3 anos até 64 anos<br>
• 25–64 anos: preferir co-teste (citologia + HPV-DNA) a cada 5 anos<br>
• &gt;64 anos: interromper se ≥2 negativos consecutivos nos últimos 10 anos<br>
• Histerectomia total + sem histórico de NIC2/3: interromper rastreamento<br>
Vacinação HPV: 9–14 anos (2 doses) · até 26 anos (3 doses) · 27–45 anos: decidir com médico<br><br>
<strong>Próstata — PSA:</strong><br>
• USPSTF: PSA não recomendado como rastreamento de rotina (&gt;55 anos: decisão individual informada)<br>
• SBU/CFM: oferecer PSA anual a partir de 50 anos (45 se afrodescendente ou familiar de 1° grau com Ca próstata &lt;65 anos)<br>
• PSA &gt;4 ng/mL ou velocidade de subida &gt;0,75 ng/mL/ano: urologista + biópsia guiada por RM multiparamétrica<br><br>
<strong>Pulmão — TC de tórax de baixa dose:</strong><br>
• 50–80 anos + história de ≥20 maços-ano + tabagismo atual ou cessação &lt;15 anos (USPSTF 2021)<br>
• Anualmente · NLST trial: redução 20% de mortalidade por Ca pulmão<br>

    {col:'#0369a1',nome:'Rastreamentos Metabólicos e Cardiovasculares',
     body:`<strong>Diabetes (ADA 2024):</strong><br>

/* ─── TABAGISMO & OBESIDADE ─────────────────────────────────────── */
function renderTabObes(){
  if(document.getElementById('tabObesList').innerHTML) return;
  const CARDS=[
    {col:'#374151',nome:'Cessação do Tabagismo — Farmacoterapia',
     body:`<strong>Eficácia comparativa:</strong> Vareniclina &gt; TRN combinado (adesivo + goma) &gt; bupropiona &gt; TRN monoterapia<br><br>

• Extensão: 12 semanas adicionais aumenta abstinência para 44% em 1 ano (EAGLES trial: extensão de 24 sem superior)<br>
• RAM: náusea (tomar com alimento), sonhos vivos, cefaleia · Cardioseguro em DCV estável (EAGLES: sem diferença em MACE vs placebo)<br>

• Mirtazapina 15 mg: pode reduzir náusea da vareniclina (também melhora humor em ex-tabagistas)<br><br>
<strong>2. Terapia de Reposição de Nicotina (TRN)</strong><br>
• <strong>Adesivo (patch):</strong> 21 mg/24h × 6 sem → 14 mg × 2 sem → 7 mg × 2 sem (TRN de alta dose se &gt;1 maço/dia)<br>
• <strong>Goma de mascar:</strong> 2 mg (≤25 cigarros/dia) ou 4 mg (&gt;25 cigarros/dia) · 1 goma a cada 1–2h · Técnica mordida-pausa-bocal<br>
• Pastilha: 2 mg ou 4 mg · Dissolver debaixo da língua<br>
• Spray nasal (não disponível no Brasil) · Inalador<br>
• <strong>Combinação adesivo + forma de liberação rápida</strong> (goma/pastilha): superior à monoterapia · Adesivo controla baseline + goma controla fissura<br><br>
<strong>3. Bupropiona SR 150 mg/dia × 3 dias → 150 mg 2×/dia × 7–12 sem</strong><br>

• CI: histórico de convulsão, transtorno alimentar (bulimia/AN), IMAO em uso · Cuidado: IAM recente, bipolar<br>
• Útil em depressão comórbida com tabagismo<br><br>
<strong>4. Citicolina (Cytidine 5-diphosphocholine):</strong><br>
• Evidência emergente: reduz craving de nicotina · 500 mg 2×/dia · Off-label no Brasil<br><br>
<strong>Abordagem 5As (INCA/BRASIL):</strong><br>
Abordar (perguntar sobre tabagismo) → Aconselhar (orientar a parar) → Avaliar (prontidão para parar) → Auxiliar (oferecer suporte + farmacoterapia) → Acompanhar (follow-up em 1, 4, 12 semanas)`,

     body:`<strong>Critérios para farmacoterapia:</strong> IMC ≥30 kg/m² OU IMC ≥27 + ≥1 comorbidade (DM, HAS, dislipidemia, SAOS, doença cardíaca) + falha de mudança comportamental ≥3 meses<br><br>

<strong>Outras opções aprovadas:</strong><br>
• <strong>Bupropiona/Naltrexona SR (Contrave/Mysimba) 8/90 mg:</strong> 1 comp/dia → 2×/dia × 1 sem → 2+1×/dia × 1 sem → 2+2×/dia (máx) · COR-I: -6,4% peso · CI: HAS não controlada, convulsão, tabagismo com vareniclina<br>
• <strong>Orlistate 120 mg 3×/dia com refeições gordurosas</strong>: inibidor de lipase · Perda -3,5 a -5% · Diarreia gordurosa (reduzir gordura na dieta) · Reduz absorção de vitaminas lipossolúveis (suplementar)<br>

• Bypass gástrico em Y de Roux (BGYR): perda de 60–70% do excesso de peso · Resolução DM2 em 80%<br>
• Gastrectomia vertical (sleeve): perda 50–60% · Sem desvio intestinal · Menos deficiências nutricionais`,
     note:'Semaglutida e perda muscular: perda de massa magra (20–30% do peso perdido é músculo) → associar exercício resistido. Semaglutida e cirurgia: suspender 1 semana antes de cirurgia eletiva (risco de aspiração por esvaziamento gástrico retardado — anestesiologista deve ser informado). Manutenção: recidiva de peso ao suspender semaglutida/tirzepatida → tratamento crônico, não temporário.'},
  ];
  document.getElementById('tabObesList').innerHTML=CARDS.map(c=>`<div class="prv-card" style="border-color:${c.col}"><div class="prv-nome" style="color:${c.col}">${c.nome}</div><div class="prv-body">${c.body}</div>${c.note?`<div style="font-size:.7rem;color:#64748b;margin-top:6px">💡 ${c.note}</div>`:''}</div>`).join('');
}
