<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anotações SOAP — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <style>
    body { background:#f8fafc;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif }
    .topbar { display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100 }
    .back-btn { background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;color:#475569;border-radius:8px }
    .topbar-title { font-size:1rem;font-weight:700;color:#1e293b;flex:1 }

    .sec-title { font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;padding:0 16px;margin:14px 0 6px }

    /* SOAP form */
    .soap-card { background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden }
    .soap-section { border-bottom:1px solid #f1f5f9 }
    .soap-section:last-child { border-bottom:none }
    .soap-header { display:flex;align-items:center;gap:10px;padding:11px 14px 0 }
    .soap-badge  { width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;flex-shrink:0 }
    .soap-lbl    { font-size:.78rem;font-weight:800;color:#1e293b }
    .soap-sub    { font-size:.65rem;color:#94a3b8;margin-left:auto }
    .soap-ta     { width:100%;box-sizing:border-box;border:none;padding:8px 14px 12px;font-size:.82rem;color:#1e293b;resize:none;background:transparent;line-height:1.55 }
    .soap-ta:focus { outline:none }

    /* Obj. campos auto-fill */
    .obj-auto { display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 14px;background:#f8fafc }
    .obj-item { background:#fff;border-radius:8px;padding:6px 8px;text-align:center;border:1px solid #e2e8f0 }
    .obj-val  { font-size:.85rem;font-weight:800;color:#1e293b }
    .obj-key  { font-size:.6rem;color:#94a3b8;font-weight:600 }

    /* DRP chips */
    .drp-chips { display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 10px }
    .drp-chip  { background:#f1f5f9;border:1.5px solid transparent;border-radius:16px;padding:5px 10px;font-size:.7rem;font-weight:700;color:#64748b;cursor:pointer }
    .drp-chip.sel { background:#ffe4e6;border-color:#fda4af;color:#be123c }

    /* Meta/retorno */
    .meta-row { display:flex;gap:8px;padding:0 14px 12px;align-items:center }
    .meta-input { flex:1;border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 12px;font-size:.8rem;color:#1e293b }
    .meta-input:focus { outline:none;border-color:#6366f1 }

    .btn-salvar { width:calc(100% - 32px);display:block;margin:0 16px;background:#6366f1;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.9rem;font-weight:800;cursor:pointer }

    /* Histórico */
    .nota-item { padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer }
    .nota-item:last-child { border-bottom:none }
    .nota-top  { display:flex;align-items:center;gap:8px;margin-bottom:5px }
    .nota-data { font-size:.72rem;font-weight:700;color:#6366f1;flex-shrink:0 }
    .nota-farm { font-size:.75rem;color:#1e293b;font-weight:700;flex:1 }
    .nota-drps { display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px }
    .nota-drp  { font-size:.62rem;font-weight:700;border-radius:4px;padding:2px 6px;background:#ffe4e6;color:#be123c }
    .nota-s    { font-size:.75rem;color:#475569;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden }
    .nota-del  { background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:.9rem;padding:0 4px }
    .nota-del:hover { color:#ef4444 }

    /* Modal expandido */
    .modal-bg  { position:fixed;inset:0;background:rgba(15,52,96,.45);backdrop-filter:blur(3px);z-index:300;overflow-y:auto;padding:16px }
    .modal-box { background:#fff;border-radius:16px;max-width:600px;margin:0 auto;padding:20px }
    .modal-close { background:none;border:none;font-size:1.3rem;cursor:pointer;color:#64748b;float:right;margin-top:-4px }
    .soap-view { font-size:.82rem;color:#475569;line-height:1.7;white-space:pre-wrap }
    .soap-view-section { margin-bottom:12px }
    .soap-view-lbl { font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px }
    .btn-print-nota { background:#0f3460;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:12px }

    .vazio { text-align:center;color:#94a3b8;padding:24px;font-size:.82rem }

    @media print {
      .topbar,.btn-salvar,.back-btn,.nota-del,.modal-close,.btn-print-nota { display:none }
      .modal-bg { position:static;background:none;padding:0 }
      .modal-box { box-shadow:none }
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">📝 Anotações Farmacêuticas</span>
</div>

<div id="app" style="padding-bottom:80px">
  <p style="text-align:center;color:#94a3b8;padding:40px 20px;font-size:.85rem">Carregando...</p>
</div>

<div class="toast" id="toast"></div>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>

/* ─── Problemas Relacionados a Medicamentos (DRP / PCNE) ── */
const _DRPS = [
  'Indicação sem medicamento','Medicamento sem indicação','Medicamento ineficaz',
  'Dose abaixo do necessário','Dose acima do necessário','Reação adversa',
  'Interação medicamentosa','Não adesão ao tratamento','Custo/acesso ao medicamento',
  'Duplicidade terapêutica','Falta de monitorização','Prescrição inadequada',
];

let _pid      = null;
let _pac      = null;
let _notas    = [];
let _drpsSel  = new Set();
let _objData  = {};

/* ─── Init ──────────────────────────────────────────── */
async function init() {
  _pid = typeof getActivePacienteId === 'function' ? getActivePacienteId() : null;
  if (!_pid) { window.location.href = 'index.html'; return; }
  _pac   = await dbGet('pacientes', _pid);
  _notas = (await dbGetConfig('soap_' + _pid)) || [];
  _notas.sort((a,b) => b.data.localeCompare(a.data));

  /* Auto-fill objetivo: último registro de diário */
  try {
    const hoje = new Date().toISOString().slice(0,10);
    const dt30 = new Date(); dt30.setDate(dt30.getDate()-30);
    const diarios = await dbGetDiarioRange(dt30.toISOString().slice(0,10), hoje);
    const comPA  = diarios.filter(r => r.paSis).sort((a,b) => b.data.localeCompare(a.data));
    const comGli = diarios.filter(r => r.glicemia).sort((a,b) => b.data.localeCompare(a.data));
    const comPeso= diarios.filter(r => r.peso).sort((a,b) => b.data.localeCompare(a.data));
    _objData = {
      pa:   comPA[0]  ? comPA[0].paSis+'/'+comPA[0].paDia+' mmHg'  : null,
      gli:  comGli[0] ? comGli[0].glicemia+' mg/dL'                : null,
      peso: comPeso[0]? comPeso[0].peso+' kg'+(comPeso[0].imc?' (IMC '+comPeso[0].imc+')':'') : null,
    };
    /* Último TFG do paciente */
    if (_pac?.tfg) _objData.tfg = _pac.tfg + ' mL/min';
  } catch(e) {}

  render();
}

/* ─── Render ────────────────────────────────────────── */
function render() {
  const app  = document.getElementById('app');
  const hoje = new Date().toISOString().slice(0,10);
  const hhmm = new Date().toTimeString().slice(0,5);

  const drpChips = _DRPS.map(d => {
    const sel = _drpsSel.has(d);
    return `<span class="drp-chip${sel?' sel':''}" onclick="toggleDRP('${d.replace(/'/g,"\\'")}')">${d}</span>`;
  }).join('');

  const objItems = [
    { k:'PA',      v:_objData.pa   },
    { k:'Glicemia',v:_objData.gli  },
    { k:'Peso/IMC',v:_objData.peso },
    { k:'TFG',     v:_objData.tfg  },
  ].filter(o => o.v);

  /* Histórico */
  const histHTML = _notas.length ? _notas.map(n => {
    const [y,m,d] = n.data.split('-');
    return `<div class="nota-item" onclick="abrirNota('${n.id}')">
      <div class="nota-top">
        <span class="nota-data">${d}/${m}/${y}</span>
        <span class="nota-farm">${n.farmaceutico||'Anotação farmacêutica'}</span>
        <button class="nota-del" onclick="event.stopPropagation();excluir('${n.id}')">×</button>
      </div>
      ${n.drps?.length ? `<div class="nota-drps">${n.drps.map(d=>`<span class="nota-drp">${d}</span>`).join('')}</div>` : ''}
      ${n.S ? `<p class="nota-s">${n.S}</p>` : ''}
    </div>`;
  }).join('') : `<p class="vazio">Nenhuma anotação registrada.</p>`;

  app.innerHTML = `
    <p class="sec-title">Nova Consulta — ${_pac?.nome||'Paciente'}</p>

    <div class="soap-card">
      <!-- Cabeçalho da consulta -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;background:#f8fafc;border-bottom:1px solid #f1f5f9">
        <div>
          <p style="font-size:.62rem;color:#94a3b8;font-weight:700;margin-bottom:3px">Data</p>
          <input id="f-data" type="date" value="${hoje}" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:.78rem;width:100%;box-sizing:border-box">
        </div>
        <div>
          <p style="font-size:.62rem;color:#94a3b8;font-weight:700;margin-bottom:3px">Hora</p>
          <input id="f-hora" type="time" value="${hhmm}" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:.78rem;width:100%;box-sizing:border-box">
        </div>
        <div>
          <p style="font-size:.62rem;color:#94a3b8;font-weight:700;margin-bottom:3px">Farmacêutico</p>
          <input id="f-farm" type="text" placeholder="Nome/CRF" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:.78rem;width:100%;box-sizing:border-box">
        </div>
      </div>

      <!-- S — Subjetivo -->
      <div class="soap-section">
        <div class="soap-header">
          <div class="soap-badge" style="background:#ede9fe;color:#7c3aed">S</div>
          <span class="soap-lbl">Subjetivo</span>
          <span class="soap-sub">Queixa principal · Sintomas relatados · Autopercepção</span>
        </div>
        <textarea class="soap-ta" id="f-s" rows="3"
          placeholder="Ex: Paciente refere tontura ao levantar há 3 dias, coincidindo com aumento da dose de enalapril. Nega hipoglicemia. Relata boa tolerância ao omeprazol…"></textarea>
      </div>

      <!-- O — Objetivo -->
      <div class="soap-section">
        <div class="soap-header">
          <div class="soap-badge" style="background:#cffafe;color:#0891b2">O</div>
          <span class="soap-lbl">Objetivo</span>
          <span class="soap-sub">Dados mensuráveis · Exames · Sinais vitais</span>
        </div>
        ${objItems.length ? `<div class="obj-auto">
          ${objItems.map(o=>`<div class="obj-item"><div class="obj-val">${o.v}</div><div class="obj-key">${o.k}</div></div>`).join('')}
        </div>` : ''}
        <textarea class="soap-ta" id="f-o" rows="3"
          placeholder="Ex: PA 148/92 mmHg · FC 74 bpm · Glicemia jejum 118 mg/dL · TFG 62 mL/min · LDL 134 mg/dL · Medicamentos: Enalapril 10mg, Metformina 850mg…"
          value="${objItems.map(o=>o.k+': '+o.v).join(' · ')}"></textarea>
      </div>

      <!-- A — Avaliação -->
      <div class="soap-section">
        <div class="soap-header">
          <div class="soap-badge" style="background:#dcfce7;color:#16a34a">A</div>
          <span class="soap-lbl">Avaliação</span>
          <span class="soap-sub">Problemas identificados (DRP) · Impressão clínica</span>
        </div>
        <div class="drp-chips">${drpChips}</div>
        <textarea class="soap-ta" id="f-a" rows="3"
          placeholder="Ex: PA fora da meta (>130/80 mmHg) possivelmente relacionada a dose insuficiente de enalapril. Glicemia de jejum limítrofe — avaliar HbA1c. Sem interações clinicamente significativas no esquema atual…"></textarea>
      </div>

      <!-- P — Plano -->
      <div class="soap-section">
        <div class="soap-header">
          <div class="soap-badge" style="background:#fef3c7;color:#d97706">P</div>
          <span class="soap-lbl">Plano</span>
          <span class="soap-sub">Intervenções · Encaminhamentos · Retorno</span>
        </div>
        <textarea class="soap-ta" id="f-p" rows="3"
          placeholder="Ex: 1. Orientar monitorização de PA 2×/dia por 7 dias. 2. Encaminhar ao médico para ajuste de dose de enalapril. 3. Solicitar HbA1c e microalbuminúria. 4. Retorno em 30 dias…"></textarea>
        <div class="meta-row">
          <span style="font-size:.7rem;font-weight:700;color:#64748b;white-space:nowrap">Retorno em:</span>
          <input class="meta-input" id="f-retorno" type="date" placeholder="Data do retorno">
        </div>
      </div>
    </div>

    <button class="btn-salvar" onclick="salvar()">✓ Salvar Anotação</button>

    ${_notas.length ? `<p class="sec-title" style="margin-top:14px">Histórico (${_notas.length} consultas)</p>` : ''}
    <div style="background:#fff;border-radius:14px;margin:0 16px 80px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden">
      ${histHTML}
    </div>
  `;

  /* Pre-fill objetivo com dados auto */
  if (objItems.length) {
    const ta = document.getElementById('f-o');
    if (ta && !ta.value) ta.value = objItems.map(o => o.k+': '+o.v).join(' · ');
  }
}

function toggleDRP(d) { _drpsSel.has(d) ? _drpsSel.delete(d) : _drpsSel.add(d); render(); }

async function salvar() {
  const S = document.getElementById('f-s')?.value.trim();
  const O = document.getElementById('f-o')?.value.trim();
  const A = document.getElementById('f-a')?.value.trim();
  const P = document.getElementById('f-p')?.value.trim();

  if (!S && !O && !A && !P) { showToast('Preencha ao menos um campo SOAP'); return; }

  const nota = {
    id:           Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    data:         document.getElementById('f-data')?.value || new Date().toISOString().slice(0,10),
    hora:         document.getElementById('f-hora')?.value || '',
    farmaceutico: document.getElementById('f-farm')?.value.trim() || '',
    retorno:      document.getElementById('f-retorno')?.value || null,
    drps:         [..._drpsSel],
    S, O, A, P,
    pacienteNome: _pac?.nome || '',
    criadoEm:     new Date().toISOString(),
  };

  _notas.unshift(nota);
  await dbSetConfig('soap_' + _pid, _notas);

  _drpsSel.clear();
  showToast('✓ Anotação salva');
  render();
}

async function excluir(id) {
  _notas = _notas.filter(n => n.id !== id);
  await dbSetConfig('soap_' + _pid, _notas);
  showToast('Anotação removida');
  render();
}

function abrirNota(id) {
  const n = _notas.find(x => x.id === id);
  if (!n) return;
  const [y,m,d] = n.data.split('-');

  const sec = (lbl, cor, v) => v ? `<div class="soap-view-section">
    <p class="soap-view-lbl" style="color:${cor}">${lbl}</p>
    <p class="soap-view">${v}</p>
  </div>` : '';

  const div = document.createElement('div');
  div.className = 'modal-bg';
  div.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="this.closest('.modal-bg').remove()">×</button>
    <p style="font-size:.72rem;font-weight:700;color:#94a3b8;margin-bottom:4px">${d}/${m}/${y}${n.hora?' às '+n.hora:''}</p>
    <p style="font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:${n.drps?.length?'10px':'16px'}">${n.pacienteNome||'Paciente'} · ${n.farmaceutico||'Farmacêutico'}</p>
    ${n.drps?.length ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">${n.drps.map(d=>`<span class="nota-drp">${d}</span>`).join('')}</div>` : ''}
    ${sec('S — Subjetivo','#7c3aed', n.S)}
    ${sec('O — Objetivo','#0891b2', n.O)}
    ${sec('A — Avaliação','#16a34a', n.A)}
    ${sec('P — Plano','#d97706', n.P)}
    ${n.retorno ? `<p style="font-size:.78rem;color:#6366f1;font-weight:700;margin-top:8px">📅 Retorno agendado: ${n.retorno.split('-').reverse().join('/')}</p>` : ''}
    <button class="btn-print-nota" onclick="window.print()">🖨️ Imprimir</button>
  </div>`;
  div.addEventListener('click', () => div.remove());
  document.body.appendChild(div);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
