<script>
/* ── CHILD-PUGH ─────────────────────────────────────────────────────── */
let cpClasse = null;

function scoreCP(val, thresholds) {
  if(val<=thresholds[0]) return 1;
  if(val<=thresholds[1]) return 2;
  return 3;
}

function calcCP() {
  const bili = parseFloat(document.getElementById('cp_bili').value)||0;
  const alb  = parseFloat(document.getElementById('cp_alb').value)||0;
  const inr  = parseFloat(document.getElementById('cp_inr').value)||0;
  const asc  = parseInt(document.getElementById('cp_asc').value)||1;
  const enc  = parseInt(document.getElementById('cp_enc').value)||1;

  if(!bili && !alb && !inr) { alert('Informe ao menos bilirrubina, albumina e INR.'); return; }

  const pBili = bili ? scoreCP(bili,[2,3]) : 1;
  const pAlb  = alb  ? (alb>3.5?1:alb>=2.8?2:3) : 1;
  const pInr  = inr  ? scoreCP(inr,[1.7,2.3]) : 1;
  const total = pBili + pAlb + pInr + asc + enc;

  let classe, cor, prog, sobrevida;
  if(total<=6){ classe='A'; cor='#16a34a'; prog='Hepatopatia compensada'; sobrevida='Sobrevida 1 ano: ~100% · 2 anos: ~85%'; }
  else if(total<=9){ classe='B'; cor='#d97706'; prog='Hepatopatia moderada'; sobrevida='Sobrevida 1 ano: ~81% · 2 anos: ~57%'; }
  else{ classe='C'; cor='#dc2626'; prog='Hepatopatia descompensada grave'; sobrevida='Sobrevida 1 ano: ~45% · 2 anos: ~35%'; }

  cpClasse = classe;
  document.getElementById('cpResult').style.display='block';
  document.getElementById('cpResult').innerHTML=`
    <div class="cp-result" style="border-color:${cor};background:${cor}15">
      <div class="cp-score" style="color:${cor}">${total} pts</div>
      <div class="cp-classe" style="color:${cor}">Child-Pugh ${classe}</div>
      <div class="cp-desc">${prog}</div>
      <div class="cp-detail">${sobrevida}</div>
      <div class="cp-detail" style="margin-top:6px">Bilirrubina:${pBili}pt · Albumina:${pAlb}pt · INR:${pInr}pt · Ascite:${asc}pt · Encefalopatia:${enc}pt</div>
    </div>`;

  document.getElementById('cpActiveBadge').style.display='block';
  document.getElementById('cpActiveBadge').innerHTML=`<div class="active-cp">🩺 Child-Pugh ${classe} (${total} pts) — recomendações destacadas abaixo</div>`;
  renderAH();
}

const GRUPOS=[...new Set(DRUGS.map(d=>d.g))];
let activeCat=null;

const CAT_COLS={
  'IBP / Gastroenterologia':'#0f766e','Analgésicos':'#b45309',
  'Anti-hipertensivos':'#0369a1','Antidiabéticos':'#d97706',
  'Psicofármacos / BZD':'#6d28d9','Anticonvulsivantes':'#9d174d',
  'Anticoagulantes':'#dc2626','Antibióticos':'#059669','Hormônios / Outros':'#64748b',
};

function buildChips(){
  document.getElementById('ahChips').innerHTML=GRUPOS.map(g=>{
    const col=CAT_COLS[g]||'#64748b',act=activeCat===g;
    return `<span class="cat-chip${act?' active':''}" style="border-color:${col};${act?'background:'+col+';color:#fff':''}" onclick="toggleCat('${g}')">${g}</span>`;
  }).join('');
}

function toggleCat(g){activeCat=activeCat===g?null:g;buildChips();renderAH();}

function statusStyle(s){
  return {ok:{bg:'#dcfce7',col:'#166534',lbl:'Sem ajuste'},
          cuidado:{bg:'#fef3c7',col:'#92400e',lbl:'Cuidado'},
          evitar:{bg:'#ffedd5',col:'#c2410c',lbl:'Evitar'},
          ci:{bg:'#fee2e2',col:'#991b1b',lbl:'Contraindicado'}}[s]||{bg:'#f1f5f9',col:'#64748b',lbl:s};
}

function renderAH(){
  const q=document.getElementById('ahSearch').value.toLowerCase();
  let items=DRUGS;
  if(activeCat) items=items.filter(d=>d.g===activeCat);
  if(q) items=items.filter(d=>`${d.n} ${d.g} ${d.a.t} ${d.b.t} ${d.c.t} ${d.note}`.toLowerCase().includes(q));
  const list=document.getElementById('ahList');
  if(!items.length){list.innerHTML='<div class="empty-state"><span style="font-size:2rem;display:block;margin-bottom:8px">🔎</span>Nenhum resultado encontrado.</div>';return;}

  list.innerHTML=items.map(d=>{
    const classes=['a','b','c'];
    const dados=[d.a,d.b,d.c];
    const labels=['Child A','Child B','Child C'];
    const cpColors={A:'#16a34a',B:'#d97706',C:'#dc2626'};
    return `<div class="ah-card">
      <div class="ah-card-top">
        <div><div class="ah-grupo">${d.g}</div><div class="ah-nome">${d.n}</div></div>
      </div>
      <div class="cls-grid">${classes.map((c,i)=>{
        const st=statusStyle(dados[i].s);
        const isActive=cpClasse===labels[i].replace('Child ','');
        return `<div class="cls-box" style="background:${st.bg};border:${isActive?'2px solid '+cpColors[labels[i].replace('Child ','')]:'1px solid transparent'}">
          <div class="cls-lbl" style="color:${st.col}">${labels[i]}${isActive?' ★':''}</div>
          <div class="cls-val" style="color:${st.col}">${dados[i].t}</div>
        </div>`;
      }).join('')}</div>
      <div class="ah-note">💡 ${d.note}</div>
    </div>`;
  }).join('');
}

buildChips();
renderAH();
</script>
