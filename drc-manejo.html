  <style>
    .drc-hdr{background:linear-gradient(135deg,#1e3a8a,#1e40af);color:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
    .drc-title{font-size:1rem;font-weight:800;margin-bottom:4px}
    .drc-sub{font-size:.73rem;opacity:.8}
    label{font-size:.75rem;font-weight:700;color:#1e3a5f;display:block;margin-bottom:4px}
    input[type=number]{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;outline:none;margin-bottom:10px}
    input[type=text]{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;outline:none}
    input:focus{border-color:#1e3a8a}
    select{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;margin-bottom:10px}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .checkbox-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .checkbox-item{display:flex;align-items:center;gap:8px;font-size:.8rem;cursor:pointer}
    .checkbox-item input[type=checkbox]{width:18px;height:18px;accent-color:#1e3a8a;cursor:pointer}
    .btn-calc{width:100%;background:#1e3a8a;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.87rem;font-weight:700;cursor:pointer;margin:8px 0}
    .btn-auto{background:#0f766e;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:.8rem;font-weight:700;cursor:pointer;margin-bottom:10px}
    .tab-bar{display:flex;gap:6px;margin-bottom:14px}
    .tab-btn{flex:1;padding:10px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;color:#64748b}
    .tab-btn.active{border-color:#1e3a8a;background:#eff6ff;color:#1e3a8a}
    .stage-card{border-radius:14px;border:4px solid;padding:14px;margin-bottom:10px;text-align:center}
    .stage-num{font-size:1.8rem;font-weight:900;line-height:1}
    .stage-lbl{font-size:.85rem;font-weight:800;margin-top:4px}
    .stage-sub{font-size:.72rem;margin-top:8px;opacity:.85}
    .rec-card{border-radius:12px;border:2px solid;padding:14px;margin-bottom:10px}
    .rec-hdr{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .rec-nome{font-size:.88rem;font-weight:800;margin-bottom:6px}
    .rec-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;color:#fff;margin:2px}
    .rec-body{font-size:.78rem;margin-top:6px;line-height:1.7}
    .rec-note{font-size:.71rem;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #f1f5f9}
    .comp-card{border-radius:10px;border:2px solid #e2e8f0;padding:12px 14px;margin-bottom:8px}
    .comp-nome{font-size:.82rem;font-weight:800;color:#1e3a5f;margin-bottom:6px}
    .comp-trig{font-size:.7rem;color:#dc2626;font-weight:700;margin-bottom:6px}
    .comp-trat{font-size:.76rem;line-height:1.6;color:#1e3a5f}
    .comp-note{font-size:.7rem;color:#64748b;margin-top:6px}
    .cat-chip{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:.7rem;font-weight:800;border:1.5px solid;cursor:pointer;margin:3px}
    .cat-chip.active{color:#fff}
    .drug-card{border-radius:10px;border:2px solid #e2e8f0;padding:12px;margin-bottom:8px}
    .drug-nome{font-size:.82rem;font-weight:800;color:#1e3a5f}
    .drug-grupo{font-size:.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em}
    .tfg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:8px 0}
    .tfg-cell{border-radius:6px;padding:5px 3px;text-align:center}
    .tfg-lbl{font-size:.58rem;font-weight:800;color:#6b7280;text-transform:uppercase;margin-bottom:2px}
    .tfg-val{font-size:.68rem;font-weight:800;line-height:1.3}
    .drug-note{font-size:.7rem;color:#64748b;margin-top:4px}
    .search-wrap{position:relative;margin-bottom:8px}
    .search-wrap input{padding-left:36px}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8}

</head>
<body>
<header class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>

  <div class="top-right"></div>
</header>
<main class="container" style="padding-bottom:90px">

  <div class="drc-hdr">
    <div class="drc-title">🫘 Doença Renal Crônica — Manejo Farmacológico</div>
    <div class="drc-sub">Nefroproteção · Complicações (anemia, hiperfosfatemia, acidose, hipercalemia) · Fármacos por TFG — KDIGO 2024</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tb0" onclick="showTab(0)">Nefroproteção</button>
    <button class="tab-btn" id="tb1" onclick="showTab(1)">Complicações</button>
    <button class="tab-btn" id="tb2" onclick="showTab(2)">Fármacos / TFG</button>
  </div>

  <!-- TAB 0 – NEFROPROTEÇÃO -->
  <div id="tab0">
    <button class="btn-auto" onclick="autoFill()">⚡ Auto-preencher do paciente ativo</button>
    <div class="card" style="padding:12px 14px">
      <div class="input-row">
        <div><label>TFG CKD-EPI (mL/min/1,73m²)</label><input type="number" id="tfg" placeholder="ex.: 38" min="0"></div>
        <div><label>Razão Albumina-Creatinina (mg/g)</label><input type="number" id="acr" placeholder="ex.: 180" min="0"></div>
      </div>
      <label>Comorbidades</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="n_dm"> Diabetes mellitus</label>
        <label class="checkbox-item"><input type="checkbox" id="n_has"> Hipertensão arterial (HAS)</label>
        <label class="checkbox-item"><input type="checkbox" id="n_ic"> Insuficiência cardíaca (IC)</label>
        <label class="checkbox-item"><input type="checkbox" id="n_dcv"> DCV estabelecida (DAC, AVC, DAP)</label>
        <label class="checkbox-item"><input type="checkbox" id="n_hipo"> Risco de hipercalemia (K⁺ >5,0)</label>
      </div>
      <label>Tratamento atual de proteção renal</label>
      <select id="n_trat">
        <option value="naive">Sem IECA/BRA/iSGLT2</option>
        <option value="raas">Em uso de IECA ou BRA</option>
        <option value="sglt2">Em uso de iSGLT2</option>
        <option value="ambos">IECA/BRA + iSGLT2</option>
      </select>
    </div>
    <button class="btn-calc" onclick="calcNefro()">🫘 Gerar protocolo de nefroproteção</button>
    <div id="nefroResult" style="display:none"></div>
  </div>

  <!-- TAB 1 – COMPLICAÇÕES -->
  <div id="tab1" style="display:none">
    <div id="compList"></div>
  </div>

  <!-- TAB 2 – FÁRMACOS POR TFG -->
  <div id="tab2" style="display:none">
    <div class="card" style="padding:8px 12px;margin-bottom:6px">
      <div style="display:flex;gap:6px;font-size:.68rem;font-weight:800;justify-content:space-around;text-align:center">
        <div><span style="display:block;background:#dcfce7;color:#166534;border-radius:4px;padding:2px 6px;">Verde</span>Sem ajuste</div>
        <div><span style="display:block;background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 6px;">Âmbar</span>TFG 30–59</div>
        <div><span style="display:block;background:#ffedd5;color:#c2410c;border-radius:4px;padding:2px 6px;">Laranja</span>TFG 15–29</div>
        <div><span style="display:block;background:#fee2e2;color:#991b1b;border-radius:4px;padding:2px 6px;">Vermelho</span>TFG &lt;15 / Diálise</div>
      </div>
    </div>
    <div class="card" style="padding:10px 14px;margin-bottom:6px">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="drcSearch" placeholder="Buscar (ex.: metformina, lisinopril…)" oninput="renderDrugs()">
      </div>
      <div id="drcChips"></div>
    </div>

</main>

<script src="js/db.js"></script>
<script>
const pid=localStorage.getItem('vd_active');

function showTab(n){
  [0,1,2].forEach(i=>{document.getElementById('tab'+i).style.display=i===n?'block':'none';document.getElementById('tb'+i).classList.toggle('active',i===n);});
  if(n===1) renderComp();
  if(n===2){buildChips();renderDrugs();}
}

async function autoFill(){
  if(!pid){alert('Nenhum paciente ativo.');return;}
  const pac=await dbGet('pacientes',parseInt(pid));
  if(!pac) return;
  const conds=pac.condicoes||[];
  if(conds.includes('dm'))  document.getElementById('n_dm').checked=true;
  if(conds.includes('has')) document.getElementById('n_has').checked=true;
  if(conds.includes('ic'))  document.getElementById('n_ic').checked=true;
}

/* ── KDIGO STAGING ──────────────────────────────────────────────────── */
function getStage(tfg,acr){
  let g,gCol;
  if(tfg>=90){g='G1';gCol='#16a34a';}
  else if(tfg>=60){g='G2';gCol='#84cc16';}
  else if(tfg>=45){g='G3a';gCol='#d97706';}
  else if(tfg>=30){g='G3b';gCol='#ea580c';}
  else if(tfg>=15){g='G4';gCol='#dc2626';}
  else{g='G5';gCol='#7f1d1d';}
  let a,aCol;
  if(acr<30){a='A1';aCol='#16a34a';}
  else if(acr<=300){a='A2';aCol='#d97706';}
  else{a='A3';aCol='#dc2626';}
  return{g,gCol,a,aCol};
}

function calcNefro(){
  const tfg=parseFloat(document.getElementById('tfg').value)||0;
  const acr=parseFloat(document.getElementById('acr').value)||0;
  const dm   =document.getElementById('n_dm').checked;
  const has  =document.getElementById('n_has').checked;
  const ic   =document.getElementById('n_ic').checked;
  const dcv  =document.getElementById('n_dcv').checked;
  const hipo =document.getElementById('n_hipo').checked;
  const trat =document.getElementById('n_trat').value;
  if(!tfg){alert('Informe a TFG.');return;}

  const {g,gCol,a,aCol}=getStage(tfg,acr);
  const highRisk=acr>=300||tfg<45;

  document.getElementById('nefroResult').style.display='block';
  const stageHTML=`<div class="stage-card" style="border-color:${gCol};background:${gCol}15">
    <div style="display:flex;justify-content:center;gap:16px">
      <div><div class="stage-num" style="color:${gCol}">${g}</div><div class="stage-lbl" style="color:${gCol}">TFG ${tfg} mL/min</div></div>
      ${acr?`<div><div class="stage-num" style="color:${aCol}">${a}</div><div class="stage-lbl" style="color:${aCol}">ACR ${acr} mg/g</div></div>`:''}
    </div>
    <div class="stage-sub">${stageDesc(tfg,acr)}</div>
  </div>`;

  const recs=[];

  // RAAS
  const raasOk=!hipo&&tfg>=20;
  recs.push({hdr:'1ª Linha — IECA ou BRA (Nefroproteção RAAS)',col:raasOk?'#16a34a':'#d97706',
    nome:raasOk?'IECA/BRA — base da nefroproteção em DRC':'IECA/BRA — cautela (hipercalemia / TFG baixa)',
    badges:[{t:dm?'DRC diabética':'DRC com proteinúria',c:'#16a34a'},{t:'KDIGO 2024 IA',c:'#1e3a8a'}],
    body:`<strong>Quando usar:</strong> DRC diabética (qualquer ACR) · DRC não-diabética com ACR ≥30 mg/g · IC FEr<br><strong>Fármacos:</strong> Enalapril 5–20 mg/dia · Lisinopril 10–40 mg/dia · Ramipril 5 mg/dia · Losartana 50–100 mg/dia<br><strong>Iniciar:</strong> dose baixa; checar K⁺ e creatinina em 1–2 semanas<br>Aceitável: ↑ creatinina ≤30% e K⁺ ≤5,5 (não suspender — indica eficácia anti-hipertensiva intrarrenal)<br><strong>Meta PA:</strong> &lt;130/80 mmHg (ou &lt;120 sistólica se tolerado em DRC+proteinúria)`,
    note:hipo?'⚠️ K⁺ >5,0: usar com cautela ou associar quelante de K⁺ (patirômero) antes de iniciar. TFG <20: manter se já em uso; não iniciar se nunca usou.':
      'NÃO combinar IECA + BRA (ONTARGET: mais RAM sem benefício adicional). Monitorar K⁺ e creatinina a cada 3–6 meses estável.'});

  // iSGLT2
  const sglt2Ok=tfg>=20;
  recs.push({hdr:'2ª Linha — iSGLT2 (Nefroproteção adicional)',col:sglt2Ok?'#0369a1':'#dc2626',
    nome:sglt2Ok?'Dapagliflozina ou Empagliflozina — CREDENCE / DAPA-CKD / EMPA-KIDNEY':'iSGLT2 contraindicado se TFG <20',
    badges:[{t:'DAPA-CKD: ↓39% progressão',c:'#0369a1'},{t:'EMPA-KIDNEY',c:'#0369a1'}],
    body:sglt2Ok?`<strong>Dapagliflozina 10 mg/dia</strong> (indicada em DRC com ACR ≥200 mg/g, TFG 25–75, independente de DM — DAPA-CKD)<br><strong>Empagliflozina 10 mg/dia</strong> (TFG ≥20 — EMPA-KIDNEY)<br><strong>Continuar após queda de TFG:</strong> não suspender se TFG cair para 20–24 após iniciar — manter para proteção<br><strong>Efeito adicional:</strong> ↓ proteinúria, ↓ eventos IC, ↓ hospitalizações`:'TFG <20: iSGLT2 ineficaz e não recomendado. Aguardar transplante ou iniciar diálise.',
    note:dm?'DM + DRC: iSGLT2 benefício triplo: glicêmico + renal + cardiovascular. Reduzir dose de insulina/SU ao iniciar para prevenir hipoglicemia.':
      'DRC sem DM: dapagliflozina aprovada (DAPA-CKD) se ACR ≥200 mg/g. Principal RAM: ITU e candidíase genital.'});

  // Metas
  recs.push({hdr:'Metas Terapêuticas na DRC',col:'#7c3aed',nome:'PA + Proteinúria + HbA1c + Tabagismo',badges:[{t:'KDIGO 2024',c:'#7c3aed'}],
    body:`<strong>Pressão arterial:</strong> &lt;130/80 mmHg (IECA/BRA de escolha)<br><strong>Proteinúria:</strong> Meta ACR &lt;300 mg/g; se possível &lt;30 mg/g<br><strong>HbA1c (DM + DRC):</strong> 7,0% (não &lt;6,5% — risco de hipoglicemia aumentado na DRC)<br><strong>Metformina:</strong> manter se TFG ≥30 (reduzir dose a 500 mg 2×/dia se TFG 30–44); suspender se TFG &lt;30<br><strong>Cessação tabagismo:</strong> tabagismo acelera declínio de TFG em 0,5 mL/min/ano adicional<br><strong>Restrição proteica:</strong> 0,6–0,8 g/kg/dia (se TFG &lt;45 e sem diálise) — reduz carga azoatada`,
    note:ic?'IC + DRC: dupla indicação para iSGLT2 e IECA/BRA. Furosemida mantém eficácia até TFG ~15. Espironolactona: cuidado com hipercalemia em DRC G3b+.':
      `Encaminhar ao nefrologista quando: TFG &lt;30 (progressão acelerada, preparo para TRS) · ACR &gt;300 · Causa incerta · K⁺ ou Na⁺ difícil controle.`});

  // Fármacos a evitar
  const evitar=['AINE e COX-2: vasoconstricção da artéria aferente → precipita IRA em DRC (evitar se TFG <60)','Contraste iodado IV: nefropatia por contraste se TFG <45 (hidratar com SF 0,9% antes e depois)','Aminoglicosídeos (gentamicina): nefrotóxicos → usar somente se essencial com monitoramento de nível sérico','Metformina (se TFG <30) e outros que requerem ajuste — ver aba Fármacos/TFG'];
  recs.push({hdr:'Medicamentos a Evitar / Ajustar na DRC',col:'#dc2626',nome:'Nefrotóxicos e drogas de excreção renal',badges:[{t:'Revisão obrigatória',c:'#dc2626'}],
    body:evitar.map(e=>`• ${e}`).join('<br>'),note:'Revisar TODOS os medicamentos quando TFG cai abaixo de 60 e abaixo de 30. Ver aba Fármacos/TFG para recomendações individuais.'});

  document.getElementById('nefroResult').innerHTML=stageHTML+recs.map(r=>`<div class="rec-card" style="border-color:${r.col}"><div class="rec-hdr" style="color:${r.col}">${r.hdr}</div><div class="rec-nome">${r.nome}</div><div>${r.badges.map(b=>`<span class="rec-badge" style="background:${b.c}">${b.t}</span>`).join('')}</div><div class="rec-body">${r.body}</div><div class="rec-note">${r.note}</div></div>`).join('');
  document.getElementById('nefroResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function stageDesc(tfg,acr){
  let s='';
  if(tfg>=90)s='DRC G1: TFG normal ou aumentada (com marcador de dano)';
  else if(tfg>=60)s='DRC G2: TFG levemente reduzida';
  else if(tfg>=45)s='DRC G3a: TFG levemente a moderadamente reduzida';
  else if(tfg>=30)s='DRC G3b: TFG moderada a gravemente reduzida';
  else if(tfg>=15)s='DRC G4: TFG gravemente reduzida — preparo para TRS';
  else s='DRC G5: Falência renal — diálise ou transplante';
  if(acr) s+=' · Albuminúria '+(acr<30?'A1 (normal)':acr<=300?'A2 (moderada)':'A3 (alta)');
  return s;
}

/* ── COMPLICAÇÕES ───────────────────────────────────────────────────── */
function renderComp(){
  const COMPS=[
    {nome:'Anemia Renal (DRC G3b–G5)',col:'#dc2626',
     trig:'Hb <10 g/dL (ou <10,5 em pré-diálise sintomático)',
     trat:`<strong>1. Descartar deficiência de ferro primeiro (sempre):</strong><br>Ferritina &lt;200 ng/mL ou sat. transferrina &lt;20%: reposição IV de ferro (ferrocarboxialtose 500–1000 mg IV) ou VO (sulfato ferroso 200 mg 3×/dia — absorção reduzida em DRC)<br><br><strong>2. Agente Estimulante de Eritropoiese (AEE):</strong><br>Epoetina alfa 50–100 UI/kg SC 3×/semana · Epoetina beta 50 UI/kg SC 3×/semana · Darbepoetina alfa 0,45 mcg/kg SC 1×/sem<br>Meta Hb: 10–12 g/dL (NÃO normalizar &gt;13 g/dL — risco de AVC e TEV)<br><br><strong>3. Inibidores de PHD (ROXASTAT — em DRC pré-diálise):</strong><br>Roxadustate: nova classe; estimula eritropoiese via HIF sem injeção SC`,
     note:'Hemoglobina >13 g/dL com AEE: aumenta mortalidade CV (TREAT trial). Corrigir ferro ANTES de iniciar AEE — AEE ineficaz sem ferro adequado.'},
    {nome:'Hiperfosfatemia (P > 5,5 mg/dL)',col:'#d97706',
     trig:'Fósforo sérico >5,5 mg/dL — DRC G3b+ (produto Ca×P >55 → calcificação vascular)',
     trat:`<strong>1. Restrição dietética de fósforo:</strong> &lt;900 mg/dia (laticínios, leguminosas, refrigerante escuro)<br><br><strong>2. Quelantes de fósforo com as refeições:</strong><br>• <strong>Carbonato de cálcio</strong> 500–1000 mg com as principais refeições (barato; cuidado se Ca sérico alto)<br>• <strong>Sevelamer</strong> 800–1600 mg com as refeições (sem cálcio — preferível se calcificação vascular ou Ca >10,2)<br>• <strong>Hidróxido de alumínio</strong> (somente curto prazo — toxicidade por Al a longo prazo)<br>• <strong>Carbonato de lantânio</strong> 500–1000 mg com refeições (mascar antes de engolir)`,
     note:'Sevelamer também reduz colesterol LDL (~15%). Cuidado: quelantes de cálcio + vitamina D ativa pode hipercalcemia. Dar quelante DURANTE a refeição (não antes/depois).'},
    {nome:'Hiperparatireoidismo Secundário (PTH elevado)',col:'#b45309',
     trig:'PTH intacto (iPTH) >200 pg/mL em G4-G5; >300 em diálise',
     trat:`<strong>1. Controlar hiperfosfatemia primeiro</strong> (fósforo elevado estimula PTH)<br><br><strong>2. Vitamina D ativa (calcitriol / alfacalcidol):</strong><br>Calcitriol 0,25 mcg/dia → 0,25 mcg em dias alternados se hipercalcemia · Alfacalcidol 0,25–1 mcg/dia<br>Objetivo: normalizar Ca, P e reduzir PTH sem hipercalcemia<br><br><strong>3. Cinacalcete (calcimimético):</strong><br>Cinacalcete 30 mg/dia → titular a cada 2–4 sem até 180 mg/dia conforme PTH<br>Indicado se iPTH persistente >2–9× LSN apesar de vitamina D · Reduz Ca × P produto<br>RAM: náusea/vômito (tomar com alimento), hipocalcemia`,
     note:'Paratiroidectomia: PTH >800 persistente com Ca e P altos + calcificação grave = indicação cirúrgica. Etelcalcetide (IV em diálise): alternativa ao cinacalcete oral.'},
    {nome:'Hipercalemia (K⁺ > 5,5 mEq/L)',col:'#7c3aed',
     trig:'K⁺ >5,5 em DRC G3b+; aumentado por IECA/BRA/MRA/iSGLT2',
     trat:`<strong>Dieta:</strong> &lt;2 g K⁺/dia (evitar banana, laranja, tomate, batata, suco, frutas secas)<br><br><strong>Agentes quelantes de K⁺ — cronicamente:</strong><br>• <strong>Patirômero</strong> (Veltassa) 8,4–25,2 g/dia em pó (resina polímero; maior evidência, melhor tolerado)<br>• <strong>Zircônio de silicato de sódio</strong> (SZC / Lokelma) 10 g 3×/dia × 48h → manutenção 5–10 g/dia<br><br><strong>Crise aguda (K⁺ &gt;6,5 ou ECG alterado):</strong><br>Gluconato de cálcio 10 mL 10% IV (estabilização de membrana) · Insulina regular 10 UI + glicose 50% · Bicarbonato IV · Hemodiálise urgente se refratário`,

}

const GRUPOS=[...new Set(DRCMEDS.map(d=>d.g))];
let activeCat=null;
const CAT_COLS={'Antidiabéticos':'#d97706','Anti-hipertensivos':'#0369a1','Analgésicos':'#b45309','Antibióticos':'#059669','Anticoagulantes':'#dc2626','Neurológicos / Outros':'#6d28d9'};

function stCell(s,t){const m={ok:{bg:'#dcfce7',col:'#166534'},cuid:{bg:'#fef3c7',col:'#92400e'},evit:{bg:'#ffedd5',col:'#c2410c'},ci:{bg:'#fee2e2',col:'#991b1b'}};const c=m[s]||{bg:'#f1f5f9',col:'#64748b'};return `<div class="tfg-cell" style="background:${c.bg}"><div class="tfg-lbl" style="color:${c.col}">${s.toUpperCase()}</div><div class="tfg-val" style="color:${c.col}">${t}</div></div>`;}

function buildChips(){
  document.getElementById('drcChips').innerHTML=GRUPOS.map(g=>{const col=CAT_COLS[g]||'#64748b',act=activeCat===g;return `<span class="cat-chip${act?' active':''}" style="border-color:${col};${act?'background:'+col+';color:#fff':''}" onclick="toggleCat('${g}')">${g}</span>`;}).join('');
}
function toggleCat(g){activeCat=activeCat===g?null:g;buildChips();renderDrugs();}

function renderDrugs(){
  const q=document.getElementById('drcSearch').value.toLowerCase();
  let items=DRCMEDS;
  if(activeCat) items=items.filter(d=>d.g===activeCat);
  if(q) items=items.filter(d=>`${d.n} ${d.g} ${d.t60} ${d.t30} ${d.t15} ${d.note}`.toLowerCase().includes(q));
  const list=document.getElementById('drcDrugList');
  if(!items.length){list.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8">🔎 Nenhum resultado.</div>';return;}
  list.innerHTML=items.map(d=>`
    <div class="drug-card">
      <div class="drug-grupo">${d.g}</div>
      <div class="drug-nome">${d.n}</div>
      <div class="tfg-grid">
        <div class="tfg-cell" style="background:#eff6ff"><div class="tfg-lbl" style="color:#1e3a8a">TFG ≥60</div><div class="tfg-val" style="color:#1e3a8a">${d.t60}</div></div>
        ${stCell(d.s30,'TFG 30–59: '+d.t30)}
        ${stCell(d.s15,'TFG 15–29: '+d.t15)}
        ${stCell(d.sd,'<15/Diálise: '+d.td)}
      </div>
      <div class="drug-note">💡 ${d.note}</div>
    </div>`).join('');
}
