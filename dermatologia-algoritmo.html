<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dermatologia — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .derm-hdr{background:linear-gradient(135deg,#be185d,#db2777);color:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
    .derm-title{font-size:1rem;font-weight:800;margin-bottom:4px}
    .derm-sub{font-size:.73rem;opacity:.8}
    label{font-size:.75rem;font-weight:700;color:#1e3a5f;display:block;margin-bottom:4px}
    select{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;margin-bottom:10px}
    select:focus{border-color:#be185d;outline:none}
    input[type=number]{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;outline:none;margin-bottom:10px}
    input:focus{border-color:#be185d}
    .checkbox-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .checkbox-item{display:flex;align-items:center;gap:8px;font-size:.8rem;cursor:pointer}
    .checkbox-item input[type=checkbox]{width:18px;height:18px;accent-color:#be185d;cursor:pointer}
    .btn-calc{width:100%;background:#be185d;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.87rem;font-weight:700;cursor:pointer;margin:8px 0}
    .tab-bar{display:flex;gap:6px;margin-bottom:14px}
    .tab-btn{flex:1;padding:9px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:.76rem;font-weight:700;cursor:pointer;color:#64748b}
    .tab-btn.active{border-color:#be185d;background:#fdf2f8;color:#be185d}
    .rec-card{border-radius:12px;border:2px solid;padding:14px;margin-bottom:10px}
    .rec-hdr{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .rec-nome{font-size:.88rem;font-weight:800;margin-bottom:6px}
    .rec-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;color:#fff;margin:2px}
    .rec-body{font-size:.78rem;margin-top:6px;line-height:1.7}
    .rec-note{font-size:.71rem;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #f1f5f9}
    .derm-card{border-radius:10px;border-left:5px solid;padding:10px 14px;margin-bottom:8px;background:#fff}
    .derm-nome{font-size:.83rem;font-weight:800;margin-bottom:4px}
    .derm-body{font-size:.76rem;line-height:1.7;color:#374151}
    .derm-note{font-size:.7rem;color:#64748b;margin-top:4px}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  </style>
</head>
<body>
<header class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="top-title">Dermatologia — Algoritmo</span>
  <div class="top-right"></div>
</header>
<main class="container" style="padding-bottom:90px">
  <div class="derm-hdr">
    <div class="derm-title">🧴 Dermatologia — Algoritmo Farmacoterapêutico</div>
    <div class="derm-sub">Acne · Psoríase · Dermatite atópica · Onicomicose · Herpes · Urticária · Tinea</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tb0" onclick="showTab(0)">Acne</button>
    <button class="tab-btn" id="tb1" onclick="showTab(1)">Psoríase & DA</button>
    <button class="tab-btn" id="tb2" onclick="showTab(2)">Outras Dermatoses</button>
  </div>

  <!-- TAB 0 — ACNE -->
  <div id="tab0">
    <div class="card" style="padding:12px 14px">
      <label>Grau de acne</label>
      <select id="acne_grau">
        <option value="1">Grau I — Comedoniana (cravos abertos/fechados, sem inflamação)</option>
        <option value="2">Grau II — Mista leve (pápulas e pústulas + comedões)</option>
        <option value="3">Grau III — Pápulo-pustulosa moderada (disseminada, eritema)</option>
        <option value="4">Grau IV — Nódulo-cística / Conglobata (nódulos, cistos, risco de cicatriz)</option>
      </select>
      <label>Perfil e comorbidades</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="acne_gest"> Gestante</label>
        <label class="checkbox-item"><input type="checkbox" id="acne_cicatriz"> Cicatrizes ou histórico de queloides</label>
        <label class="checkbox-item"><input type="checkbox" id="acne_sop"> SOP / hiperandrogenismo suspeito</label>
        <label class="checkbox-item"><input type="checkbox" id="acne_falha"> Falha de ATB tópico ≥3 meses</label>
      </div>
    </div>
    <button class="btn-calc" onclick="calcAcne()">🧴 Gerar escada terapêutica</button>
    <div id="acneResult" style="display:none"></div>
  </div>

  <!-- TAB 1 — PSORÍASE & DA -->
  <div id="tab1" style="display:none">
    <div class="card" style="padding:12px 14px">
      <label>Diagnóstico</label>
      <select id="pa_dx">
        <option value="pso_leve">Psoríase em Placas — Leve (PASI <10, BSA <10%, DLQI <10)</option>
        <option value="pso_mod">Psoríase em Placas — Moderada a Grave (PASI ≥10 ou BSA ≥10% ou DLQI ≥10)</option>
        <option value="pso_ungeal">Psoríase Ungueal</option>
        <option value="da_leve">Dermatite Atópica — Leve (EASI <7)</option>
        <option value="da_mod">Dermatite Atópica — Moderada a Grave (EASI ≥7)</option>
      </select>
      <label>Comorbidades / perfil</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="pa_artrite"> Artrite psoriásica associada</label>
        <label class="checkbox-item"><input type="checkbox" id="pa_gest"> Gestante / planejamento</label>
        <label class="checkbox-item"><input type="checkbox" id="pa_crianca"> Criança (&lt;12 anos)</label>
        <label class="checkbox-item"><input type="checkbox" id="pa_idoso"> Idoso (&gt;65 anos)</label>
        <label class="checkbox-item"><input type="checkbox" id="pa_drc"> DRC ou hepatopatia</label>
      </div>
    </div>
    <button class="btn-calc" onclick="calcPA()">💊 Gerar protocolo</button>
    <div id="paResult" style="display:none"></div>
  </div>

  <!-- TAB 2 — OUTRAS -->
  <div id="tab2" style="display:none">
    <div id="outrasList"></div>
  </div>
</main>

<script>
function showTab(n){[0,1,2].forEach(i=>{document.getElementById('tab'+i).style.display=i===n?'block':'none';document.getElementById('tb'+i).classList.toggle('active',i===n);});if(n===2)renderOutras();}
function recHTML(r){return `<div class="rec-card" style="border-color:${r.col}"><div class="rec-hdr" style="color:${r.col}">${r.hdr}</div><div class="rec-nome">${r.nome}</div><div>${(r.badges||[]).map(b=>`<span class="rec-badge" style="background:${b.c}">${b.t}</span>`).join('')}</div><div class="rec-body">${r.body}</div>${r.note?`<div class="rec-note">${r.note}</div>`:''}</div>`;}

/* ── ACNE ────────────────────────────────────────────────────────────── */
function calcAcne(){
  const grau   =parseInt(document.getElementById('acne_grau').value);
  const gest   =document.getElementById('acne_gest').checked;
  const cicatriz=document.getElementById('acne_cicatriz').checked;
  const sop    =document.getElementById('acne_sop').checked;
  const falha  =document.getElementById('acne_falha').checked;
  const recs=[];

  recs.push({hdr:'Base — Limpeza e Fotoproteção',col:'#be185d',
    nome:'Higiene com sabonete não-comedogênico + protetor solar oil-free',badges:[{t:'Base universal',c:'#be185d'}],
    body:`Limpeza 2×/dia com sabonete de ácido salicílico 0,5–2% ou gluconolactona<br>
Fotoproteção diária FPS≥30 oil-free / não-comedogênico (obrigatório com retinoides)<br>
Evitar manipulação das lesões (↑ risco de cicatriz e pigmentação pós-inflamatória)`,note:''});

  if(grau>=1){
    recs.push({hdr:'Passo 1 — Comedônica / Leve',col:'#d97706',
      nome:gest?'Ácido azelaico + Peróxido de benzoíla — seguros na gestação':'Retinoide tópico + Peróxido de benzoíla',
      badges:[{t:'Tópico',c:'#d97706'},{t:gest?'Gestação':'1ª linha',c:gest?'#9d174d':'#b45309'}],
      body:gest
        ?`<strong>Gestação:</strong><br>
• <strong>Ácido azelaico</strong> 15–20% gel/creme 2×/dia (categoria B — seguro em toda gestação; eficaz para comedões e inflamação)<br>
• <strong>Peróxido de benzoíla</strong> 2,5–5% — limitado dados; uso localizado na menor dose possível<br>
• <strong>Eritromicina tópica</strong> 2%: ATB tópico seguro na gestação<br>
Evitar: retinoides (tópico e oral — teratogênicos), doxiciclina, espironolactona`
        :`<strong>Retinoide tópico (1ª linha comedoniana):</strong><br>
• <strong>Tretinoína</strong> 0,025–0,05% creme (noite — fotossensível; iniciar 3×/sem → diária conforme tolerância)<br>
• <strong>Adapaleno</strong> 0,1% gel/creme: melhor tolerabilidade que tretinoína; 1×/dia à noite<br>
• <strong>Tazaroteno</strong> 0,1% gel: mais potente; para lesões resistentes<br>
<strong>Peróxido de benzoíla</strong> 2,5–5% gel: antimicrobiano + comedolítico; manhã (não associar ao mesmo horário do retinoide)<br>
Combinação adapaleno + PB em gel único: ↑ aderência`,
      note:'Retinoides tópicos: irritação inicial esperada (eritema, descamação) — adapaleno é mais tolerado. NUNCA usar retinoide tópico em gestante. Fotoprotetor obrigatório ao usar retinoide.'});
  }

  if(grau>=2){
    recs.push({hdr:'Passo 2 — Inflamatória Leve a Moderada',col:'#d97706',
      nome:gest?'Eritromicina tópica + ácido azelaico':'ATB tópico + retinoide + PB',
      badges:[{t:'Tópico combinado',c:'#d97706'}],
      body:gest
        ?`<strong>Eritromicina 2%</strong> loção/gel 2×/dia (segura na gestação)<br>
Associar com peróxido de benzoíla 2,5% para reduzir resistência<br>
Ácido azelaico 15–20%: comedolítico + anti-inflamatório`
        :`<strong>ATBs tópicos (sempre combinar com PB para evitar resistência):</strong><br>
• <strong>Clindamicina</strong> 1% loção/gel 2×/dia + PB 5% (separados ou em formulação combinada)<br>
• <strong>Eritromicina</strong> 2% + PB 5%: alternativa<br>
ATB tópico nunca em monoterapia (resistência de C. acnes → PB previne resistência)<br>
Duração máxima de ATB tópico: 12 semanas → reavaliar<br>
<strong>Ácido salicílico</strong> 0,5–2%: comedolítico + peelings químicos em consultório`,
      note:falha?'⚠️ Falha de ATB tópico ≥3 meses: progredir para ATB oral. Resistência de C. acnes a eritromicina e clindamicina é crescente — preferir clindamicina + PB para reduzir pressão de seleção.':''});
  }

  if(grau>=2&&!gest){
    recs.push({hdr:'Passo 3 — ATB Oral (grau II–III ou falha tópico)',col:'#0369a1',
      nome:'Doxiciclina ou Limeciclina — 1ª linha oral',badges:[{t:'ATB oral',c:'#0369a1'},{t:'Máx 3–6 meses',c:'#1d4ed8'}],
      body:`<strong>1ª linha:</strong><br>
• <strong>Doxiciclina</strong> 50–100 mg/dia (baixa dose anti-inflamatória: 40–50 mg/dia — tão eficaz, menos resistência)<br>
• <strong>Limeciclina</strong> 300 mg/dia: alternativa à doxiciclina (melhor tolerabilidade GI)<br>
• Duração: máximo 3–6 meses · NUNCA em monoterapia → sempre com PB tópico<br>
<strong>Contraindicações das tetraciclinas:</strong> <12 anos (↓ calcificação óssea) · Gestação · Lactação<br><br>
<strong>Alternativa (alergia/CI):</strong><br>
• <strong>Azitromicina</strong> 500 mg 3×/semana (resistência crescente — usar apenas se CI às tetraciclinas)<br>
• <strong>Amoxicilina</strong> 500 mg 3×/dia (menos evidência para acne)`,
      note:`${sop?'SOP/Hiperandrogenismo: espironolactona 50–200 mg/dia (antiandrogênico; contracepção obrigatória; monitorar K+) ou anticoncepcional oral (ciproterona + etinilestradiol). Tratar a causa hormonal para efeito sustentado.':''}ATB oral: nunca por mais de 6 meses. Resistência bacteriana é real — associar SEMPRE PB tópico e limitar duração.`});
  }

  if(grau===4||cicatriz||(grau>=3&&falha)){
    if(!gest){
      recs.push({hdr:'Passo 4 — Isotretinoína Oral (Acnotin / Roacutan)',col:'#dc2626',
        nome:'Acne grave, nódulo-cística, resistente ou com risco de cicatriz',badges:[{t:'Isotretinoína',c:'#dc2626'},{t:'Tratamento definitivo',c:'#7f1d1d'}],
        body:`<strong>Dose:</strong> 0,5 mg/kg/dia → aumentar para 1 mg/kg/dia conforme tolerância<br>
Dose cumulativa alvo: 120–150 mg/kg (menor recidiva) — duração média 4–6 meses<br><br>
<strong>Exames antes de iniciar:</strong><br>
• Hemograma + TGP + TGO + triglicerídeos + colesterol · β-hCG (mulheres)<br>
• Repetir mensalmente nos primeiros 3 meses, depois a cada 2–3 meses<br><br>
<strong>Contracepção — Programa de Prevenção de Gravidez (obrigatório):</strong><br>
• Dois métodos anticoncepcionais eficazes 1 mês antes → durante tratamento → 1 mês após<br>
• Teste de gravidez negativo antes de prescrever e mensalmente<br><br>
<strong>Efeitos adversos e manejo:</strong><br>
• <strong>Queilite / pele seca:</strong> hidratante + protetor labial (mais comum; invariável — preparar o paciente)<br>
• <strong>Hipertrigliceridemia:</strong> reduzir gordura · Fenofibrato se >500 mg/dL · Reduzir dose se >800 mg/dL<br>
• <strong>Hepatotoxicidade:</strong> TGP >3× suspender<br>
• <strong>Sintomas musculares:</strong> ↑ CPK em exercício intenso → avaliar suspensão temporária<br>
• <strong>Fotossensibilidade:</strong> FPS diário obrigatório<br>
• <strong>Depressão / pensamentos suicidas:</strong> raramente relatado — monitorar saúde mental; suspender se sintomas`,
        note:cicatriz?'Acne com risco de cicatriz: isotretinoína mesmo em grau III se lesões nodulares em áreas com propensão a queloides (mandíbula, tórax). Não aguardar falha de múltiplos ciclos de ATB.':'Acne resistente a ≥2 ciclos de ATB sistêmico: indicação formal de isotretinoína (AAD 2022). Flare inicial: peróxido de benzoíla + dose baixa (0,25 mg/kg) nos primeiros 4 semanas.'});
    } else {
      recs.push({hdr:'Acne Grave na Gestação',col:'#9d174d',nome:'Apenas tópicos seguros + dermatologista',badges:[{t:'Gestação',c:'#9d174d'}],
        body:'Isotretinoína ABSOLUTAMENTE CONTRAINDICADA na gestação (teratogenicidade grave — aborto espontâneo, malformações cardíacas, SNC, craniofaciais)<br>Manejo com ácido azelaico + eritromicina tópica + PB suave + higiene adequada<br>Caso grave: encaminhar ao dermatologista para avaliação individualizada',note:''});
    }
  }

  document.getElementById('acneResult').style.display='block';
  document.getElementById('acneResult').innerHTML=recs.map(recHTML).join('');
  document.getElementById('acneResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ── PSORÍASE & DA ───────────────────────────────────────────────────── */
function calcPA(){
  const dx    =document.getElementById('pa_dx').value;
  const artrite=document.getElementById('pa_artrite').checked;
  const gest  =document.getElementById('pa_gest').checked;
  const crianca=document.getElementById('pa_crianca').checked;
  const idoso =document.getElementById('pa_idoso').checked;
  const drc   =document.getElementById('pa_drc').checked;
  const recs=[];
  const isDA=dx.startsWith('da');

  if(!isDA){
    // PSORÍASE
    if(dx==='pso_leve'){
      recs.push({hdr:'Psoríase Leve — Tratamento Tópico',col:'#be185d',
        nome:'Corticoide tópico + Calcipotriol — dupla terapia de 1ª linha',badges:[{t:'Tópico',c:'#be185d'},{t:'1ª linha',c:'#9d174d'}],
        body:`<strong>Associação preferida (maior eficácia que monoterapia):</strong><br>
• <strong>Calcipotriol 50 mcg/g + Betametasona dipropionato 0,5 mg/g</strong> em gel ou espuma 1×/dia (Daivobet/Enstilar)<br>
→ Calcipotriol: análogo de vitamina D3 — antiproliferativo e imunomodulador<br>
→ Betametasona: potente corticoide tópico<br><br>
<strong>Corticoide tópico isolado (por localização):</strong><br>
• Couro cabeludo: betametasona loção ou xampu clobetasol 0,05%<br>
• Face / dobras: hidrocortisona 1% ou desonida 0,05% (evitar potentes nessas áreas — atrofia)<br>
• Tronco/membros: betametasona valerato 0,1% creme ou halobetasol 0,05%<br>
• Palmas/plantas (hiperceratose): halobetasol 0,05% com cobertura oclusiva × 1 semana<br><br>
<strong>Rotação ("pulsoterapia tópica"):</strong> corticoide 5 dias → calcipotriol 2 dias (fim de semana) — reduz atrofia e taquifilaxia<br>
<strong>Ácido salicílico</strong> 5–10% (queratolítico): antes de corticoide em placas espessas`,
        note:gest?'Gestação: corticoide tópico de baixa-média potência (hidrocortisona, triamcinolona) em pequenas áreas. Calcipotriol: dados limitados — evitar em 1T. Evitar uso extenso e sob oclusão.':'Atrofia cutânea com corticoide tópico: após 4 semanas de potente → pausa de 4 semanas ou rotação para calcipotriol. Face e dobras: nunca mais de 2 semanas de potente.'});
    }

    if(dx==='pso_mod'){
      recs.push({hdr:'Psoríase Moderada-Grave — Sistêmico ou Biológico',col:'#dc2626',
        nome:'Metotrexato ou Acitretina → Biológico (anti-IL-17, anti-IL-23, anti-TNF)',badges:[{t:'PASI ≥10',c:'#dc2626'},{t:'Sistêmico',c:'#7f1d1d'}],
        body:gest
          ?`<strong>Gestação: sistêmicos limitados</strong><br>
• Tópicos seguros (betametasona área limitada, calcipotriol)<br>
• Fototerapia UVB banda estreita (311 nm): opção segura em toda gestação<br>
• Ciclosporina: usada com cautela em 2T/3T (teratogênica no 1T)<br>
• Evitar: MTX (teratogênico), acitretina (teratogênica — washout ≥3 anos para concepção!), biológicos com dados insuficientes`
          :`<strong>Sistêmicos convencionais:</strong><br>
• <strong>Metotrexato</strong> 7,5–25 mg/semana VO/SC + ácido fólico 5 mg/semana (1ª linha sistêmico — eficaz para pele e articulações)<br>
• <strong>Acitretina</strong> 25–50 mg/dia (retinoide sistêmico; eficaz para psoríase palmoplantar e ungueal; TERATOGÊNICO — washout ≥3 anos antes de concepção)<br>
• <strong>Ciclosporina</strong> 2,5–5 mg/kg/dia (uso curto — indução de remissão; toxicidade renal e HAS limitam uso prolongado; máx 2 anos)<br>
• <strong>Apremilaste</strong> 30 mg 2×/dia (inibidor de PDE4 — oral; menor eficácia que biológicos; sem imunossupressão significativa)<br><br>
<strong>Biológicos (PASI ≥10 com falha sistêmica):</strong><br>
• <strong>Anti-IL-17A:</strong> Secuquinumabe 300 mg SC/sem ×5 (indução) → mensalmente — eficácia ↑↑↑ (PASI90 ~60%)<br>
• <strong>Anti-IL-23 (anti-p19):</strong> Guselcumabe 100 mg SC em 0, 4 sem → a cada 8 sem; Risuquizumabe 150 mg SC em 0, 4 sem → a cada 12 sem<br>
• <strong>Anti-IL-12/23 (anti-p40):</strong> Ustekinumabe 45/90 mg SC (0, 4 sem → 12/12 sem)<br>
• <strong>Anti-TNF:</strong> Adalimumabe, Etanercepte (eficácia menor que IL-17/IL-23 para pele; preferidos se artrite psoriásica)`,
        note:`${artrite?'Artrite psoriásica: anti-TNF (adalimumabe, certolizumabe) e secuquinumabe têm indicação dupla pele + articulação. Anti-IL-23 (guselcumabe): dado positivo em AP. Anti-IL-17: MUITO eficaz para pele — considerar como 1ª linha biológica AP.':''}${drc?'DRC: ciclosporina contraindicada (nefrotóxica). MTX: ajustar dose. Biológicos: preferidos (sem ajuste renal necessário).':''}`});
    }

    if(dx==='pso_ungeal'){
      recs.push({hdr:'Psoríase Ungueal — Tratamento Específico',col:'#0369a1',
        nome:'Tópico + Biológico se associada a psoríase cutânea grave ou AP',badges:[{t:'Ungueal',c:'#0369a1'}],
        body:`Lesões: pitting, leuconíquia, óleo sob a lâmina, onicólise, hiperceratose subungueal<br><br>
<strong>Tópico (onicólise leve-moderada):</strong><br>
• Calcipotriol + betametasona (Daivobet) gel sob a prega ungueal proximal 1×/dia<br>
• Corticoide intralesional (triancinolona): eficaz para pitting e onicólise — técnica de injeção na prega proximal<br>
• Tacrolimus 0,1% tópico: alternativa<br><br>
<strong>Sistêmico (ungueal isolada grave ou sem resposta):</strong><br>
• MTX: melhora moderada<br>
• Acitretina: eficaz para hiperceratose subungueal<br>
• <strong>Adalimumabe ou Secuquinumabe:</strong> melhora significativa de psoríase ungueal (dados de estudos específicos — NAIL trial e outros)<br><br>
<strong>Prognóstico:</strong> melhora lenta (6–12 meses de tratamento para ver resultado — crescimento da unha leva meses)`,
        note:'Onicomicose concomitante (diagnóstico diferencial): dermoscopia + KOH + cultura antes de tratar como psoríase ungueal. Tratamento concomitante: terbinafina + tópico para psoríase ungueal se ambas confirmadas.'});
    }
  }

  if(isDA){
    // DERMATITE ATÓPICA
    if(dx==='da_leve'){
      recs.push({hdr:'Dermatite Atópica Leve — Tópico + Emoliente',col:'#0f766e',
        nome:'Hidratação intensiva + Corticoide tópico nas crises',badges:[{t:'EASI <7',c:'#0f766e'},{t:'Tópico',c:'#065f46'}],
        body:`<strong>Emoliente (base do tratamento — usar SEMPRE, não só na crise):</strong><br>
Cremes ricos em lipídeos (ceramidas, ácido linoleico) 2–3×/dia generosamente · Aplicar imediatamente após banho morno curto (2–5 min; água não quente)<br>
Ex.: vaselina pura (mais barata, mais oclusiva), Cetaphil, Cerave, Eucerin<br><br>
<strong>Corticoide tópico nas crises (wet-wrap technique em agudo):</strong><br>
• Face/dobras: Desonida 0,05% ou Hidrocortisona 1–2,5% (potência baixa — evitar atrofia em áreas sensíveis)<br>
• Tronco/membros: Mometasona furoato 0,1% ou Betametasona valerato 0,1% (potência média-alta)<br>
• Duração de crise: 5–7 dias → manutenção profilática 2×/semana nas áreas de recidiva frequente ("proactive therapy")<br><br>
<strong>Inibidores de calcineurina tópicos (ICT — manutenção e face):</strong><br>
• <strong>Tacrolimus</strong> 0,03% (crianças >2 anos) / 0,1% (adultos) pomada 2×/dia<br>
• <strong>Pimecrolimus</strong> 1% creme: menor potência que tacrolimus; melhor para face e dobras<br>
ICT evitam atrofia — preferidos para uso crônico em face e dobras`,
        note:`${crianca?'Crianças: desonida 0,05% ou hidrocortisona 1% (potência baixa) em fraldas e face. Tacrolimus 0,03% aprovado >2 anos. Emoliente desde o nascimento em bebês de risco (eczema parental) reduz incidência de DA.':''}Antihistamínico oral: sem evidência para prurido de DA (o prurido é mediado por IL-31/IL-4, não histamina). Hidroxizine: pode ajudar pelo efeito sedativo — uso noturno apenas se prurido interfere no sono.`});
    }

    if(dx==='da_mod'){
      recs.push({hdr:'Dermatite Atópica Moderada-Grave — Biológico ou JAKi',col:'#dc2626',
        nome:'Dupilumabe (1ª linha) → JAKi (abrocitinibe, baricitinibe, upadacitinibe)',badges:[{t:'EASI ≥7',c:'#dc2626'},{t:'Biológico',c:'#7f1d1d'}],
        body:`<strong>Controle sistêmico de curto prazo (ponte):</strong><br>
• Ciclosporina 2,5–5 mg/kg/dia × 3–6 meses (rápido; toxicidade renal e HAS limitam uso prolongado)<br>
• Metotrexato 10–15 mg/semana (início de ação mais lento — 8–12 semanas)<br>
• Corticoide oral: apenas em cursos curtos de indução (5–7 dias — sem uso crônico)<br><br>
<strong>Biológico de 1ª linha:</strong><br>
• <strong>Dupilumabe</strong> 600 mg SC (dose inicial) → 300 mg SC a cada 2 semanas (anti-IL-4Rα — bloqueia IL-4 e IL-13)<br>
Eficácia: EASI-75 em ~60% · Conjuntivite: RAM específica (15–20%) — colírio anti-inflamatório<br>
Sem imunossupressão sistêmica — pode vacinar normalmente<br>
Aprovado ≥6 meses (formulações pediátricas disponíveis)<br><br>
<strong>Inibidores de JAK (JAKi) — início de ação mais rápido que dupilumabe:</strong><br>
• <strong>Abrocitinibe</strong> 100–200 mg/dia VO (JAK1 seletivo) — EASI-90 em ~40% com 200 mg; início em 2 semanas<br>
• <strong>Upadacitinibe</strong> 15–30 mg/dia VO (JAK1 seletivo) — maior eficácia numérica entre JAKi em DA<br>
• <strong>Baricitinibe</strong> 2–4 mg/dia VO (JAK1/2) — aprovado ≥2 anos; menor eficácia que abrocitinibe/upa<br>
<strong>Alertas JAKi:</strong> mesmo perfil de segurança que para AR (infecção, herpes-zóster, MACE, trombose — ver AR)`,
        note:`${gest?'Dupilumabe: dados de segurança limitados na gestação — usar apenas se benefício > risco. JAKi: evitar na gestação e lactação.':''}${crianca?'Dupilumabe: aprovado ≥6 meses para DA grave. Ciclosporina: dados pediátricos para ≥2 anos. JAKi: baricitinibe aprovado ≥2 anos para DA.':''}Trefinamento: EASI-75 às 16 semanas → se atingido, manter dupilumabe indefinidamente. Não atingido: reavaliar diagnóstico, desencadeantes, aderência ao emoliente.`});
    }
  }

  document.getElementById('paResult').style.display='block';
  document.getElementById('paResult').innerHTML=recs.map(recHTML).join('');
  document.getElementById('paResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

    {nome:'Tinea (Dermatofitose) — Tinea Corporis, Pedis, Cruris, Versicolor',col:'#0369a1',
     body:`<strong>Tinea corporis / cruris / pedis (antifúngico tópico — 1ª linha):</strong><br>
• <strong>Terbinafina</strong> 1% creme 1×/dia × 1–2 semanas (tinea corporis/cruris) ou × 2–4 semanas (pedis)<br>

     note:'Tinea pedis: lavar e secar bem entre os dedos; meias de algodão; antifúngico em pó (miconazol) nos sapatos. Recorrência é comum — tratamento profilático mensal (cetoconazol xampu 1×/mês) em casos recidivantes.'},
    {nome:'Herpes Labial e Herpes-Zóster',col:'#7c3aed',
     body:`<strong>Herpes labial (HSV-1):</strong><br>
Episódico (sintomático): <strong>Aciclovir</strong> 400 mg 5×/dia × 5 dias ou Valaciclovir 2 g 2×/dia × 1 dia (VALACLOVIR dose única)<br>

     note:'Vacinação: Shingrix (vacina recombinante) ≥50 anos (2 doses, 2–6 meses de intervalo) — eficácia 90%+ para zóster e NPH. Pode ser dada com imunossupressor (não é vírus vivo). Substitui Zostavax (vírus vivo atenuado).'},
    {nome:'Urticária — Aguda e Crônica Espontânea (UCE)',col:'#d97706',
     body:`<strong>Urticária Aguda (<6 semanas):</strong><br>

     note:'UCE: investigação de causa em maioria frustra — apenas 20% têm causa identificável (autoimune em 40–50% dos casos). Anti-H1 de 1ª geração (prometazina, difenidramina): EVITAR como uso crônico — sedação, anticolinérgico, sem superioridade. H2 (ranitidina/famotidina): sem evidência adicional na UCE — não indicar rotineiramente.'},
