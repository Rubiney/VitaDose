  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/vitadose.css">

  <style>
    .hep-hdr{background:linear-gradient(135deg,#78350f,#b45309);color:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
    .hep-title{font-size:1rem;font-weight:800;margin-bottom:4px}
    .hep-sub{font-size:.73rem;opacity:.8}
    label{font-size:.75rem;font-weight:700;color:#1e3a5f;display:block;margin-bottom:4px}
    select{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;margin-bottom:10px}
    select:focus{border-color:#78350f;outline:none}
    input[type=number]{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;outline:none;margin-bottom:10px}
    input:focus{border-color:#78350f}
    .checkbox-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .checkbox-item{display:flex;align-items:center;gap:8px;font-size:.8rem;cursor:pointer}
    .checkbox-item input[type=checkbox]{width:18px;height:18px;accent-color:#78350f;cursor:pointer}
    .btn-calc{width:100%;background:#78350f;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.87rem;font-weight:700;cursor:pointer;margin:8px 0}
    .tab-bar{display:flex;gap:6px;margin-bottom:14px}
    .tab-btn{flex:1;padding:9px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:.76rem;font-weight:700;cursor:pointer;color:#64748b}
    .tab-btn.active{border-color:#78350f;background:#fef3c7;color:#78350f}
    .rec-card{border-radius:12px;border:2px solid;padding:14px;margin-bottom:10px}
    .rec-hdr{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .rec-nome{font-size:.88rem;font-weight:800;margin-bottom:6px}
    .rec-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;color:#fff;margin:2px}
    .rec-body{font-size:.78rem;margin-top:6px;line-height:1.7}
    .rec-note{font-size:.71rem;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #f1f5f9}
    .comp-card{border-radius:10px;border-left:5px solid;padding:10px 14px;margin-bottom:8px;background:#fff}
    .comp-nome{font-size:.83rem;font-weight:800;margin-bottom:4px}
    .comp-body{font-size:.76rem;line-height:1.7;color:#374151}
    .rucam-row{padding:6px 0;border-bottom:1px dashed #fde68a;font-size:.76rem;line-height:1.6}
    .rucam-row:last-child{border-bottom:none}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .score-box{border-radius:12px;border:3px solid;padding:12px;text-align:center;margin:8px 0}
    .score-num{font-size:2rem;font-weight:900;line-height:1}
    .score-lbl{font-size:.82rem;font-weight:800;margin-top:4px}
  </style>
</head>

<header class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="top-title">Hepatologia — Hepatites & Cirrose</span>
  <div class="top-right"></div>
</header>
<main class="container" style="padding-bottom:90px">
  <div class="hep-hdr">
    <div class="hep-title">🫀 Hepatologia — Algoritmo Clínico-Farmacêutico</div>
    <div class="hep-sub">Hepatite B · Hepatite C · Cirrose · Complicações · DHGNA/MAFLD · Hepatotoxicidade (RUCAM)</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tb0" onclick="showTab(0)">Hepatites B & C</button>
    <button class="tab-btn" id="tb1" onclick="showTab(1)">Cirrose & Complicações</button>
    <button class="tab-btn" id="tb2" onclick="showTab(2)">DHGNA & RUCAM</button>
  </div>

  <!-- TAB 0 -->
  <div id="tab0">
    <div class="card" style="padding:12px 14px">
      <label>Diagnóstico viral</label>
      <select id="hep_tipo">
        <option value="hbv_pos">Hepatite B — HBeAg positivo (replicação ativa)</option>
        <option value="hbv_neg">Hepatite B — HBeAg negativo / Anti-HBe positivo</option>
        <option value="hbv_prof">Hepatite B — Profilaxia (imunossupressão / biológico)</option>
        <option value="hcv">Hepatite C — Tratamento com DAA pangenotípico</option>
        <option value="hcv_inter">Hepatite C — Interações de DAAs com fármacos</option>
      </select>
      <label>TFG (mL/min/1,73m²)</label>
      <input type="number" id="hep_tfg" placeholder="ex.: 65" min="0" max="130">
      <label>Cirrose presente?</label>
      <select id="hep_cirrose">
        <option value="nao">Não / F0–F3</option>
        <option value="comp">Cirrose compensada (Child A)</option>
        <option value="desc">Cirrose descompensada (Child B/C)</option>
      </select>
    </div>
    <button class="btn-calc" onclick="calcHep()">💊 Gerar protocolo antiviral</button>
    <div id="hepResult" style="display:none"></div>
  </div>

  <!-- TAB 1 -->
  <div id="tab1" style="display:none">
    <div id="cirroseCards"></div>
  </div>

  <!-- TAB 2 -->
  <div id="tab2" style="display:none">
    <div class="card" style="padding:12px 14px;margin-bottom:10px">
      <div style="font-size:.78rem;font-weight:800;color:#78350f;margin-bottom:8px">🫀 DHGNA / MAFLD — Manejo Farmacológico</div>
      <div id="dhgnaContent"></div>
    </div>
    <div class="card" style="padding:12px 14px">
      <div style="font-size:.78rem;font-weight:800;color:#dc2626;margin-bottom:10px">⚠️ RUCAM — Hepatotoxicidade por Fármaco</div>
      <label>Tipo de lesão hepática</label>
      <select id="ruc_tipo">
        <option value="hepato">Hepatocelular (TGP >2× LSN ou razão TGP/FA >5)</option>
        <option value="coles">Colestático (FA >2× LSN ou razão TGP/FA <2)</option>
        <option value="misto">Misto (TGP e FA >2× LSN, razão entre 2–5)</option>
      </select>
      <div class="checkbox-group">
        <label style="font-size:.75rem;font-weight:800;margin:8px 0 4px">Critérios RUCAM (marcar os aplicáveis):</label>
        <label class="checkbox-item"><input type="checkbox" id="r1"> Tempo de início compatível (5–90 dias para hepatocelular; 5–90 dias para colestático)</label>
        <label class="checkbox-item"><input type="checkbox" id="r2"> Curso após suspensão: queda TGP/FA ≥50% em ≤8 dias (hepatocelular) ou ≤180 dias (colestático)</label>
        <label class="checkbox-item"><input type="checkbox" id="r3"> Fatores de risco (álcool, gestação, doenças prévias)</label>
        <label class="checkbox-item"><input type="checkbox" id="r4"> Outros fármacos hepatotóxicos concomitantes</label>
        <label class="checkbox-item"><input type="checkbox" id="r5"> Causas alternativas excluídas (VHA/VHB/VHC, autoimune, isquemia, obstrução)</label>
        <label class="checkbox-item"><input type="checkbox" id="r6"> Resposta a reintrodução positiva (aumento TGP ≥2× com reexposição)</label>
      </div>
      <button class="btn-calc" onclick="calcRUCAM()">📋 Calcular probabilidade RUCAM</button>
      <div id="rucamResult" style="display:none"></div>
    </div>
  </div>

<script>
function showTab(n){[0,1,2].forEach(i=>{document.getElementById('tab'+i).style.display=i===n?'block':'none';document.getElementById('tb'+i).classList.toggle('active',i===n);});if(n===1)renderCirrose();if(n===2)renderDHGNA();}
function recHTML(r){return `<div class="rec-card" style="border-color:${r.col}"><div class="rec-hdr" style="color:${r.col}">${r.hdr}</div><div class="rec-nome">${r.nome}</div><div>${(r.badges||[]).map(b=>`<span class="rec-badge" style="background:${b.c}">${b.t}</span>`).join('')}</div><div class="rec-body">${r.body}</div>${r.note?`<div class="rec-note">${r.note}</div>`:''}</div>`;}

function calcHep(){
  const tipo   =document.getElementById('hep_tipo').value;
  const tfg    =parseFloat(document.getElementById('hep_tfg').value)||90;
  const cirrose=document.getElementById('hep_cirrose').value;
  const recs=[];

  if(tipo==='hbv_pos'||tipo==='hbv_neg'){
    const hbePos=tipo==='hbv_pos';
    recs.push({hdr:`Hepatite B — ${hbePos?'HBeAg Positivo':'HBeAg Negativo'}`,col:'#b45309',
      nome:'Antivirais de 1ª linha — Tenofovir ou Entecavir',badges:[{t:'1ª linha',c:'#b45309'},{t:'EASL 2023',c:'#78350f'}],
      body:`<strong>Indicação de tratamento:</strong><br>
• HBeAg+: DNA VHB >20.000 UI/mL + TGP >1× LSN (ou >2× LSN segundo algumas diretrizes) → tratar<br>
• HBeAg-: DNA VHB >2.000 UI/mL + TGP elevada → tratar<br>
• Fibrose F3/F4 (cirrose): tratar independente de DNA/TGP<br>
• Imunossupressão iminente: profilaxia (ver opção profilaxia)<br><br>
<strong>Fármacos preferidos (resistência mínima):</strong><br>
• <strong>Tenofovir disoproxila (TDF)</strong> 300 mg/dia VO ${tfg<50?`— <span style="color:#dc2626">⚠️ TFG ${tfg} — ajustar dose: TFG 30–49: 300 mg 48/48h; TFG 10–29: 300 mg 72–96h; <10 ou diálise: 300 mg 7/7 dias</span>`:'(sem ajuste se TFG ≥50)'}<br>
• <strong>Tenofovir alafenamida (TAF)</strong> 25 mg/dia — menor nefrotoxicidade e óssea (preferível em DRC, osteoporose, idoso) ${tfg<15?'— <span style="color:#dc2626">CI em TFG <15 não dialítico</span>':''}<br>
• <strong>Entecavir</strong> 0,5 mg/dia (virgem) ou 1 mg/dia (se resistência a lamivudina) ${tfg<50?`— <span style="color:#dc2626">ajustar: TFG 30–49: 0,25 mg/dia; TFG 10–29: 0,15 mg/dia; <10: 0,05 mg/dia</span>`:''}<br><br>
<strong>Duração:</strong><br>
• HBeAg+: até soroconversão Anti-HBe + 1 ano adicional (mínimo 12 meses)<br>
• HBeAg-: indefinido (suspensão raramente possível — recidiva >95%)<br>
• Cirrose: tratamento indefinido — nunca suspender`,
      note:cirrose==='desc'?'⚠️ Cirrose descompensada (Child B/C): TDF pode agravar disfunção renal — preferir entecavir 0,5 mg/dia ou TAF. Encaminhar para avaliação de transplante hepático (MELD ≥15). Não usar interferon em cirrose descompensada.':`Monitoramento: DNA VHB a cada 3 meses × 1 ano → a cada 6 meses. TGO/TGP + creatinina + fosfatemia a cada 3–6 meses. HBsAg anualmente. Ultrassom hepático a cada 6 meses (rastreio CHC se cirrose ou HB>40 anos ou histórico familiar de CHC).`});

    recs.push({hdr:'Metas Terapêuticas e Monitoramento',col:'#0f766e',nome:'Resposta virológica, bioquímica e sorológica',badges:[{t:'Follow-up',c:'#0f766e'}],
      body:`<strong>Meta primária:</strong> DNA VHB indetectável (<20 UI/mL) ao final de 12 meses<br>
<strong>Meta ideal (cura funcional):</strong> perda do HBsAg + soroconversão Anti-HBs (ocorre em <5% com NUC)<br>
<strong>Resposta bioquímica:</strong> normalização de TGP<br><br>
<strong>Resistência:</strong> DNA VHB >1 log acima do nadir após resposta inicial → checar resistência (genótipo) · TDF e TAF: resistência praticamente nula (<1%) · Entecavir: resistência <1% em virgens<br><br>
<strong>Interações importantes do tenofovir:</strong><br>
• Didanosina: ↑ toxicidade ddI — evitar<br>
• AINE, vancomicina, aminoglicosídeos: ↑ nefrotoxicidade<br>
• Atazanavir ↑ concentrações do TDF — monitorar renal`,note:''});
  }

  if(tipo==='hbv_prof'){
    recs.push({hdr:'Profilaxia VHB — Imunossupressão / Biológico',col:'#dc2626',
      nome:'Triagem obrigatória antes de qualquer imunossupressor',badges:[{t:'Profilaxia VHB',c:'#dc2626'}],
      body:`<strong>Triagem:</strong> HBsAg · Anti-HBc · Anti-HBs<br><br>
<strong>HBsAg positivo (portador ou hepatite B ativa):</strong><br>
→ Tratar VHB antes de iniciar imunossupressor · Entecavir 0,5 mg/dia ou TDF 300 mg/dia durante imunossupressão + 12 meses após (24 meses se anti-CD20/rituximabe)<br><br>
<strong>Anti-HBc+ isolado (HBsAg-) — reativação oculta:</strong><br>
→ Risco depende do imunossupressor:<br>
• Alto risco (rituximabe, quimio, transplante): profilaxia com entecavir/TDF<br>
• Risco moderado (anti-TNF, corticoide dose alta, MTX): monitorar DNA VHB a cada 3 meses ou profilaxia<br>
• Baixo risco (azatioprina, MTX baixa dose): monitorar DNA a cada 3 meses<br><br>
<strong>Anti-HBs <10 UI/L + Anti-HBc negativo:</strong> suscetível → vacinação (3 doses 0, 1, 6 meses) antes de iniciar imunossupressor`,
      note:'Reativação de VHB com imunossupressores pode ser fatal — triagem NÃO é opcional. Rituximabe (anti-CD20): maior risco de reativação (até 80% em HBsAg+) — profilaxia SEMPRE por ≥24 meses após a última dose.'});
  }

  if(tipo==='hcv'){
    recs.push({hdr:'Hepatite C — DAA Pangenotípico (todos os genótipos)',col:'#065f46',
      nome:'Sofosbuvir/Velpatasvir ou Glecaprevir/Pibrentasvir — cura >95%',badges:[{t:'DAA pangenotípico',c:'#065f46'},{t:'EASL 2022',c:'#0f766e'}],
      body:`<strong>Opção 1 — Sofosbuvir/Velpatasvir (SOF/VEL — Epclusa)</strong><br>
400 mg/100 mg 1×/dia × 12 semanas (naïve e experientes sem cirrose)<br>
Cirrose compensada: SOF/VEL × 12 semanas (sem ribavirina em maioria dos casos)<br>
Cirrose descompensada (Child B/C): SOF/VEL + Ribavirina (600 mg/dia, ajustada por Hb) × 12 semanas ou SOF/VEL × 24 sem sem RBV<br>
${tfg<30?'<strong style="color:#dc2626">⚠️ TFG <30: evitar SOF (acúmulo) — preferir GLE/PIB</strong>':'TFG ≥30: sem ajuste de SOF/VEL'}<br><br>
<strong>Opção 2 — Glecaprevir/Pibrentasvir (GLE/PIB — Mavyret)</strong><br>
3 comp/dia (300 mg/120 mg) × 8 semanas (naïve sem cirrose, todos os genótipos)<br>
Cirrose compensada naïve: 8 semanas · Experientes: 12–16 semanas<br>
<strong>DRC (qualquer TFG, incluindo diálise):</strong> GLE/PIB SEM ajuste de dose — preferido em DRC severa<br>
<strong>CI em cirrose descompensada (Child B/C)</strong> — contraindicado (inibidor de protease)<br><br>
<strong>Meta: RVS (resposta virológica sustentada):</strong> RNA VHC indetectável 12 semanas após tratamento → cura em >97%`,
      note:`Confirmação de cura: RNA VHC 12 semanas pós-tratamento (RVS12). Não usar sorologia (Anti-VHC permanece positivo mesmo após cura). Cirrose: manter ultrassom abdominal semestral para CHC mesmo após cura (risco persiste, reduz mas não zera).`});

    recs.push({hdr:'Interações Críticas dos DAAs',col:'#dc2626',
      nome:'Verificar SEMPRE em HEP Drug Interactions (hep-druginteractions.org)',badges:[{t:'Interações DAA',c:'#dc2626'}],
      body:`<strong>SOF/VEL — interações principais:</strong><br>
• <strong>IBP (omeprazol, pantoprazol):</strong> ↓ velpatasvir — evitar; se necessário: IBP dose baixa 4h após SOF/VEL em jejum<br>
• <strong>Antiácidos (Al/Mg):</strong> separar por 4h<br>
• <strong>Amiodarona:</strong> bradicardia grave com sofosbuvir — contraindicado<br>
• <strong>Rifampicina, carbamazepina, fenitoína:</strong> indutores fortes → reduzem DAA — contraindicado<br>
• <strong>Estatinas:</strong> rosuvastatina ↑ — usar menor dose; atorvastatina: cautela<br><br>
<strong>GLE/PIB — interações principais:</strong><br>
• <strong>Rifampicina, carbamazepina:</strong> contraindicado<br>
• <strong>Estatinas (maioria):</strong> ↑ concentrações — rosuvastatin máx 10 mg; atorvastatina max 20 mg; sinvastatina/lovastatina: contraindicado<br>
• <strong>Atazanavir, darunavir:</strong> contraindicado (HIV+VHC — usar regimes alternativos)<br>
• <strong>Ciclosporina:</strong> ↑ glecaprevir — dose máxima ciclosporina 100 mg/dia`,note:''});
  }

  if(tipo==='hcv_inter'){
    recs.push({hdr:'Ferramenta de Interações DAA',col:'#0369a1',
      nome:'Consultar sempre hep-druginteractions.org da Universidade de Liverpool',badges:[{t:'Interações',c:'#0369a1'}],
      body:`<strong>Categorias de interação:</strong><br>
🟢 Sem interação clinicamente relevante — sem ajuste necessário<br>
🟡 Potencial interação — monitorar ou ajustar dose<br>
🔴 Contraindicado — não coadministrar<br><br>
<strong>Classes com maior risco de interação com DAAs:</strong><br>
• Anticonvulsivantes indutores (CBZ, fenitoína, fenobarbital) → ↓ DAA — CI<br>
• Rifampicina, rifabutina → ↓ DAA — CI<br>
• Antirretrovirais (VHC + VIH coinfecção) → selecionar regime compatível<br>
• Estatinas → ↑ exposição — ajustar dose<br>
• Imunossupressores (tacrolimus, ciclosporina) → ↑ concentrações<br>
• IBP → ↓ VEL (sofosbuvir/velpatasvir)<br>
• Warfarina → monitorar INR`,
      note:'hep-druginteractions.org: ferramenta gratuita com banco de dados atualizado. Inserir o DAA e o fármaco concomitante para resultado imediato com mecanismo e recomendação.'});
  }

  document.getElementById('hepResult').style.display='block';
  document.getElementById('hepResult').innerHTML=recs.map(recHTML).join('');
  document.getElementById('hepResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderCirrose(){
  const comps=[
    {nome:'Ascite — Manejo por grau',col:'#b45309',
     body:`<strong>Grau 1 (leve — só detectada por US):</strong> restrição de sódio 2 g/dia (não <1,2 g — hipotensão) · Monitorar<br>
<strong>Grau 2 (moderada — distensão visível):</strong><br>
• <strong>Espironolactona</strong> 100 mg/dia → titular até 400 mg/dia<br>
• <strong>Furosemida</strong> 40 mg/dia → até 160 mg/dia (relação espiro:furo = 100:40 — manter para K+ normal)<br>
• Meta: perda ponderal ≤0,5 kg/dia (sem edema) ou ≤1 kg/dia (com edema periférico)<br>
<strong>Grau 3 (tensa / refratária):</strong><br>
• Paracentese de grande volume (>5 L) + Albumina 8 g por litro retirado acima de 5 L (previne DRPA)<br>
• TIPS (shunt portossistêmico transjugular): ascite refratária com função hepática preservada<br>
• Tolvaptana: sem benefício em ascite cirrótica (dados negativos)`,
     note:'Hiponatremia dilucional (<130 mEq/L): restringir água livre (<1 L/dia); NÃO infundir SF (piora retenção). Albumina 20% (100 mL 2×/semana): controversa em ascite grau 2 — ANSWER trial positivo para sobrevida.'},
    {nome:'PBE — Peritonite Bacteriana Espontânea',col:'#dc2626',
     body:`<strong>Diagnóstico:</strong> PMN no líquido ascítico ≥250/mm³ (sem causa secundária)<br>
<strong>Tratamento imediato:</strong><br>
• <strong>Cefotaxima</strong> 2 g IV 8/8h × 5–7 dias (1ª linha)<br>
• Ceftriaxona 2 g IV/dia: alternativa equivalente<br>
• <strong>Albumina 20%:</strong> 1,5 g/kg ao diagnóstico + 1 g/kg no dia 3 → reduz SHR em 30% (Chen 2022)<br><br>
<strong>Profilaxia primária (alto risco):</strong><br>
• Proteína no LA <1,5 g/dL + Child ≥9 + bilirrubina ≥3 ou creatinina ≥1,2 ou Na ≤130 ou Child-Pugh ≥10<br>
• <strong>Norfloxacino</strong> 400 mg/dia (onde disponível) ou <strong>ciprofloxacino</strong> 250 mg/dia<br>
• Alternativa: SMX-TMP 480/2400 mg 5×/semana (segunda a sexta)<br>
<strong>Profilaxia secundária (após 1º episódio):</strong> norfloxacino 400 mg/dia indefinidamente`,
     note:'PBE em paciente com disfunção renal prévia: usar albumina SEMPRE. Resistência a quinolonas: se uso prévio de quinolona ou nosocomial → piperacilina-tazobactam ou carbapenêmico empírico.'},
    {nome:'Encefalopatia Hepática (EH)',col:'#7c3aed',
     body:`<strong>Graus (West Haven):</strong><br>
• Grau 1: alteração de humor, sonolência leve<br>
• Grau 2: asterixis, confusão moderada<br>
• Grau 3: letargia, confusão grave<br>
• Grau 4: coma<br><br>
<strong>Tratamento farmacológico:</strong><br>
• <strong>Lactulose</strong> 25–50 mL 2–4×/dia → titular para 2–3 evacuações pastosas/dia (não diarreico) — 1ª linha<br>
Enema de lactulose: EH aguda grave (300 mL + 700 mL água, manter 30 min)<br>
• <strong>Rifaximina</strong> 550 mg 2×/dia + lactulose — reduz recorrência 58% vs placebo (RFHE) — manutenção após 1º episódio<br>
• <strong>LOLA (L-ornitina L-aspartato)</strong> IV: dados positivos em EH aguda (meta-análise 2022)<br><br>
<strong>Fatores precipitantes — tratar:</strong><br>
Infecção (PBE, ITU) · Hemorragia GI · Hipocalemia · Desidratação · Sedativos (benzodiazepínicos: evitar — se EH aguda, usar flumazenil) · Obstipação`,
     note:'Zinco 220 mg 2×/dia: déficit frequente em cirróticos; pode melhorar EH crônica. Evitar BZD, opioides e outros depressores do SNC em cirróticos com risco de EH.'},
    {nome:'Síndrome Hepatorrenal (SHR)',col:'#1e3a8a',
     body:`<strong>Critérios diagnósticos (SHR-AKI):</strong> cirrose + ascite + Cr ≥1,5 mg/dL + ausência de melhora após 48h de expansão volêmica + exclusão de outras causas de IRA<br><br>
<strong>Tratamento (SHR tipo 1 — rápida progressão):</strong><br>
• <strong>Terlipressina</strong> 0,5–1 mg IV 4/4h → 2 mg 4/4h (CONFIRM trial) + Albumina 20–40 g/dia<br>
• <strong>Norepinefrina</strong> 0,5–3 mg/h (UTI) + albumina (alternativa se sem terlipressina)<br>
• Suspender diuréticos, AINE, aminoglicosídeos, contraste IV<br><br>
<strong>SHR tipo 2 (crônico — ascite refratária):</strong> TIPS + manutenção<br>
<strong>Transplante hepático:</strong> único tratamento definitivo`,
     note:'Albumina sem vasopressor: insuficiente isolada. Terlipressina: resposta em ~45% — reavaliar em 48h. CI: doença cardiovascular isquêmica ativa. Midodrina + octreotida: combinação oral (ambulatorial) — dados menos robustos que terlipressina.'},
    {nome:'Hipertensão Portal — Varizes Esofágicas',col:'#0f766e',
     body:`<strong>Profilaxia primária (varizes de médio-grande calibre):</strong><br>
• <strong>Propranolol</strong> 20–40 mg 2×/dia → titular até FC 55–60 bpm ou FC basal -25% (máx 160 mg/dia)<br>
• <strong>Carvedilol</strong> 6,25 mg/dia → 12,5 mg/dia (maior ↓ pressão porta que propranolol)<br>
• Alternativa endoscópica: ligadura elástica (EBL) se intolerância a BBL<br><br>
<strong>Hemorragia varicosa aguda (emergência):</strong><br>
• <strong>Terlipressina</strong> 2 mg IV 4/4h × 2–5 dias (ou somatostatina/octreotida) — iniciar antes de endoscopia<br>
• Ceftriaxona 1 g IV/dia × 5–7 dias (profilaxia de infecção — reduz mortalidade)<br>
• EBL ou escleroterapia imediata (EDA em ≤12h)<br>
• Balão de Sengstaken: ponte para TIPS em refratários<br><br>
<strong>Profilaxia secundária:</strong> BBL + EBL cada 4–6 semanas até obliteração`,
     note:'MELD ≥18 após hemorragia varicosa: TIPS preemptivo (em 72h) reduz mortalidade. Carvedilol: dados crescentes de superioridade ao propranolol na profilaxia primária.'},
  ];
  document.getElementById('cirroseCads'||'cirroseCads');
  if(!document.getElementById('cirroseCards').innerHTML){
    document.getElementById('cirroseCards').innerHTML=comps.map(c=>`<div class="comp-card" style="border-color:${c.col}"><div class="comp-nome" style="color:${c.col}">${c.nome}</div><div class="comp-body">${c.body}</div>${c.note?`<div style="font-size:.7rem;color:#64748b;margin-top:6px">💡 ${c.note}</div>`:''}</div>`).join('');

}

function renderDHGNA(){
  if(document.getElementById('dhgnaContent').innerHTML) return;
  document.getElementById('dhgnaContent').innerHTML=`<div style="font-size:.78rem;line-height:1.8">
<strong>DHGNA / MAFLD — Critérios diagnósticos (MAFLD 2020):</strong><br>
Esteatose hepática (US ou histologia) + 1 de: sobrepeso/obesidade · DM2 · ≥2 fatores metabólicos<br><br>
<strong>Estadiamento:</strong> Fibroscan (elastografia) ou escore FIB-4 = Idade × TGO / (plaquetas × √TGP)<br>
FIB-4 <1,3: baixo risco de fibrose avançada · >2,67: biópsia recomendada<br><br>
<strong>Tratamento farmacológico (2024):</strong><br>
• <strong>Resmetirom (Rezdiffra)</strong> 80–100 mg/dia — aprovado FDA março/2024 para NASH com fibrose F2-F3. Agonista seletivo de receptor de hormônio tireoidiano β-hepático. Reduz NAS e melhora fibrose em 24 semanas<br>
• <strong>Semaglutida</strong> 2,4 mg SC/semana (GLP-1RA) — reduz esteatose e marcadores inflamatórios; aprovado para obesidade + DM (sem aprovação específica para NASH mas evidência crescente — NASH trial em andamento)<br>
• <strong>Liraglutida</strong> 1,8 mg SC/dia: evidência positiva para resolução de NASH (LEAN trial)<br>
• <strong>Vitamina E</strong> 800 UI/dia (tocoferol): NASH sem DM sem cirrose — evidência moderada (PIVENS trial); risco ↑ CA próstata em homens (usar com cautela)<br>
• <strong>Pioglitazona</strong> 30–45 mg/dia: NASH com DM2 — melhora histológica; ganho de peso e retenção hídrica<br><br>
<strong>Contraindicados em DHGNA descompensada:</strong> metformina (Child C), estatinas (ajustar conforme TGP)<br>
<strong>Estatinas:</strong> NÃO contraindicadas em DHGNA compensada — cardiovascular é principal causa de morte em DHGNA</div>`;
}

function calcRUCAM(){
  let score=0;
  const checks=[document.getElementById('r1').checked,document.getElementById('r2').checked,document.getElementById('r3').checked,document.getElementById('r4').checked,document.getElementById('r5').checked,document.getElementById('r6').checked];
  const pts=[2,2,-1,-2,2,3];
  checks.forEach((c,i)=>{if(c)score+=pts[i];});
  let cat,col,txt;
  if(score>=9){cat='Altamente provável';col='#dc2626';}
  else if(score>=6){cat='Provável';col='#d97706';}
  else if(score>=3){cat='Possível';col='#84cc16';}
  else{cat='Improvável / Excluído';col='#64748b';}
  txt=`<div class="score-box" style="border-color:${col}"><div class="score-num" style="color:${col}">${score}</div><div class="score-lbl" style="color:${col}">${cat}</div><div style="font-size:.7rem;color:#64748b;margin-top:6px">RUCAM simplificado — ≥9: Altamente provável · 6–8: Provável · 3–5: Possível · 1–2: Improvável · ≤0: Excluído</div></div>
<div style="font-size:.76rem;margin-top:8px;line-height:1.7"><strong>Fármacos mais frequentemente associados a hepatotoxicidade:</strong><br>
Paracetamol (superdose) · Isoniazida · Rifampicina · Amoxicilina-clavulanato · Nitrofurantoína · Metildopa · Estatinas · AINE · Valproato · Carbamazepina · Halotano · MTX · Azatioprina · Sulfonamidas<br><br>
<strong>Padrão hepatocelular:</strong> TGP >5× LSN → suspender fármaco imediatamente. Acetilcisteína (paracetamol): 150 mg/kg IV em 15 min → 50 mg/kg em 4h → 100 mg/kg em 16h (Rumack-Matthew nomograma para indicação)<br>
<strong>Sempre excluir:</strong> VHA, VHB, VHC, autoimune (ANA, Anti-LKM, IgG), isquemia, obstrução biliar, doença de Wilson (ceruloplasmina em jovem)</div>`;
  document.getElementById('rucamResult').style.display='block';
  document.getElementById('rucamResult').innerHTML=txt;
}
