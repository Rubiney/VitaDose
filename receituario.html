<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Receituário Farmacêutico — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar { display:flex;align-items:center;gap:10px;padding:12px 16px;background:#1e3a5f;position:sticky;top:0;z-index:100 }
    .back-btn { background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;font-size:1rem;cursor:pointer }
    .topbar-title { font-size:.95rem;font-weight:800;color:#fff;flex:1 }
    .topbar-sub { font-size:.65rem;color:rgba(255,255,255,.7) }
    .btn-top { background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:.73rem;font-weight:700;cursor:pointer }

    main { padding:14px 16px 90px;max-width:560px;margin:0 auto }

    .tabs { display:flex;gap:6px;margin-bottom:14px }
    .tab-btn { flex:1;padding:10px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.82rem;font-weight:700;color:#64748b;cursor:pointer }
    .tab-btn.active { background:#1e3a5f;color:#fff;border-color:#1e3a5f }
    .tab-panel { display:none }
    .tab-panel.active { display:block }

    /* Form */
    .form-card { background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06) }
    .form-sec { font-size:.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px }
    .field-lbl { font-size:.7rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;margin-top:10px }
    .field-inp { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:9px;padding:9px 12px;font-size:.85rem;background:#fff;color:#1e293b }
    .field-inp:focus { outline:none;border-color:#1e3a5f }
    .field-sel { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:9px;padding:9px 12px;font-size:.82rem;background:#fff;color:#1e293b }
    .field-ta  { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:9px;padding:9px 12px;font-size:.82rem;min-height:70px;resize:vertical;color:#1e293b }
    .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:10px }

    .btn-gerar { width:100%;background:#1e3a5f;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.9rem;font-weight:800;cursor:pointer;margin-top:16px }
    .btn-gerar:hover { background:#16305a }

    /* Receituário impresso */
    #docRec { display:none }
    .rec-wrap { background:#fff;border-radius:16px;border:2px solid #e2e8f0;overflow:hidden;margin-bottom:14px }
    .rec-head { background:#1e3a5f;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between }
    .rec-logo { font-size:.85rem;font-weight:900 }
    .rec-tipo-badge { background:rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:700 }
    .rec-pac { background:#f0f4f8;padding:12px 20px;border-bottom:1.5px solid #e2e8f0 }
    .rec-pac-nome { font-size:.95rem;font-weight:800;color:#1e3a5f }
    .rec-pac-meta { font-size:.7rem;color:#64748b;margin-top:2px }
    .rec-body { padding:20px }
    .rec-rx { font-size:2rem;font-weight:900;color:#1e3a5f;margin-bottom:12px }
    .rec-med-nome { font-size:1.05rem;font-weight:900;color:#1e293b;border-bottom:1.5px solid #e2e8f0;padding-bottom:8px;margin-bottom:10px }
    .rec-row { font-size:.82rem;color:#374151;margin-bottom:5px;line-height:1.5 }
    .rec-row strong { color:#1e293b }
    .rec-instrucoes { background:#f8fafc;border-radius:8px;padding:10px 12px;font-size:.78rem;color:#374151;margin-top:12px;line-height:1.6 }
    .rec-observ { font-size:.73rem;color:#dc2626;margin-top:10px;font-weight:700 }
    .rec-footer { border-top:1px solid #f1f5f9;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;font-size:.68rem;color:#94a3b8 }
    .rec-assin { padding:20px;border-top:1.5px solid #e2e8f0 }
    .rec-sign-line { border-top:1.5px solid #374151;margin-top:40px;padding-top:5px;font-size:.68rem;color:#475569;text-align:center }
    .rec-validade { background:#fef3c7;border:1.5px solid #fcd34d;border-radius:8px;padding:8px 12px;font-size:.72rem;color:#92400e;font-weight:700;margin-top:10px }

    /* Histórico */
    .hist-card { background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid #1e3a5f }
    .hist-med { font-size:.88rem;font-weight:800;color:#1e293b }
    .hist-det { font-size:.72rem;color:#64748b;margin-top:3px;line-height:1.5 }
    .hist-dt  { font-size:.65rem;color:#94a3b8;margin-top:4px }
    .hist-acts { display:flex;gap:6px;margin-top:8px }
    .btn-sm-outline { background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:.68rem;font-weight:700;color:#475569;cursor:pointer }
    .btn-sm-outline:hover { background:#f8fafc }

    .empty-msg { text-align:center;color:#94a3b8;font-size:.82rem;padding:30px 0 }

    @media print {
      .topbar,.tabs,.form-card,nav,[onclick] { display:none !important }
      #docRec { display:block !important }
      .rec-wrap { border:1.5px solid #94a3b8;border-radius:0 }
      body { background:#fff }
      main { padding:0;max-width:none }
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div style="flex:1">
    <div class="topbar-title">📜 Receituário Farmacêutico</div>
    <div class="topbar-sub">PrescFarm / Prescrição Farmacêutica</div>
  </div>
  <button class="btn-top" onclick="imprimir()">🖨️</button>
</div>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('nova',this)">✍️ Nova Prescrição</button>
    <button class="tab-btn"        onclick="showTab('hist',this)">📋 Histórico</button>
  </div>

  <!-- Nova prescrição -->
  <div id="tab-nova" class="tab-panel active">
    <div class="form-card">
      <p class="form-sec">Tipo de Receituário</p>
      <select class="field-sel" id="fTipo" onchange="toggleAntimicrobiano()">
        <option value="simples">Receita Simples (RMS)</option>
        <option value="antimicrobiano">Notificação de Antimicrobiano (RAM)</option>
        <option value="especial">Receita de Controle Especial (RCE — Azul / Amarela)</option>
        <option value="alto_custo">Laudo Medicamento de Alto Custo (LME)</option>
      </select>

      <p class="form-sec">Dados do Paciente</p>
      <label class="field-lbl">Paciente</label>
      <input class="field-inp" id="fPacNome" type="text" placeholder="Nome completo do paciente" readonly style="background:#f8fafc">
      <div class="grid-2">
        <div>
          <label class="field-lbl">Idade</label>
          <input class="field-inp" id="fPacIdade" type="text" readonly style="background:#f8fafc">
        </div>
        <div>
          <label class="field-lbl">Peso (kg)</label>
          <input class="field-inp" id="fPacPeso" type="text" readonly style="background:#f8fafc">
        </div>
      </div>
      <label class="field-lbl">Endereço (opcional)</label>
      <input class="field-inp" id="fPacEnd" type="text" placeholder="Rua, número, bairro">

      <p class="form-sec">Prescrição</p>
      <label class="field-lbl">Medicamento *</label>
      <input class="field-inp" id="fMed" type="text" placeholder="Ex: Amoxicilina 500 mg (cápsulas)">

      <div class="grid-2">
        <div>
          <label class="field-lbl">Dose *</label>
          <input class="field-inp" id="fDose" type="text" placeholder="Ex: 500 mg">
        </div>
        <div>
          <label class="field-lbl">Via de administração</label>
          <select class="field-sel" id="fVia">
            <option>Oral</option>
            <option>Subcutânea</option>
            <option>Intramuscular</option>
            <option>Intravenosa</option>
            <option>Tópica</option>
            <option>Inalatória</option>
            <option>Sublingual</option>
            <option>Ocular</option>
            <option>Otológica</option>
            <option>Retal</option>
            <option>Vaginal</option>
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label class="field-lbl">Frequência *</label>
          <select class="field-sel" id="fFreq">
            <option>1x ao dia</option>
            <option>2x ao dia (12/12h)</option>
            <option>3x ao dia (8/8h)</option>
            <option>4x ao dia (6/6h)</option>
            <option>De 12 em 12 horas</option>
            <option>De 8 em 8 horas</option>
            <option>De 6 em 6 horas</option>
            <option>Em dias alternados</option>
            <option>1x por semana</option>
            <option>Dose única</option>
            <option>Conforme necessário (SOS)</option>
            <option>Outro (ver instrução)</option>
          </select>
        </div>
        <div>
          <label class="field-lbl">Duração *</label>
          <input class="field-inp" id="fDuracao" type="text" placeholder="Ex: 7 dias, 30 dias">
        </div>
      </div>

      <label class="field-lbl">Quantidade a dispensar</label>
      <input class="field-inp" id="fQtd" type="text" placeholder="Ex: 21 cápsulas, 1 frasco">

      <label class="field-lbl">Instruções ao paciente</label>
      <textarea class="field-ta" id="fInstr" placeholder="Ex: Tomar com alimento. Não interromper o tratamento antes de completar os 7 dias, mesmo que melhore. Evitar laticínios 2h antes e depois."></textarea>

      <!-- Antimicrobiano -->
      <div id="antiBlock" style="display:none">
        <p class="form-sec" style="color:#dc2626">Dados Especiais — Antimicrobiano (RAM)</p>
        <div class="grid-2">
          <div>
            <label class="field-lbl">Nº da notificação</label>
            <input class="field-inp" id="fNumRam" type="text" placeholder="Gerado pelo CFM/CFF">
          </div>
          <div>
            <label class="field-lbl">Validade (dias)</label>
            <input class="field-inp" id="fValRam" type="number" value="10" min="1" max="10">
          </div>
        </div>
        <label class="field-lbl">Diagnóstico / Indicação (obrigatório na RAM)</label>
        <input class="field-inp" id="fDiagRam" type="text" placeholder="Ex: Infecção do trato urinário baixo (N39.0)">
      </div>

      <p class="form-sec">Observações (opcional)</p>
      <textarea class="field-ta" id="fObs" placeholder="Observações adicionais, advertências, interações a evitar..."></textarea>

      <button class="btn-gerar" onclick="gerar()">📜 Gerar Receituário</button>
    </div>
  </div>

  <!-- Histórico -->
  <div id="tab-hist" class="tab-panel">
    <div id="listHist"><p class="empty-msg">Carregando histórico...</p></div>
  </div>

  <!-- Receituário gerado (visível para impressão) -->
  <div id="docRec"></div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="historico.html" class="nav-item">📋<span>Histórico</span></a>
  <a href="diario.html" class="nav-item">📓<span>Diário</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>

const KEY_HIST = 'receituario_hist_';

const TIPO_LABEL = {
  simples:'Receita Simples (RMS)',
  antimicrobiano:'Notificação de Antimicrobiano (RAM)',
  especial:'Receita de Controle Especial',
  alto_custo:'Laudo Medicamento de Alto Custo',
};

let _pac = null;
let _farmCfg = null;

async function init() {
  const pid = getActivePacienteId();
  if (pid) {
    [_pac, _farmCfg] = await Promise.all([
      dbGet('pacientes', pid),
      dbGetConfig('farmaceutico_cfg'),
    ]);
    if (_pac) {
      document.getElementById('fPacNome').value  = _pac.nome || '';
      document.getElementById('fPacIdade').value = _pac.idadePac ? _pac.idadePac+' anos' : '';
      document.getElementById('fPacPeso').value  = _pac.pesoPac ? _pac.pesoPac+' kg' : '';
    }
  }
  carregarHistorico();
}

function toggleAntimicrobiano() {
  const v = document.getElementById('fTipo').value;
  document.getElementById('antiBlock').style.display = v === 'antimicrobiano' ? '' : 'none';
}

function gerar() {
  const med  = document.getElementById('fMed').value.trim();
  const dose = document.getElementById('fDose').value.trim();
  const freq = document.getElementById('fFreq').value;
  const dur  = document.getElementById('fDuracao').value.trim();
  if (!med || !dose || !dur) { alert('Preencha medicamento, dose e duração.'); return; }

  const tipo    = document.getElementById('fTipo').value;
  const via     = document.getElementById('fVia').value;
  const qtd     = document.getElementById('fQtd').value.trim();
  const instr   = document.getElementById('fInstr').value.trim();
  const obs     = document.getElementById('fObs').value.trim();
  const pacEnd  = document.getElementById('fPacEnd').value.trim();
  const numRam  = tipo==='antimicrobiano' ? (document.getElementById('fNumRam').value.trim()||'—') : null;
  const valRam  = tipo==='antimicrobiano' ? (parseInt(document.getElementById('fValRam').value)||10) : null;
  const diagRam = tipo==='antimicrobiano' ? document.getElementById('fDiagRam').value.trim() : null;

  const dt = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const dtValidade = (() => {
    const d = new Date();
    const dias = tipo==='antimicrobiano' ? valRam : tipo==='especial' ? 30 : tipo==='simples' ? 30 : 180;
    d.setDate(d.getDate() + dias);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}) + ` (${dias} dias)`;
  })();

  const pacNome = (_pac?.nome)||document.getElementById('fPacNome').value||'Paciente';
  const farm = _farmCfg?.nome ? `${_farmCfg.nome}${_farmCfg.crf?' — '+_farmCfg.crf:''}` : 'Farmacêutico Responsável';

  const docHTML = `<div class="rec-wrap">
    <div class="rec-head">
      <div>
        <div class="rec-logo">💊 VitaDose · Farmácia Clínica</div>
        <div style="font-size:.7rem;opacity:.7;margin-top:2px">${farm}</div>
      </div>
      <span class="rec-tipo-badge">${TIPO_LABEL[tipo]}</span>
    </div>

    <div class="rec-pac">
      <div class="rec-pac-nome">${esc(pacNome)}</div>
      <div class="rec-pac-meta">
        ${[_pac?.idadePac?_pac.idadePac+' anos':'', _pac?.pesoPac?_pac.pesoPac+' kg':'', pacEnd].filter(Boolean).join(' · ')}
      </div>
    </div>

    ${diagRam ? `<div style="background:#fee2e2;padding:8px 20px;font-size:.75rem;font-weight:700;color:#991b1b">
      Diagnóstico / CID: ${esc(diagRam)}${numRam?' · Nº Notificação: '+esc(numRam):''}
    </div>` : ''}

    <div class="rec-body">
      <div class="rec-rx">℞</div>
      <div class="rec-med-nome">${esc(med)}</div>

      <div class="rec-row"><strong>Dose:</strong> ${esc(dose)}</div>
      <div class="rec-row"><strong>Via:</strong> ${esc(via)}</div>
      <div class="rec-row"><strong>Frequência:</strong> ${esc(freq)}</div>
      <div class="rec-row"><strong>Duração:</strong> ${esc(dur)}</div>
      ${qtd ? `<div class="rec-row"><strong>Quantidade a dispensar:</strong> ${esc(qtd)}</div>` : ''}

      ${instr ? `<div class="rec-instrucoes">📋 <strong>Instruções:</strong><br>${esc(instr).replace(/\n/g,'<br>')}</div>` : ''}
      ${obs   ? `<div class="rec-observ">⚠️ ${esc(obs)}</div>` : ''}

      <div class="rec-validade">
        ⏳ Validade: ${dtValidade}
      </div>
    </div>

    <div class="rec-footer">
      <span>Emitida em ${dt}</span>
      <span>VitaDose · Farmácia Clínica</span>
    </div>

    <div class="rec-assin">
      <div style="display:flex;gap:30px">
        <div style="flex:1"><div class="rec-sign-line">${esc(_farmCfg?.nome||'Farmacêutico')}${_farmCfg?.crf?'<br>'+esc(_farmCfg.crf):''}</div></div>
        <div style="flex:1"><div class="rec-sign-line">Paciente ou Responsável</div></div>
      </div>
    </div>
  </div>`;

  document.getElementById('docRec').style.display = '';
  document.getElementById('docRec').innerHTML = `
    <hr style="border:none;border-top:1.5px solid #e2e8f0;margin:14px 0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p style="font-size:.82rem;font-weight:700;color:#374151;margin:0">📜 Receituário Gerado</p>
      <div style="display:flex;gap:6px">
        <button onclick="window.print()" style="background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:.75rem;font-weight:700;cursor:pointer">🖨️ Imprimir</button>
        <button onclick="compartilhar()" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:.75rem;font-weight:700;cursor:pointer">📤 Compartilhar</button>
      </div>
    </div>
    ${docHTML}`;

  /* Salva no histórico */
  salvarHistorico({ tipo, med, dose, via, freq, dur, qtd, instr, obs, dt: hoje(), pacNome });
}

async function salvarHistorico(rec) {
  const pid = getActivePacienteId() || 0;
  const hist = (await dbGetConfig(KEY_HIST + pid)) || [];
  hist.unshift({ ...rec, id: Date.now() });
  if (hist.length > 30) hist.splice(30);
  await dbSetConfig(KEY_HIST + pid, hist);
  carregarHistorico();
}

async function carregarHistorico() {
  const pid = getActivePacienteId() || 0;
  const hist = (await dbGetConfig(KEY_HIST + pid)) || [];
  const el = document.getElementById('listHist');
  if (!hist.length) { el.innerHTML = '<p class="empty-msg">Nenhuma prescrição registrada ainda.</p>'; return; }
  el.innerHTML = hist.map((r,i) => {
    const dt = r.dt ? new Date(r.dt+'T12:00').toLocaleDateString('pt-BR') : '—';
    return `<div class="hist-card">
      <div class="hist-med">${esc(r.med||'—')}</div>
      <div class="hist-det">${esc(r.dose||'')} · ${esc(r.via||'')} · ${esc(r.freq||'')} · ${esc(r.dur||'')}</div>
      <div class="hist-dt">${dt} · ${TIPO_LABEL[r.tipo]||r.tipo}</div>
      <div class="hist-acts">
        <button class="btn-sm-outline" onclick="reemitir(${i})">🔁 Reemitir</button>
        <button class="btn-sm-outline" onclick="excluirRec(${i})" style="color:#dc2626">🗑 Excluir</button>
      </div>
    </div>`;
  }).join('');
}

async function reemitir(idx) {
  const pid = getActivePacienteId() || 0;
  const hist = (await dbGetConfig(KEY_HIST + pid)) || [];
  const r = hist[idx]; if (!r) return;
  document.getElementById('fMed').value   = r.med||'';
  document.getElementById('fDose').value  = r.dose||'';
  document.getElementById('fVia').value   = r.via||'Oral';
  document.getElementById('fFreq').value  = r.freq||'';
  document.getElementById('fDuracao').value = r.dur||'';
  document.getElementById('fQtd').value   = r.qtd||'';
  document.getElementById('fInstr').value = r.instr||'';
  document.getElementById('fObs').value   = r.obs||'';
  if (r.tipo) document.getElementById('fTipo').value = r.tipo;
  showTab('nova', document.querySelector('.tab-btn'));
  gerar();
}

async function excluirRec(idx) {
  if (!confirm('Excluir esta prescrição do histórico?')) return;
  const pid = getActivePacienteId() || 0;
  const hist = (await dbGetConfig(KEY_HIST + pid)) || [];
  hist.splice(idx, 1);
  await dbSetConfig(KEY_HIST + pid, hist);
  carregarHistorico();
}

function imprimir() {
  if (document.getElementById('docRec').style.display === 'none' || !document.getElementById('docRec').innerHTML.trim()) {
    alert('Gere um receituário primeiro.'); return;
  }
  window.print();
}

async function compartilhar() {
  const med  = document.getElementById('fMed').value;
  const dose = document.getElementById('fDose').value;
  const freq = document.getElementById('fFreq').value;
  const dur  = document.getElementById('fDuracao').value;
  const instr= document.getElementById('fInstr').value;
  const pacNome = _pac?.nome || document.getElementById('fPacNome').value || 'Paciente';
  const farm = _farmCfg?.nome || 'Farmacêutico';
  const dt = new Date().toLocaleDateString('pt-BR');
  const txt = `💊 *RECEITUÁRIO FARMACÊUTICO*\n*Paciente:* ${pacNome}\n*Data:* ${dt}\n\n*Medicamento:* ${med}\n*Dose:* ${dose}\n*Frequência:* ${freq}\n*Duração:* ${dur}\n${instr?'*Instruções:* '+instr+'\n':''}\n_${farm} · VitaDose_`;
  if (navigator.share) {
    try { await navigator.share({ title:'Receituário Farmacêutico', text: txt }); return; } catch(e) {}
  }
  window.open('https://wa.me/?text='+encodeURIComponent(txt), '_blank');
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
