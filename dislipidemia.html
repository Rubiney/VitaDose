<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dislipidemia — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .dl-hdr{background:linear-gradient(135deg,#1e3a8a,#92400e);color:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
    .dl-title{font-size:1rem;font-weight:800;margin-bottom:4px}
    .dl-sub{font-size:.73rem;opacity:.8}
    label{font-size:.75rem;font-weight:700;color:#1e3a5f;display:block;margin-bottom:4px}
    input[type=number]{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;outline:none;margin-bottom:10px}
    input:focus{border-color:#1e3a8a}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .checkbox-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .checkbox-item{display:flex;align-items:center;gap:8px;font-size:.8rem;cursor:pointer}
    .checkbox-item input[type=checkbox]{width:18px;height:18px;accent-color:#1e3a8a;cursor:pointer}
    .btn-calc{width:100%;background:#1e3a8a;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.87rem;font-weight:700;cursor:pointer;margin:8px 0}
    .btn-auto{background:#92400e;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:.8rem;font-weight:700;cursor:pointer;margin-bottom:10px}
    .tab-bar{display:flex;gap:6px;margin-bottom:14px}
    .tab-btn{flex:1;padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;color:#64748b}
    .tab-btn.active{border-color:#1e3a8a;background:#eff6ff;color:#1e3a8a}
    .risco-card{border-radius:14px;border:4px solid;padding:16px;margin-bottom:10px;text-align:center}
    .risco-num{font-size:1.4rem;font-weight:900;line-height:1.1}
    .risco-lbl{font-size:.9rem;font-weight:800;margin-top:4px}
    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .meta-box{border-radius:10px;padding:10px;text-align:center}
    .meta-val{font-size:1.3rem;font-weight:900}
    .meta-lbl{font-size:.65rem;font-weight:800;color:#64748b;text-transform:uppercase;margin-top:2px}
    .step-card{border-radius:12px;border:2px solid;padding:14px;margin-bottom:10px}
    .step-n{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .step-nome{font-size:.9rem;font-weight:800;margin-bottom:6px}
    .step-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;color:#fff;margin:2px}
    .step-drugs{font-size:.78rem;margin-top:6px;line-height:1.6}
    .step-note{font-size:.71rem;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #f1f5f9}
    .drug-card{border-radius:10px;border:1.5px solid #e2e8f0;padding:12px;margin-bottom:8px}
    .drug-classe{font-size:.82rem;font-weight:800}
    .drug-row{padding:5px 0;border-bottom:1px dashed #e2e8f0;font-size:.75rem}
    .drug-row:last-child{border-bottom:none}
    .drug-lbl{font-size:.62rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}
    .drug-val{color:#1e3a5f;line-height:1.5}
    .lipid-row{padding:7px 0;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:.8rem}
    .lipid-row:last-child{border-bottom:none}
    .lipid-ok{color:#16a34a;font-weight:800}
    .lipid-warn{color:#d97706;font-weight:800}
    .lipid-danger{color:#dc2626;font-weight:800}
  </style>
</head>
<body>
<header class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="top-title">Dislipidemia — Risco CV e Tratamento</span>
  <div class="top-right"></div>
</header>
<main class="container" style="padding-bottom:90px">

  <div class="dl-hdr">
    <div class="dl-title">🫀 Dislipidemia — Algoritmo Farmacoterapêutico</div>
    <div class="dl-sub">Estratificação de risco · Meta de LDL · Estatinas · Ezetimibe · iPCSK9 — SBC 2020 / ACC-AHA 2023</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tb0" onclick="showTab(0)">Risco &amp; Meta</button>
    <button class="tab-btn" id="tb1" onclick="showTab(1)">Algoritmo</button>
    <button class="tab-btn" id="tb2" onclick="showTab(2)">Fármacos</button>
  </div>

  <!-- TAB 0 -->
  <div id="tab0">
    <button class="btn-auto" onclick="autoFill()">⚡ Auto-preencher do paciente ativo</button>
    <div class="card" style="padding:12px 14px">
      <div class="input-row">
        <div><label>LDL (mg/dL)</label><input type="number" id="dl_ldl" placeholder="ex.: 145" min="0"></div>
        <div><label>HDL (mg/dL)</label><input type="number" id="dl_hdl" placeholder="ex.: 42" min="0"></div>
      </div>
      <div class="input-row">
        <div><label>Triglicérides — TG (mg/dL)</label><input type="number" id="dl_tg" placeholder="ex.: 210" min="0"></div>
        <div><label>Colesterol Total — CT (mg/dL)</label><input type="number" id="dl_ct" placeholder="ex.: 220" min="0"></div>
      </div>
      <div class="input-row">
        <div><label>Idade</label><input type="number" id="dl_idade" placeholder="ex.: 58" min="18"></div>
        <div><label>Sexo</label>
          <select id="dl_sexo" style="border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;width:100%;margin-bottom:10px">
            <option value="m">Masculino</option>
            <option value="f">Feminino</option>
          </select>
        </div>
      </div>

      <label>Fatores de risco e histórico clínico</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="dl_dcv"> DCV estabelecida (IAM, AVC isquêmico, DAC, DAP)</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_dm"> Diabetes mellitus</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_dm_loa"> DM + lesão de órgão-alvo (albuminúria, neuropatia, retinopatia ou revascularização)</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_drc"> DRC estágio 3–4 (TFG 15–59 mL/min)</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_hf"> Hipercolesterolemia Familiar (HF) ou LDL basal ≥190 mg/dL</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_has"> Hipertensão arterial (HAS)</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_tab"> Tabagismo ativo</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_ob"> Obesidade (IMC ≥30) / Síndrome metabólica</label>
        <label class="checkbox-item"><input type="checkbox" id="dl_hf_fam"> HF familiar 1º grau com evento CV prematuro (&lt;55 ♂ / &lt;65 ♀)</label>
      </div>

      <label>Tratamento lipídico atual</label>
      <select id="dl_trat" style="width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.85rem;background:#fff;margin-bottom:10px">
        <option value="naive">Sem tratamento</option>
        <option value="est_mod">Estatina intensidade moderada</option>
        <option value="est_alta">Estatina intensidade alta</option>
        <option value="est_ezet">Estatina alta + Ezetimibe</option>
        <option value="tripla">Estatina + Ezetimibe + iPCSK9</option>
      </select>
    </div>
    <button class="btn-calc" onclick="calcRisco()">📊 Calcular risco e meta lipídica</button>

    <div id="dlResult" style="display:none">
      <div class="risco-card" id="riscoCard">
        <div class="risco-num" id="riscoNum">—</div>
        <div class="risco-lbl" id="riscoLbl">—</div>
        <div style="font-size:.72rem;margin-top:8px;opacity:.85" id="riscoSub"></div>
      </div>

      <div class="meta-grid" id="metaGrid"></div>

      <div id="perfLipid" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- TAB 1 -->
  <div id="tab1" style="display:none">
    <div id="algoContent"></div>
  </div>

  <!-- TAB 2 -->
  <div id="tab2" style="display:none">
    <div id="drugList"></div>
  </div>

</main>

<script src="js/db.js"></script>
<script>
const pid = localStorage.getItem('vd_active');

function showTab(n) {
  [0,1,2].forEach(i=>{ document.getElementById('tab'+i).style.display=i===n?'block':'none'; document.getElementById('tb'+i).classList.toggle('active',i===n); });
  if(n===1) renderAlgo();
  if(n===2) renderDrugs();
}

async function autoFill() {
  if(!pid){alert('Nenhum paciente ativo.');return;}
  const pac = await dbGet('pacientes',parseInt(pid));
  if(!pac) return;
  if(pac.idadePac) document.getElementById('dl_idade').value=pac.idadePac;
  if(pac.sexoPac)  document.getElementById('dl_sexo').value=pac.sexoPac==='M'?'m':'f';
  const conds = pac.condicoes||[];
  if(conds.includes('dm'))  document.getElementById('dl_dm').checked=true;
  if(conds.includes('has')) document.getElementById('dl_has').checked=true;
}

/* ── RISCO & META ───────────────────────────────────────────────────── */
function calcRisco() {
  const ldl  = parseFloat(document.getElementById('dl_ldl').value)||0;
  const hdl  = parseFloat(document.getElementById('dl_hdl').value)||0;
  const tg   = parseFloat(document.getElementById('dl_tg').value)||0;
  const ct   = parseFloat(document.getElementById('dl_ct').value)||0;
  const dcv  = document.getElementById('dl_dcv').checked;
  const dm   = document.getElementById('dl_dm').checked;
  const dmLoa= document.getElementById('dl_dm_loa').checked;
  const drc  = document.getElementById('dl_drc').checked;
  const hf   = document.getElementById('dl_hf').checked;
  const has  = document.getElementById('dl_has').checked;
  const tab  = document.getElementById('dl_tab').checked;
  const ob   = document.getElementById('dl_ob').checked;
  const hfFam= document.getElementById('dl_hf_fam').checked;
  const trat = document.getElementById('dl_trat').value;

  // Estratificação SBC 2020
  let nivel, ldlMeta, nonHdlMeta, tgMeta, cor, sub;
  if(dcv || dmLoa || drc || hf || ldl>=190) {
    nivel='Muito Alto'; cor='#dc2626'; ldlMeta=50; nonHdlMeta=80;
    sub='DCV estabelecida / DM+LOA / DRC 3–4 / HF / LDL≥190: risco de evento CV >20% em 10 anos';
  } else if(dm || (has && (tab||ob||hfFam))) {
    nivel='Alto'; cor='#ea580c'; ldlMeta=70; nonHdlMeta=100;
    sub='DM sem LOA, ou HAS com múltiplos fatores de risco adicionais';
  } else if((has&&dm)||(tab&&has)||(ob&&dm)) {
    nivel='Alto'; cor='#ea580c'; ldlMeta=70; nonHdlMeta=100;
    sub='Combinação de fatores de risco tradicionais';
  } else if(has||tab||ob||hfFam) {
    nivel='Intermediário'; cor='#d97706'; ldlMeta=100; nonHdlMeta=130;
    sub='1–2 fatores de risco moderados; Escore de risco 5–10%';
  } else {
    nivel='Baixo'; cor='#16a34a'; ldlMeta=130; nonHdlMeta=160;
    sub='Sem fatores de risco significativos; Escore de risco <5%';
  }
  tgMeta=150;

  document.getElementById('dlResult').style.display='block';
  const rc=document.getElementById('riscoCard');
  rc.style.borderColor=cor; rc.style.background=cor+'15';
  document.getElementById('riscoNum').textContent=nivel; document.getElementById('riscoNum').style.color=cor;
  document.getElementById('riscoLbl').textContent='Risco Cardiovascular '+nivel;
  document.getElementById('riscoLbl').style.color=cor;
  document.getElementById('riscoSub').textContent=sub;

  document.getElementById('metaGrid').innerHTML = [
    { lbl:'Meta LDL', val:'<'+ldlMeta+' mg/dL', ok:ldl&&ldl<ldlMeta },
    { lbl:'Meta Não-HDL', val:'<'+nonHdlMeta+' mg/dL', ok:ct&&hdl&&(ct-hdl)<nonHdlMeta },
    { lbl:'Meta TG', val:'<150 mg/dL', ok:tg&&tg<150 },
    { lbl:'Meta HDL (desejável)', val:'♂>40 / ♀>50 mg/dL', ok:false },
  ].map(m=>`
    <div class="meta-box" style="background:${m.ok?'#f0fdf4':'#fff7ed'};border:2px solid ${m.ok?'#86efac':'#fde68a'}">
      <div class="meta-val" style="color:${m.ok?'#16a34a':'#b45309'}">${m.val}</div>
      <div class="meta-lbl">${m.lbl}</div>
      <div style="font-size:.7rem;color:${m.ok?'#16a34a':'#b45309'};font-weight:700;margin-top:2px">${m.ok?'✅ Atingida':'⚠️ A atingir'}</div>
    </div>`).join('');

  // Perfil lipídico com interpretação
  let perfRows='';
  if(ldl)  { const ok=ldl<ldlMeta; perfRows+=`<div class="lipid-row"><span>LDL medido: <strong>${ldl} mg/dL</strong></span><span class="${ok?'lipid-ok':'lipid-danger'}">${ok?'✅ Na meta':'❌ Acima da meta (−'+(ldl-ldlMeta)+' mg/dL)'}</span></div>`; }
  if(hdl)  { const ok=(document.getElementById('dl_sexo').value==='m'?hdl>40:hdl>50); perfRows+=`<div class="lipid-row"><span>HDL: <strong>${hdl} mg/dL</strong></span><span class="${ok?'lipid-ok':'lipid-warn'}">${ok?'✅ Adequado':'⚠️ Baixo (FRC)'}</span></div>`; }
  if(tg)   { const ok=tg<150; perfRows+=`<div class="lipid-row"><span>Triglicérides: <strong>${tg} mg/dL</strong></span><span class="${ok?'lipid-ok':tg<500?'lipid-warn':'lipid-danger'}">${ok?'✅ Normal':tg<200?'⚠️ Limítrofe':tg<500?'⚠️ Elevado':'❌ Muito elevado (pancreatite!)'}</span></div>`; }
  if(ct&&hdl) { const nhdl=ct-hdl; const ok=nhdl<nonHdlMeta; perfRows+=`<div class="lipid-row"><span>Não-HDL (CT−HDL): <strong>${nhdl} mg/dL</strong></span><span class="${ok?'lipid-ok':'lipid-danger'}">${ok?'✅ Na meta':'❌ Acima da meta'}</span></div>`; }

  // Redução necessária de LDL
  if(ldl&&ldl>=ldlMeta) {
    const redAbs=ldl-ldlMeta;
    const redPct=Math.round(redAbs/ldl*100);
    perfRows+=`<div class="lipid-row" style="background:#eff6ff;border-radius:8px;padding:8px;margin-top:4px"><span style="font-weight:700;color:#1e3a8a">Redução necessária de LDL</span><span style="font-weight:900;color:#1e3a8a">${redAbs} mg/dL (${redPct}%)</span></div>`;

    // Qual estatina vai atingir a meta
    let estRec='';
    if(redPct>=50) estRec='Estatina intensidade ALTA (Atorvastatina 40–80 mg ou Rosuvastatina 20–40 mg)';
    else if(redPct>=30) estRec='Estatina intensidade MODERADA a ALTA';
    else estRec='Estatina intensidade MODERADA pode ser suficiente';
    if(trat==='est_alta'||trat==='est_alta') estRec+=' → considerar adicionar Ezetimibe';
    if(trat==='est_ezet') estRec+=' → considerar iPCSK9 se risco muito alto';
    perfRows+=`<div class="lipid-row" style="background:#f0fdf4;border-radius:8px;padding:8px"><span style="font-size:.72rem;color:#166534">💡 ${estRec}</span></div>`;
  }

  document.getElementById('perfLipid').innerHTML = perfRows ? `<div class="card" style="padding:10px 14px">${perfRows}</div>` : '';
  document.getElementById('dlResult').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ── ALGORITMO ──────────────────────────────────────────────────────── */
function renderAlgo() {
  const steps = [
    { n:'Sempre — Passo 0', col:'#16a34a', nome:'Mudança de Estilo de Vida (MEV)',
      badges:[{t:'Base de qualquer tratamento',c:'#16a34a'}],
      drugs:'• Dieta pobre em gordura saturada (<7% VCT) e trans (0%) · Rica em fibras (ômega-3, estanóis, aveia)<br>• Exercício aeróbico 150–300 min/sem (moderado) ou 75–150 min/sem (vigoroso)<br>• Perda de peso (↓10 kg → ↓ LDL ~8 mg/dL, ↑ HDL ~4 mg/dL, ↓ TG 20–30%)<br>• Cessação do tabagismo · Redução do consumo de álcool · Controle da glicemia',
      note:'MEV isolada raramente atinge meta em risco alto/muito alto — iniciar farmacoterapia sem aguardar resposta a MEV em alto risco.' },
    { n:'Passo 1 — 1ª linha', col:'#1e3a8a', nome:'Estatina em intensidade adequada ao risco',
      badges:[{t:'AHA/ACC IIA',c:'#1e3a8a'},{t:'SBC 2020',c:'#1e3a8a'}],
      drugs:'<strong>Intensidade ALTA</strong> (redução LDL ≥50%): <u>Atorvastatina 40–80 mg</u> · Rosuvastatina 20–40 mg<br><strong>Intensidade MODERADA</strong> (redução LDL 30–49%): Atorvastatina 10–20 mg · Rosuvastatina 5–10 mg · Sinvastatina 20–40 mg · Pravastatina 40–80 mg · Pitavastatina 2–4 mg<br><strong>Intensidade BAIXA</strong> (redução LDL <30%): Sinvastatina 10 mg (usar somente se intolerância)',
      note:'Risco muito alto e alto: iniciar com intensidade alta. Checar CPK e TGP/TGO basalmente. Mialgia é a RAM mais comum (~5%); CPK >10×LSN: suspender. Não iniciar em gestação (teratogênico).' },
    { n:'Passo 2 — Adicionar se LDL ainda acima da meta', col:'#7c3aed', nome:'Ezetimibe 10 mg/dia',
      badges:[{t:'IMPROVE-IT',c:'#7c3aed'}],
      drugs:'<strong>Ezetimibe 10 mg/dia</strong> — inibe absorção intestinal de colesterol; redução adicional de LDL de 15–25%.<br>Pode combinar com estatina de qualquer intensidade. Formulação fixa: Atorvastatina+Ezetimibe (Atozet).',
      note:'IMPROVE-IT: ezetimibe+sinvastatina reduziu eventos VS sinvastatina isolada em pós-IAM (NNT=50). Bem tolerado; poucas interações. Sem necessidade de monitoramento adicional rotineiro.' },
    { n:'Passo 3 — Se LDL ainda >50 mg/dL acima da meta (risco muito alto)', col:'#dc2626', nome:'iPCSK9 (inibidor de PCSK9)',
      badges:[{t:'FOURIER (evolocumabe)',c:'#dc2626'},{t:'ODYSSEY (alirocumabe)',c:'#dc2626'}],
      drugs:'<strong>Evolocumabe</strong> (Repatha) 140 mg SC q2sem ou 420 mg SC/mês · Alirocumabe (Praluent) 75–150 mg SC q2sem<br>Redução de LDL de 50–60% adicional sobre estatina+ezetimibe. Anticorpos monoclonais anti-PCSK9.',
      note:'Indicação SBC: risco CV muito alto + LDL ≥100 mg/dL (meta não atingida) apesar de estatina dose máxima + ezetimibe, OU intolerância a estatinas. Custo elevado; disponível em PCDT para HF no SUS. Aplicação SC a cada 2 semanas.' },
    { n:'Caso especial — Hipertrigliceridemia grave (TG >500 mg/dL)', col:'#0f766e', nome:'Fibrato + ômega-3 (risco de pancreatite aguda)',
      badges:[{t:'TG >500 mg/dL: pancreatite',c:'#0f766e'}],
      drugs:'<strong>Fenofibrato</strong> 145 mg/dia (1ª escolha · menor interação com estatina) · Bezafibrato 400 mg/dia · Gemfibrozil (evitar com estatina: risco miopatia)<br><strong>Ômega-3</strong> 2–4 g/dia (DHA+EPA): reduz TG 20–30%; neutro em LDL; pode ↑ LDL levemente',
      note:'Meta primária com TG >500: reduzir a <500 mg/dL para prevenir pancreatite. Meta secundária: <150 mg/dL. Dieta com restrição severa de carboidratos e gordura. Cessar álcool. Investigar DM, hipotireoidismo, síndrome nefrótica como causas secundárias.' },
  ];

  document.getElementById('algoContent').innerHTML = steps.map(s=>`
    <div class="step-card" style="border-color:${s.col}">
      <div class="step-n" style="color:${s.col}">${s.n}</div>
      <div class="step-nome">${s.nome}</div>
      <div>${s.badges.map(b=>`<span class="step-badge" style="background:${b.c}">${b.t}</span>`).join('')}</div>
      <div class="step-drugs">${s.drugs}</div>
      <div class="step-note">${s.note}</div>
    </div>`).join('');
}

/* ── FÁRMACOS ───────────────────────────────────────────────────────── */
const DL_DRUGS = [
  { classe:'Estatinas — Intensidade ALTA', col:'#1e3a8a', ev:'JUPITER / WOSCOPS / 4S / ASCOT',
    dose:'Atorvastatina 10–80 mg/dia · Rosuvastatina 5–40 mg/dia',
    eficacia:'Atorva 40 mg: ↓LDL ~50% · Rosuva 20 mg: ↓LDL ~55% · Pitavastatina 4mg: ↓LDL 40–45%',
    monitor:'TGP/TGO basalmente (e se sintomático) · CPK se mialgia · Glicemia (↑ DM2 em predispostos ~0,1%/ano)',
    ci:'Gestação (cat. X) · Amamentação · Hepatopatia ativa (TGP >3×LSN) · Uso com gemfibrozil' },
  { classe:'Estatinas — Intensidade MODERADA', col:'#0369a1', ev:'Múltiplos estudos',
    dose:'Atorvastatina 10–20 mg · Rosuvastatina 5–10 mg · Sinvastatina 20–40 mg · Pravastatina 40–80 mg · Pitavastatina 2 mg',
    eficacia:'↓LDL 30–49%. Pravastatina: menos interações (não CYP3A4). Sinvastatina: risco de miopatia com amiodarona/diltiazem.',
    monitor:'Mesmos da estatina alta intensidade.',
    ci:'Sinvastatina 80 mg: não iniciar (miopatia). Sinvastatina + amiodarona: máx 20 mg/dia.' },
  { classe:'Ezetimibe', col:'#7c3aed', ev:'IMPROVE-IT',
    dose:'Ezetimibe 10 mg/dia (dose única)',
    eficacia:'↓LDL 15–25% adicional · ↓ absorção intestinal de colesterol e fitoesteróis',
    monitor:'Sem monitoramento específico além dos lípides.',
    ci:'Hepatopatia ativa (combinação com estatina). Gestação (dados limitados).' },
  { classe:'iPCSK9 — Inibidores de PCSK9', col:'#dc2626', ev:'FOURIER (evolocumabe) / ODYSSEY OUTCOMES (alirocumabe)',

function renderDrugs() {
  document.getElementById('drugList').innerHTML = DL_DRUGS.map(d=>`
    <div class="drug-card" style="border-color:${d.col}">
      <div class="drug-classe" style="color:${d.col}">${d.classe}</div>
      <div style="font-size:.63rem;color:#94a3b8;margin:2px 0 6px">${d.ev}</div>
      <div class="drug-row"><div class="drug-lbl">Dose</div><div class="drug-val">${d.dose}</div></div>
      <div class="drug-row"><div class="drug-lbl">Eficácia esperada</div><div class="drug-val">${d.eficacia}</div></div>
      <div class="drug-row"><div class="drug-lbl">Monitoramento</div><div class="drug-val">${d.monitor}</div></div>
      <div class="drug-row"><div class="drug-lbl">Contraindicações</div><div class="drug-val" style="color:#dc2626">${d.ci}</div></div>
    </div>`).join('');
}
</script>
