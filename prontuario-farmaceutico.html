<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Prontuário Farmacêutico — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar { display:flex;align-items:center;gap:10px;padding:12px 16px;background:#1e3a5f;position:sticky;top:0;z-index:100 }
    .back-btn { background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:1rem }
    .topbar-title { font-size:.93rem;font-weight:800;color:#fff;flex:1 }
    .btn-top { background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:4px }

    main { max-width:640px;margin:0 auto;padding:12px 14px 90px }

    /* Seletor de paciente (não imprime) */
    .pac-sel { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:.88rem;margin-bottom:12px;background:#fff }

    /* ===== DOCUMENTO PRONTUÁRIO ===== */
    .prontuario { background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06) }

    /* Cabeçalho */
    .pron-cabecalho { background:#1e3a5f;color:#fff;padding:20px 24px }
    .pron-title { font-size:1rem;font-weight:900;letter-spacing:.02em;text-transform:uppercase }
    .pron-subtitle { font-size:.72rem;opacity:.75;margin-top:2px }
    .pron-meta { display:flex;justify-content:space-between;align-items:flex-start;margin-top:14px }
    .pron-meta-bloco { flex:1 }
    .pron-meta-label { font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;opacity:.7;margin-bottom:2px }
    .pron-meta-val { font-size:.84rem;font-weight:700 }

    /* Corpo */
    .pron-corpo { padding:0 }

    /* Seções */
    .pron-sec { padding:16px 20px;border-bottom:1px solid #f1f5f9 }
    .pron-sec:last-child { border-bottom:none }
    .pron-sec-title { font-size:.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px }
    .pron-sec-title::before { content:'';display:inline-block;width:3px;height:12px;background:#1e3a5f;border-radius:2px }

    /* Tabelas */
    table.pt { width:100%;border-collapse:collapse;font-size:.78rem }
    table.pt th { background:#f8fafc;padding:6px 9px;text-align:left;font-size:.62rem;color:#64748b;border-bottom:1.5px solid #e2e8f0;font-weight:700 }
    table.pt td { padding:7px 9px;border-bottom:1px solid #f8fafc;vertical-align:top }
    table.pt tr:last-child td { border:none }

    /* Campos inline */
    .pron-campo { font-size:.8rem;color:#374151;margin-bottom:5px;line-height:1.5 }
    .pron-campo strong { color:#1e293b }

    /* Badges */
    .badge { display:inline-block;padding:2px 8px;border-radius:999px;font-size:.62rem;font-weight:700 }
    .b-ok   { background:#dcfce7;color:#16a34a }
    .b-par  { background:#fef3c7;color:#92400e }
    .b-bad  { background:#fee2e2;color:#dc2626 }
    .b-info { background:#dbeafe;color:#1e40af }
    .b-gray { background:#f1f5f9;color:#64748b }

    /* Alerta RAM / DDI */
    .alerta-row { display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:5px;font-size:.78rem }
    .alerta-grave  { background:#fee2e2;color:#991b1b }
    .alerta-moder  { background:#fef3c7;color:#92400e }

    /* Vitais grid */
    .vitais-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px }
    .vital-item { background:#f8fafc;border-radius:8px;padding:8px 10px;text-align:center }
    .vital-val { font-size:1.1rem;font-weight:900;color:#1e293b }
    .vital-lbl { font-size:.6rem;color:#64748b;margin-top:2px }

    /* Assinaturas */
    .assinaturas { display:flex;gap:20px;margin-top:20px;padding-top:14px;border-top:1.5px solid #e2e8f0 }
    .assin-bloco { flex:1;text-align:center }
    .assin-linha { border-top:1.5px solid #1e293b;margin-bottom:6px }
    .assin-nome  { font-size:.75rem;color:#374151;font-weight:700;line-height:1.5 }
    .assin-cargo { font-size:.65rem;color:#94a3b8 }

    /* Rodapé */
    .pron-rodape { background:#f8fafc;border-top:1.5px solid #e2e8f0;padding:10px 20px;font-size:.65rem;color:#94a3b8;display:flex;justify-content:space-between }

    .loading { text-align:center;padding:40px;color:#94a3b8;font-size:.85rem }

    @media print {
      .topbar,.btn-top,.no-print,nav,.pac-sel { display:none!important }
      .prontuario { border:none;border-radius:0;box-shadow:none }
      body { background:#fff }
      main { padding:0;max-width:none }
      .pron-sec { page-break-inside:avoid }
      table.pt { page-break-inside:avoid }
      @page { margin:1.2cm }
    }
  </style>
</head>
<body>

<div class="topbar no-print">
  <button class="back-btn" onclick="history.back()">←</button>
  <div style="flex:1">
    <div class="topbar-title">📄 Prontuário Farmacêutico</div>
  </div>
  <button class="btn-top" onclick="window.print()">🖨️ Imprimir</button>
  <button class="btn-top" onclick="compartilharWpp()">📲 WPP</button>
</div>

<main>
  <select class="pac-sel no-print" id="sel-pac" onchange="init()">
    <option value="">Selecione o paciente...</option>
  </select>

  <div id="documento"><p class="loading">Selecione um paciente para gerar o prontuário.</p></div>
</main>

<nav class="bottom-nav no-print">
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="historico.html" class="nav-item">📋<span>Histórico</span></a>
  <a href="diario.html" class="nav-item">📓<span>Diário</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/interacoes.js"></script>
<script src="js/beers.js"></script>
<script src="js/anticolin.js"></script>

<script>
let _pac = null, _farmCfg = {}, _meds = [], _allDoses = [], _allDiario = [], _allLabs = [];

async function init() {
  const sel = document.getElementById('sel-pac');
  if (!sel.dataset.loaded) {
    const pacs = await dbGetAll('pacientes');
    sel.innerHTML = '<option value="">Selecione o paciente...</option>' +
      pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
    sel.dataset.loaded = '1';
    const pid = getActivePacienteId();
    if (pid) sel.value = pid;
  }

  const pid = parseInt(sel.value);
  if (!pid) { document.getElementById('documento').innerHTML = '<p class="loading">Selecione um paciente.</p>'; return; }

  document.getElementById('documento').innerHTML = '<p class="loading">⏳ Gerando prontuário...</p>';

  const hj = hoje();
  [_pac, _farmCfg] = await Promise.all([dbGet('pacientes', pid), dbGetConfig('farmaceutico_cfg')]);
  _farmCfg = _farmCfg || {};

  const [allMeds, allDoses, allDiario, allLabs,
         soaps, ints, plano, rams, planoSeg, anamnese, conciliacao, notasInt] = await Promise.all([
    dbGetByIndex('medicamentos', 'pacienteId', pid),
    dbGetAll('doses'),
    dbGetAll('diario'),
    dbGetAll('laboratorio'),
    dbGetConfig('soap_' + pid),
    dbGetConfig('sft_int_' + pid),
    dbGetConfig('plano_cuidados_' + pid),
    dbGetConfig('ram_' + pid),
    dbGetConfig('plano_seg_' + pid),
    dbGetConfig('anamnese_sft_' + pid),
    dbGetConfig('conciliacao_' + pid),
    dbGetConfig('nota_int_' + pid),
  ]);

  _meds = allMeds.filter(m=>m.ativo!==false&&(!m.dataFim||m.dataFim>=hj));
  _allDoses   = allDoses.filter(d=>allMeds.find(m=>m.id===d.medicamentoId));
  _allDiario  = allDiario.filter(d=>d.pacienteId===pid||!d.pacienteId).sort((a,b)=>b.data>a.data?1:-1);
  _allLabs    = allLabs.filter(l=>l.pacienteId===pid||!l.pacienteId).sort((a,b)=>b.data>a.data?1:-1);

  renderProntuario(pid, soaps||[], ints||[], plano||{}, rams||[], planoSeg||{}, anamnese||{}, conciliacao||null, notasInt||[]);
}

function renderProntuario(pid, soaps, ints, plano, rams, planoSeg, anamnese, conciliacao, notasInt) {
  const pac     = _pac;
  const farm    = _farmCfg;
  const dtHoje  = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const numPront= 'PF-' + String(pid).padStart(3,'0') + '-' + new Date().getFullYear();

  // Cálculo de aderência
  const totDoses = _allDoses.length;
  const tomadas  = _allDoses.filter(d=>d.status==='tomado').length;
  const adh = totDoses ? Math.round(tomadas/totDoses*100) : null;

  // Vitais mais recentes
  const vitais = _allDiario[0] || {};
  const lastLab = tipo => {
    const r = _allLabs.filter(l=>(l.tipo||l.nome||'').toLowerCase().includes(tipo)).sort((a,b)=>b.data>a.data?1:-1)[0];
    return r ? `${r.valor} ${r.unidade||''}`.trim() : null;
  };

  // DDI e alertas
  let alertasDDI = [];
  if (typeof gerarAlertas === 'function') alertasDDI = gerarAlertas(_meds).slice(0,5);

  // Beers
  let alertasBeers = [];
  if (typeof buscarBeers === 'function' && (parseInt(pac?.idadePac)||0)>=65) {
    _meds.forEach(m=>{ const b=buscarBeers(m.nome); if(b) alertasBeers.push({med:m.nome,...b}); });
  }

  const prms = plano.problemas || [];
  const nResolvidos = prms.filter(p=>p.desfecho==='resolvido').length;

  // SOAP mais recente
  const lastSoap = soaps.length ? soaps[soaps.length-1] : null;

  document.getElementById('documento').innerHTML = `
  <div class="prontuario">

    <!-- Cabeçalho -->
    <div class="pron-cabecalho">
      <div class="pron-title">Prontuário Farmacêutico</div>
      <div class="pron-subtitle">Documento de Seguimento Farmacoterapêutico — Método Dáder</div>
      <div class="pron-meta">
        <div class="pron-meta-bloco">
          <div class="pron-meta-label">Número do Prontuário</div>
          <div class="pron-meta-val">${numPront}</div>
        </div>
        <div class="pron-meta-bloco" style="text-align:center">
          <div class="pron-meta-label">Data de emissão</div>
          <div class="pron-meta-val">${dtHoje}</div>
        </div>
        <div class="pron-meta-bloco" style="text-align:right">
          <div class="pron-meta-label">Farmacêutico(a)</div>
          <div class="pron-meta-val">${esc(farm.nome||'—')}</div>
          ${farm.crf?`<div style="font-size:.65rem;opacity:.75">${esc(farm.crf)}</div>`:''}
        </div>
      </div>
    </div>

    <div class="pron-corpo">

      <!-- 1. Identificação do Paciente -->
      <div class="pron-sec">
        <div class="pron-sec-title">Identificação do Paciente</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px">
          <div class="pron-campo"><strong>Nome:</strong> ${esc(pac?.nome||'—')}</div>
          <div class="pron-campo"><strong>Idade:</strong> ${pac?.idadePac||'—'} anos</div>
          <div class="pron-campo"><strong>Sexo:</strong> ${pac?.sexoPac==='F'?'Feminino':pac?.sexoPac==='M'?'Masculino':'—'}</div>
          <div class="pron-campo"><strong>Peso / Altura:</strong> ${pac?.pesoPac||'—'} kg / ${pac?.alturaPac||'—'} cm</div>
          <div class="pron-campo"><strong>Tipo sanguíneo:</strong> ${pac?.tipoSanguineo||'—'}</div>
          <div class="pron-campo"><strong>Telefone:</strong> ${pac?.telefone||'—'}</div>
        </div>
        ${(pac?.condicoes||[]).length ? `
        <div class="pron-campo" style="margin-top:8px"><strong>Condições clínicas:</strong> ${pac.condicoes.map(c=>`<span class="badge b-info" style="margin:1px 2px">${esc(c)}</span>`).join(' ')}</div>` : ''}
        ${pac?.alergias||pac?.historicoAlergias ? `
        <div style="background:#fee2e2;border-radius:8px;padding:8px 10px;margin-top:8px">
          <div style="font-size:.65rem;font-weight:800;color:#991b1b;margin-bottom:3px">🚨 ALERGIAS</div>
          <div style="font-size:.8rem;color:#991b1b">${esc(pac.alergias||pac.historicoAlergias||'—')}</div>
        </div>` : ''}
      </div>

      <!-- 2. Anamnese Farmacêutica -->
      ${(anamnese.queixa||anamnese.hist||anamnese.habitos) ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Anamnese Farmacêutica</div>
        ${anamnese.queixa?`<div class="pron-campo"><strong>Queixa principal:</strong> ${esc(anamnese.queixa)}</div>`:''}
        ${anamnese.hist?`<div class="pron-campo" style="margin-top:6px"><strong>Histórico farmacoterapêutico:</strong> ${esc(anamnese.hist)}</div>`:''}
        ${anamnese.habitos?`<div class="pron-campo" style="margin-top:6px"><strong>Hábitos de vida:</strong> ${esc(anamnese.habitos)}</div>`:''}
      </div>` : ''}

      <!-- 3. Lista de Medicamentos -->
      <div class="pron-sec">
        <div class="pron-sec-title">Farmacoterapia Atual — ${_meds.length} medicamento${_meds.length!==1?'s':''}</div>
        ${_meds.length ? `
        <table class="pt">
          <thead><tr><th>#</th><th>Medicamento</th><th>Dose / Via</th><th>Frequência</th><th>Indicação</th></tr></thead>
          <tbody>${_meds.map((m,i)=>`<tr>
            <td style="color:#94a3b8">${i+1}</td>
            <td><strong>${esc(m.nome||'—')}</strong>${m.generico&&m.generico!==m.nome?`<br><span style="font-size:.68rem;color:#94a3b8">${esc(m.generico)}</span>`:''}</td>
            <td>${esc(m.dosagem||'—')}${m.via?' / '+esc(m.via):''}</td>
            <td>${esc(m.frequencia||'—')}</td>
            <td>${esc(m.indicacao||'—')}</td>
          </tr>`).join('')}</tbody>
        </table>` : '<div style="color:#94a3b8;font-size:.8rem">Nenhum medicamento ativo cadastrado.</div>'}
      </div>

      <!-- 4. Alertas Farmacológicos -->
      ${(alertasDDI.length||alertasBeers.length) ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Alertas Farmacológicos</div>
        ${alertasDDI.filter(a=>a.nivel==='grave').map(a=>`
          <div class="alerta-row alerta-grave">⛔ <strong>DDI Grave:</strong> ${esc(a.par||a.msg)}</div>`).join('')}
        ${alertasDDI.filter(a=>a.nivel==='moderada').map(a=>`
          <div class="alerta-row alerta-moder">⚠️ <strong>DDI Moderada:</strong> ${esc(a.par||a.msg)}</div>`).join('')}
        ${alertasBeers.map(a=>`
          <div class="alerta-row alerta-moder">👴 <strong>Critério de Beers:</strong> ${esc(a.med)} — ${esc(a.motivo||a.risco||'Medicamento potencialmente inapropriado para idosos')}</div>`).join('')}
      </div>` : ''}

      <!-- 5. Problemas Relacionados a Medicamentos (PRMs) -->
      <div class="pron-sec">
        <div class="pron-sec-title">PRMs Identificados — ${prms.length} problema${prms.length!==1?'s':''} (${nResolvidos} resolvido${nResolvidos!==1?'s':''})</div>
        ${prms.length ? `
        <table class="pt">
          <thead><tr><th>#</th><th>PRM / Problema</th><th>Categoria</th><th>Data</th><th>Status</th><th>Desfecho</th></tr></thead>
          <tbody>${prms.map((p,i)=>{
            const DCLS = { resolvido:'b-ok', parcial:'b-par', 'nao-resolvido':'b-bad', transferido:'b-gray' };
            const DLBL = { resolvido:'Resolvido', parcial:'Parcial', 'nao-resolvido':'Não resolv.', transferido:'Transf.' };
            return `<tr>
              <td style="color:#94a3b8">${i+1}</td>
              <td>${esc(p.problema||'—')}</td>
              <td style="font-size:.72rem;color:#64748b">${esc(p.categoria||'—')}</td>
              <td style="font-size:.72rem;color:#64748b">${p.data||'—'}</td>
              <td><span class="badge ${p.status==='resolvido'?'b-ok':p.status==='parcial'?'b-par':'b-gray'}">${p.status||'ativo'}</span></td>
              <td>${p.desfecho?`<span class="badge ${DCLS[p.desfecho]||'b-gray'}">${DLBL[p.desfecho]||p.desfecho}</span>${p.desfechoEvidencia?`<br><span style="font-size:.65rem;color:#64748b">${esc(p.desfechoEvidencia)}</span>`:''}`:'-'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>` : '<div style="color:#94a3b8;font-size:.8rem">Nenhum PRM registrado.</div>'}
      </div>

      <!-- 6. Intervenções Farmacêuticas -->
      <div class="pron-sec">
        <div class="pron-sec-title">Intervenções Farmacêuticas — ${ints.length} registro${ints.length!==1?'s':''}</div>
        ${ints.length ? `
        <table class="pt">
          <thead><tr><th>Data</th><th>Tipo</th><th>Conduta</th><th>Resultado</th><th>Aceita</th></tr></thead>
          <tbody>${ints.map(h=>{
            const ac = h.aceita===true||h.aceita==='sim';
            const nao = h.aceita===false||h.aceita==='nao';
            return `<tr>
              <td style="font-size:.7rem;color:#64748b;white-space:nowrap">${h.data||h.dt||'—'}</td>
              <td style="font-size:.72rem">${esc(h.tipo||'—')}</td>
              <td style="font-size:.76rem">${esc(h.conduta||h.acao||'—')}</td>
              <td style="font-size:.76rem">${esc(h.resultado||h.result||'—')}</td>
              <td><span class="badge ${ac?'b-ok':nao?'b-bad':'b-par'}">${ac?'Aceita':nao?'Recusada':'Pend.'}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>` : '<div style="color:#94a3b8;font-size:.8rem">Nenhuma intervenção registrada.</div>'}
      </div>

      <!-- 7. Notas de Intervenção ao Prescritor -->
      ${notasInt.length ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Notas de Intervenção ao Prescritor — ${notasInt.length}</div>
        <table class="pt">
          <thead><tr><th>Nº</th><th>Data</th><th>Tipo</th><th>Prioridade</th><th>Resposta</th></tr></thead>
          <tbody>${notasInt.map(n=>{ const ac=n.resposta; return `<tr>
            <td style="font-size:.7rem;color:#94a3b8">${n.numNota||'—'}</td>
            <td style="font-size:.7rem;color:#64748b;white-space:nowrap">${n.geradaEm||'—'}</td>
            <td style="font-size:.72rem">${esc(n.tipo||'—')}</td>
            <td style="font-size:.7rem">${esc((n.prior||'').split('—')[0].trim())}</td>
            <td><span class="badge ${ac==='sim'?'b-ok':ac==='nao'?'b-bad':'b-par'}">${ac==='sim'?'Aceita':ac==='nao'?'Recusada':'Pendente'}</span></td>
          </tr>`; }).join('')}</tbody>
        </table>
      </div>` : ''}

      <!-- 8. RAMs documentadas -->
      ${rams.length ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Reações Adversas (RAMs) — ${rams.length} registrada${rams.length!==1?'s':''}</div>
        <table class="pt">
          <thead><tr><th>Medicamento</th><th>Reação</th><th>Gravidade</th><th>Data</th><th>Conduta</th></tr></thead>
          <tbody>${rams.map(r=>`<tr>
            <td>${esc(r.med||r.medicamento||'—')}</td>
            <td>${esc(r.reacao||r.reacao_adv||r.descricao||'—')}</td>
            <td><span class="badge ${r.gravidade==='grave'||r.gravidade==='severa'?'b-bad':r.gravidade?'b-par':'b-gray'}">${esc(r.gravidade||'—')}</span></td>
            <td style="font-size:.7rem;color:#64748b">${r.data||'—'}</td>
            <td style="font-size:.76rem">${esc(r.conduta||r.tratamento||'—')}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      <!-- 9. Aderência Terapêutica -->
      <div class="pron-sec">
        <div class="pron-sec-title">Aderência Terapêutica</div>
        ${adh !== null ? `
        <div style="display:flex;align-items:center;gap:14px">
          <div style="font-size:2.2rem;font-weight:900;color:${adh>=80?'#16a34a':adh>=60?'#d97706':'#dc2626'}">${adh}%</div>
          <div>
            <div style="font-size:.85rem;font-weight:700;color:${adh>=80?'#16a34a':adh>=60?'#d97706':'#dc2626'}">${adh>=80?'Boa aderência':adh>=60?'Aderência parcial':'Baixa aderência'}</div>
            <div style="font-size:.7rem;color:#64748b">Baseada em ${totDoses} registros de dose (${tomadas} confirmadas)</div>
          </div>
        </div>` : '<div style="color:#94a3b8;font-size:.8rem">Sem registros de dose disponíveis.</div>'}
      </div>

      <!-- 10. Sinais Vitais e Parâmetros Clínicos -->
      ${(vitais.paSis||vitais.glicemia||vitais.peso||vitais.fc) ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Sinais Vitais — último registro ${vitais.data||''}</div>
        <div class="vitais-grid">
          ${vitais.paSis?`<div class="vital-item"><div class="vital-val">${vitais.paSis}/${vitais.paDia||'?'}</div><div class="vital-lbl">PA mmHg</div></div>`:''}
          ${vitais.glicemia?`<div class="vital-item"><div class="vital-val">${vitais.glicemia}</div><div class="vital-lbl">Glicemia mg/dL</div></div>`:''}
          ${vitais.peso?`<div class="vital-item"><div class="vital-val">${vitais.peso}</div><div class="vital-lbl">Peso kg</div></div>`:''}
          ${vitais.fc?`<div class="vital-item"><div class="vital-val">${vitais.fc}</div><div class="vital-lbl">FC bpm</div></div>`:''}
          ${vitais.spo2?`<div class="vital-item"><div class="vital-val">${vitais.spo2}%</div><div class="vital-lbl">SpO₂</div></div>`:''}
          ${vitais.temp?`<div class="vital-item"><div class="vital-val">${vitais.temp}°C</div><div class="vital-lbl">Temperatura</div></div>`:''}
        </div>
      </div>` : ''}

      <!-- 11. Exames Laboratoriais -->
      ${_allLabs.length ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Exames Laboratoriais — últimos resultados</div>
        <table class="pt">
          <thead><tr><th>Exame</th><th>Resultado</th><th>Unidade</th><th>Referência</th><th>Data</th></tr></thead>
          <tbody>${(() => {
            const porTipo = {};
            _allLabs.forEach(l=>{ const t=l.tipo||l.nome||'?'; if(!porTipo[t]) porTipo[t]=l; });
            return Object.values(porTipo).slice(0,10).map(l=>`<tr>
              <td>${esc(l.tipo||l.nome||'—')}</td>
              <td><strong>${l.valor||'—'}</strong></td>
              <td style="font-size:.7rem;color:#64748b">${esc(l.unidade||'—')}</td>
              <td style="font-size:.7rem;color:#64748b">${esc(l.referencia||'—')}</td>
              <td style="font-size:.7rem;color:#64748b">${l.data||'—'}</td>
            </tr>`).join('');
          })()}</tbody>
        </table>
      </div>` : ''}

      <!-- 12. Última Nota SOAP -->
      ${lastSoap ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Última Consulta SOAP — ${lastSoap.data||lastSoap.dt||''}</div>
        ${lastSoap.subjetivo?`<div class="pron-campo"><strong>S —</strong> ${esc(lastSoap.subjetivo)}</div>`:''}
        ${lastSoap.objetivo?`<div class="pron-campo"><strong>O —</strong> ${esc(lastSoap.objetivo)}</div>`:''}
        ${lastSoap.avaliacao?`<div class="pron-campo"><strong>A —</strong> ${esc(lastSoap.avaliacao)}</div>`:''}
        ${lastSoap.plano?`<div class="pron-campo"><strong>P —</strong> ${esc(lastSoap.plano)}</div>`:''}
        <div style="font-size:.65rem;color:#94a3b8;margin-top:4px">Total de consultas SOAP registradas: ${soaps.length}</div>
      </div>` : ''}

      <!-- 13. Conciliação Medicamentosa -->
      ${conciliacao ? `
      <div class="pron-sec">
        <div class="pron-sec-title">Conciliação Medicamentosa — ${conciliacao.data||''}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
          ${conciliacao.nMantido!=null?`<span class="badge b-info">Mantido: ${conciliacao.nMantido}</span>`:''}
          ${conciliacao.nAdicionado!=null?`<span class="badge b-ok">Adicionado: ${conciliacao.nAdicionado}</span>`:''}
          ${conciliacao.nOmitido!=null?`<span class="badge b-bad">Omitido: ${conciliacao.nOmitido}</span>`:''}
          ${conciliacao.nAlterado!=null?`<span class="badge b-par">Alterado: ${conciliacao.nAlterado}</span>`:''}
          ${conciliacao.fonte?`<span class="badge b-gray">Fonte: ${esc(conciliacao.fonte)}</span>`:''}
        </div>
      </div>` : ''}

      <!-- 14. Plano de Seguimento -->
      <div class="pron-sec">
        <div class="pron-sec-title">Plano de Seguimento Farmacoterapêutico</div>
        ${planoSeg.retorno?`<div class="pron-campo"><strong>Data de retorno:</strong> ${new Date(planoSeg.retorno+'T12:00').toLocaleDateString('pt-BR')}</div>`:''}
        ${planoSeg.plano?`<div class="pron-campo" style="margin-top:4px">${esc(planoSeg.plano)}</div>`:
          '<div style="color:#94a3b8;font-size:.8rem">Plano de seguimento não registrado.</div>'}
        ${(plano.metas||[]).length?`
          <div style="margin-top:10px">
            <div style="font-size:.65rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:6px">Metas terapêuticas</div>
            ${plano.metas.map(m=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="badge ${m.status==='atingida'?'b-ok':m.status==='parcial'?'b-par':'b-bad'}">${m.status||'—'}</span>
              <span style="font-size:.78rem;color:#374151">${esc(m.meta||'')}</span>
            </div>`).join('')}
          </div>` : ''}
      </div>

      <!-- Assinaturas -->
      <div class="pron-sec">
        <div class="assinaturas">
          <div class="assin-bloco">
            <div class="assin-linha"></div>
            <div class="assin-nome">${esc(farm.nome||'Farmacêutico(a) Responsável')}</div>
            <div class="assin-cargo">${esc(farm.crf||'')}${farm.email?' · '+farm.email:''}</div>
          </div>
          <div class="assin-bloco">
            <div class="assin-linha"></div>
            <div class="assin-nome">${esc(pac?.nome||'Paciente')}</div>
            <div class="assin-cargo">Paciente / Responsável</div>
          </div>
        </div>
      </div>

    </div><!-- fim pron-corpo -->

    <div class="pron-rodape">
      <span>VitaDose — Sistema de Farmácia Clínica</span>
      <span>${numPront} · Gerado em ${dtHoje}</span>
    </div>
  </div>`;
}

function compartilharWpp() {
  if (!_pac) return;
  const farm = _farmCfg;
  const dtHoje = new Date().toLocaleDateString('pt-BR');
  const meds = _meds.map(m=>`• ${m.nome} ${m.dosagem||''} — ${m.frequencia||''}`).join('\n');
  const t = `*PRONTUÁRIO FARMACÊUTICO*\n` +
    `Farmacêutico(a): ${farm.nome||'—'} ${farm.crf?'CRF: '+farm.crf:''}\n\n` +
    `*Paciente:* ${_pac.nome||'—'}\n*Idade:* ${_pac.idadePac||'—'} anos\n\n` +
    `*Medicamentos ativos (${_meds.length}):*\n${meds||'—'}\n\n` +
    `*PRMs identificados:* ${(_allDoses.length?Math.round(_allDoses.filter(d=>d.status==='tomado').length/_allDoses.length*100)+'% aderência':'sem dados')}\n\n` +
    `Emitido em ${dtHoje} — VitaDose`;
  if (navigator.share) navigator.share({ title:'Prontuário Farmacêutico', text:t });
  else window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
