<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F3460">
  <title>VitaDose — Painel da Farmácia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/vitadose.css">
  <style>
    /* ── Dashboard overrides ── */
    .dash-header {
      background: var(--navy);
      padding: 16px 20px 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .dash-logo {
      font-size: 1.1rem; font-weight: 800; line-height: 1;
    }
    .dash-logo .vita { color: var(--gold); }
    .dash-logo .dose { color: #fff; }
    .dash-logo .tag  {
      display: inline-block; margin-left: 8px;
      background: rgba(201,168,76,.2); color: var(--gold);
      font-size: .6rem; font-weight: 700; letter-spacing: .08em;
      padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
      vertical-align: middle;
    }
    .dash-sub {
      font-size: .7rem; color: rgba(255,255,255,.5);
      margin-top: 2px; letter-spacing: .02em;
    }

    /* Resumo geral */
    .dash-summary {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 1px; background: var(--border);
      margin: 14px 16px 0;
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .ds-item { background: var(--white); padding: 14px 8px; text-align: center; }
    .ds-num  { font-size: 1.5rem; font-weight: 700; color: var(--navy); line-height: 1; }
    .ds-num.green { color: var(--green); }
    .ds-num.amber { color: var(--amber); }
    .ds-num.red   { color: var(--red); }
    .ds-lbl { font-size: .62rem; color: var(--text-2); margin-top: 3px; }

    /* Filtro de período */
    .period-row {
      display: flex; gap: 6px; padding: 12px 16px 0;
    }
    .period-btn {
      flex: 1; padding: 7px 4px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-family: inherit;
      font-size: .72rem; font-weight: 600; color: var(--text-2);
      cursor: pointer; text-align: center;
    }
    .period-btn.active {
      background: var(--navy); border-color: var(--navy); color: #fff;
    }

    /* Card de paciente */
    .pac-card {
      background: var(--white); border-radius: var(--radius);
      margin: 10px 16px 0; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .pac-header {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px 10px; cursor: pointer;
    }
    .pac-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--navy); color: var(--gold);
      font-size: .8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pac-info { flex: 1; min-width: 0; }
    .pac-nome {
      font-size: .95rem; font-weight: 700; color: var(--navy);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pac-meta { font-size: .72rem; color: var(--text-2); margin-top: 1px; }
    .pac-pct  {
      font-size: 1.2rem; font-weight: 800; flex-shrink: 0;
    }
    .pac-pct.green { color: var(--green); }
    .pac-pct.amber { color: var(--amber); }
    .pac-pct.red   { color: var(--red); }

    .pac-bar-wrap { padding: 0 14px 10px; }
    .pac-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    .pac-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }

    /* Alertas por paciente */
    .pac-alertas { padding: 0 14px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .pac-tag {
      font-size: .66rem; font-weight: 600; padding: 3px 9px; border-radius: 6px;
      display: flex; align-items: center; gap: 4px;
    }
    .pac-tag.ok     { background: var(--green-bg); color: var(--green); }
    .pac-tag.warn   { background: var(--amber-bg); color: #7A4F00; }
    .pac-tag.danger { background: var(--red-bg);   color: #7A0000; }
    .pac-tag.info   { background: var(--blue-bg);  color: var(--blue); }

    /* Detalhe colapsável */
    .pac-detail { border-top: 1px solid var(--border); padding: 12px 14px; display: none; }
    .pac-detail.open { display: block; }
    .pac-detail-title {
      font-size: .67rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--text-2); margin-bottom: 8px;
    }

    /* Estado vazio */
    .empty-dash {
      text-align: center; padding: 60px 20px;
      color: var(--text-2);
    }
    .empty-dash .icon { font-size: 2.5rem; margin-bottom: 14px; }
    .empty-dash p { font-size: .88rem; margin-bottom: 6px; }
    .empty-dash .hint { font-size: .78rem; color: var(--text-2); opacity: .7; }

    /* Ação do rodapé */
    .dash-footer {
      text-align: center; padding: 20px 16px 100px;
      font-size: .72rem; color: var(--text-2);
    }
    .dash-footer a { color: var(--gold); font-weight: 600; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="dash-header">
    <p class="dash-logo">
      <span class="vita">Vita</span><span class="dose">Dose</span>
      <span class="tag">Farmácia</span>
    </p>
    <p class="dash-sub">Painel de Acompanhamento de Pacientes</p>
  </div>

  <!-- Resumo geral -->
  <div class="dash-summary" id="dash-summary">
    <div class="ds-item"><p class="ds-num" id="ds-pac">—</p><p class="ds-lbl">Pacientes</p></div>
    <div class="ds-item"><p class="ds-num" id="ds-ades">—</p><p class="ds-lbl">Adesão média</p></div>
    <div class="ds-item"><p class="ds-num red" id="ds-alert">—</p><p class="ds-lbl">Alertas ativos</p></div>
  </div>

  <!-- Filtro de período -->
  <div class="period-row">
    <button class="period-btn active" onclick="setPeriodo(7,this)">7 dias</button>
    <button class="period-btn" onclick="setPeriodo(15,this)">15 dias</button>
    <button class="period-btn" onclick="setPeriodo(30,this)">30 dias</button>
  </div>

  <!-- Lista de pacientes -->
  <p class="sec-header" style="padding-top:16px">Pacientes Cadastrados</p>
  <div id="pac-list"></div>

  <!-- Rodapé -->
  <div class="dash-footer">
    <a href="cadastro.html">+ Cadastrar novo paciente</a>
    &nbsp;·&nbsp;
    <a href="qrcode.html">QR Code</a>
    &nbsp;·&nbsp;
    <a href="index.html">Modo paciente</a>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let _periodo = 7;
    let _allPacientes = [];
    let _allMeds = [];
    let _allDoses = [];

    async function initDash() {
      _allPacientes = await dbGetAll('pacientes');
      _allMeds      = await dbGetAll('medicamentos');
      _allDoses     = await dbGetAll('doses');
      renderDash();
    }

    function setPeriodo(dias, btn) {
      _periodo = dias;
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDash();
    }

    function renderDash() {
      if (!_allPacientes.length) {
        document.getElementById('pac-list').innerHTML = `
          <div class="empty-dash">
            <div class="icon">🏥</div>
            <p>Nenhum paciente cadastrado ainda.</p>
            <p class="hint">Use o <a href="cadastro.html" style="color:var(--gold)">Cadastro</a> para registrar o primeiro paciente.</p>
          </div>`;
        document.getElementById('ds-pac').textContent   = '0';
        document.getElementById('ds-ades').textContent  = '—';
        document.getElementById('ds-alert').textContent = '0';
        return;
      }

      const dataCorte = (() => {
        const d = new Date(); d.setDate(d.getDate() - (_periodo - 1));
        return d.toISOString().slice(0,10);
      })();

      let totalPct = 0, totalAlerts = 0;
      let html = '';

      for (const pac of _allPacientes) {
        const meds = _allMeds.filter(m => m.pacienteId === pac.id && m.ativo !== false);
        const doses = _allDoses.filter(d => d.data >= dataCorte);

        // Calcular adesão no período
        let tomadas = 0, total = 0;
        for (const med of meds) {
          const dosesM = doses.filter(d => d.medicamentoId === med.id);
          tomadas += dosesM.filter(d => d.status === 'tomado').length;
          total   += dosesM.length;
        }
        const pct = total ? Math.round((tomadas/total)*100) : null;
        const cor = pct === null ? 'amber' : pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';

        if (pct !== null) totalPct += pct;

        // Tags de alerta por paciente
        const tags = [];
        for (const med of meds) {
          if (med.qtdAtual <= 0) {
            tags.push({ tipo:'danger', txt: `⚠ ${med.nome}: estoque zerado` });
            totalAlerts++;
          } else if (med.qtdAtual <= med.limiarAlerta) {
            tags.push({ tipo:'warn', txt: `⚠ ${med.nome}: ${med.qtdAtual} un.` });
            totalAlerts++;
          }
        }
        if (!tags.length && pct !== null) {
          tags.push({ tipo:'ok', txt: '✓ Sem alertas' });
        }
        if (pct !== null && pct < 60) {
          tags.push({ tipo:'danger', txt: `Adesão crítica (${pct}%)` });
        }

        // Detalhe de medicamentos
        const medsHtml = meds.map(m => {
          const sc = getStockColor(m);
          const dias = diasRestantes(m);
          return `<div class="med-list-item">
            <div class="med-list-dot" style="background:var(--${sc})"></div>
            <div class="med-list-info">
              <p class="med-list-name">${m.nome} ${m.dose}${m.unidade||''}</p>
              <p class="med-list-detail">${(m.horarios||[]).join(' · ')} · ${dias}d restantes</p>
            </div>
            <span class="badge badge-${sc==='green'?'green':sc==='amber'?'amber':'gray'}" style="font-size:.63rem">${m.qtdAtual||0}/${m.qtdCaixa||0}</span>
          </div>`;
        }).join('') || '<p class="text-sm text-2">Sem medicamentos cadastrados.</p>';

        html += `
          <div class="pac-card">
            <div class="pac-header" onclick="toggleDetalhe('${pac.id}')">
              <div class="pac-avatar">${iniciaisNome(pac.nome)}</div>
              <div class="pac-info">
                <p class="pac-nome">${pac.nome}</p>
                <p class="pac-meta">${meds.length} med${meds.length !== 1 ? 's' : ''} · ${_periodo} dias</p>
              </div>
              <p class="pac-pct ${cor}">${pct !== null ? pct+'%' : '—'}</p>
            </div>
            <div class="pac-bar-wrap">
              <div class="pac-bar">
                <div class="pac-bar-fill" style="width:${pct||0}%;background:var(--${cor})"></div>
              </div>
              <div class="pac-alertas">
                ${tags.map(t => `<span class="pac-tag ${t.tipo}">${t.txt}</span>`).join('')}
              </div>
            </div>
            <div class="pac-detail" id="det-${pac.id}">
              <p class="pac-detail-title">Medicamentos</p>
              ${medsHtml}
            </div>
          </div>`;
      }

      document.getElementById('pac-list').innerHTML = html;

      // Resumo global
      const media = _allPacientes.length ? Math.round(totalPct / _allPacientes.length) : 0;
      const corMedia = media >= 80 ? 'green' : media >= 50 ? 'amber' : 'red';
      document.getElementById('ds-pac').textContent   = _allPacientes.length;
      document.getElementById('ds-ades').textContent  = _allPacientes.length ? media + '%' : '—';
      document.getElementById('ds-ades').className    = `ds-num ${corMedia}`;
      document.getElementById('ds-alert').textContent = totalAlerts;
    }

    function toggleDetalhe(pid) {
      const el = document.getElementById('det-' + pid);
      el.classList.toggle('open');
    }

    document.addEventListener('DOMContentLoaded', initDash);
  </script>
</body>
</html>
