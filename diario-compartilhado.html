<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Diário Compartilhado — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0f766e;position:sticky;top:0;z-index:100}
    .back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:1rem}
    .topbar-title{font-size:.93rem;font-weight:800;color:#fff;flex:1}
    .topbar-sub{font-size:.62rem;color:rgba(255,255,255,.7);margin-top:1px}
    .btn-top{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:4px}
    main{max-width:620px;margin:0 auto;padding:12px 14px 90px}
    .pac-sel{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:.88rem;margin-bottom:10px;background:#fff}

    /* Nova entrada */
    .nova-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
    .nova-title{font-size:.75rem;font-weight:800;color:#0f766e;margin-bottom:10px;text-transform:uppercase}

    /* Autor */
    .autor-row{display:flex;gap:6px;margin-bottom:10px}
    .autor-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:.73rem;font-weight:700;cursor:pointer;background:#f8fafc;text-align:center;transition:.12s}
    .autor-btn.ativo.farm{background:#ccfbf1;border-color:#0d9488;color:#0f766e}
    .autor-btn.ativo.cuid{background:#fff7ed;border-color:#f97316;color:#c2410c}
    .autor-btn.ativo.pac{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8}

    /* Tipo */
    .tipo-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
    .tipo-pill{padding:5px 11px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:.68rem;font-weight:700;cursor:pointer;background:#f8fafc;color:#475569;transition:.12s}
    .tipo-pill.ativo{background:#ccfbf1;border-color:#0d9488;color:#0f766e}

    .nova-ta{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:.83rem;resize:none;min-height:80px;font-family:inherit}
    .nova-ta:focus{outline:none;border-color:#0d9488}
    .salvar-btn{width:100%;padding:12px;background:#0f766e;color:#fff;border:none;border-radius:10px;font-size:.84rem;font-weight:800;cursor:pointer;margin-top:8px}

    /* Filtros */
    .filtro-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .filtro-btn{padding:5px 12px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:.68rem;font-weight:700;cursor:pointer;background:#fff;color:#64748b;transition:.12s}
    .filtro-btn.ativo{background:#0f766e;border-color:#0f766e;color:#fff}

    /* Linha do tempo */
    .timeline{position:relative;padding-left:28px}
    .timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#e2e8f0;border-radius:2px}
    .entry{position:relative;margin-bottom:12px}
    .entry-dot{position:absolute;left:-22px;top:14px;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px}
    .entry-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .entry-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
    .entry-autor{font-size:.63rem;font-weight:800;padding:2px 8px;border-radius:20px}
    .autor-farm-badge{background:#ccfbf1;color:#0f766e}
    .autor-cuid-badge{background:#fff7ed;color:#c2410c}
    .autor-pac-badge{background:#eff6ff;color:#1d4ed8}
    .entry-tipo{font-size:.62rem;color:#94a3b8;font-weight:700}
    .entry-data{font-size:.62rem;color:#cbd5e1;margin-left:auto}
    .entry-txt{font-size:.8rem;color:#1e293b;line-height:1.5}
    .entry-actions{display:flex;gap:6px;margin-top:8px}
    .del-btn{background:none;border:none;color:#fca5a5;font-size:.68rem;cursor:pointer;padding:2px 6px;border-radius:6px}
    .del-btn:hover{background:#fee2e2}

    .empty{text-align:center;padding:40px;color:#94a3b8;font-size:.8rem}
    @media print{
      .topbar,.pac-sel,.nova-card,.filtro-row,.btn-top,nav,.del-btn{display:none!important}
      body{background:#fff}main{padding:0}
      .entry-card{box-shadow:none;border:1px solid #e2e8f0}
    }
  </style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div style="flex:1">
    <div class="topbar-title">💬 Diário Compartilhado</div>
    <div class="topbar-sub">Farmacêutico · Cuidador · Paciente</div>
  </div>
  <button class="btn-top" onclick="window.print()">🖨️</button>
</div>
<main>
  <select class="pac-sel" id="sel-pac" onchange="init()"><option value="">Selecione o paciente...</option></select>

  <!-- Nova entrada -->
  <div class="nova-card" id="nova-card" style="display:none">
    <div class="nova-title">✏️ Nova Entrada</div>
    <div class="autor-row">
      <div class="autor-btn farm ativo" id="btn-farm" onclick="selAutor('farmaceutico',this)">👨‍⚕️ Farmacêutico</div>
      <div class="autor-btn cuid" id="btn-cuid" onclick="selAutor('cuidador',this)">🧡 Cuidador</div>
      <div class="autor-btn pac" id="btn-pac" onclick="selAutor('paciente',this)">👤 Paciente</div>
    </div>
    <div class="tipo-pills" id="tipo-pills">
      <div class="tipo-pill ativo" onclick="selTipo(this,'orientacao')">📋 Orientação</div>
      <div class="tipo-pill" onclick="selTipo(this,'mudanca')">🔄 Mudança</div>
      <div class="tipo-pill" onclick="selTipo(this,'ocorrencia')">⚠️ Ocorrência</div>
      <div class="tipo-pill" onclick="selTipo(this,'evolucao')">📈 Evolução</div>
      <div class="tipo-pill" onclick="selTipo(this,'duvida')">❓ Dúvida</div>
      <div class="tipo-pill" onclick="selTipo(this,'observacao')">📝 Observação</div>
    </div>
    <textarea class="nova-ta" id="nova-ta" placeholder="Escreva aqui..."></textarea>
    <button class="salvar-btn" onclick="salvar()">💾 Salvar no diário</button>
  </div>

  <!-- Filtros -->
  <div class="filtro-row" id="filtros" style="display:none">
    <div class="filtro-btn ativo" onclick="setFiltro('todos',this)">Todos</div>
    <div class="filtro-btn" onclick="setFiltro('farmaceutico',this)">👨‍⚕️ Farm.</div>
    <div class="filtro-btn" onclick="setFiltro('cuidador',this)">🧡 Cuidador</div>
    <div class="filtro-btn" onclick="setFiltro('paciente',this)">👤 Paciente</div>
  </div>

  <div id="timeline-div"></div>
</main>
<nav class="bottom-nav">
  <a href="modo-cuidador.html" class="nav-item">🧡<span>Cuidador</span></a>
  <a href="index.html" class="nav-item">🏠<span>Início</span></a>
  <a href="estoque-inteligente.html" class="nav-item">📦<span>Estoque</span></a>
  <a href="perfil.html" class="nav-item active">👤<span>Perfil</span></a>
</nav>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>
let _pid=null, _autor='farmaceutico', _tipo='orientacao', _filtro='todos', _entradas=[];

const AUTOR_CFG={
  farmaceutico:{lbl:'Farmacêutico',badge:'autor-farm-badge',dot:'#0d9488',emoji:'👨‍⚕️'},
  cuidador:    {lbl:'Cuidador',    badge:'autor-cuid-badge',dot:'#f97316',emoji:'🧡'},
  paciente:    {lbl:'Paciente',    badge:'autor-pac-badge', dot:'#3b82f6',emoji:'👤'},
};
const TIPO_EMOJI={orientacao:'📋',mudanca:'🔄',ocorrencia:'⚠️',evolucao:'📈',duvida:'❓',observacao:'📝'};

function selAutor(a,btn){
  _autor=a;
  document.querySelectorAll('.autor-btn').forEach(b=>{b.classList.remove('ativo');});
  btn.classList.add('ativo');
}
function selTipo(btn,t){
  _tipo=t;
  document.querySelectorAll('.tipo-pill').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
}
function setFiltro(f,btn){
  _filtro=f;
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderTimeline();
}

async function init(){
  _pid=parseInt(document.getElementById('sel-pac').value)||null;
  if(!_pid){
    document.getElementById('nova-card').style.display='none';
    document.getElementById('filtros').style.display='none';
    document.getElementById('timeline-div').innerHTML='';
    return;
  }
  _entradas=await dbGetConfig('diario_comp_'+_pid)||[];
  document.getElementById('nova-card').style.display='block';
  document.getElementById('filtros').style.display='flex';
  renderTimeline();
}

function renderTimeline(){
  const lista=_entradas
    .filter(e=>_filtro==='todos'||e.autor===_filtro)
    .slice().reverse();

  if(!lista.length){
    document.getElementById('timeline-div').innerHTML=`<div class="empty">
      Nenhuma entrada ainda.<br>Seja o primeiro a registrar uma orientação ou ocorrência!
    </div>`;
    return;
  }

  // Agrupa por data
  const grupos={};
  lista.forEach(e=>{
    const d=e.data||'';
    if(!grupos[d]) grupos[d]=[];
    grupos[d].push(e);
  });

  let html='';
  Object.keys(grupos).sort().reverse().forEach(data=>{
    const dFmt=data?data.split('-').reverse().join('/'):'';
    html+=`<div style="font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin:12px 0 8px">${dFmt}</div>
    <div class="timeline">`;
    grupos[data].forEach((e,i)=>{
      const cfg=AUTOR_CFG[e.autor]||AUTOR_CFG.farmaceutico;
      const emoji=TIPO_EMOJI[e.tipo]||'📝';
      html+=`<div class="entry">
        <div class="entry-dot" style="background:${cfg.dot};box-shadow:0 0 0 2px ${cfg.dot}40"></div>
        <div class="entry-card">
          <div class="entry-header">
            <span class="entry-autor ${cfg.badge}">${cfg.emoji} ${cfg.lbl}</span>
            <span class="entry-tipo">${emoji} ${esc(e.tipo||'observação')}</span>
            <span class="entry-data">${e.hora||''}</span>
          </div>
          ${e.categoria?`<div style="font-size:.65rem;color:#f97316;font-weight:700;margin-bottom:4px">${esc(e.categoria)}</div>`:''}
          <div class="entry-txt">${esc(e.texto||'').replace(/\n/g,'<br>')}</div>
          <div class="entry-actions">
            <button class="del-btn" onclick="deletar('${e.ts}')">🗑️ Remover</button>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('timeline-div').innerHTML=html;
}

async function salvar(){
  if(!_pid){showToast('Selecione um paciente');return;}
  const txt=document.getElementById('nova-ta').value.trim();
  if(!txt){showToast('Escreva algo antes de salvar');return;}
  const agora=new Date();
  const entrada={
    pid:_pid,autor:_autor,tipo:_tipo,texto:txt,
    data:hoje(),
    hora:agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    ts:Date.now(),
  };
  _entradas.push(entrada);
  await dbSetConfig('diario_comp_'+_pid,_entradas);
  document.getElementById('nova-ta').value='';
  renderTimeline();
  showToast('✅ Entrada salva no diário');
}

async function deletar(ts){
  if(!confirm('Remover esta entrada?')) return;
  _entradas=_entradas.filter(e=>String(e.ts)!==String(ts));
  await dbSetConfig('diario_comp_'+_pid,_entradas);
  renderTimeline();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hoje(){return new Date().toISOString().slice(0,10);}

document.addEventListener('DOMContentLoaded',async()=>{
  const pacs=await dbGetAll('pacientes');
  const sel=document.getElementById('sel-pac');
  sel.innerHTML='<option value="">Selecione o paciente...</option>'+pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
  const pid=getActivePacienteId();
  if(pid){sel.value=pid;await init();}
});
</script>
</body>
</html>
