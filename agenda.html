<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agenda Clínica — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <style>
    body { background:#f8fafc;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif }
    .topbar { display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100 }
    .back-btn { background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;color:#475569;border-radius:8px }
    .topbar-title { font-size:1rem;font-weight:700;color:#1e293b;flex:1 }
    .topbar-add { background:#6366f1;color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:.8rem;font-weight:700;cursor:pointer }

    .sec-title { font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;padding:0 16px;margin:14px 0 6px }

    /* Resumo contadores */
    .resumo { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px 6px }
    .res-item { background:#fff;border-radius:12px;padding:10px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06) }
    .res-num  { font-size:1.4rem;font-weight:900 }
    .res-lbl  { font-size:.62rem;color:#64748b;font-weight:600;margin-top:2px }

    /* Evento card */
    .ev-card { background:#fff;margin:0 16px 8px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden }
    .ev-item { display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid #f1f5f9;position:relative }
    .ev-item:last-child { border-bottom:none }
    .ev-item.concluido { opacity:.55 }
    .ev-left { display:flex;flex-direction:column;align-items:center;min-width:36px }
    .ev-dia  { font-size:1.2rem;font-weight:900;color:#1e293b;line-height:1 }
    .ev-mes  { font-size:.58rem;font-weight:700;color:#94a3b8;text-transform:uppercase }
    .ev-dot  { width:8px;height:8px;border-radius:50%;margin-top:4px }
    .ev-body { flex:1 }
    .ev-tipo-pill { font-size:.62rem;font-weight:800;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:3px }
    .ev-titulo { font-size:.87rem;font-weight:700;color:#1e293b;margin-bottom:2px }
    .ev-sub    { font-size:.72rem;color:#64748b }
    .ev-obs    { font-size:.72rem;color:#94a3b8;margin-top:3px;font-style:italic }
    .ev-atrasado { font-size:.62rem;font-weight:800;color:#dc2626 }
    .ev-actions { display:flex;gap:8px;margin-top:6px }
    .ev-btn { font-size:.68rem;font-weight:700;border:none;border-radius:6px;padding:4px 10px;cursor:pointer }
    .ev-btn-ok  { background:#dcfce7;color:#166534 }
    .ev-btn-del { background:#fee2e2;color:#991b1b }
    .ev-btn-undo { background:#f1f5f9;color:#64748b }

    /* Tipo configs */
    .tipo-cfg = {};

    /* Modal de novo evento */
    .modal-bg { position:fixed;inset:0;background:rgba(15,52,96,.45);backdrop-filter:blur(3px);z-index:300;display:flex;align-items:flex-end;justify-content:center }
    .modal-box { background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;box-sizing:border-box;animation:vd-slideup .25s ease }
    .modal-title { font-size:1rem;font-weight:800;color:#1e293b;margin-bottom:16px }
    .m-form-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px }
    .m-form-full { grid-column:1/-1 }
    .m-group label { display:block;font-size:.67rem;font-weight:700;color:#64748b;margin-bottom:4px }
    .m-input { width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 12px;font-size:.85rem;color:#1e293b }
    .m-input:focus { outline:none;border-color:#6366f1 }
    .m-btns { display:flex;gap:10px;margin-top:14px }
    .m-btn-cancel { flex:1;background:#f1f5f9;color:#64748b;border:none;border-radius:10px;padding:12px;font-size:.85rem;font-weight:700;cursor:pointer }
    .m-btn-save   { flex:2;background:#6366f1;color:#fff;border:none;border-radius:10px;padding:12px;font-size:.85rem;font-weight:800;cursor:pointer }

    .vazio { text-align:center;color:#94a3b8;padding:24px;font-size:.82rem }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">🗓️ Agenda Clínica</span>
  <button class="topbar-add" onclick="abrirModal()">+ Novo</button>
</div>

<div id="app" style="padding-bottom:80px">
  <p style="text-align:center;color:#94a3b8;padding:40px 20px;font-size:.85rem">Carregando...</p>
</div>

<div class="toast" id="toast"></div>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script>

/* ─── Configurações de tipo de evento ──────────────── */
const _TIPOS = {
  consulta:   { icon:'👨‍⚕️', label:'Consulta',           cor:'#6366f1', bg:'#ede9fe' },
  exame:      { icon:'🧪', label:'Exame / Coleta',       cor:'#0891b2', bg:'#cffafe' },
  receita:    { icon:'📋', label:'Renovar Receita',      cor:'#d97706', bg:'#fef3c7' },
  retorno:    { icon:'🔄', label:'Retorno / Revisão',    cor:'#0f766e', bg:'#ccfbf1' },
  medicacao:  { icon:'💊', label:'Reposição de Estoque', cor:'#7c3aed', bg:'#ede9fe' },
  vacina:     { icon:'💉', label:'Vacinação',            cor:'#be123c', bg:'#ffe4e6' },
  cirurgia:   { icon:'🏥', label:'Procedimento/Cirurgia',cor:'#1d4ed8', bg:'#dbeafe' },
  outro:      { icon:'📌', label:'Outro',                cor:'#64748b', bg:'#f1f5f9' },
};

const MESES_CURTOS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

let _pid    = null;
let _evs    = [];   // todos os eventos do paciente
let _filtro = 'proximos'; // 'proximos' | 'concluidos' | 'todos'

/* ─── Init ────────────────────────────────────────── */
async function init() {
  _pid = typeof getActivePacienteId === 'function' ? getActivePacienteId() : null;
  if (!_pid) { window.location.href = 'index.html'; return; }
  _evs = (await dbGetConfig('agenda_eventos_' + _pid)) || [];
  /* Importa exames vencidos do rastreio como sugestão (apenas uma vez) */
  await sugerirExamesVencidos();
  render();
}

async function sugerirExamesVencidos() {
  /* Se já existe ao menos 1 evento de exame, não re-sugere */
  if (_evs.some(e => e.tipo === 'exame' && e.origem === 'rastreio_auto')) return;
  /* Sem acesso às regras do rastreio aqui — skip silencioso */
}

/* ─── Render ────────────────────────────────────────── */
function render() {
  const app  = document.getElementById('app');
  const hoje = new Date().toISOString().slice(0,10);

  const pendentes  = _evs.filter(e => !e.concluido && e.data >= hoje).sort((a,b) => a.data.localeCompare(b.data) || (a.hora||'').localeCompare(b.hora||''));
  const atrasados  = _evs.filter(e => !e.concluido && e.data <  hoje).sort((a,b) => b.data.localeCompare(a.data));
  const concluidos = _evs.filter(e =>  e.concluido).sort((a,b) => b.data.localeCompare(a.data));

  /* ── Resumo ── */
  const proximos7 = pendentes.filter(e => {
    const d = new Date(e.data+'T12:00'); const d7 = new Date(); d7.setDate(d7.getDate()+7);
    return d <= d7;
  });

  const evHTML = (ev, isAtrasado) => {
    const t = _TIPOS[ev.tipo] || _TIPOS.outro;
    const [y,m,d] = ev.data.split('-');
    const diasRestantes = Math.ceil((new Date(ev.data+'T12:00') - new Date()) / 86400000);
    const diasTxt = isAtrasado
      ? `${Math.abs(diasRestantes)} dia${Math.abs(diasRestantes)!==1?'s':''} atrasado`
      : diasRestantes === 0 ? 'Hoje!'
      : diasRestantes === 1 ? 'Amanhã'
      : `em ${diasRestantes} dias`;

    return `<div class="ev-item${ev.concluido?' concluido':''}">
      <div class="ev-left">
        <span class="ev-dia">${d}</span>
        <span class="ev-mes">${MESES_CURTOS[+m-1]}</span>
        <div class="ev-dot" style="background:${t.cor}"></div>
      </div>
      <div class="ev-body">
        <span class="ev-tipo-pill" style="background:${t.bg};color:${t.cor}">${t.icon} ${t.label}</span>
        <p class="ev-titulo">${ev.titulo}</p>
        ${ev.hora ? `<p class="ev-sub">⏰ ${ev.hora}${ev.local?' · 📍 '+ev.local:''}</p>` : (ev.local ? `<p class="ev-sub">📍 ${ev.local}</p>` : '')}
        ${ev.obs  ? `<p class="ev-obs">${ev.obs}</p>` : ''}
        ${isAtrasado ? `<p class="ev-atrasado">⚠️ ${diasTxt}</p>`
          : !ev.concluido ? `<p class="ev-sub" style="color:${diasRestantes<=3?'#d97706':'#94a3b8'}">${diasTxt}</p>` : ''}
        <div class="ev-actions">
          ${!ev.concluido
            ? `<button class="ev-btn ev-btn-ok"  onclick="concluir('${ev.id}')">✓ Concluído</button>`
            : `<button class="ev-btn ev-btn-undo" onclick="reabrirEv('${ev.id}')">↩ Reabrir</button>`}
          <button class="ev-btn ev-btn-del" onclick="excluir('${ev.id}')">Excluir</button>
        </div>
      </div>
    </div>`;
  };

  app.innerHTML = `
    <!-- Resumo -->
    <div class="resumo">
      <div class="res-item"><div class="res-num" style="color:#dc2626">${atrasados.length}</div><div class="res-lbl">Atrasados</div></div>
      <div class="res-item"><div class="res-num" style="color:#d97706">${proximos7.length}</div><div class="res-lbl">Próximos 7d</div></div>
      <div class="res-item"><div class="res-num" style="color:#16a34a">${concluidos.length}</div><div class="res-lbl">Concluídos</div></div>
    </div>

    ${atrasados.length ? `
    <p class="sec-title">⚠️ Atrasados (${atrasados.length})</p>
    <div class="ev-card">${atrasados.map(e => evHTML(e, true)).join('')}</div>` : ''}

    ${pendentes.length ? `
    <p class="sec-title">📅 Próximos eventos (${pendentes.length})</p>
    <div class="ev-card">${pendentes.map(e => evHTML(e, false)).join('')}</div>` : ''}

    ${!atrasados.length && !pendentes.length ? `
    <p class="vazio">Nenhum evento pendente.<br>Toque em <strong>+ Novo</strong> para agendar.</p>` : ''}

    ${concluidos.length ? `
    <p class="sec-title">✅ Concluídos (${concluidos.length})</p>
    <div class="ev-card">${concluidos.slice(0,20).map(e => evHTML(e, false)).join('')}</div>` : ''}
  `;
}

/* ─── Ações ──────────────────────────────────────── */
async function concluir(id) {
  const ev = _evs.find(e => e.id === id);
  if (ev) { ev.concluido = true; ev.concluidoEm = new Date().toISOString(); }
  await salvarEvs();
  render();
}
async function reabrirEv(id) {
  const ev = _evs.find(e => e.id === id);
  if (ev) { ev.concluido = false; delete ev.concluidoEm; }
  await salvarEvs();
  render();
}
async function excluir(id) {
  _evs = _evs.filter(e => e.id !== id);
  await salvarEvs();
  showToast('Evento removido');
  render();
}
async function salvarEvs() {
  await dbSetConfig('agenda_eventos_' + _pid, _evs);
}

/* ─── Modal de novo evento ───────────────────────── */
function abrirModal(prefill = {}) {
  const hoje = new Date().toISOString().slice(0,10);
  const tiposOpts = Object.entries(_TIPOS).map(([k,v]) =>
    `<option value="${k}"${k===(prefill.tipo||'consulta')?' selected':''}>${v.icon} ${v.label}</option>`
  ).join('');

  const div = document.createElement('div');
  div.className = 'modal-bg';
  div.id = 'modal-novo';
  div.innerHTML = `
    <div class="modal-box" onclick="event.stopPropagation()">
      <p class="modal-title">📌 Novo Evento</p>
      <div class="m-form-grid">
        <div class="m-group m-form-full">
          <label>Tipo de evento</label>
          <select class="m-input" id="m-tipo" style="appearance:auto">${tiposOpts}</select>
        </div>
        <div class="m-group m-form-full">
          <label>Título / Descrição</label>
          <input class="m-input" id="m-titulo" placeholder="Ex: Consulta Dr. Silva · Hemograma completo"
            value="${prefill.titulo||''}">
        </div>
        <div class="m-group">
          <label>Data</label>
          <input class="m-input" id="m-data" type="date" value="${prefill.data||hoje}">
        </div>
        <div class="m-group">
          <label>Hora (opcional)</label>
          <input class="m-input" id="m-hora" type="time" value="${prefill.hora||''}">
        </div>
        <div class="m-group m-form-full">
          <label>Local / Especialidade (opcional)</label>
          <input class="m-input" id="m-local" placeholder="Ex: UBS Centro · Cardiologia" value="${prefill.local||''}">
        </div>
        <div class="m-group m-form-full">
          <label>Observações</label>
          <input class="m-input" id="m-obs" placeholder="Ex: Levar exames anteriores · Jejum de 12h" value="${prefill.obs||''}">
        </div>
      </div>
      <div class="m-btns">
        <button class="m-btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="m-btn-save"   onclick="salvarEvento()">✓ Salvar</button>
      </div>
    </div>`;
  div.addEventListener('click', fecharModal);
  document.body.appendChild(div);
  document.getElementById('m-titulo').focus();
}

function fecharModal() {
  document.getElementById('modal-novo')?.remove();
}

async function salvarEvento() {
  const titulo = document.getElementById('m-titulo').value.trim();
  const data   = document.getElementById('m-data').value;
  if (!titulo) { showToast('Informe o título do evento'); return; }
  if (!data)   { showToast('Informe a data');             return; }

  const ev = {
    id:       Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    tipo:     document.getElementById('m-tipo').value,
    titulo,
    data,
    hora:     document.getElementById('m-hora').value   || null,
    local:    document.getElementById('m-local').value.trim() || null,
    obs:      document.getElementById('m-obs').value.trim()   || null,
    concluido:false,
    criadoEm: new Date().toISOString(),
  };

  _evs.push(ev);
  await salvarEvs();
  fecharModal();
  showToast('✓ Evento agendado');
  render();

  /* Notificação (se dia de hoje ou amanhã e permissão ok) */
  agendarNotifEvento(ev);
}

function agendarNotifEvento(ev) {
  if (Notification.permission !== 'granted') return;
  const hoje = new Date().toISOString().slice(0,10);
  const amanha = new Date(); amanha.setDate(amanha.getDate()+1);
  const amStr  = amanha.toISOString().slice(0,10);
  if (ev.data !== hoje && ev.data !== amStr) return;
  const t = _TIPOS[ev.tipo]||_TIPOS.outro;
  const quando = ev.data === hoje ? 'Hoje' : 'Amanhã';
  setTimeout(() => {
    new Notification(`${t.icon} ${quando} — VitaDose`, {
      body: `${ev.titulo}${ev.hora?' às '+ev.hora:''}`,
      icon: '/icons/icon-192.svg',
    });
  }, 500);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
