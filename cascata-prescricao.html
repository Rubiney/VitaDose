<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Cascata de Prescrição — VitaDose</title>
  <link rel="stylesheet" href="css/vitadose.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#7f1d1d;position:sticky;top:0;z-index:100}
    .back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:1rem}
    .topbar-title{font-size:.93rem;font-weight:800;color:#fff;flex:1}
    .topbar-sub{font-size:.62rem;color:rgba(255,255,255,.7);margin-top:1px}
    .btn-top{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:4px}
    main{max-width:660px;margin:0 auto;padding:12px 14px 90px}
    .pac-sel{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px 14px;font-size:.88rem;margin-bottom:10px;background:#fff}

    /* Sumário */
    .sum-bar{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .sum-item{text-align:center;flex:1;min-width:70px}
    .sum-n{font-size:1.8rem;font-weight:900}
    .sum-lbl{font-size:.62rem;font-weight:700;color:#64748b;text-transform:uppercase}

    /* Card de cascata */
    .casc-card{background:#fff;border-radius:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border-left:5px solid}
    .casc-header{padding:13px 14px;cursor:pointer}
    .casc-tag{font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:5px}
    .tag-alta{background:#fee2e2;color:#991b1b}
    .tag-moderada{background:#fef3c7;color:#92400e}
    .tag-baixa{background:#f1f5f9;color:#64748b}
    .casc-titulo{font-size:.84rem;font-weight:800;color:#1e293b;line-height:1.3}
    .casc-meds{font-size:.72rem;color:#475569;margin-top:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .med-pill{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:20px;padding:3px 10px;font-size:.67rem;font-weight:700}
    .med-arrow{font-size:.85rem;color:#94a3b8}
    .status-badge{font-size:.62rem;font-weight:800;padding:3px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}
    .sb-suspeita{background:#fee2e2;color:#991b1b}
    .sb-confirmada{background:#fecaca;color:#7f1d1d}
    .sb-justificada{background:#dcfce7;color:#166534}
    .sb-incerta{background:#fef3c7;color:#92400e}
    .casc-body{padding:12px 14px;border-top:1px solid #f1f5f9}
    .casc-body.collapsed{display:none}
    .info-row{display:flex;gap:8px;margin-bottom:8px}
    .info-lbl{font-size:.65rem;font-weight:800;color:#94a3b8;min-width:90px;text-transform:uppercase;line-height:1.5}
    .info-txt{font-size:.75rem;color:#334155;line-height:1.5;flex:1}
    .alt-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:9px;padding:9px 12px;font-size:.74rem;color:#14532d;margin-top:8px;line-height:1.5}
    .decisao-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .dec-btn{flex:1;min-width:110px;padding:8px 8px;border-radius:9px;border:1.5px solid #e2e8f0;font-size:.7rem;font-weight:700;cursor:pointer;background:#f8fafc;text-align:center;transition:.12s}
    .dec-btn.sel-casc{background:#fee2e2;border-color:#f87171;color:#991b1b}
    .dec-btn.sel-just{background:#dcfce7;border-color:#22c55e;color:#166534}
    .dec-btn.sel-inc{background:#fef3c7;border-color:#fbbf24;color:#92400e}
    .obs-inp{width:100%;box-sizing:border-box;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:.75rem;resize:vertical;min-height:48px;margin-top:8px}

    .empty{text-align:center;padding:40px;color:#94a3b8;font-size:.8rem}
    .all-ok{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:16px;text-align:center;color:#14532d;font-size:.8rem;font-weight:700;margin-bottom:10px}
    .ref-box{background:#fff1f2;border:1.5px solid #fecdd3;border-radius:10px;padding:10px 12px;font-size:.72rem;color:#7f1d1d;line-height:1.8;margin-top:10px}
    @media print{.topbar,.pac-sel,.btn-top,nav,.decisao-row{display:none!important}body{background:#fff}main{padding:0}}
  </style>
</head>
<body>

  <button class="btn-top" onclick="salvarTudo()">💾</button>

</div>
<main>

</main>
<nav class="bottom-nav">

<script>
const CASCADE_DB = [
  {
    id:'aine_anti-hp',
    m1:/nsaid|aine|ibuprofeno|naproxeno|diclofenaco|meloxicam|piroxicam|celecoxibe|indometacina|cetoprofeno|nimesulida/i,
    m2:/losartana|enalapril|captopril|lisinopril|ramipril|perindopril|amlodipina|anlodipino|hidroclorotiazida|atenolol|metoprolol|carvedilol|valsartana|irbesartana|anti.hipertensivo|telmisartana|olmesartana|furosemida|clonidina|anlodipina/i,
    lbl:'AINE → Anti-hipertensivo',
    ram:'Elevação da PA induzida por AINE',
    cascade:'Hipertensão arterial (pode ser falsamente diagnosticada como de novo)',
    mecanismo:'AINEs causam retenção de sódio e água, vasoconstrição renal e antagonismo direto dos anti-hipertensivos, elevando a PA em 3–5 mmHg em média.',
    alternativa:'Substituir AINE por paracetamol para dor. Se AINE indispensável, verificar se a HAS precedeu ou seguiu o início do AINE. Monitorar PA rigorosamente.',
    evidencia:'alta',
    ref:'Gurwitz JH et al. JAMA 1994;271(10):751-4; Rochon PA & Gurwitz JH. Lancet 1995;353:832-6'
  },
  {
    id:'metoclo_parkin',
    m1:/metoclopramida|metoclopramide/i,
    m2:/levodopa|carbidopa|pramipexol|ropinirol|biperideno|triexifenidil|amantadina|selegilina|rasagilina|entacapona/i,
    lbl:'Metoclopramida → Antiparkinsoniano',
    ram:'Parkinsonismo induzido por fármaco',
    cascade:'Doença de Parkinson de início tardio (diagnóstico equivocado)',
    mecanismo:'Metoclopramida bloqueia receptores D2 no striatum — causa tremor, rigidez e bradicinesia indistinguíveis de Parkinson em 10% dos usuários crônicos.',
    alternativa:'Substituir metoclopramida por domperidona (não atravessa BHE) ou ondansetrona. O parkinsonismo regride em semanas após suspensão.',
    evidencia:'alta',
    ref:'Ganzini L et al. Arch Intern Med 1993; Mallet L et al. Can Pharm J 2012'
  },
  {
    id:'tiazid_gota',
    m1:/hidroclorotiazida|clortalidona|indapamida|tiazid/i,
    m2:/alopurinol|febuxostate|colchicina|probenecida|rasburicase|gota|hiperuricemia/i,
    lbl:'Tiazídico → Alopurinol/Colchicina',
    ram:'Hiperuricemia / Gota aguda',
    cascade:'Artrite gotosa (atribuída à doença primária)',
    mecanismo:'Tiazídicos competem com o ácido úrico pela secreção tubular, elevando uricemia em 1–2 mg/dL e precipitando gota em pacientes predispostos.',
    alternativa:'Considerar troca do tiazídico por outro anti-hipertensivo (losartana tem efeito uricosúrico leve). Tratar a causa, não apenas o ataque gotoso.',
    evidencia:'alta',
    ref:'Gurwitz JH et al. JAMA 1994;271(10):751-4'
  },
  {
    id:'ieca_bronco',
    m1:/enalapril|captopril|lisinopril|ramipril|perindopril|benazepril|fosinopril|trandolapril|imidapril/i,
    m2:/salbutamol|formoterol|budesonida|beclometasona|ipratropio|fluticasona|salmeterol|tiotropio|montelucaste|teofilina|aminofilina|brometo/i,
    lbl:'IECA → Broncodilatador',
    ram:'Tosse seca persistente por IECA',
    cascade:'Asma ou DPOC de início tardio (diagnóstico equivocado)',
    mecanismo:'IECAs acumulam bradicinina e substância P nas vias aéreas, causando tosse seca em 10–30% (mais em mulheres e asiáticos). Pode ser confundida com asma.',
    alternativa:'Substituir IECA por BRA (losartana, valsartana, etc.) — eficácia equivalente, incidência de tosse <1%.',
    evidencia:'alta',
    ref:'Irwin RS et al. Chest 1998; Yeo WW & Ramsay LE. Eur J Clin Pharmacol 1990'
  },
  {
    id:'estatina_analgésico',
    m1:/atorvastatina|sinvastatina|rosuvastatina|lovastatina|pravastatina|fluvastatina|pitavastatina/i,
    m2:/ibuprofeno|naproxeno|diclofenaco|meloxicam|paracetamol|dipirona|tramadol|codeína|morfina|pregabalina|gabapentina|amitriptilina|ciclobenzaprina/i,
    lbl:'Estatina → Analgésico/Miorrelaxante',
    ram:'Mialgia / Dor muscular induzida por estatina',
    cascade:'Dor crônica / Fibromialgia / Polineuropatia (diagnóstico impreciso)',
    mecanismo:'Mialgia ocorre em 5–10% dos usuários de estatinas (depleção de CoQ10, disfunção mitocondrial). A dor muscular é tratada com analgésicos em vez de investigar e corrigir a causa.',
    alternativa:'Dosar CPK. Se mialgia: reduzir dose, trocar a estatina (pravastatina e fluvastatina têm menor miotoxicidade) ou avaliar suspensão temporária.',
    evidencia:'moderada',
    ref:'Stroes ES et al. Eur Heart J 2015;36(17):1012-22; Banach M et al. Atherosclerosis 2015'
  },
  {
    id:'antipsic_parkin',
    m1:/haloperidol|risperidona|clorpromazina|levomepromazina|ziprasidona|flufenazina|trifluoperazina/i,
    m2:/biperideno|triexifenidil|amantadina|levodopa|pramipexol|ropinirol/i,
    lbl:'Antipsicótico → Antiparkinsoniano',
    ram:'Efeitos extrapiramidais (EPS)',
    cascade:'Parkinsonismo / Doença de Parkinson',
    mecanismo:'Antipsicóticos típicos bloqueiam D2 no nigroestriado, causando EPS em 20–40% dos pacientes. O uso de antiparkinsonianos cria carga anticolinérgica adicional.',
    alternativa:'Reduzir dose do antipsicótico, trocar por atípico com menor afinidade D2 (quetiapina, clozapina). Antiparkinsonianos anticolinérgicos devem ser evitados em idosos (Beers).',
    evidencia:'alta',
    ref:'Nasrallah HA et al. J Clin Psychiatry 2009; AGS Beers Criteria 2023'
  },
  {
    id:'bcc_diuretico',
    m1:/amlodipina|anlodipino|nifedipina|felodipina|isradipina/i,
    m2:/furosemida|hidroclorotiazida|espironolactona|clortalidona|indapamida/i,
    lbl:'BCC Di-hidropiridínico → Diurético',
    ram:'Edema periférico de membros inferiores',
    cascade:'Insuficiência cardíaca ou venosa (diagnóstico equivocado)',
    mecanismo:'Edema por BCC di-hidropiridínicos é por vasodilatação capilar LOCAL — não é retenção de sódio. Diuréticos são ineficazes e causam hipopotassemia desnecessária.',
    alternativa:'Reduzir dose do BCC, trocar por não-di-hidropiridínico (diltiazem) ou substituir por IECA/BRA. O edema regride com suspensão/redução do BCC.',
    evidencia:'alta',
    ref:'Messerli FH. N Engl J Med 2003;348(10):884; Makani H et al. BMJ 2011'
  },
  {
    id:'cort_diabetico',
    m1:/prednisona|prednisolona|dexametasona|betametasona|hidrocortisona|metilprednisolona/i,
    m2:/insulina|metformina|glibenclamida|gliclazida|glimepirida|sitagliptina|empagliflozina|dapagliflozina|liraglutida|semaglutida|glipizida/i,
    lbl:'Corticoide → Antidiabético',
    ram:'Hiperglicemia induzida por corticoide',
    cascade:'Diabetes mellitus (pode ser transitório)',
    mecanismo:'Corticosteroides induzem resistência insulínica e gliconeogênese hepática, elevando glicemia em 100–200 mg/dL. Em não-diabéticos, pode ser interpretado como DM2 permanente.',
    alternativa:'Verificar se a hiperglicemia precedeu o corticoide. Monitorar glicemia durante o tratamento. Se DM induzido, avaliar resolução após suspensão antes de manter antidiabético.',
    evidencia:'alta',
    ref:'Clore JN & Thurby-Hay L. Endocr Pract 2009;15(5):469-74'
  },
  {
    id:'cort_anti-hp',
    m1:/prednisona|prednisolona|dexametasona|betametasona|hidrocortisona|metilprednisolona/i,
    m2:/losartana|enalapril|captopril|amlodipina|anlodipino|atenolol|metoprolol|carvedilol|anti.hipertensivo|valsartana|irbesartana|olmesartana|telmisartana/i,
    lbl:'Corticoide → Anti-hipertensivo',
    ram:'Hipertensão arterial induzida por corticoide',
    cascade:'HAS (pode ser transitória/reversível)',
    mecanismo:'Corticosteroides causam retenção de sódio por ação mineralocorticoide e aumentam a responsividade vascular. A PA pode normalizar após redução/suspensão do corticoide.',
    alternativa:'Verificar histórico de PA antes do corticoide. Usar corticoides de menor potência mineralocorticoide (prednisolona > betametasona). Reavaliar necessidade do anti-hipertensivo.',
    evidencia:'moderada',
    ref:'Souverein PC et al. Eur J Clin Pharmacol 2004;60(7):483-8'
  },
  {
    id:'litio_hipotir',
    m1:/carbonato de lítio|lítio|litio/i,
    m2:/levotiroxina|tiroxina|l-tiroxina|t4/i,
    lbl:'Lítio → Levotiroxina',
    ram:'Hipotireoidismo induzido por lítio',
    cascade:'Hipotireoidismo primário (pode ser secundário ao lítio)',
    mecanismo:'Lítio inibe síntese e secreção de T3/T4 e pode induzir tireoidite autoimune. Hipotireoidismo ocorre em 20–40% dos usuários crônicos.',
    alternativa:'Monitorar TSH anualmente. Considerar se o hipotireoidismo resolveria com redução/suspensão do lítio antes de iniciar levotiroxina permanente.',
    evidencia:'alta',
    ref:'Shine B et al. J Affect Disord 2015;184:233-9'
  },
  {
    id:'amio_tireoid',
    m1:/amiodarona/i,
    m2:/levotiroxina|tiroxina|propiltiouracil|metimazol|tiamazol/i,
    lbl:'Amiodarona → Tratamento Tireoidiano',
    ram:'Disfunção tireoidiana induzida por amiodarona',
    cascade:'Hipotireoidismo ou hipertireoidismo primário',
    mecanismo:'Amiodarona contém 37% de iodo; inibe conversão T4→T3 (hipotireoidismo) ou causa tireoidite (hipertireoidismo) em 15–20% dos pacientes.',
    alternativa:'TSH a cada 6 meses em usuários de amiodarona. Avaliar se a substituição da amiodarona resolveria a disfunção antes de iniciar tratamento tireoidiano indefinido.',
    evidencia:'alta',
    ref:'Martino E et al. Endocr Rev 2001;22(2):240-54'
  },
  {
    id:'beta_bronco',
    m1:/propranolol|atenolol|metoprolol|nadolol|timolol/i,
    m2:/salbutamol|formoterol|salmeterol|bambuterol|brometo|ipratropio|budesonida|beclometasona|fluticasona|montelucaste|teofilina/i,
    lbl:'Betabloqueador → Broncodilatador',
    ram:'Broncoespasmo induzido por betabloqueador',
    cascade:'Asma ou DPOC (diagnóstico equivocado)',
    mecanismo:'Betabloqueadores não seletivos bloqueiam β2 nos pulmões, causando broncoespasmo. Mais risco com propranolol, atenolol do que com bisoprolol ou nebivolol (cardiosseletivos).',
    alternativa:'Trocar por betabloqueador cardiosseletivo (bisoprolol, nebivolol, carvedilol em baixa dose). Avaliar se o broncoespasmo é causa ou consequência antes de iniciar broncodilatador.',
    evidencia:'moderada',
    ref:'Salpeter S et al. Cochrane Database Syst Rev 2002; Van der Woude HJ et al. Chest 2005'
  },
];

let _meds=[], _decisoes={}, _pid=null;

async function init(){
  _pid=parseInt(document.getElementById('sel-pac').value)||null;
  if(!_pid){document.getElementById('conteudo').innerHTML='';return;}
  _meds=(await dbGetByIndex('medicamentos','pacienteId',_pid)||[]).filter(m=>m.ativo!==false&&m.ativo!==0);
  const saved=await dbGetConfig('cascata_'+_pid)||{};
  _decisoes=saved.decisoes||{};
  render();
}

function detectar(){
  const str=_meds.map(m=>(m.nome||m.medicamento||'').toLowerCase()).join('\n');
  const encontradas=[];
  CASCADE_DB.forEach(c=>{
    const nomes1=_meds.filter(m=>c.m1.test(m.nome||m.medicamento||'')).map(m=>m.nome||m.medicamento);
    const nomes2=_meds.filter(m=>c.m2.test(m.nome||m.medicamento||'')).map(m=>m.nome||m.medicamento);
    if(nomes1.length&&nomes2.length){
      encontradas.push({...c,nomes1,nomes2});
    }
  });
  return encontradas;
}

function render(){
  if(!_meds.length){
    document.getElementById('conteudo').innerHTML='<div class="empty">Nenhum medicamento ativo cadastrado.</div>';
    return;
  }
  const cascatas=detectar();
  const confirmadas=cascatas.filter(c=>(_decisoes[c.id]||{}).decisao==='cascata').length;
  const justificadas=cascatas.filter(c=>(_decisoes[c.id]||{}).decisao==='justificada').length;
  const pendentes=cascatas.filter(c=>!(_decisoes[c.id]||{}).decisao).length;

  let html=`<div class="sum-bar">
    <div class="sum-item"><div class="sum-n" style="color:#7f1d1d">${cascatas.length}</div><div class="sum-lbl">Pares suspeitos</div></div>
    <div class="sum-item"><div class="sum-n" style="color:#dc2626">${confirmadas}</div><div class="sum-lbl">Confirmadas</div></div>
    <div class="sum-item"><div class="sum-n" style="color:#16a34a">${justificadas}</div><div class="sum-lbl">Justificadas</div></div>
    <div class="sum-item"><div class="sum-n" style="color:#f97316">${pendentes}</div><div class="sum-lbl">Pendentes</div></div>
  </div>`;

  if(!cascatas.length){
    html+=`<div class="all-ok">✅ Nenhuma cascata de prescrição detectada nos ${_meds.length} medicamento(s) ativo(s).<br>
    <span style="font-size:.72rem;font-weight:400;color:#166534">Base: ${CASCADE_DB.length} pares de cascata conhecidos verificados.</span></div>`;
  } else {
    cascatas.forEach((c,ci)=>{
      const dec=_decisoes[c.id]||{};
      const {decisao='',obs=''}=dec;
      const corEv=c.evidencia==='alta'?'#dc2626':c.evidencia==='moderada'?'#f97316':'#64748b';
      const corCard=decisao==='cascata'?'#dc2626':decisao==='justificada'?'#22c55e':decisao==='incerta'?'#fbbf24':'#f97316';
      const badgeCls=decisao==='cascata'?'sb-confirmada':decisao==='justificada'?'sb-justificada':decisao==='incerta'?'sb-incerta':'sb-suspeita';
      const badgeLbl=decisao==='cascata'?'Cascata confirmada':decisao==='justificada'?'Co-prescrição justificada':decisao==='incerta'?'Incerto':'Suspeita';

      html+=`<div class="casc-card" style="border-left-color:${corCard}">
        <div class="casc-header" onclick="toggle(${ci})">
          <div style="display:flex;align-items:flex-start;gap:8px">
            <div style="flex:1">
              <span class="casc-tag ${c.evidencia==='alta'?'tag-alta':c.evidencia==='moderada'?'tag-moderada':'tag-baixa'}">Evidência ${c.evidencia}</span>
              <div class="casc-titulo">${esc(c.lbl)}</div>
              <div class="casc-meds">
                ${c.nomes1.map(n=>`<span class="med-pill">${esc(n)}</span>`).join('')}
                <span class="med-arrow">→ RAM →</span>
                ${c.nomes2.map(n=>`<span class="med-pill">${esc(n)}</span>`).join('')}
              </div>
            </div>
            <span class="status-badge ${badgeCls}">${badgeLbl}</span>
          </div>
        </div>
        <div class="casc-body collapsed" id="body-${ci}">
          <div class="info-row"><span class="info-lbl">RAM causadora</span><span class="info-txt">${esc(c.ram)}</span></div>
          <div class="info-row"><span class="info-lbl">Diagnóstico questionável</span><span class="info-txt">${esc(c.cascade)}</span></div>
          <div class="info-row"><span class="info-lbl">Mecanismo</span><span class="info-txt">${esc(c.mecanismo)}</span></div>
          <div class="alt-box">💡 <strong>Alternativa farmacêutica:</strong><br>${esc(c.alternativa)}</div>
          <div style="font-size:.65rem;color:#94a3b8;margin-top:6px">Ref: ${esc(c.ref)}</div>
          <div class="decisao-row">
            <div class="dec-btn ${decisao==='cascata'?'sel-casc':''}" onclick="setDec('${c.id}','cascata',this)">🔗 Cascata confirmada</div>
            <div class="dec-btn ${decisao==='justificada'?'sel-just':''}" onclick="setDec('${c.id}','justificada',this)">✅ Co-prescrição justificada</div>
            <div class="dec-btn ${decisao==='incerta'?'sel-inc':''}" onclick="setDec('${c.id}','incerta',this)">❔ Incerto — investigar</div>
          </div>
          <textarea class="obs-inp" id="obs-${c.id}" placeholder="Observações clínicas...">${esc(obs)}</textarea>
        </div>
      </div>`;
    });
  }

  html+=`<div class="ref-box">
    <strong>O que é cascata de prescrição?</strong><br>
    Ocorre quando um efeito adverso de um medicamento é interpretado como nova doença e tratado com um segundo medicamento — que por sua vez pode causar mais efeitos adversos.<br><br>
    Rochon PA, Gurwitz JH. <em>Lancet</em>. 1995;353:832-6 (conceito original) ·
    Gurwitz JH et al. <em>JAMA</em>. 1994;271(10):751-4 ·
    Petrovic M et al. <em>Drugs Aging</em>. 2012;29(7):521-30
  </div>`;

  document.getElementById('conteudo').innerHTML=html;
}

function toggle(ci){
  const b=document.getElementById('body-'+ci);
  b.classList.toggle('collapsed');
}

function setDec(id,val,btn){
  if(!_decisoes[id]) _decisoes[id]={};
  _decisoes[id].decisao=val;
  btn.closest('.decisao-row').querySelectorAll('.dec-btn').forEach(b=>b.className='dec-btn');
  btn.classList.add(val==='cascata'?'sel-casc':val==='justificada'?'sel-just':'sel-inc');
  // Atualiza badge e borda do card
  const card=btn.closest('.casc-card');
  if(!card)return;
  const badge=card.querySelector('.status-badge');
  const corCard=val==='cascata'?'#dc2626':val==='justificada'?'#22c55e':'#fbbf24';
  const badgeCls=val==='cascata'?'sb-confirmada':val==='justificada'?'sb-justificada':'sb-incerta';
  const badgeLbl=val==='cascata'?'Cascata confirmada':val==='justificada'?'Co-prescrição justificada':'Incerto';
  card.style.borderLeftColor=corCard;
  if(badge){badge.className='status-badge '+badgeCls;badge.textContent=badgeLbl;}
}

async function salvarTudo(){
  if(!_pid){showToast('Selecione um paciente');return;}
  // Coleta observações
  document.querySelectorAll('[id^="obs-"]').forEach(el=>{
    const id=el.id.replace('obs-','');
    if(!_decisoes[id]) _decisoes[id]={};
    _decisoes[id].obs=el.value;
  });
  const cascatas=detectar();
  const confirmadas=cascatas.filter(c=>(_decisoes[c.id]||{}).decisao==='cascata').length;
  await dbSetConfig('cascata_'+_pid,{decisoes:{..._decisoes},total:cascatas.length,confirmadas,data:hoje()});
  showToast(`✅ Avaliação salva — ${confirmadas} cascata(s) confirmada(s) de ${cascatas.length} suspeita(s)`);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.addEventListener('DOMContentLoaded',async()=>{
  const pacs=await dbGetAll('pacientes');
  const sel=document.getElementById('sel-pac');
  sel.innerHTML='<option value="">Selecione o paciente...</option>'+pacs.map(p=>`<option value="${p.id}">${esc(p.nome||'Paciente '+p.id)}</option>`).join('');
  const pid=getActivePacienteId();
  if(pid){sel.value=pid;await init();}
});
</script>
